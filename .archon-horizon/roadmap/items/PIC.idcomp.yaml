  §1 group-scheme leaves (identity-component clopen / subgroup / base change) need
  Stacks **037Q/04KU** (connected $k$-scheme + $k$-rational section $\Rightarrow$
  geometrically connected) and **02LB/04KS** clopen-descent, both absent from v4.31
  Mathlib; the $\mathrm{Pic}^{0}$-specific leaves (`Pic0Scheme`, `degree`, `isAbelianVariety`,
  `finrank_eq_genus`) inherit the FGA sorry-taint (`AJC.picrep`) and the tangent-space
  comparison (`AJC.pic0av`).

  '
