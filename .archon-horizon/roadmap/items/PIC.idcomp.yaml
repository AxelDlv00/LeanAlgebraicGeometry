  and its abelian-variety structure:

  $$e\in\mathrm{Pic}^{0}_{C/k}=\big(\underline{\mathrm{Pic}}_{C/k}\big)^{\!\circ},\qquad
  \dim_k\mathrm{Pic}^{0}_{C/k}=g .$$

  Builds green (byte-identical to the AJC copies) as an FBC-free, isolated iteration
