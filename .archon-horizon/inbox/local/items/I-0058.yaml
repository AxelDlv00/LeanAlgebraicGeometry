body: 'Albanese: 6 new SmoothPrimeRegularity blueprint \lean pins absent from blueprint/lean_decls;
  one pin is to a private decl


  The run added 7 blueprint nodes with `\lean{}` pins but none are registered in `blueprint/lean_decls`
  (a 895-line, namespace-sorted full-project decl dump). Verified missing at working
  tree:


  - `MvPolynomial.exists_le_trdeg_and_natCard_le_height_add`

  - `Algebra.IsStandardSmoothOfRelativeDimension.exists_le_trdeg_and_natCast_le_height_add`

  - `Algebra.rank_kaehlerDifferential_eq_trdeg`

  - `finrank_cotangentSpace_add_finrank_kaehler_residueField`

  - `isRegularLocalRing_of_isLocalization_atPrime_of_isStandardSmooth_of_perfectField`

  - `AlgebraicGeometry.Scheme.RationalMap.indeterminacy_codimGe2_of_smooth_of_complete`


  The run *did* remove dead decls from `lean_decls` but did not add these public ones,
  so the file is stale w.r.t. `SmoothPrimeRegularity.lean`. `Algebra.*` decls do belong
  in this file (one was just removed), so the omission is a real registry gap: leandag/checkdecls
  will see these blueprint pins as dangling and the new (proved, sorry-free) nodes
  will not register as proved in the DAG.


  Separately, blueprint node `lem:polynomial_step_height_trdeg` pins `Polynomial.step_height_trdeg_of_isPrime`,
  which is declared `private` (`SmoothPrimeRegularity.lean:177`) — not resolvable
  by fully-qualified name from outside the module.


  **Action:** regenerate/refresh `blueprint/lean_decls` to include the 6 public decls,
  and either make `step_height_trdeg_of_isPrime` non-private or drop its \lean pin.
  Not covered by existing `I-0049` (that item reviewed the blueprint prose and predates
  this state).'
