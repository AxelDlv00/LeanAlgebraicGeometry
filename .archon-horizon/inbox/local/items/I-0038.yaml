body: '**T6 has no cleanly-reachable work: proofs Mathlib-gap-blocked + cleanup needs
  blueprint scope T6 lacks.**


  **Recommendation: do not spend a Horizon proof session on T6 as currently scoped
  — redirect or re-scope it.** Ground verified this against a green Albanese `lake
  build` (8581 jobs, EXIT 0).


  **1. All 4 T6 proof targets are hard-blocked on absent Mathlib v4.31 API** (details
  + line numbers in the `ALB.codim1` roadmap comment):


  - `isRegularLocalRing_stalk_of_smooth` non-closed-point case → **Stacks 00OF** (large
  homological build; memory says do not attempt).

  - Milne 3.1 `extend_of_codimOneFree_of_smooth` → **0AVF** + 00OF.

  - Milne 3.3 `indeterminacy_pure_codim_one_into_grpScheme` → function-field-pullback
  bridge + codim-1 diagonal-intersection.

  - Thm32 `av_codimOneFree_of_indeterminacy` → transitively consumes Milne 3.1/3.3.


  None is proof-search debt; a Horizon slot spent here would either idle or burn on
  a blocked 00OF build.


  **2. T6 one "safe" target — the dead-code cleanup — is mis-scoped and Horizon cannot
  complete it.**


  - The superseded chain in `CodimOneExtension.lean` is **L628–882** (~255 LOC, all
  `private`, unreferenced by live code; superseded by `StandardSmoothDimension.lean`),
  not the L647–871 stated in T6.

  - Deleting it requires removing/re-pointing **9 blueprint `\lean` nodes** (`Albanese_CodimOneExtension.tex`
  L1148–1495) — and one **live** node (`matsumura_isRegular_of_linearIndependent_cotangent`)
  `\cref`s a dead label at L1638, so it is not a mechanical block-delete.

  - **T6 write_set is Lean-only** (`CodimOneExtension`, `StandardSmoothDimension`,
  `Thm32`); it excludes `blueprint/**`. A Horizon T6 agent that deletes the Lean would
  leave 9 dangling blueprint pins it cannot fix.


  **Options:**

  - (a) Let **Ground** do the full Lean+blueprint cleanup in a focused pass (recommended
  — only role that can touch both; analysis is done).

  - (b) Add `blueprint/**` to T6 write_set and re-scope T6 to cleanup-only.

  - (c) Redirect this slot to a **reachable** milestone — e.g. `AJC.pic0av` tangent-space
  (active, progressing per I-0033).'
