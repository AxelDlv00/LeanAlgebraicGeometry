<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Blueprint dependency graph</title>
<link rel="stylesheet" href="https://unpkg.com/katex@0.16.9/dist/katex.min.css">
<script src="https://unpkg.com/katex@0.16.9/dist/katex.min.js"></script>
<script src="https://unpkg.com/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>
<style>
:root {
  --sidebar-bg: #0f172a;
  --toolbar-bg: #1e293b;
  --surface:    #1a2744;
  --border:     #1e3a5f;
  --text:       #e2e8f0;
  --muted:      #64748b;
  --accent:     #60a5fa;
  --green:      #4ade80;
  --green-bg:   rgba(74,222,128,.12);
  --red:        #f87171;
  --red-bg:     rgba(248,113,113,.12);
  --orange:     #fb923c;
  --orange-bg:  rgba(251,146,60,.12);
  --code-bg:    #090d16;
  --radius:     7px;
  --mono: 'JetBrains Mono','Fira Code','Cascadia Code','Consolas','Monaco',monospace;
  --sans: -apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;
}

html { margin:0; padding:0; height:100%; overflow:hidden; }
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
body { font-family:var(--sans); display:flex; flex-direction:column;
       height:100%; background:#f8fafc; color:var(--text); }

/* ── Toolbar ─────────────────────────────────────────────────── */
#toolbar {
  background:var(--toolbar-bg); height:44px; padding:0 16px;
  display:flex; align-items:center; gap:14px; flex-shrink:0;
  border-bottom:1px solid #263045;
}
.brand { font-size:13px; font-weight:700; color:#f1f5f9; letter-spacing:.03em; }
.stat  { font-size:12px; color:#64748b; white-space:nowrap; }
.legend { display:flex; gap:6px; align-items:center; flex-wrap:wrap; }
.leg-dot { width:10px; height:10px; border-radius:50%; display:inline-block; }
.leg-bar {
  width:54px; height:8px; border-radius:4px; display:inline-block;
  background:linear-gradient(90deg,#facc15,#f59e0b,#f97316);
}
.leg-txt { font-size:10px; font-weight:600; color:#94a3b8; }
.sym-legend { padding-left:10px; margin-left:4px; border-left:1px solid #334155; gap:8px; }
.hint { margin-left:auto; font-size:11px; color:#334155; white-space:nowrap; }

/* ── Controls bar ────────────────────────────────────────────── */
#controls {
  background:#16233b; min-height:40px; padding:6px 16px;
  display:flex; align-items:center; gap:10px; flex-shrink:0;
  border-bottom:1px solid #263045; flex-wrap:wrap;
}
#controls input[type=text], #controls select {
  background:#0f1f3d; color:var(--text); border:1px solid #1e3a5f;
  border-radius:5px; font-size:12px; padding:5px 8px;
  font-family:var(--sans); outline:none;
}
#controls input[type=text] { width:200px; }
#controls input[type=text]:focus, #controls select:focus { border-color:var(--accent); }
#controls select { max-width:260px; cursor:pointer; }
#controls .chk { font-size:12px; color:#94a3b8; display:flex; align-items:center; gap:5px; cursor:pointer; user-select:none; }
.btn {
  background:#1e293b; color:#cbd5e1; border:1px solid #334155;
  border-radius:5px; font-size:12px; padding:5px 12px; cursor:pointer;
}
.btn:hover { background:#263045; }
.pill {
  display:inline-flex; align-items:center; gap:7px;
  background:#172554; color:#93c5fd; border:1px solid #1e3a8a;
  border-radius:12px; font-size:11px; padding:3px 4px 3px 11px; cursor:pointer;
  max-width:280px;
}
.pill .lbl { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.pill .x { font-weight:700; padding:0 6px; border-radius:9px; }
.pill:hover .x { background:#1e3a8a; }

/* ── Main layout ─────────────────────────────────────────────── */
#main  { display:flex; flex:1; overflow:hidden; min-height:0; position:relative; }
#graph { flex:1; min-height:0; background:#f8fafc; }

/* ── Project-stats overlay ───────────────────────────────────── */
#stats-panel {
  position:absolute; top:12px; left:12px; z-index:5;
  background:rgba(15,23,42,.9); border:1px solid #1e3a5f; border-radius:8px;
  padding:10px 12px; min-width:188px; backdrop-filter:blur(3px);
  font-size:11px; color:#cbd5e1; box-shadow:0 4px 16px rgba(0,0,0,.25);
}
#stats-panel h4 {
  font-size:10px; font-weight:700; letter-spacing:.08em; text-transform:uppercase;
  color:#64748b; margin-bottom:7px;
}
#stats-panel .row { display:flex; justify-content:space-between; gap:14px; line-height:1.7; }
#stats-panel .row .v { font-family:var(--mono); color:#f1f5f9; }
#stats-panel .v.done { color:var(--green); }
#stats-panel .v.work { color:var(--orange); }
#stats-panel .v.inf  { color:var(--red); }
#stats-panel .bar {
  height:6px; border-radius:3px; background:#1e293b; margin:7px 0 3px; overflow:hidden;
}
#stats-panel .bar > span { display:block; height:100%; background:var(--green); }
#stats-panel .sep { border-top:1px solid #1e3a5f; margin:7px 0; }
#graph canvas { display:block; }

/* ── File-view colour legend ─────────────────────────────────── */
#file-legend {
  position:absolute; bottom:12px; left:12px; z-index:5;
  background:rgba(15,23,42,.9); border:1px solid #1e3a5f; border-radius:8px;
  padding:9px 11px; max-width:280px; max-height:42%; overflow-y:auto;
  backdrop-filter:blur(3px); font-size:11px; color:#cbd5e1;
  box-shadow:0 4px 16px rgba(0,0,0,.25);
}
#file-legend::-webkit-scrollbar { width:4px; }
#file-legend::-webkit-scrollbar-thumb { background:#1e3a5f; border-radius:2px; }
#file-legend h4 {
  font-size:10px; font-weight:700; letter-spacing:.08em; text-transform:uppercase;
  color:#64748b; margin-bottom:7px;
}
#file-legend .fl-row { display:flex; align-items:center; gap:7px; line-height:1.9; }
#file-legend .fl-sw { width:11px; height:11px; border-radius:3px; flex-shrink:0;
  border:1px solid rgba(255,255,255,.18); }
#file-legend .fl-name {
  font-family:var(--mono); font-size:10px; color:#cbd5e1;
  overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex:1;
}
#file-legend .fl-n { font-family:var(--mono); font-size:10px; color:#64748b; }
#file-legend .fl-empty { font-style:italic; color:#475569; }

/* ── Sidebar ─────────────────────────────────────────────────── */
#sidebar {
  width:340px; flex-shrink:0;
  background:var(--sidebar-bg);
  border-left:1px solid #1e293b;
  display:flex; flex-direction:column; overflow:hidden;
}
#sidebar-empty {
  flex:1; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:10px;
}
#sidebar-empty svg { opacity:.2; }
#sidebar-empty p { font-size:13px; color:#334155; }
#sidebar-content {
  flex:1; overflow-y:auto; padding:10px;
  display:flex; flex-direction:column; gap:8px;
}
#sidebar-content::-webkit-scrollbar { width:4px; }
#sidebar-content::-webkit-scrollbar-thumb { background:#1e3a5f; border-radius:2px; }

/* ── Cards ───────────────────────────────────────────────────── */
.card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius); padding:12px;
}
.card-title {
  font-size:10px; font-weight:700; letter-spacing:.08em;
  text-transform:uppercase; color:var(--muted); margin-bottom:10px;
}
.btn-focus {
  width:100%; margin-top:10px; background:#172554; color:#93c5fd;
  border:1px solid #1e3a8a; border-radius:5px; font-size:11px;
  font-weight:600; padding:7px; cursor:pointer; letter-spacing:.02em;
}
.btn-focus:hover { background:#1e3a8a; color:#bfdbfe; }

/* ── Header card ─────────────────────────────────────────────── */
.node-badges { display:flex; gap:5px; flex-wrap:wrap; margin-bottom:8px; }
.badge {
  display:inline-block; padding:2px 8px; border-radius:10px;
  font-size:10px; font-weight:700; letter-spacing:.04em;
}
.badge-type    { background:#172554; color:#93c5fd; border:1px solid #1e3a8a44; }
.badge-proved  { background:var(--green-bg);  color:var(--green);  border:1px solid rgba(74,222,128,.25); }
.badge-sorry   { background:var(--orange-bg); color:var(--orange); border:1px solid rgba(251,146,60,.25); }
.badge-unproved{ background:var(--red-bg);    color:var(--red);    border:1px solid rgba(248,113,113,.25); }
.node-title   { font-size:15px; font-weight:600; color:#f1f5f9; line-height:1.35; margin-bottom:5px; }
.node-id      { font-family:var(--mono); font-size:11px; color:#475569; }
.node-chapter { font-size:11px; color:#334155; margin-top:3px; }
.lean-ref     { font-size:11px; color:var(--muted); margin-top:6px; }
.lean-ref code{ font-family:var(--mono); color:var(--accent); }

/* ── Structure card ──────────────────────────────────────────── */
.degrees { display:flex; gap:20px; margin-bottom:10px; }
.degree  { display:flex; flex-direction:column; align-items:center; gap:2px; }
.degree-val   { font-size:22px; font-weight:700; color:#f1f5f9; line-height:1; }
.degree-label { font-size:10px; color:var(--muted); text-align:center; }
.deps-list  { display:flex; flex-wrap:wrap; gap:4px; margin-bottom:8px; }
.deps-sub   { font-size:10px; color:var(--muted); margin:6px 0 4px; letter-spacing:.03em; }
.dep-chip {
  font-family:var(--mono); font-size:10px; padding:3px 7px;
  background:#0f1f3d; border:1px solid #1e3a5f;
  border-radius:4px; color:var(--accent); cursor:pointer; transition:background .15s;
}
.dep-chip:hover { background:#172554; }
.no-deps { font-size:12px; color:var(--muted); font-style:italic; }

/* ── Metrics card ────────────────────────────────────────────── */
.metrics-grid {
  display:grid; grid-template-columns:auto 1fr 1fr;
  gap:5px 10px; align-items:center;
}
.col-head { font-size:10px; color:#334155; text-align:right; font-weight:600; }
.m-label  { font-size:11px; color:var(--muted); }
.m-val    { font-family:var(--mono); font-size:12px; color:#94a3b8; text-align:right; }
.m-done   { color:var(--green); font-weight:700; }
.m-inf    { color:var(--red);   font-weight:700; }
.m-work   { color:var(--orange); }

/* ── Section header ──────────────────────────────────────────── */
.sec-hdr {
  display:flex; justify-content:space-between; align-items:baseline; margin-bottom:6px;
}
.chars-pair { font-family:var(--mono); font-size:10px; color:#334155; }
.chars-inf  { color:var(--red); }
.chars-val  { color:#475569; }

/* ── LaTeX rendered block ────────────────────────────────────── */
.latex-rendered {
  font-family:var(--sans); font-size:13px; line-height:1.7;
  color:#94a3b8; overflow-x:auto; min-height:1.5em;
}
.latex-rendered .katex-display { margin:6px 0; overflow-x:auto; }
.latex-rendered em { font-style:italic; color:#cbd5e1; }
.latex-rendered strong { font-weight:600; color:#cbd5e1; }
.latex-rendered.empty { color:#1e3a5f; font-style:italic; }

/* ── Lean code block ─────────────────────────────────────────── */
.code-block {
  font-family:var(--mono); font-size:11px; line-height:1.6;
  background:var(--code-bg); color:#abb2bf;
  border:1px solid #1a2744; border-radius:5px;
  padding:10px 12px; white-space:pre; overflow:auto;
  max-height:220px;
}
.code-block::-webkit-scrollbar { width:4px; height:4px; }
.code-block::-webkit-scrollbar-thumb { background:#1e3a5f; border-radius:2px; }
.code-block.empty { color:#1e3a5f; font-style:italic; white-space:normal; }

/* ── Lean syntax colours (One Dark palette) ──────────────────── */
.hl-kw      { color:#c678dd; }
.hl-tactic  { color:#61afef; }
.hl-type    { color:#e5c07b; }
.hl-comment { color:#5c6370; font-style:italic; }
.hl-str     { color:#98c379; }
.hl-num     { color:#d19a66; }
</style>
</head>

<div id="toolbar">

  <span class="legend"><span class="leg-dot" style="background:#22c55e"></span><span class="leg-txt">done</span><span class="leg-dot" style="background:#3b82f6"></span><span class="leg-txt">mathlib</span><span class="leg-bar"></span><span class="leg-txt">more effort</span><span class="leg-dot" style="background:#ef4444"></span><span class="leg-txt">∞ no proof</span></span>
  <span class="legend sym-legend">
    <span class="leg-txt">✓ Lean proof</span>
    <span class="leg-txt">⚠ sorry</span>
    <span class="leg-txt">ⓜ mathlib</span>

    <span class="leg-txt">★ LaTeX proof</span>

  <span class="hint">click = highlight cone &middot; double-click = focus &middot; ctrl+scroll = zoom</span>
</div>
<div id="controls">

  <datalist id="node-ids"></datalist>
  <select id="nodeset" title="Which declarations to include">
    <option value="union">All declarations</option>
    <option value="blueprint">Blueprint only</option>
    <option value="lean">Lean only</option>
  </select>
  <select id="component"><option value="">All components</option></select>
  <select id="chapter"><option value="">All chapters</option></select>
  <select id="fileview" title="Tint the background by source file">
    <option value="off">File view: off</option>
    <option value="lean">File view: Lean files</option>
    <option value="tex">File view: LaTeX files</option>
  </select>
  <label class="chk"><input type="checkbox" id="orphans"> show isolated <span id="iso-count"></span></label>
  <span id="focus-pill" class="pill" style="display:none" title="Clear focus">
    <span class="lbl"></span><span class="x">&times;</span>
  </span>
  <button id="reset" class="btn">Reset view</button>
</div>
<div id="main">
  <div id="graph"></div>
  <div id="stats-panel"></div>
  <div id="file-legend" style="display:none"></div>
  <aside id="sidebar">
    <div id="sidebar-empty">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none"
           stroke="#334155" stroke-width="1.2" stroke-linecap="round">

        <line x1="9" y1="9" x2="15" y2="9"/><line x1="9" y1="13" x2="13" y2="13"/>
      </svg>
      <p>Click a node to inspect it</p>
    </div>
    <div id="sidebar-content" style="display:none"></div>
  </aside>
</div>

ort_total": 0}, "mathlib:right_derived": {"id": "mathlib:right_derived", "type": "definition", "title": "Right-derived functor of an additive functor", "chapter": "", "statement": "\\textit{Provided by Mathlib.}\n  Let \\(F:\\mathcal A\\to\\mathcal B\\) be an additive functor between abelian\n  categories, with \\(\\mathcal A\\) having enough injectives.  Mathlib provides the\n  \\(i\\)-th right-derived functor \\(F.\\mathrm{rightDerived}\\,i:\\mathcal A\\to\n  \\mathcal B\\), computed by applying \\(F\\) to an injective resolution and taking\n  the \\(i\\)-th cohomology.  A short exact sequence in \\(\\mathcal A\\) induces the\n  associated long exact sequence of the \\(F.\\mathrm{rightDerived}\\,i\\).", "uses": [], "lean_name": "CategoryTheory.Functor.rightDerived", "proved": false, "mathlib_ok": true, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Kemeny_PeerDependencies.tex", "lean_file": "", "dep_count": 0, "rdep_count": 2, "descendant_count": 31, "proof_size_tex": null, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 0}, "mathlib:exterior_power_functor": {"id": "mathlib:exterior_power_functor", "type": "definition", "title": "Exterior power functor on a module category", "chapter": "", "statement": "\\textit{Provided by Mathlib.}\n  For a commutative ring \\(R\\) and \\(i\\in\\mathbb N\\), Mathlib provides the\n  \\(i\\)-th exterior power as a functor\n  \\(\\wedge^i:\\mathrm{Mod}_R\\to\\mathrm{Mod}_R\\) on the category of \\(R\\)-modules,\n  natural in the module argument.  Note there is no analogous symmetric-power\n  functor in Mathlib (see \\cref{found:modulecat_sym_power}).", "uses": [], "lean_name": "ModuleCat.exteriorPower.functor", "proved": false, "mathlib_ok": true, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Kemeny_PeerDependencies.tex", "lean_file": "", "dep_count": 0, "rdep_count": 2, "descendant_count": 18, "proof_size_tex": null, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 0}, "mathlib:short_exact": {"id": "mathlib:short_exact", "type": "definition", "title": "Short exact sequence in an abelian category", "chapter": "", "statement": "\\textit{Provided by Mathlib.}\n  Mathlib encodes a short exact sequence in an abelian category as the predicate\n  \\(\\mathrm{ShortExact}\\) on a short complex \\(A\\xrightarrow{f}B\\xrightarrow{g}C\\):\n  \\(f\\) is a monomorphism, \\(g\\) is an epimorphism, and the complex is exact at\n  \\(B\\).  This is the formalism in which the kernel-bundle and power-filtration\n  sequences of the secant-bundle construction are stated.", "uses": [], "lean_name": "CategoryTheory.ShortComplex.ShortExact", "proved": false, "mathlib_ok": true, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Kemeny_PeerDependencies.tex", "lean_file": "", "dep_count": 0, "rdep_count": 2, "descendant_count": 31, "proof_size_tex": null, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 0}, "mathlib:stalk_locality": {"id": "mathlib:stalk_locality", "type": "lemma", "title": "Stalkwise criterion for isomorphisms of sheaves", "chapter": "", "statement": "\\textit{Provided by Mathlib.}\n  A morphism \\(\\varphi:\\mathcal F\\to\\mathcal G\\) of sheaves on a topological\n  space is an isomorphism if and only if the induced morphism on every stalk\n  \\(\\varphi_x:\\mathcal F_x\\to\\mathcal G_x\\) is an isomorphism.", "uses": [], "lean_name": "TopCat.Presheaf.isIso_iff_stalkFunctor_map_iso", "proved": false, "mathlib_ok": true, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Kemeny_PeerDependencies.tex", "lean_file": "", "dep_count": 0, "rdep_count": 1, "descendant_count": 16, "proof_size_tex": null, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 0}, "mathlib:groth_enough_injectives": {"id": "mathlib:groth_enough_injectives", "type": "lemma", "title": "A Grothendieck abelian category has enough injectives", "chapter": "", "statement": "\\textit{Provided by Mathlib.}\n  Every Grothendieck abelian category has enough injectives: each object admits a\n  monomorphism into an injective object.", "uses": [], "lean_name": "CategoryTheory.IsGrothendieckAbelian.enoughInjectives", "proved": false, "mathlib_ok": true, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Kemeny_PeerDependencies.tex", "lean_file": "", "dep_count": 0, "rdep_count": 3, "descendant_count": 34, "proof_size_tex": null, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 0}, "mathlib:enough_inj_has_resolutions": {"id": "mathlib:enough_inj_has_resolutions", "type": "lemma", "title": "Enough injectives gives injective resolutions", "chapter": "", "statement": "\\textit{Provided by Mathlib.}\n  In an abelian category with enough injectives, every object admits an injective\n  resolution; i.e. the category satisfies \\(\\mathrm{HasInjectiveResolutions}\\).", "uses": [], "lean_name": "CategoryTheory.InjectiveResolution.instHasInjectiveResolution", "proved": false, "mathlib_ok": true, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Kemeny_PeerDependencies.tex", "lean_file": "", "dep_count": 0, "rdep_count": 2, "descendant_count": 33, "proof_size_tex": null, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 0}, "mathlib:sheaf_groth_abelian": {"id": "mathlib:sheaf_groth_abelian", "type": "lemma", "title": "Sheaves valued in a Grothendieck category are Grothendieck abelian", "chapter": "", "statement": "\\textit{Provided by Mathlib.}\n  For an essentially small category \\(\\mathcal C\\) equipped with a Grothendieck\n  topology \\(J\\), and a Grothendieck abelian target category \\(\\mathcal A\\)\n  admitting sheafification (\\(\\mathrm{HasSheafify}\\)), the category\n  \\(\\mathrm{Sheaf}\\,J\\,\\mathcal A\\) of \\(\\mathcal A\\)-valued sheaves on\n  \\(\\mathcal C\\) is again Grothendieck abelian.  Its valid application target in\n  this chapter is the category of \\emph{abelian-group}-valued sheaves on the\n  essentially small site of opens of a scheme (\\cref{found:absheaf_groth_abelian}),\n  which literally has this form with \\(\\mathcal A=\\mathrm{Ab}\\).  It does\n  \\emph{not} apply to \\(X.\\mathrm{Modules}\\): sheaves of modules over a varying\n  ring sheaf are not objects of any single \\(\\mathrm{Sheaf}\\,J\\,\\mathcal A\\), so\n  the module-category bridge (\\cref{found:modules_grothendieck_abelian}) takes a\n  different route.", "uses": [], "lean_name": "CategoryTheory.Sheaf.isGrothendieckAbelian_of_essentiallySmall", "proved": false, "mathlib_ok": true, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Kemeny_PeerDependencies.tex", "lean_file": "", "dep_count": 0, "rdep_count": 1, "descendant_count": 33, "proof_size_tex": null, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 0}, "mathlib:addcommgrp_ab5": {"id": "mathlib:addcommgrp_ab5", "type": "lemma", "title": "The category of abelian groups satisfies \\(\\mathrm{AB5}\\)", "chapter": "", "statement": "\\textit{Provided by Mathlib.}\n  The category \\(\\mathrm{Ab}\\) of abelian groups satisfies Grothendieck's\n  \\(\\mathrm{AB5}\\) axiom: it has filtered colimits and these are exact.  This is\n  the concrete base-category input from which \\(\\mathrm{AB5}\\) for presheaves of\n  modules is obtained, by lifting to the functor category \\(\\mathcal C^{\\mathrm{op}}\n  \\to\\mathrm{Ab}\\) and transporting along the forgetful functor.", "uses": [], "lean_name": "instAB5AddCommGrpCat", "proved": false, "mathlib_ok": true, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Kemeny_PeerDependencies.tex", "lean_file": "", "dep_count": 0, "rdep_count": 1, "descendant_count": 21, "proof_size_tex": null, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 0}, "mathlib:sheafification_modules_exact": {"id": "mathlib:sheafification_modules_exact", "type": "lemma", "title": "Sheafification of presheaves of modules is exact", "chapter": "", "statement": "\\textit{Provided by Mathlib.}\n  Mathlib provides the sheafification functor\n  \\[\n    (-)^{\\sharp}:\\mathrm{PresheafOfModules}\\,R\\to\\mathrm{SheafOfModules}\\,R ,\n  \\]\n  left adjoint to the forgetful inclusion.  It is exact: being a left adjoint it\n  preserves all colimits, and Mathlib furthermore proves it preserves finite\n  limits, so it is left exact as well.  This exactness is what lets one transport \\(\\mathrm{AB5}\\) and\n  the exterior/symmetric powers from the presheaf level to the sheaf level.", "uses": [], "lean_name": "PresheafOfModules.sheafification", "proved": false, "mathlib_ok": true, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Kemeny_PeerDependencies.tex", "lean_file": "", "dep_count": 0, "rdep_count": 3, "descendant_count": 31, "proof_size_tex": null, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 0}, "mathlib:presheafmod_freeYoneda": {"id": "mathlib:presheafmod_freeYoneda", "type": "lemma", "title": "Free-Yoneda separating family of presheaves of modules", "chapter": "", "statement": "\\textit{Provided by Mathlib.}\n  For a presheaf of rings \\(R\\) on a category \\(\\mathcal C\\), Mathlib provides the\n  family \\(\\mathrm{freeYoneda}\\,R\\) of free presheaves of modules built on the\n  representable (Yoneda) presheaves: for an open \\(U\\), a morphism\n  \\(\\mathrm{freeYoneda}(U)\\to\\mathcal F\\) is precisely a section of \\(\\mathcal F\\)\n  over \\(U\\).  This family therefore sees sections over \\emph{every} open, and\n  Mathlib proves it is a small separating family:\n  \\(\\mathrm{freeYoneda}\\,R\\) is \\(\\mathrm{IsSeparating}\\) (and \\(\\mathrm{Small}\\))\n  in \\(\\mathrm{PresheafOfModules}\\,R\\).", "uses": [], "lean_name": "PresheafOfModules.freeYoneda.isSeparating", "proved": false, "mathlib_ok": true, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Kemeny_PeerDependencies.tex", "lean_file": "", "dep_count": 0, "rdep_count": 1, "descendant_count": 20, "proof_size_tex": null, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 0}, "mathlib:sheafification_adjunction": {"id": "mathlib:sheafification_adjunction", "type": "lemma", "title": "Sheafification adjunction for presheaves of modules", "chapter": "", "statement": "\\textit{Provided by Mathlib.}\n  For a sheaf of rings \\(R\\) on a site, Mathlib provides the sheafification adjunction\n  \\[\n    (-)^{\\sharp}\\dashv \\iota:\\;\\mathrm{PresheafOfModules}\\,R.\\mathrm{obj}\n    \\;\\rightleftarrows\\;\\mathrm{SheafOfModules}\\,R ,\n  \\]\n  whose left adjoint is sheafification and whose right adjoint \\(\\iota\\) is the\n  (faithful) forgetful inclusion of sheaves of modules into presheaves of modules.", "uses": [], "lean_name": "PresheafOfModules.sheafificationAdjunction", "proved": false, "mathlib_ok": true, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Kemeny_PeerDependencies.tex", "lean_file": "", "dep_count": 0, "rdep_count": 1, "descendant_count": 20, "proof_size_tex": null, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 0}, "mathlib:isSeparator_sigma": {"id": "mathlib:isSeparator_sigma", "type": "lemma", "title": "A coproduct of a separating family is a separator", "chapter": "", "statement": "\\textit{Provided by Mathlib.}\n  In a category with the relevant coproduct, a family of objects\n  \\((S_b)_{b\\in\\beta}\\) is separating if and only if its coproduct\n  \\(\\coprod_{b}S_b\\) is a separator.  In particular a small separating family\n  yields a single separator object.", "uses": [], "lean_name": "CategoryTheory.isSeparator_sigma", "proved": false, "mathlib_ok": true, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Kemeny_PeerDependencies.tex", "lean_file": "", "dep_count": 0, "rdep_count": 1, "descendant_count": 20, "proof_size_tex": null, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 0}, "found:modules_to_absheaf": {"id": "found:modules_to_absheaf", "type": "definition", "title": "", "chapter": "", "statement": "ok\n[Underlying abelian-group sheaf of an \\(\\cO_X\\)-module]\n  \n  \n  \n  For a scheme \\(X\\), the forgetful functor\n  \\[\n    (-)^{\\mathrm{Ab}}:X.\\mathrm{Modules}\\to\\mathrm{Sh}(X,\\mathrm{Ab})\n  \\]\n  sending an \\(\\cO_X\\)-module \\(\\mathcal F\\) to its underlying sheaf of abelian\n  groups, an object of the category \\(\\mathrm{Sh}(X,\\mathrm{Ab})\\).  This is the\n  forgetful functor that retains the sheaf condition and the abelian-group\n  structure of \\(\\mathcal F\\) while forgetting the \\(\\cO_X\\)-module structure.", "uses": ["mathlib:oxmod_category"], "lean_name": "AlgebraicGeometry.Scheme.Modules.toAbSheaf", "proved": true, "mathlib_ok": false, "proof_tex": "", "lean_source": "noncomputable def Scheme.Modules.toAbSheaf (X : Scheme.{u}) :\n    X.Modules ⥤ TopCat.Sheaf.{u} Ab.{u} X where\n  obj M := ⟨M.presheaf, M.isSheaf⟩\n  map φ := ⟨(Scheme.Modules.toPresheaf X).map φ⟩\n  map_id M := by apply Sheaf.hom_ext; exact (Scheme.Modules.toPresheaf X).map_id M\n  map_comp f g := by apply Sheaf.hom_ext; exact (Scheme.Modules.toPresheaf X).map_comp f g", "proof_size_lean": 367, "has_sorry": false, "tex_file": "chapters/Kemeny_PeerDependencies.tex", "lean_file": "MR4213770UniversalSecantBundlesAndSyzygiesOfCanonicalCurves/Foundations.lean", "dep_count": 1, "rdep_count": 2, "descendant_count": 32, "proof_size_tex": null, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 0}, "found:absheaf_groth_abelian": {"id": "found:absheaf_groth_abelian", "type": "lemma", "title": "", "chapter": "", "statement": "ok\n[Abelian-group sheaves on a scheme are Grothendieck abelian]\n  \n  \n  \n  For a scheme \\(X\\), the category \\(\\mathrm{Sh}(X,\\mathrm{Ab})\\) of\n  abelian-group-valued sheaves on the site of opens of \\(X\\) is Grothendieck\n  abelian.", "uses": ["mathlib:sheaf_groth_abelian"], "lean_name": "AlgebraicGeometry.instIsGrothendieckAbelianTopCatSheafAb", "proved": true, "mathlib_ok": false, "proof_tex": "\n  \\uses{mathlib:sheaf_groth_abelian}\n  \\leanok\n  The category \\(\\mathrm{Ab}\\) of abelian groups is Grothendieck abelian, the\n  site of opens of \\(X\\) is essentially small, and sheafification of\n  abelian-group presheaves exists (\\(\\mathrm{HasSheafify}\\)).  The category\n  \\(\\mathrm{Sh}(X,\\mathrm{Ab})\\) is exactly \\(\\mathrm{Sheaf}\\,J\\,\\mathrm{Ab}\\) for\n  the canonical Grothendieck topology \\(J\\) on the opens of \\(X\\); applying\n  \\cref{mathlib:sheaf_groth_abelian} to this essentially small site with target\n  \\(\\mathcal A=\\mathrm{Ab}\\) yields the Grothendieck-abelian structure.\n", "lean_source": "instance instIsGrothendieckAbelianTopCatSheafAb (X : Scheme.{u}) :\n    IsGrothendieckAbelian.{u} (TopCat.Sheaf.{u} Ab.{u} X) :=\n  Sheaf.isGrothendieckAbelian_of_essentiallySmall\n    (Opens.grothendieckTopology (X : TopCat)) Ab.{u}", "proof_size_lean": 230, "has_sorry": false, "tex_file": "chapters/Kemeny_PeerDependencies.tex", "lean_file": "MR4213770UniversalSecantBundlesAndSyzygiesOfCanonicalCurves/Foundations.lean", "dep_count": 1, "rdep_count": 2, "descendant_count": 32, "proof_size_tex": 578, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 0}, "found:absheaf_has_injective_resolutions": {"id": "found:absheaf_has_injective_resolutions", "type": "lemma", "title": "", "chapter": "", "statement": "ok\n[Abelian-group sheaves have injective resolutions]\n  \n  \n  \n  For a scheme \\(X\\), the abelian category \\(\\mathrm{Sh}(X,\\mathrm{Ab})\\) has\n  injective resolutions: every abelian-group sheaf embeds into an injective one,\n  and admits an injective resolution.", "uses": ["found:absheaf_groth_abelian", "found:absheaf_enough_injectives", "mathlib:groth_enough_injectives", "mathlib:enough_inj_has_resolutions"], "lean_name": "AlgebraicGeometry.instHasInjectiveResolutionsTopCatSheafAb", "proved": true, "mathlib_ok": false, "proof_tex": "\n  \\uses{found:absheaf_groth_abelian, found:absheaf_enough_injectives, mathlib:groth_enough_injectives, mathlib:enough_inj_has_resolutions}\n  \\leanok\n  By \\cref{found:absheaf_groth_abelian} the category \\(\\mathrm{Sh}(X,\\mathrm{Ab})\\)\n  is Grothendieck abelian, hence has enough injectives by\n  \\cref{mathlib:groth_enough_injectives}; an abelian category with enough\n  injectives has injective resolutions by\n  \\cref{mathlib:enough_inj_has_resolutions}.\n", "lean_source": "noncomputable instance instHasInjectiveResolutionsTopCatSheafAb (X : Scheme.{u}) :\n    HasInjectiveResolutions (TopCat.Sheaf.{u} Ab.{u} X) :=\n  ⟨fun Z => InjectiveResolution.instHasInjectiveResolution Z⟩", "proof_size_lean": 203, "has_sorry": false, "tex_file": "chapters/Kemeny_PeerDependencies.tex", "lean_file": "MR4213770UniversalSecantBundlesAndSyzygiesOfCanonicalCurves/Foundations.lean", "dep_count": 4, "rdep_count": 1, "descendant_count": 30, "proof_size_tex": 449, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 0}, "found:absheaf_enough_injectives": {"id": "found:absheaf_enough_injectives", "type": "lemma", "title": "", "chapter": "", "statement": "ok\n[Abelian-group sheaves have enough injectives]\n  \n  \n  \n  For a scheme \\(X\\), the category \\(\\mathrm{Sh}(X,\\mathrm{Ab})\\) of\n  abelian-group sheaves has enough injectives: every abelian-group sheaf admits a\n  monomorphism into an injective one.", "uses": ["found:absheaf_groth_abelian", "mathlib:groth_enough_injectives"], "lean_name": "AlgebraicGeometry.instEnoughInjectivesTopCatSheafAb", "proved": true, "mathlib_ok": false, "proof_tex": "\n  \\uses{found:absheaf_groth_abelian, mathlib:groth_enough_injectives}\n  \\leanok\n  Being Grothendieck abelian (\\cref{found:absheaf_groth_abelian}), the category\n  \\(\\mathrm{Sh}(X,\\mathrm{Ab})\\) has enough injectives by\n  \\cref{mathlib:groth_enough_injectives}.\n", "lean_source": "noncomputable instance instEnoughInjectivesTopCatSheafAb (X : Scheme.{u}) :\n    EnoughInjectives (TopCat.Sheaf.{u} Ab.{u} X) :=\n  IsGrothendieckAbelian.enoughInjectives", "proof_size_lean": 168, "has_sorry": false, "tex_file": "chapters/Kemeny_PeerDependencies.tex", "lean_file": "MR4213770UniversalSecantBundlesAndSyzygiesOfCanonicalCurves/Foundations.lean", "dep_count": 2, "rdep_count": 1, "descendant_count": 31, "proof_size_tex": 257, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 0}, "found:absheaf_global_sections": {"id": "found:absheaf_global_sections", "type": "definition", "title": "", "chapter": "", "statement": "ok\n[Sheaf-level global-sections functor]\n  \n  \n  \n  For a scheme \\(X\\), the sheaf-level global-sections functor\n  \\[\n    \\Gamma:\\mathrm{Sh}(X,\\mathrm{Ab})\\to\\mathrm{Ab}\n  \\]\n  on abelian-group sheaves, given by forgetting an abelian-group sheaf to its\n  underlying presheaf and evaluating at the terminal open \\(\\top=X\\).  This is the\n  functor whose right-derived functors compute sheaf cohomology\n  (\\cref{def:peer_scheme_hmodule}): the cohomology of an \\(\\cO_X\\)-module is\n  obtained by first passing to its underlying abelian-group sheaf\n  (\\cref{found:modules_to_absheaf}) and then right-deriving this \\(\\Gamma\\).  It\n  is distinct from the module-level global-sections functor of\n  \\cref{found:global_sections_ab}, which lands in \\(\\mathrm{Ab}\\) directly from\n  \\(X.\\mathrm{Modules}\\).", "uses": ["found:modules_to_absheaf"], "lean_name": "AlgebraicGeometry.Scheme.absheafGlobalSections", "proved": true, "mathlib_ok": false, "proof_tex": "", "lean_source": "noncomputable def Scheme.absheafGlobalSections (X : Scheme.{u}) :\n    TopCat.Sheaf.{u} Ab.{u} X ⥤ Ab.{u} :=\n  TopCat.Sheaf.forget Ab X ⋙ (CategoryTheory.evaluation _ _).obj (Opposite.op ⊤)", "proof_size_lean": 188, "has_sorry": false, "tex_file": "chapters/Kemeny_PeerDependencies.tex", "lean_file": "MR4213770UniversalSecantBundlesAndSyzygiesOfCanonicalCurves/Foundations.lean", "dep_count": 1, "rdep_count": 2, "descendant_count": 31, "proof_size_tex": null, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 0}, "found:absheaf_global_sections_additive": {"id": "found:absheaf_global_sections_additive", "type": "lemma", "title": "", "chapter": "", "statement": "ok\n[Sheaf-level global-sections functor is additive]\n  \n  \n  \n  For a scheme \\(X\\), the sheaf-level global-sections functor \\(\\Gamma\\) of\n  \\cref{found:absheaf_global_sections} is additive, hence may be right-derived.", "uses": ["found:absheaf_global_sections"], "lean_name": "AlgebraicGeometry.Scheme.absheafGlobalSections_additive", "proved": true, "mathlib_ok": false, "proof_tex": "\n  \\uses{found:absheaf_global_sections}\n  \\leanok\n  \\(\\Gamma\\) is the composite of the additive forgetful functor from\n  abelian-group sheaves to abelian-group presheaves with the additive evaluation\n  functor at the open \\(\\top=X\\); a composite of additive functors is additive.\n", "lean_source": "instance Scheme.absheafGlobalSections_additive (X : Scheme.{u}) :\n    (Scheme.absheafGlobalSections X).Additive where\n  map_add {M N f g} := by\n    change ((TopCat.Sheaf.forget Ab X).map (f + g)).app (Opposite.op ⊤) =\n      ((TopCat.Sheaf.forget Ab X).map f).app (Opposite.op ⊤) +\n      ((TopCat.Sheaf.forget Ab X).map g).app (Opposite.op ⊤)\n    rw [Functor.map_add]; rfl", "proof_size_lean": 371, "has_sorry": false, "tex_file": "chapters/Kemeny_PeerDependencies.tex", "lean_file": "MR4213770UniversalSecantBundlesAndSyzygiesOfCanonicalCurves/Foundations.lean", "dep_count": 1, "rdep_count": 1, "descendant_count": 30, "proof_size_tex": 276, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 0}, "found:global_sections_ab": {"id": "found:global_sections_ab", "type": "definition", "title": "Additive global-sections functor", "chapter": "", "statement": "ok\n  \n  \n  \n  For a scheme \\(X\\), the additive global-sections functor\n  \\[\n    \\Gamma_{\\mathrm{Ab}}:X.\\mathrm{Modules}\\to\\mathrm{Ab}\n  \\]\n  sends an \\(\\cO_X\\)-module \\(\\mathcal F\\) to its abelian group of global\n  sections \\(\\mathcal F(X)\\) and a morphism to its induced map on global\n  sections.  It factors through the underlying-abelian-group-sheaf functor of\n  \\cref{found:modules_to_absheaf} followed by the global-sections functor\n  \\(\\Gamma(X,-)\\).  This module-level \\(\\Gamma_{\\mathrm{Ab}}:X.\\mathrm{Modules}\\to\n  \\mathrm{Ab}\\) is \\emph{not} the functor that sheaf cohomology right-derives:\n  \\(H^i\\) is computed by right-deriving the sheaf-level global sections\n  \\(\\Gamma:\\mathrm{Sh}(X,\\mathrm{Ab})\\to\\mathrm{Ab}\\)\n  (\\cref{found:absheaf_global_sections}) after passing to the underlying\n  abelian-group sheaf.  Whether right-deriving \\(\\Gamma_{\\mathrm{Ab}}\\)\n  directly produces the same cohomology groups as the sheaf-level route of\n  \\cref{def:peer_scheme_hmodule} is an open comparison question.", "uses": ["mathlib:oxmod_category"], "lean_name": "AlgebraicGeometry.Scheme.globalSectionsAb", "proved": true, "mathlib_ok": false, "proof_tex": "", "lean_source": "noncomputable def Scheme.globalSectionsAb (X : Scheme.{u}) : X.Modules ⥤ AddCommGrpCat :=\n  Scheme.Modules.toPresheaf X ⋙ (CategoryTheory.evaluation _ _).obj (Opposite.op ⊤)", "proof_size_lean": 173, "has_sorry": false, "tex_file": "chapters/Kemeny_PeerDependencies.tex", "lean_file": "MR4213770UniversalSecantBundlesAndSyzygiesOfCanonicalCurves/Foundations.lean", "dep_count": 1, "rdep_count": 1, "descendant_count": 1, "proof_size_tex": null, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 0}, "found:presheafmod_ab5": {"id": "found:presheafmod_ab5", "type": "lemma", "title": "", "chapter": "", "statement": "ok\n[Presheaves of modules satisfy \\(\\mathrm{AB5}\\)]\n  \n  \n  \n  For a presheaf of rings \\(R\\) on the site of opens of a scheme, the category\n  \\(\\mathrm{PresheafOfModules}\\,R\\) satisfies \\(\\mathrm{AB5OfSize}\\): it has\n  filtered colimits and these are exact.", "uses": ["mathlib:addcommgrp_ab5"], "lean_name": "AlgebraicGeometry.instAB5OfSizePresheafOfModules", "proved": true, "mathlib_ok": false, "proof_tex": "\n  \\uses{mathlib:addcommgrp_ab5}\n  \\leanok\n  The exactness of filtered colimits is transported from \\(\\mathrm{Ab}\\) along the\n  forgetful functor to abelian-group presheaves.  The category \\(\\mathrm{Ab}\\)\n  satisfies \\(\\mathrm{AB5}\\) (\\cref{mathlib:addcommgrp_ab5}); exactness of filtered\n  colimits is inherited by any functor category, so the presheaf category\n  \\(\\mathcal C^{\\mathrm{op}}\\to\\mathrm{Ab}\\) of abelian-group presheaves again\n  satisfies \\(\\mathrm{AB5}\\).  The forgetful functor\n  \\(\\mathrm{PresheafOfModules}\\,R\\to(\\mathcal C^{\\mathrm{op}}\\to\\mathrm{Ab})\\)\n  preserves colimits while reflecting and preserving finite limits, so the\n  domain-transport principle for exact colimits (\\(\\mathrm{HasExactColimitsOfShape}\n  \\) along a functor) carries the \\(\\mathrm{AB5}\\) exactness back to\n  \\(\\mathrm{PresheafOfModules}\\,R\\).\n", "lean_source": "instance instAB5OfSizePresheafOfModules {C : Type*} [Category C] (R₀ : Cᵒᵖ ⥤ RingCat.{u}) :\n    AB5OfSize.{u, u} (PresheafOfModules.{u} R₀) where\n  ofShape K _ _ := by\n    haveI : HasExactColimitsOfShape K Ab.{u} := CategoryTheory.AB5OfSize.ofShape (C := Ab.{u}) K\n    haveI : HasExactColimitsOfShape K (Cᵒᵖ ⥤ Ab.{u}) := inferInstance\n    exact HasExactColimitsOfShape.domain_of_functor K (PresheafOfModules.toPresheaf R₀)", "proof_size_lean": 422, "has_sorry": false, "tex_file": "chapters/Kemeny_PeerDependencies.tex", "lean_file": "MR4213770UniversalSecantBundlesAndSyzygiesOfCanonicalCurves/Foundations.lean", "dep_count": 1, "rdep_count": 1, "descendant_count": 20, "proof_size_tex": 835, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 0}, "found:sheafmod_ab5": {"id": "found:sheafmod_ab5", "type": "lemma", "title": "", "chapter": "", "statement": "ok\n[Sheaves of modules satisfy \\(\\mathrm{AB5}\\)]\n  \n  \n  \n  For a sheaf of rings \\(R\\) on the site of opens of a scheme, the category\n  \\(\\mathrm{SheafOfModules}\\,R\\) satisfies \\(\\mathrm{AB5OfSize}\\).", "uses": ["found:presheafmod_ab5", "mathlib:sheafification_modules_exact"], "lean_name": "AlgebraicGeometry.instAB5OfSizeSheafOfModules", "proved": true, "mathlib_ok": false, "proof_tex": "\n  \\uses{found:presheafmod_ab5, mathlib:sheafification_modules_exact}\n  \\leanok\n  Filtered colimits in \\(\\mathrm{SheafOfModules}\\,R\\) are computed by sheafifying\n  the corresponding filtered colimit of presheaves.  By\n  \\cref{found:presheafmod_ab5} filtered colimits are exact at the presheaf level,\n  and by \\cref{mathlib:sheafification_modules_exact} the sheafification functor is\n  exact; composing an exact filtered-colimit functor with the exact\n  sheafification (and using that the forgetful inclusion is left exact) transports\n  the \\(\\mathrm{AB5}\\) exactness from presheaves to sheaves.\n", "lean_source": "instance instAB5OfSizeSheafOfModules : AB5OfSize.{u, u} (SheafOfModules.{u} R) where\n  ofShape K _ _ := by\n    haveI : Presheaf.IsLocallyInjective J (𝟙 R.obj) := inferInstance\n    haveI : Presheaf.IsLocallySurjective J (𝟙 R.obj) := inferInstance\n    have adj := PresheafOfModules.sheafificationAdjunction (𝟙 R.obj)\n    haveI : HasExactColimitsOfShape K (PresheafOfModules R.obj) :=\n      CategoryTheory.AB5OfSize.ofShape (C := PresheafOfModules R.obj) K\n    exact adj.hasExactColimitsOfShape K", "proof_size_lean": 493, "has_sorry": false, "tex_file": "chapters/Kemeny_PeerDependencies.tex", "lean_file": "MR4213770UniversalSecantBundlesAndSyzygiesOfCanonicalCurves/Foundations.lean", "dep_count": 2, "rdep_count": 1, "descendant_count": 19, "proof_size_tex": 591, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 0}, "found:separating_transport_left_adjoint": {"id": "found:separating_transport_left_adjoint", "type": "lemma", "title": "Separating families transport along a left adjoint with faithful right adjoint", "chapter": "", "statement": "Let \\(F\\dashv G\\) be an adjunction with \\(G\\) faithful.  If \\(\\{S_b\\}_{b\\in\\beta}\\)\n  is a separating family in the source category, then \\(\\{F(S_b)\\}_{b\\in\\beta}\\)\n  is a separating family in the target category.", "uses": [], "lean_name": "AlgebraicGeometry.isSeparating_ofObj_leftAdjoint", "proved": false, "mathlib_ok": false, "proof_tex": "\n  Proved directly in Lean.\n", "lean_source": "private theorem isSeparating_ofObj_leftAdjoint {C' : Type*} [Category C'] {β : Type*} {S : β → C'}\n    {D : Type*} [Category D] {F : C' ⥤ D} {Gr : D ⥤ C'}\n    (adj : F ⊣ Gr) [Gr.Faithful]\n    (hS : ObjectProperty.IsSeparating (.ofObj S)) :\n    ObjectProperty.IsSeparating (.ofObj (fun b => F.obj (S b))) := by\n  intro X Y f g H\n  apply Gr.map_injective\n  refine hS (Gr.map f) (Gr.map g) ?_\n  rintro Z hZ k\n  obtain ⟨b, rfl⟩ := (ObjectProperty.ofObj_iff _ _).1 hZ\n  have hh := H _ (ObjectProperty.ofObj_apply (fun b => F.obj (S b)) b) ((adj.homEquiv _ _).symm k)\n  simpa [Adjunction.homEquiv_naturality_right] using congrArg (adj.homEquiv (S b) Y) hh", "proof_size_lean": 649, "has_sorry": false, "tex_file": "chapters/Kemeny_PeerDependencies.tex", "lean_file": "MR4213770UniversalSecantBundlesAndSyzygiesOfCanonicalCurves/Foundations.lean", "dep_count": 0, "rdep_count": 1, "descendant_count": 20, "proof_size_tex": 24, "effort_local": 0, "proof_size_tex_total": 24, "proof_size_lean_total": 649, "effort_total": 0}, "found:sheafmod_separator": {"id": "found:sheafmod_separator", "type": "lemma", "title": "", "chapter": "", "statement": "ok\n[Sheaves of modules have a separator]\n  \n  \n  \n  For a sheaf of rings \\(R\\) on the site of opens of a scheme, the category\n  \\(\\mathrm{SheafOfModules}\\,R\\) has a separator.", "uses": ["mathlib:presheafmod_freeYoneda", "mathlib:sheafification_adjunction", "mathlib:isSeparator_sigma", "found:separating_transport_left_adjoint"], "lean_name": "AlgebraicGeometry.instHasSeparatorSheafOfModules", "proved": true, "mathlib_ok": false, "proof_tex": "\n  \\uses{mathlib:presheafmod_freeYoneda, mathlib:sheafification_adjunction, mathlib:isSeparator_sigma, found:separating_transport_left_adjoint}\n  \\leanok\n  Work at the presheaf level first.  The free-Yoneda family\n  \\(\\mathrm{freeYoneda}\\,R.\\mathrm{obj}\\) of free presheaves of modules on the\n  representable presheaves is a small separating family of\n  \\(\\mathrm{PresheafOfModules}\\,R.\\mathrm{obj}\\)\n  (\\cref{mathlib:presheafmod_freeYoneda}): a morphism out of\n  \\(\\mathrm{freeYoneda}(U)\\) is exactly a section over the open \\(U\\), so the\n  family detects morphisms by their effect on sections over \\emph{every} open, not\n  merely the global ones.\n\n  Transport this family across the sheafification adjunction\n  \\((-)^{\\sharp}\\dashv\\iota\\) of \\cref{mathlib:sheafification_adjunction}.  A separating family transports\n  along a left adjoint whose right adjoint is faithful\n  (\\cref{found:separating_transport_left_adjoint}): since \\(\\iota\\) is faithful,\n  the images \\(\\bigl(\\mathrm{freeYoneda}(U)\\bigr)^{\\sharp}\\) form a separating\n  family of \\(\\mathrm{SheafOfModules}\\,R\\).\n\n  Finally, the coproduct of a separating family is a separator\n  (\\cref{mathlib:isSeparator_sigma}), so the coproduct of the sheafified\n  free-Yoneda family is a single separator object of\n  \\(\\mathrm{SheafOfModules}\\,R\\).\n", "lean_source": "instance instHasSeparatorSheafOfModules : HasSeparator (SheafOfModules.{u} R) := by\n  haveI : Presheaf.IsLocallyInjective J (𝟙 R.obj) := inferInstance\n  haveI : Presheaf.IsLocallySurjective J (𝟙 R.obj) := inferInstance\n  have adj := PresheafOfModules.sheafificationAdjunction (𝟙 R.obj)\n  exact ⟨_, (isSeparator_sigma _).2\n    (isSeparating_ofObj_leftAdjoint adj (PresheafOfModules.freeYoneda.isSeparating R.obj))⟩", "proof_size_lean": 413, "has_sorry": false, "tex_file": "chapters/Kemeny_PeerDependencies.tex", "lean_file": "MR4213770UniversalSecantBundlesAndSyzygiesOfCanonicalCurves/Foundations.lean", "dep_count": 4, "rdep_count": 1, "descendant_count": 19, "proof_size_tex": 1297, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 0}, "found:sheafmod_grothendieck_abelian": {"id": "found:sheafmod_grothendieck_abelian", "type": "lemma", "title": "", "chapter": "", "statement": "ok\n[Sheaves of modules over a sheaf of rings form a Grothendieck abelian category]\n  \n  \n  \n  For a sheaf of rings \\(R\\) on the (small) site of opens of a scheme, the category\n  \\(\\mathrm{SheafOfModules}\\,R\\) is Grothendieck abelian.", "uses": ["found:sheafmod_ab5", "found:sheafmod_separator"], "lean_name": "AlgebraicGeometry.instIsGrothendieckAbelianSheafOfModules", "proved": true, "mathlib_ok": false, "proof_tex": "\n  \\uses{found:sheafmod_ab5, found:sheafmod_separator}\n  \\leanok\n  Being Grothendieck abelian amounts to four data on the abelian category\n  \\(\\mathrm{SheafOfModules}\\,R\\): existence of filtered colimits, local smallness,\n  exactness of filtered colimits (\\(\\mathrm{AB5OfSize}\\)), and the existence of a\n  separator.  The first two hold by inference (filtered colimits are computed via\n  sheafification of objectwise colimits, and the category is locally small).  The\n  substantive inputs are the \\(\\mathrm{AB5}\\) exactness, supplied by\n  \\cref{found:sheafmod_ab5}, and the separator, supplied by\n  \\cref{found:sheafmod_separator}.  Assembling the four fields yields the\n  Grothendieck-abelian structure.  The essentially-small theorem\n  \\cref{mathlib:sheaf_groth_abelian} is \\emph{not} used, as sheaves of modules over\n  a varying ring sheaf are not of the form \\(\\mathrm{Sheaf}\\,J\\,\\mathcal A\\).\n", "lean_source": "instance instIsGrothendieckAbelianSheafOfModules :\n    IsGrothendieckAbelian.{u} (SheafOfModules.{u} R) where", "proof_size_lean": 109, "has_sorry": false, "tex_file": "chapters/Kemeny_PeerDependencies.tex", "lean_file": "MR4213770UniversalSecantBundlesAndSyzygiesOfCanonicalCurves/Foundations.lean", "dep_count": 2, "rdep_count": 1, "descendant_count": 18, "proof_size_tex": 894, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 0}, "found:modules_grothendieck_abelian": {"id": "found:modules_grothendieck_abelian", "type": "lemma", "title": "", "chapter": "", "statement": "ok\n[\\(\\cO_X\\)-modules form a Grothendieck abelian category]\n  \n  \n  \n  For every scheme \\(X\\), the category \\(X.\\mathrm{Modules}\\) is Grothendieck\n  abelian.", "uses": ["found:sheafmod_grothendieck_abelian", "mathlib:oxmod_category"], "lean_name": "AlgebraicGeometry.instIsGrothendieckAbelianModules", "proved": true, "mathlib_ok": false, "proof_tex": "\n  \\uses{found:sheafmod_grothendieck_abelian, mathlib:oxmod_category}\n  \\leanok\n  By definition \\(X.\\mathrm{Modules}=\\mathrm{SheafOfModules}\\,X.\\mathrm{ringCatSheaf}\\)\n  (\\cref{mathlib:oxmod_category}), so this is the specialisation of the general\n  instance \\cref{found:sheafmod_grothendieck_abelian} to the structure ring sheaf\n  \\(R=X.\\mathrm{ringCatSheaf}\\), transferred across that definitional equality.  The\n  four-field assembly of the Grothendieck-abelian structure (filtered colimits and\n  local smallness by inference, \\(\\mathrm{AB5}\\), and the separator) lives in the\n  general instance.\n", "lean_source": "instance instIsGrothendieckAbelianModules (X : Scheme.{u}) :\n    IsGrothendieckAbelian.{u} X.Modules :=\n  inferInstanceAs (IsGrothendieckAbelian.{u} (SheafOfModules.{u} X.ringCatSheaf))", "proof_size_lean": 185, "has_sorry": false, "tex_file": "chapters/Kemeny_PeerDependencies.tex", "lean_file": "MR4213770UniversalSecantBundlesAndSyzygiesOfCanonicalCurves/Foundations.lean", "dep_count": 2, "rdep_count": 1, "descendant_count": 17, "proof_size_tex": 596, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 0}, "found:has_injective_resolutions": {"id": "found:has_injective_resolutions", "type": "lemma", "title": "", "chapter": "", "statement": "ok\n[\\(\\cO_X\\)-modules have injective resolutions]\n  \n  \n  \n  For every scheme \\(X\\), the abelian category \\(X.\\mathrm{Modules}\\) has enough\n  injectives, so every \\(\\cO_X\\)-module admits an injective resolution; in\n  particular, the hypothesis of \\cref{mathlib:right_derived} is satisfied for\n  the pushforward functor in the module category.", "uses": ["found:modules_grothendieck_abelian", "mathlib:groth_enough_injectives", "mathlib:enough_inj_has_resolutions"], "lean_name": "AlgebraicGeometry.instHasInjectiveResolutionsModules", "proved": true, "mathlib_ok": false, "proof_tex": "\n  \\uses{found:modules_grothendieck_abelian, mathlib:groth_enough_injectives, mathlib:enough_inj_has_resolutions}\n  \\leanok\n  By \\cref{found:modules_grothendieck_abelian} the category \\(X.\\mathrm{Modules}\\)\n  is Grothendieck abelian, hence has enough injectives by\n  \\cref{mathlib:groth_enough_injectives}; an abelian category with enough\n  injectives has injective resolutions by\n  \\cref{mathlib:enough_inj_has_resolutions}.\n", "lean_source": "noncomputable instance instHasInjectiveResolutionsModules (X : Scheme.{u}) :\n    HasInjectiveResolutions X.Modules :=\n  letI : EnoughInjectives X.Modules :=\n    inferInstanceAs (EnoughInjectives (SheafOfModules.{u} X.ringCatSheaf))\n  ⟨fun Z => InjectiveResolution.instHasInjectiveResolution Z⟩", "proof_size_lean": 293, "has_sorry": false, "tex_file": "chapters/Kemeny_PeerDependencies.tex", "lean_file": "MR4213770UniversalSecantBundlesAndSyzygiesOfCanonicalCurves/Foundations.lean", "dep_count": 3, "rdep_count": 1, "descendant_count": 16, "proof_size_tex": 422, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 0}, "found:ringcatsheaf_commring": {"id": "found:ringcatsheaf_commring", "type": "lemma", "title": "Commutative-ring structure on the structure-sheaf sections", "chapter": "", "statement": "For a scheme \\(X\\) and an open \\(U\\), the value \\(X.\\mathrm{ringCatSheaf}(U)\\) of\n  the structure ring sheaf --- a priori only an object of \\(\\mathrm{RingCat}\\) ---\n  carries a commutative-ring structure, compatible with (indeed identical to) the\n  commutative-ring structure of the structure-sheaf sections \\(\\cO_X(U)=\n  X.\\mathrm{presheaf}(U)\\) as an object of \\(\\mathrm{CommRingCat}\\).", "uses": ["mathlib:oxmod_category"], "lean_name": "AlgebraicGeometry.Scheme.ringCatSheaf_commRing", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{mathlib:oxmod_category}\n  The ring sheaf \\(X.\\mathrm{ringCatSheaf}\\) is the image of the structure sheaf\n  \\(\\cO_X\\) under the forgetful functor \\(\\mathrm{CommRingCat}\\to\\mathrm{RingCat}\\):\n  its value at \\(U\\) is the same underlying set with the same addition and\n  multiplication as \\(\\cO_X(U)\\).  The commutativity carried by the\n  \\(\\mathrm{CommRingCat}\\) object \\(\\cO_X(U)\\) is therefore present on the\n  sections, and is recovered as a \\(\\mathrm{CommRing}\\) instance on the\n  \\(\\mathrm{RingCat}\\)-valued \\(X.\\mathrm{ringCatSheaf}(U)\\), which the\n  \\(\\mathrm{RingCat}\\) type level forgets.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Kemeny_PeerDependencies.tex", "lean_file": "", "dep_count": 1, "rdep_count": 1, "descendant_count": 17, "proof_size_tex": 600, "effort_local": 600, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 600}, "found:exterior_power_base_change": {"id": "found:exterior_power_base_change", "type": "lemma", "title": "Base-change functoriality of exterior powers", "chapter": "", "statement": "Let \\(\\varphi:R\\to S\\) be a homomorphism of commutative rings, \\(M\\) an\n  \\(R\\)-module, \\(N\\) an \\(S\\)-module, and \\(g:M\\to N\\) a \\(\\varphi\\)-semilinear\n  map --- equivalently an \\(R\\)-linear map \\(M\\to N{\\restriction}_R\\) into the\n  restriction of scalars of \\(N\\) along \\(\\varphi\\).  Then for each\n  \\(i\\in\\mathbb N\\) there is an induced \\(\\varphi\\)-semilinear map\n  \\[\n    \\wedge^i g:\\textstyle\\bigwedge^i_R M\\to\\bigwedge^i_S N\n  \\]\n  on exterior powers, compatible with restriction of scalars along \\(\\varphi\\) and\n  natural in \\(g\\): it carries identities to identities and respects composition\n  of a composable pair of semilinear maps over composable ring homomorphisms.\n  This is the ingredient that Mathlib lacks: it provides the exterior power as a\n  functor over a \\emph{fixed} commutative base\n  (\\cref{mathlib:exterior_power_functor}) but not its variance in the base ring,\n  so this base-change functoriality is supplied here as project infrastructure.", "uses": ["mathlib:exterior_power_functor"], "lean_name": "ModuleCat.exteriorPower.baseChangeMap", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{mathlib:exterior_power_functor}\n  Over a fixed ring the exterior power is the functor of\n  \\cref{mathlib:exterior_power_functor}; the new content is variance in the ring.\n  A \\(\\varphi\\)-semilinear map \\(g:M\\to N\\) is an \\(R\\)-linear map\n  \\(M\\to N{\\restriction}_R\\), so applying \\(\\bigwedge^i_R\\) yields an \\(R\\)-linear\n  map \\(\\bigwedge^i_R M\\to\\bigwedge^i_R(N{\\restriction}_R)\\).  Composing with the\n  canonical \\(R\\)-linear comparison\n  \\(\\bigwedge^i_R(N{\\restriction}_R)\\to\\bigl(\\bigwedge^i_S N\\bigr){\\restriction}_R\\),\n  which sends a decomposable wedge \\(n_1\\wedge\\cdots\\wedge n_i\\) to the same\n  decomposable wedge formed over \\(S\\), produces the desired\n  \\(\\varphi\\)-semilinear map; identities and composition are preserved because\n  both \\(\\bigwedge^i\\) and restriction of scalars are functorial and the\n  comparison maps are compatible with composition of ring homomorphisms.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Kemeny_PeerDependencies.tex", "lean_file": "", "dep_count": 1, "rdep_count": 1, "descendant_count": 17, "proof_size_tex": 893, "effort_local": 893, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 893}, "found:presheafmod_exterior_power": {"id": "found:presheafmod_exterior_power", "type": "lemma", "title": "Exterior power of a presheaf of modules", "chapter": "", "statement": "For \\(i\\in\\mathbb N\\), the \\(i\\)-th exterior power functor\n  \\[\n    \\wedge^i:\\mathrm{PresheafOfModules}\\,R\\to\\mathrm{PresheafOfModules}\\,R ,\n  \\]\n  given over each open \\(U\\) by the module-level exterior power\n  \\(\\mathrm{ModuleCat.exteriorPower}\\) of \\(\\mathcal F(U)\\), and functorial in the\n  restriction maps.", "uses": ["found:ringcatsheaf_commring", "found:exterior_power_base_change", "mathlib:exterior_power_functor"], "lean_name": "AlgebraicGeometry.PresheafOfModules.exteriorPower", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{found:ringcatsheaf_commring, found:exterior_power_base_change, mathlib:exterior_power_functor}\n  Two obstructions must be cleared.  First, \\(\\mathrm{PresheafOfModules}\\,R\\) is\n  \\(\\mathrm{RingCat}\\)-valued, so the sections ring \\(R(U)\\) does not present as\n  commutative at the type level and the module-level exterior-power functor\n  \\cref{mathlib:exterior_power_functor}, which requires a commutative base, does\n  not apply directly; \\cref{found:ringcatsheaf_commring} restores the\n  \\(\\mathrm{CommRing}\\) structure on each \\(R(U)\\), so the openwise exterior power\n  \\(\\wedge^i_{R(U)}\\mathcal F(U)\\) is defined.  Second, the restriction map of\n  \\(\\mathcal F\\) along an inclusion \\(V\\subseteq U\\) is not \\(R(U)\\)-linear but\n  \\emph{semilinear} over the ring map \\(R(U)\\to R(V)\\), so the induced map on\n  exterior powers must run \\(\\wedge^i_{R(U)}\\mathcal F(U)\\to\\wedge^i_{R(V)}\\mathcal\n  F(V)\\) over \\(R(U)\\to R(V)\\); this is exactly the base-change functoriality of\n  \\cref{found:exterior_power_base_change}.  Applying that lemma to each\n  restriction map produces semilinear transition maps on exterior powers, which\n  inherit the presheaf identity and composition laws from those of\n  \\(\\mathcal F\\) and assemble into a presheaf of modules \\(\\wedge^i\\mathcal F\\),\n  functorially in \\(\\mathcal F\\).\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Kemeny_PeerDependencies.tex", "lean_file": "", "dep_count": 3, "rdep_count": 1, "descendant_count": 16, "proof_size_tex": 1308, "effort_local": 1308, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 2801}, "found:oxmod_exterior_power": {"id": "found:oxmod_exterior_power", "type": "definition", "title": "Exterior power of an \\(\\cO_X\\)-module", "chapter": "", "statement": "For \\(i\\in\\mathbb N\\), the exterior power functor\n  \\(\\wedge^i:X.\\mathrm{Modules}\\to X.\\mathrm{Modules}\\), obtained by applying the\n  presheaf-level exterior power \\cref{found:presheafmod_exterior_power} to the\n  underlying presheaf of an \\(\\cO_X\\)-module and then sheafifying\n  (\\cref{mathlib:sheafification_modules_exact}).  Kemeny's bundles\n  \\(\\wedge^{k+1}M_L\\), \\(\\wedge^k\\pi^*\\cM\\) and \\(\\wedge^k\\Gamma\\) are instances\n  of this functor.", "uses": ["found:presheafmod_exterior_power", "mathlib:sheafification_modules_exact", "mathlib:oxmod_category"], "lean_name": "AlgebraicGeometry.Scheme.Modules.exteriorPower", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Kemeny_PeerDependencies.tex", "lean_file": "", "dep_count": 3, "rdep_count": 2, "descendant_count": 15, "proof_size_tex": null, "effort_local": 443, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 3244}, "mathlib:symmetricpower_type": {"id": "mathlib:symmetricpower_type", "type": "definition", "title": "Symmetric power type", "chapter": "", "statement": "\\textit{Provided by Mathlib.}\n  For a commutative (semi)ring \\(R\\), an index type \\(\\iota\\) and an\n  \\(R\\)-module \\(M\\), Mathlib provides the symmetric-power \\emph{type}\n  \\(\\Sym^i M=\\mathrm{SymmetricPower}\\,R\\,\\iota\\,M\\) --- the quotient of the\n  \\(\\iota\\)-fold tensor power by the permutation relation --- together with its\n  \\(R\\)-module structure and the generating family of decomposable symmetric\n  tensors \\(\\mathrm{tprod}\\), whose span is everything.  It does \\emph{not}\n  provide the functorial action \\(\\Sym^i f\\) of a linear map, nor any functor\n  packaging; those are built in \\cref{found:modulecat_sym_power}.", "uses": [], "lean_name": "SymmetricPower", "proved": false, "mathlib_ok": true, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Kemeny_PeerDependencies.tex", "lean_file": "", "dep_count": 0, "rdep_count": 3, "descendant_count": 29, "proof_size_tex": null, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 0}, "found:sympow_map_aux": {"id": "found:sympow_map_aux", "type": "lemma", "title": "Factorwise tensor map underlying \\(\\Sym^i f\\)", "chapter": "", "statement": "For an \\(R\\)-linear map \\(f:M\\to N\\), the auxiliary \\(R\\)-linear map\n  \\[\n    \\textstyle\\bigotimes^i M\\to\\Sym^i N\n  \\]\n  obtained by applying \\(f\\) factor-wise on the \\(i\\)-fold tensor power and then\n  symmetrising --- sending a decomposable tensor to the \\(\\mathrm{tprod}\\) of the\n  images of its factors.  This is the map that descends to \\(\\Sym^i f\\).", "uses": ["mathlib:symmetricpower_type"], "lean_name": "SymmetricPower.mapAux", "proved": false, "mathlib_ok": false, "proof_tex": "\n  Proved directly in Lean.\n", "lean_source": "private noncomputable def mapAux (f : M →ₗ[R] N) : (⨂[R] (_ : ι), M) →ₗ[R] Sym[R] ι N :=\n  (SymmetricPower.mk R ι N).comp (PiTensorProduct.map (fun _ => f))", "proof_size_lean": 156, "has_sorry": false, "tex_file": "chapters/Kemeny_PeerDependencies.tex", "lean_file": "MR4213770UniversalSecantBundlesAndSyzygiesOfCanonicalCurves/Foundations.lean", "dep_count": 1, "rdep_count": 3, "descendant_count": 27, "proof_size_tex": 24, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 0}, "found:sympow_map_aux_respects": {"id": "found:sympow_map_aux_respects", "type": "lemma", "title": "The auxiliary map respects symmetrisation", "chapter": "", "statement": "The factorwise map of \\cref{found:sympow_map_aux} is constant on the\n  symmetrisation-equivalence classes: the factor-wise action commutes with\n  permutations of the tensor factors, hence it descends through the\n  symmetrisation quotient that defines \\(\\Sym^i M\\).", "uses": ["found:sympow_map_aux", "mathlib:symmetricpower_type"], "lean_name": "SymmetricPower.mapAux_respects", "proved": false, "mathlib_ok": false, "proof_tex": "\n  Proved directly in Lean.\n", "lean_source": "private theorem mapAux_respects (f : M →ₗ[R] N) :\n    addConGen (Rel R ι M) ≤ AddCon.ker (mapAux f).toAddMonoidHom := by\n  apply AddCon.addConGen_le\n  rintro _ _ ⟨e, g⟩\n  change mapAux f (⨂ₜ[R] i, g i) = mapAux f (⨂ₜ[R] i, g (e i))\n  simp only [mapAux, LinearMap.comp_apply, PiTensorProduct.map_tprod]\n  change (⨂ₛ[R] i, f (g i)) = ⨂ₛ[R] i, f (g (e i))\n  rw [tprod_equiv e (fun i => f (g i))]", "proof_size_lean": 392, "has_sorry": false, "tex_file": "chapters/Kemeny_PeerDependencies.tex", "lean_file": "MR4213770UniversalSecantBundlesAndSyzygiesOfCanonicalCurves/Foundations.lean", "dep_count": 2, "rdep_count": 1, "descendant_count": 26, "proof_size_tex": 24, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 0}, "found:sympow_map": {"id": "found:sympow_map", "type": "lemma", "title": "Induced map \\(\\Sym^i f\\) on symmetric powers", "chapter": "", "statement": "For an \\(R\\)-linear map \\(f:M\\to N\\), the induced \\(R\\)-linear map\n  \\[\n    \\Sym^i f:\\Sym^i M\\to\\Sym^i N ,\n  \\]\n  obtained by descending the factorwise map \\cref{found:sympow_map_aux} through\n  the symmetrisation quotient; well-definedness is\n  \\cref{found:sympow_map_aux_respects}.", "uses": ["found:sympow_map_aux", "found:sympow_map_aux_respects"], "lean_name": "SymmetricPower.map", "proved": false, "mathlib_ok": false, "proof_tex": "\n  Proved directly in Lean.\n", "lean_source": "noncomputable def map (f : M →ₗ[R] N) : Sym[R] ι M →ₗ[R] Sym[R] ι N where\n  toAddHom := (AddCon.lift _ (mapAux f).toAddMonoidHom (mapAux_respects f)).toAddHom\n  map_smul' r x := by\n    induction x using AddCon.induction_on with\n    | H a =>\n      change mapAux f (r • a) = (RingHom.id R) r • mapAux f a\n      rw [RingHom.id_apply, map_smul]", "proof_size_lean": 340, "has_sorry": false, "tex_file": "chapters/Kemeny_PeerDependencies.tex", "lean_file": "MR4213770UniversalSecantBundlesAndSyzygiesOfCanonicalCurves/Foundations.lean", "dep_c _sorry": false, "tex_file": "chapters/Kemeny_PeerDependencies.tex", "lean_file": "MR4213770UniversalSecantBundlesAndSyzygiesOfCanonicalCurves/Foundations.lean", "dep_count": 2, "rdep_count": 1, "descendant_count": 21, "proof_size_tex": 24, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 0}, "found:sympow_map_comp": {"id": "found:sympow_map_comp", "type": "lemma", "title": "\\(\\Sym^i\\) preserves composition", "chapter": "", "statement": "\\(\\Sym^i(g\\circ f)=\\Sym^i g\\circ\\Sym^i f\\).", "uses": ["found:sympow_map", "found:sympow_map_tprod"], "lean_name": "SymmetricPower.map_comp", "proved": false, "mathlib_ok": false, "proof_tex": "\n  Proved directly in Lean.\n", "lean_source": "theorem map_comp (f : M →ₗ[R] N) (h : N →ₗ[R] P) :\n    (map (h ∘ₗ f) : Sym[R] ι M →ₗ[R] Sym[R] ι P) = (map h) ∘ₗ (map f) := by\n  apply LinearMap.ext_on (span_tprod_eq_top R ι M); rintro _ ⟨g, rfl⟩; simp [map_tprod]", "proof_size_lean": 214, "has_sorry": false, "tex_file": "chapters/Kemeny_PeerDependencies.tex", "lean_file": "MR4213770UniversalSecantBundlesAndSyzygiesOfCanonicalCurves/Foundations.lean", "dep_count": 2, "rdep_count": 1, "descendant_count": 21, "proof_size_tex": 24, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 0}, "found:modulecat_sympow_obj": {"id": "found:modulecat_sympow_obj", "type": "definition", "title": "Symmetric power object in the module category", "chapter": "", "statement": "For an object \\(M\\) of \\(\\mathrm{Mod}_R\\) and \\(n\\in\\mathbb N\\), the symmetric\n  power \\(\\Sym^n M\\) as an object of \\(\\mathrm{Mod}_R\\), with the index type taken\n  to be \\(\\mathrm{ULift}(\\mathrm{Fin}\\,n)\\) so that the ring/index universe\n  coupling of the symmetric-power type is satisfied while \\(R\\) stays in a general\n  universe (mirroring the exterior-power object of\n  \\cref{mathlib:exterior_power_functor}).", "uses": ["mathlib:symmetricpower_type"], "lean_name": "ModuleCat.symmetricPower", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "noncomputable def symmetricPower (M : ModuleCat.{v} R) (n : ℕ) : ModuleCat.{max u v} R :=\n  ModuleCat.of R (SymmetricPower R (ULift.{u} (Fin n)) M)", "proof_size_lean": 147, "has_sorry": false, "tex_file": "chapters/Kemeny_PeerDependencies.tex", "lean_file": "MR4213770UniversalSecantBundlesAndSyzygiesOfCanonicalCurves/Foundations.lean", "dep_count": 1, "rdep_count": 2, "descendant_count": 22, "proof_size_tex": null, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 0}, "found:modulecat_sympow_map": {"id": "found:modulecat_sympow_map", "type": "definition", "title": "Induced morphism on symmetric power objects", "chapter": "", "statement": "For a morphism \\(f:M\\to N\\) of \\(\\mathrm{Mod}_R\\) and \\(n\\in\\mathbb N\\), the\n  induced morphism \\(\\Sym^n M\\to\\Sym^n N\\) of \\(\\mathrm{Mod}_R\\), the categorical\n  wrapper of the linear map \\(\\Sym^n f\\) of \\cref{found:sympow_map}.", "uses": ["found:modulecat_sympow_obj", "found:sympow_map"], "lean_name": "ModuleCat.symmetricPower.map", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "noncomputable def map {M N : ModuleCat.{v} R} (f : M ⟶ N) (n : ℕ) :\n    M.symmetricPower n ⟶ N.symmetricPower n :=\n  ofHom (SymmetricPower.map f.hom)", "proof_size_lean": 149, "has_sorry": false, "tex_file": "chapters/Kemeny_PeerDependencies.tex", "lean_file": "MR4213770UniversalSecantBundlesAndSyzygiesOfCanonicalCurves/Foundations.lean", "dep_count": 2, "rdep_count": 1, "descendant_count": 21, "proof_size_tex": null, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 0}, "found:modulecat_sym_power": {"id": "found:modulecat_sym_power", "type": "lemma", "title": "", "chapter": "", "statement": "ok\n[Symmetric power functor on a module category]\n  \n  \n  \n  For a commutative ring \\(R\\) and \\(i\\in\\mathbb N\\), the \\(i\\)-th symmetric power\n  as a functor \\(\\Sym^i:\\mathrm{Mod}_R\\to\\mathrm{Mod}_R\\).  Mathlib supplies only\n  the symmetric-power \\emph{object} \\(\\Sym^i M\\) (the type\n  \\(\\mathrm{SymmetricPower}\\,R\\,\\iota\\,M\\) of \\cref{mathlib:symmetricpower_type})\n  and its generating decomposable tensors; the induced linear map on a morphism\n  and the functor packaging are both absent and are constructed here in two\n  layers.\n\n  \\emph{Layer 1 (linear algebra).}  For an \\(R\\)-linear map \\(f:M\\to N\\) one\n  forms the induced map\n  \\[\n    \\Sym^i f:\\Sym^i M\\to\\Sym^i N\n  \\]\n  by descending the \\(i\\)-fold tensor-power action of \\(f\\) through the\n  symmetrisation quotient: \\(f\\) acts factor-wise on the \\(i\\)-fold tensor power\n  by tensor-power functoriality, this action carries the permutation relation\n  into itself, so it passes to the quotient and defines \\(\\Sym^i f\\) on\n  decomposable symmetric tensors by \\(m_1\\cdots m_i\\mapsto f(m_1)\\cdots f(m_i)\\).\n  The functoriality laws\n  \\[\n    \\Sym^i(\\mathrm{id}_M)=\\mathrm{id}_{\\Sym^i M},\\qquad\n    \\Sym^i(g\\circ f)=\\Sym^i g\\circ\\Sym^i f\n  \\]\n  follow from the corresponding identities for the tensor power together with the\n  fact that the decomposable symmetric tensors span \\(\\Sym^i M\\), so two linear\n  maps agreeing on them coincide.\n\n  \\emph{Layer 2 (module category).}  Wrapping Layer 1 gives the functor\n  \\(\\Sym^i:\\mathrm{Mod}_R\\to\\mathrm{Mod}_R\\), \\(M\\mapsto\\Sym^i M\\),\n  \\(f\\mapsto\\Sym^i f\\), mirroring the exterior-power functor\n  \\cref{mathlib:exterior_power_functor}; the functor laws are exactly the\n  Layer 1 identities.", "uses": ["found:modulecat_sympow_obj", "found:modulecat_sympow_map", "found:sympow_map_id", "found:sympow_map_comp"], "lean_name": "ModuleCat.symmetricPower.functor", "proved": true, "mathlib_ok": false, "proof_tex": "\n  \\uses{found:modulecat_sympow_obj, found:modulecat_sympow_map, found:sympow_map_id, found:sympow_map_comp, mathlib:exterior_power_functor}\n  \\leanok\n  Layer~1: the symmetrisation quotient defining \\(\\Sym^i M\\) is taken on the\n  \\(i\\)-fold tensor power, whose functorial action sends \\(f:M\\to N\\) to the\n  factor-wise map on tensors.  This map intertwines the permutation relations on\n  source and target, hence descends to a well-defined linear map\n  \\(\\Sym^i f:\\Sym^i M\\to\\Sym^i N\\) determined by\n  \\(m_1\\cdots m_i\\mapsto f(m_1)\\cdots f(m_i)\\) on decomposable symmetric tensors.\n  Because these tensors span \\(\\Sym^i M\\), the identities\n  \\(\\Sym^i(\\mathrm{id})=\\mathrm{id}\\) and\n  \\(\\Sym^i(g\\circ f)=\\Sym^i g\\circ\\Sym^i f\\) reduce to the tensor-power versions,\n  which they inherit factor-wise.  Layer~2: \\(M\\mapsto\\Sym^i M\\),\n  \\(f\\mapsto\\Sym^i f\\) is then a functor \\(\\mathrm{Mod}_R\\to\\mathrm{Mod}_R\\), with\n  the functor laws supplied by the Layer~1 identities, in the same packaging as\n  \\cref{mathlib:exterior_power_functor}.\n", "lean_source": "@[simps]\nnoncomputable def functor (n : ℕ) : ModuleCat.{v} R ⥤ ModuleCat.{max u v} R where\n  obj M := M.symmetricPower n\n  map f := map f n\n  map_id M := by\n    apply ModuleCat.hom_ext\n    simp only [map, ModuleCat.hom_id, SymmetricPower.map_id]\n    rfl\n  map_comp f g := by\n    apply ModuleCat.hom_ext\n    simp only [map, ModuleCat.hom_comp, SymmetricPower.map_comp]\n    rfl", "proof_size_lean": 375, "has_sorry": false, "tex_file": "chapters/Kemeny_PeerDependencies.tex", "lean_file": "MR4213770UniversalSecantBundlesAndSyzygiesOfCanonicalCurves/Foundations.lean", "dep_count": 4, "rdep_count": 1, "descendant_count": 20, "proof_size_tex": 1030, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 0}, "found:presheafmod_sym_power": {"id": "found:presheafmod_sym_power", "type": "lemma", "title": "Symmetric power of a presheaf of modules", "chapter": "", "statement": "For \\(i\\in\\mathbb N\\), the \\(i\\)-th symmetric power functor\n  \\(\\Sym^i:\\mathrm{PresheafOfModules}\\,R\\to\\mathrm{PresheafOfModules}\\,R\\), given\n  over each open \\(U\\) by the module-level symmetric power\n  \\cref{found:modulecat_sym_power} of \\(\\mathcal F(U)\\) and functorial in the\n  restriction maps.", "uses": ["found:modulecat_sym_power"], "lean_name": "AlgebraicGeometry.PresheafOfModules.symPower", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{found:modulecat_sym_power}\n  Apply the module-category symmetric-power functor\n  \\cref{found:modulecat_sym_power} \\(U\\)-by-\\(U\\) to the sections\n  \\(\\mathcal F(U)\\); the restriction maps induce maps on symmetric powers by\n  functoriality, assembling into a presheaf of modules, functorially in\n  \\(\\mathcal F\\).\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Kemeny_PeerDependencies.tex", "lean_file": "", "dep_count": 1, "rdep_count": 1, "descendant_count": 19, "proof_size_tex": 317, "effort_local": 317, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 317}, "found:oxmod_sym_power": {"id": "found:oxmod_sym_power", "type": "definition", "title": "Symmetric power of an \\(\\cO_X\\)-module", "chapter": "", "statement": "For \\(i\\in\\mathbb N\\), the symmetric power functor\n  \\(\\Sym^i:X.\\mathrm{Modules}\\to X.\\mathrm{Modules}\\), obtained by applying the\n  presheaf-level symmetric power \\cref{found:presheafmod_sym_power} to the\n  underlying presheaf of an \\(\\cO_X\\)-module and then sheafifying\n  (\\cref{mathlib:sheafification_modules_exact}).  Kemeny's \\(\\Sym^i\\cS\\) and\n  \\(\\Sym^{k+1}\\cG\\) are instances.", "uses": ["found:presheafmod_sym_power", "mathlib:sheafification_modules_exact", "mathlib:oxmod_category"], "lean_name": "AlgebraicGeometry.Scheme.Modules.symPower", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Kemeny_PeerDependencies.tex", "lean_file": "", "dep_count": 3, "rdep_count": 1, "descendant_count": 18, "proof_size_tex": null, "effort_local": 383, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 700}, "found:locally_free": {"id": "found:locally_free", "type": "definition", "title": "Locally free \\(\\cO_X\\)-module", "chapter": "", "statement": "ok\n  \n  \n  \n  The predicate \\(\\mathrm{IsLocallyFree}\\) on \\(X.\\mathrm{Modules}\\): an\n  \\(\\cO_X\\)-module \\(\\mathcal F\\) is locally free (of rank \\(r\\)) when \\(X\\) is\n  covered by open subsets on which \\(\\mathcal F\\) is isomorphic to\n  \\(\\cO_X^{\\oplus r}\\).  The rank is recorded as a finite index type \\(I\\) (of\n  cardinality the rank), so this is local freeness of \\emph{constant finite\n  rank}.  Kemeny's ``locally free of rank \\(k\\)'' assertions for the cokernel\n  bundle \\(\\mathcal W\\) and the universal secant bundles are instances of this\n  predicate.", "uses": ["mathlib:oxmod_category"], "lean_name": "AlgebraicGeometry.Scheme.Modules.IsLocallyFree", "proved": true, "mathlib_ok": false, "proof_tex": "", "lean_source": "def Scheme.Modules.IsLocallyFree {X : Scheme.{u}} (F : X.Modules) : Prop :=\n  ∃ (I : Type u) (_ : Finite I), ∀ x : X, ∃ (U : X.Opens) (_ : x ∈ U),\n    Nonempty ((Scheme.Modules.restrictFunctor U.ι).obj F ≅\n      (SheafOfModules.free (R := U.toScheme.ringCatSheaf) I))", "proof_size_lean": 267, "has_sorry": false, "tex_file": "chapters/Kemeny_PeerDependencies.tex", "lean_file": "MR4213770UniversalSecantBundlesAndSyzygiesOfCanonicalCurves/Foundations.lean", "dep_count": 1, "rdep_count": 1, "descendant_count": 15, "proof_size_tex": null, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 0}, "def:peer_higher_direct_image": {"id": "def:peer_higher_direct_image", "type": "definition", "title": "Higher direct image \\(R^if_*\\)", "chapter": "", "statement": "ok\n  \n  \n  \n  For a morphism of schemes \\(f:X\\to Y\\) and \\(i\\in\\mathbb N\\), the higher direct\n  image is the \\(i\\)-th right-derived functor of the additive pushforward:\n  \\[\n    (R^if_*)\\mathcal F=\\bigl((\\text{pushforward }f).\\mathrm{rightDerived}\\,i\\bigr)\\mathcal F .\n  \\]\n  Right-deriving in the module category requires injective resolutions in\n  \\(X.\\mathrm{Modules}\\) (\\cref{found:has_injective_resolutions}).  A short exact\n  sequence of \\(\\cO_X\\)-modules induces the long exact sequence of higher direct\n  images.", "uses": ["mathlib:oxmod_pushforward", "mathlib:right_derived", "mathlib:short_exact", "found:has_injective_resolutions"], "lean_name": "AlgebraicGeometry.higherDirectImage", "proved": true, "mathlib_ok": false, "proof_tex": "", "lean_source": "noncomputable def higherDirectImage {X Y : Scheme.{u}} (f : X ⟶ Y) (n : ℕ)\n    [HasInjectiveResolutions X.Modules] : X.Modules ⥤ Y.Modules :=\n  (Scheme.Modules.pushforward f).rightDerived n", "proof_size_lean": 189, "has_sorry": false, "tex_file": "chapters/Kemeny_PeerDependencies.tex", "lean_file": "MR4213770UniversalSecantBundlesAndSyzygiesOfCanonicalCurves/Foundations.lean", "dep_count": 4, "rdep_count": 3, "descendant_count": 15, "proof_size_tex": null, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 0}, "def:peer_scheme_hmodule": {"id": "def:peer_scheme_hmodule", "type": "definition", "title": "Sheaf cohomology \\(H^i(X,\\mathcal F)\\)", "chapter": "", "statement": "ok\n  \n  \n  \n  For a scheme \\(X\\) and \\(i\\in\\mathbb N\\), the sheaf cohomology of an\n  \\(\\cO_X\\)-module \\(\\mathcal F\\) is computed in the category\n  \\(\\mathrm{Sh}(X,\\mathrm{Ab})\\) of abelian-group sheaves: it is the \\(i\\)-th\n  right-derived functor of global sections on \\(\\mathrm{Sh}(X,\\mathrm{Ab})\\),\n  applied to the underlying abelian-group sheaf\n  \\(\\mathcal F^{\\mathrm{Ab}}\\) (\\cref{found:modules_to_absheaf}) of\n  \\(\\mathcal F\\):\n  \\[\n    H^i(X,\\mathcal F)=\\bigl(\\Gamma.\\mathrm{rightDer
