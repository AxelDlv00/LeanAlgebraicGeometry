ived}\\,i\\bigr)\\bigl(\\mathcal F^{\\mathrm{Ab}}\\bigr).\n  \\]\n  Injective resolutions in \\(\\mathrm{Sh}(X,\\mathrm{Ab})\\) are provided by\n  \\cref{found:absheaf_has_injective_resolutions}, requiring no hypothesis on\n  \\(X.\\mathrm{Modules}\\).  A short exact sequence of \\(\\cO_X\\)-modules has exact\n  underlying abelian-group sheaves, hence induces the long exact sequence of\n  cohomology groups.", "uses": ["mathlib:right_derived", "mathlib:short_exact", "found:modules_to_absheaf", "found:absheaf_global_sections", "found:absheaf_global_sections_additive", "found:absheaf_has_injective_resolutions"], "lean_name": "AlgebraicGeometry.Scheme.HModule", "proved": true, "mathlib_ok": false, "proof_tex": "", "lean_source": "noncomputable def Scheme.HModule {X : Scheme.{u}} (i : ℕ) (F : X.Modules) : Ab.{u} :=\n  ((Scheme.absheafGlobalSections X).rightDerived i).obj ((Scheme.Modules.toAbSheaf X).obj F)", "proof_size_lean": 178, "has_sorry": false, "tex_file": "chapters/Kemeny_PeerDependencies.tex", "lean_file": "MR4213770UniversalSecantBundlesAndSyzygiesOfCanonicalCurves/Foundations.lean", "dep_count": 6, "rdep_count": 3, "descendant_count": 29, "proof_size_tex": null, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 0}, "def:peer_affine_pushforward_base_change": {"id": "def:peer_affine_pushforward_base_change", "type": "definition", "title": "Base-change comparison morphism", "chapter": "", "statement": "ok\n  \n  \n  \n  Given a commutative square of schemes\n  \\[\n    \\begin{array}{ccc}\n      X' & \\xrightarrow{\\,g'\\,} & X\\\\\n      \\downarrow{\\scriptstyle f'} & & \\downarrow{\\scriptstyle f}\\\\\n      Y' & \\xrightarrow{\\,g\\,} & Y\n    \\end{array}\n  \\]\n  the base-change comparison morphism is the natural map\n  \\[\n    g^*f_*\\mathcal F\\to f'_*g'^*\\mathcal F\n  \\]\n  on degree-zero pushforwards, defined as the Beck--Chevalley mate of the\n  canonical comparison of inverse-image functors under the two\n  pullback--pushforward adjunctions.  Only commutativity of the square is needed\n  to define the morphism; cartesianness of the square is the extra hypothesis that\n  makes it an isomorphism.  Kemeny's pushforward identities for blow-ups, restrictions and products are\n  expressed through this morphism.", "uses": ["mathlib:oxmod_pushforward"], "lean_name": "AlgebraicGeometry.pushforwardBaseChangeMap", "proved": true, "mathlib_ok": false, "proof_tex": "", "lean_source": "noncomputable def pushforwardBaseChangeMap\n    {X Y X' Y' : Scheme.{u}} (f : X ⟶ Y) (g : Y' ⟶ Y) (f' : X' ⟶ Y') (g' : X' ⟶ X)\n    (h : f' ≫ g = g' ≫ f) :\n    Scheme.Modules.pushforward f ⋙ Scheme.Modules.pullback g ⟶\n      Scheme.Modules.pullback g' ⋙ Scheme.Modules.pushforward f' :=\n  (mateEquiv (Scheme.Modules.pullbackPushforwardAdjunction f)\n      (Scheme.Modules.pullbackPushforwardAdjunction f')\n      ((Scheme.Modules.pullbackComp f' g).hom ≫ (Scheme.Modules.pullbackCongr h).hom ≫\n        (Scheme.Modules.pullbackComp g' f).inv)).natTrans", "proof_size_lean": 547, "has_sorry": false, "tex_file": "chapters/Kemeny_PeerDependencies.tex", "lean_file": "MR4213770UniversalSecantBundlesAndSyzygiesOfCanonicalCurves/Foundations.lean", "dep_count": 1, "rdep_count": 4, "descendant_count": 21, "proof_size_tex": null, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 0}, "def:peer_module_iso_locality": {"id": "def:peer_module_iso_locality", "type": "lemma", "title": "Stalk-local criterion for module isomorphisms", "chapter": "", "statement": "ok\n  \n  \n  \n  A morphism of \\(\\cO_X\\)-modules is an isomorphism if and only if the induced\n  morphism on every stalk is an isomorphism.  The criterion reduces to the\n  stalkwise criterion for morphisms of sheaves on the underlying topological\n  space of \\(X\\).  A stronger criterion checks isomorphism on every open section\n  of \\(X\\), which subsumes the stalkwise test.", "uses": ["mathlib:stalk_locality"], "lean_name": "AlgebraicGeometry.Modules.isIso_iff_isIso_stalkFunctor_map", "proved": true, "mathlib_ok": false, "proof_tex": "", "lean_source": "theorem Modules.isIso_iff_isIso_stalkFunctor_map {X : Scheme.{u}} {M N : X.Modules}\n    (φ : M ⟶ N) :\n    IsIso φ ↔ ∀ x : X,\n      IsIso ((TopCat.Presheaf.stalkFunctor _ x).map ((Scheme.Modules.toPresheaf X).map φ)) := by\n  rw [← isIso_iff_of_reflects_iso φ (Scheme.Modules.toPresheaf X)]\n  let sh : (⟨M.presheaf, M.isSheaf⟩ : TopCat.Sheaf Ab X) ⟶ ⟨N.presheaf, N.isSheaf⟩ :=\n    ⟨(Scheme.Modules.toPresheaf X).map φ⟩\n  have key := TopCat.Presheaf.isIso_iff_stalkFunctor_map_iso sh\n  refine ⟨fun h x => ?_, fun h => ?_⟩\n  · haveI : IsIso ((sheafToPresheaf _ Ab).map sh) := h\n    exact key.mp ((fullyFaithfulSheafToPresheaf _ _).isIso_of_isIso_map sh) x\n  · haveI : IsIso sh := key.mpr h\n    exact (inferInstance : IsIso ((sheafToPresheaf _ Ab).map sh))", "proof_size_lean": 751, "has_sorry": false, "tex_file": "chapters/Kemeny_PeerDependencies.tex", "lean_file": "MR4213770UniversalSecantBundlesAndSyzygiesOfCanonicalCurves/Foundations.lean", "dep_count": 1, "rdep_count": 1, "descendant_count": 15, "proof_size_tex": null, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 0}, "found:modules_topresheaf_additive": {"id": "found:modules_topresheaf_additive", "type": "lemma", "title": "", "chapter": "", "statement": "ok\n[Forgetful functor to abelian-group presheaves is additive]\n  \n  \n  \n  For a scheme \\(X\\), the forgetful functor \\(X.\\mathrm{Modules}\\to\\) (presheaves\n  of abelian groups on \\(X\\)) is additive.", "uses": ["mathlib:oxmod_category"], "lean_name": "AlgebraicGeometry.Scheme.Modules.toPresheaf_additive", "proved": true, "mathlib_ok": false, "proof_tex": "\n  \\uses{mathlib:oxmod_category}\n  \\leanok\n  This forgetful functor is a composite of two additive functors (the forgetful\n  from sheaves of modules to presheaves of modules, then the forgetful to\n  presheaves of abelian groups), hence additive.\n", "lean_source": "instance Scheme.Modules.toPresheaf_additive (X : Scheme.{u}) :\n    (Scheme.Modules.toPresheaf X).Additive :=\n  inferInstanceAs (SheafOfModules.forget X.ringCatSheaf ⋙\n    PresheafOfModules.toPresheaf X.ringCatSheaf.obj).Additive", "proof_size_lean": 228, "has_sorry": false, "tex_file": "chapters/Kemeny_PeerDependencies.tex", "lean_file": "MR4213770UniversalSecantBundlesAndSyzygiesOfCanonicalCurves/Foundations.lean", "dep_count": 1, "rdep_count": 1, "descendant_count": 1, "proof_size_tex": 242, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 0}, "found:global_sections_ab_additive": {"id": "found:global_sections_ab_additive", "type": "lemma", "title": "", "chapter": "", "statement": "ok\n[Additive global-sections functor is additive]\n  \n  \n  \n  For a scheme \\(X\\), the global-sections functor\n  \\(\\Gamma_{\\mathrm{Ab}}\\) of \\cref{found:global_sections_ab} is additive.", "uses": ["found:global_sections_ab", "found:modules_topresheaf_additive"], "lean_name": "AlgebraicGeometry.Scheme.globalSectionsAb_additive", "proved": true, "mathlib_ok": false, "proof_tex": "\n  \\uses{found:global_sections_ab, found:modules_topresheaf_additive}\n  \\leanok\n  \\(\\Gamma_{\\mathrm{Ab}}\\) is the composite of the additive forgetful functor to\n  abelian-group presheaves with the additive sections functor \\(\\Gamma(X,-)\\); a\n  composite of additive functors is additive.\n", "lean_source": "instance Scheme.globalSectionsAb_additive (X : Scheme.{u}) :\n    (Scheme.globalSectionsAb X).Additive where\n  map_add {M N f g} := by\n    change ((Scheme.Modules.toPresheaf X).map (f + g)).app (Opposite.op ⊤) =\n      ((Scheme.Modules.toPresheaf X).map f).app (Opposite.op ⊤) +\n      ((Scheme.Modules.toPresheaf X).map g).app (Opposite.op ⊤)\n    rw [Functor.map_add]\n    rfl", "proof_size_lean": 373, "has_sorry": false, "tex_file": "chapters/Kemeny_PeerDependencies.tex", "lean_file": "MR4213770UniversalSecantBundlesAndSyzygiesOfCanonicalCurves/Foundations.lean", "dep_count": 2, "rdep_count": 0, "descendant_count": 0, "proof_size_tex": 284, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 0}, "def:kemeny_koszul_cohomology": {"id": "def:kemeny_koszul_cohomology", "type": "definition", "title": "Koszul cohomology \\(\\K_{p,q}(X,L)\\)", "chapter": "", "statement": "\\textit{Source: Kemeny, Introduction; kernel-bundle description after Ein--Lazarsfeld, Lemma 1.4.}\n  For a polarized variety \\((X,L)\\) and integers \\(p,q\\), the Koszul cohomology\n  group \\(\\K_{p,q}(X,L)\\) is the cohomology at the middle term of the Koszul\n  complex\n  \\[\n    \\wedge^{p+1}H^0(X,L)\\otimes H^0(X,L^{q-1})\n      \\to \\wedge^{p}H^0(X,L)\\otimes H^0(X,L^{q})\n      \\to \\wedge^{p-1}H^0(X,L)\\otimes H^0(X,L^{q+1}).\n  \\]\n  More generally, for a base-point-free subspace \\(V\\subseteq H^0(X,L)\\) the same\n  complex built from \\(V\\) computes \\(\\K_{p,q}(X,L,V)\\).\n\n  \\emph{Kernel-bundle description.}  Let \\(M_L\\) be the kernel bundle of\n  \\cref{def:kemeny_kernel_bundle}.  If \\(H^1(X,L^{q-1})=0\\), then the Koszul\n  complex is exact at the middle term --- that is, \\(\\K_{p,q}(X,L)=0\\) --- if and\n  only if\n  \\[\n    H^1\\bigl(X,\\wedge^{p+1}M_L\\otimes L^{q-1}\\bigr)=0 .\n  \\]\n  In particular, \\(\\K_{p,1}(X,L)=0\\) is equivalent to\n  \\(H^1(X,\\wedge^{p+1}M_L)=0\\).", "uses": ["def:peer_scheme_hmodule", "found:oxmod_exterior_power", "def:kemeny_kernel_bundle"], "lean_name": "MR4213770.koszulCohomology", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Kemeny_UniversalSecantBundles.tex", "lean_file": "", "dep_count": 3, "rdep_count": 1, "descendant_count": 14, "proof_size_tex": null, "effort_local": 959, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 4527}, "def:kemeny_kernel_bundle": {"id": "def:kemeny_kernel_bundle", "type": "definition", "title": "Kernel bundle \\(M_L\\)", "chapter": "", "statement": "\\textit{Source: Kemeny, Section sec1, opening paragraph.}\n  For a globally generated line bundle \\(L\\) on \\(X\\), the \\emph{kernel bundle}\n  \\(M_L\\) is defined by the evaluation sequence\n  \\[\n    0\\to M_L\\to H^0(L)\\otimes\\cO_X\\to L\\to0 ,\n  \\]\n  i.e.\\ \\(M_L=\\ker(\\mathrm{ev}_L)\\); it is a vector bundle of rank\n  \\(h^0(L)-1\\).", "uses": ["def:peer_scheme_hmodule"], "lean_name": "MR4213770.kernelBundle", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Kemeny_UniversalSecantBundles.tex", "lean_file": "", "dep_count": 1, "rdep_count": 3, "descendant_count": 23, "proof_size_tex": null, "effort_local": 324, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 324}, "def:kemeny_LM_bundle": {"id": "def:kemeny_LM_bundle", "type": "definition", "title": "Lazarsfeld--Mukai bundle \\(E\\)", "chapter": "", "statement": "\\textit{Source: Kemeny, Introduction.}\n  Let \\(X\\) be a K3 surface with \\(\\Pic(X)=\\mathbb Z[L]\\) and \\(L\\) ample of even\n  genus \\(g=2k\\).  The \\emph{Lazarsfeld--Mukai bundle} \\(E\\) is the rank-two\n  bundle associated to a \\(g^1_{k+1}\\), i.e.\\ a pencil \\(A\\), on a smooth curve\n  \\(C\\in|L|\\); its dual fits into the exact sequence\n  \\[\n    0\\to E^\\vee\\to H^0(C,A)\\otimes\\cO_X\\to i_*A\\to0 ,\n  \\]\n  where \\(i:C\\hookrightarrow X\\) is the inclusion.  It has invariants\n  \\(\\det E=L\\), \\(h^0(E)=k+2\\), and \\(h^1(E)=h^2(E)=0\\); in particular\n  \\(\\PP(H^0(E))\\simeq\\PP^{k+1}\\).", "uses": ["def:peer_scheme_hmodule"], "lean_name": "MR4213770.lazarsfeldMukaiBundle", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Kemeny_UniversalSecantBundles.tex", "lean_file": "", "dep_count": 1, "rdep_count": 1, "descendant_count": 25, "proof_size_tex": null, "effort_local": 569, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 569}, "thm:kemeny_generic_green": {"id": "thm:kemeny_generic_green", "type": "theorem", "title": "Generic Green's conjecture for general canonical curves", "chapter": "", "statement": "\\textit{Source: Kemeny, Introduction, Theorem generic-green.}\n  If \\(C\\) is a general complex curve of genus \\(2k\\) or \\(2k+1\\), then\n  \\(\\K_{k,1}(C,\\omega_C)=0\\).", "uses": ["lem:kemeny_even_k3_section_to_general_curve", "thm:kemeny_odd_voisin"], "lean_name": "MR4213770.GenericGreen", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{lem:kemeny_even_k3_section_to_general_curve, thm:kemeny_odd_voisin}\n  For even genus, apply the K3-section transfer from the Picard-rank-one K3\n  vanishing proved by the universal secant bundle argument to a general\n  canonical curve of genus \\(2k\\).\n  For odd genus, use the Picard-rank-two nodal K3 reduction: the projection\n  criterion reduces the desired vanishing to injectivity of the projection map,\n  and the odd-genus secant-bundle calculation supplies that injectivity.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Kemeny_UniversalSecantBundles.tex", "lean_file": "", "dep_count": 2, "rdep_count": 0, "descendant_count": 0, "proof_size_tex": 485, "effort_local": 485, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 29281}, "thm:kemeny_even_geometric_syzygy_structure": {"id": "thm:kemeny_even_geometric_syzygy_structure", "type": "theorem", "title": "Even-genus geometric syzygy theorem", "chapter": "", "statement": "\\textit{Source: Kemeny, Introduction, Theorem geo-thm-intro.}\n  Let \\(X\\) be a complex K3 surface with \\(\\Pic(X)=\\mathbb Z[L]\\) and \\(L\\)\n  ample of even genus \\(g=2k\\).  For the Lazarsfeld--Mukai bundle \\(E\\), each\n  nonzero section \\(s\\) determines a one-dimensional subspace\n  \\[\n    \\K_{k-1,1}\\bigl(X,L,H^0(L\\otimes I_{Z(s)})\\bigr)\\subseteq \\K_{k-1,1}(X,L).\n  \\]\n  The induced map\n  \\(\\PP(H^0(E))\\to \\PP(\\K_{k-1,1}(X,L))\\) is the degree \\(k-2\\) Veronese\n  embedding, hence induces\n  \\(\\Sym^{k-2}H^0(X,E)\\simeq \\K_{k-1,1}(X,L)\\).", "uses": ["cor:kemeny_extremal_syzygy_iso", "thm:kemeny_veronese_identification", "lem:kemeny_psi_global_sections", "lem:kemeny_R1q_line_bundle", "lem:kemeny_fibre_secant_map"], "lean_name": "MR4213770.EvenGeometricSyzygyStructure", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{cor:kemeny_extremal_syzygy_iso, thm:kemeny_veronese_identification, lem:kemeny_psi_global_sections, lem:kemeny_R1q_line_bundle, lem:kemeny_fibre_secant_map}\n  Write \\(\\cM=p^*M_L\\) and \\(\\Gamma'=\\pi_*\\Gamma\\).  Because\n  \\(q_*(\\wedge^k\\cM\\otimes p^*L)\\simeq H^0(X,\\wedge^kM_L(L))\\otimes\\cO_{\\PP}\\) has no\n  higher cohomology, the Leray spectral sequence gives\n  \\(H^1(B,\\wedge^k\\pi^*\\cM\\otimes p'^*L)\\simeq\n   H^0(\\PP,R^1q_*(\\wedge^k\\cM\\otimes p^*L))\\); applying Leray likewise to the\n  target, via the determinant identification\n  \\(\\wedge^k\\Gamma\\simeq I_D\\otimes q'^*\\cO_{\\PP}(k)\\), rewrites\n  \\(H^1(B,\\wedge^k\\Gamma\\otimes p'^*L)\\) as\n  \\(H^0(\\PP,R^1q_*((L\\boxtimes\\cO_{\\PP}(k))\\otimes I_{\\cZ}))\\).  By\n  \\cref{lem:kemeny_psi_global_sections}, \\(\\psi\\) is therefore the map on global\n  sections of the vector-bundle morphism\n  \\[\n    \\K_{k-1,1}(X,L)^\\vee\\otimes\\cO_{\\PP}\\;\\longrightarrow\\;\n      R^1q_*\\bigl((L\\boxtimes\\cO_{\\PP}(k))\\otimes I_{\\cZ}\\bigr).\n  \\]\n  By \\cref{lem:kemeny_R1q_line_bundle} the target is the line bundle\n  \\(\\cO_{\\PP}(k-2)\\), the identification\n  \\(R^1q_*((L\\boxtimes\\cO_{\\PP}(k))\\otimes I_{\\cZ})\\simeq\n    R^2q_*\\cO_{X\\times\\PP}\\otimes\\cO_{\\PP}(k-2)\\simeq\\cO_{\\PP}(k-2)\\) resting on\n  relative duality \\(R^2q_*\\cO_{X\\times\\PP}\\simeq\\cO_{\\PP}\\).  By\n  \\cref{cor:kemeny_extremal_syzygy_iso} the map \\(\\psi\\) is surjective on global\n  sections; since \\(\\cO_{\\PP}(k-2)\\) is globally generated, the bundle morphism is\n  a surjection of sheaves, so \\(\\cref{thm:kemeny_veronese_identification}\\)\n  realizes it as the quotient inducing a degree \\(k-2\\) Veronese embedding\n  \\(\\widetilde\\psi:\\PP(H^0(E))\\to\\PP(\\K_{k-1,1}(X,L))\\).\n\n  It remains to compute \\(\\widetilde\\psi([t])\\) for nonzero \\(t\\in H^0(E)\\).  By\n  \\cref{lem:kemeny_fibre_secant_map} the fibre of the bundle morphism over\n  \\([t]\\) is the composition\n  \\(H^1(X,\\wedge^kM_L(L))\\to H^1(X,\\wedge^k\\Gamma'_t(L))\\to\n   H^1(X,L\\otimes I_{Z(t)})\\), which on the blow-up \\(\\pi_t:B_t\\to X\\) of\n  \\(Z(t)\\) is the surjection\n  \\(H^1(B_t,\\wedge^k\\pi_t^*M_L(L))\\twoheadrightarrow\n    H^1(B_t,\\wedge^k\\Gamma_t(\\pi_t^*L))\\).  Using\n  \\(\\wedge^kM_L(L)\\simeq\\wedge^kM_L^\\vee\\) and\n  \\(\\wedge^k\\Gamma_t(\\pi_t^*L)\\simeq\\wedge^k\\cS_t^\\vee\\) (from\n  \\(0\\to\\cS_t\\to\\pi_t^*M_L\\to\\Gamma_t\\to0\\)), this is Serre dual to the inclusion\n  \\(H^1(B_t,\\wedge^k\\cS_t(D_t))\\hookrightarrow H^1(B_t,\\wedge^k\\pi_t^*M_L(D_t))\\),\n  i.e.\\ to\n  \\(\\K_{k-1,1}(B_t,D_t,\\pi_t^*L-D_t)\\hookrightarrow\\K_{k-1,1}(B_t,D_t,\\pi_t^*L)\\)\n  by the kernel-bundle description.  Since\n  \\(H^0(B_t,\\pi_t^*L^{\\otimes n}(D_t))\\simeq H^0(X,L^{\\otimes n})\\) for all \\(n\\),\n  this is the inclusion\n  \\(\\K_{k-1,1}(X,L,H^0(L\\otimes I_{Z(t)}))\\hookrightarrow\\K_{k-1,1}(X,L)\\), a\n  one-dimensional subspace; thus \\(\\widetilde\\psi([t])\\) is the secant Koszul line\n  attached to \\(Z(t)\\).  Finally \\cref{cor:kemeny_extremal_syzygy_iso} packages\n  the surjectivity of \\(\\psi\\) and the even-genus vanishing\n  \\(\\K_{k,1}(X,L)=0\\) into the natural isomorphism\n  \\(\\Sym^{k-2}H^0(X,E)\\simeq\\K_{k-1,1}(X,L)\\).\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Kemeny_UniversalSecantBundles.tex", "lean_file": "", "dep_count": 5, "rdep_count": 1, "descendant_count": 1, "proof_size_tex": 3024, "effort_local": 3024, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 24810}, "cor:kemeny_geometric_syzygy_even": {"id": "cor:kemeny_geometric_syzygy_even", "type": "corollary", "title": "Geometric Syzygy Conjecture in even genus", "chapter": "", "statement": "\\textit{Source: Kemeny, Introduction, Corollary geo-cor.}\n  If \\(C\\) is a general curve of even genus \\(2k\\), then\n  \\(\\K_{k-1,1}(C,\\omega_C)\\) is generated by the rank \\(k\\) syzygies arising\n  from the subspaces \\(H^0(\\omega_C\\otimes A^{-1})\\), for\n  \\(A\\in W^1_{k+1}(C)\\).", "uses": ["thm:kemeny_even_geometric_syzygy_structure", "lem:kemeny_grassmann_pencil_map", "lem:kemeny_voisin_generation_observation", "lem:kemeny_restrict_k3_syzygies_to_curve"], "lean_name": "MR4213770.GeometricSyzygyEven", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{thm:kemeny_even_geometric_syzygy_structure, lem:kemeny_grassmann_pencil_map, lem:kemeny_voisin_generation_observation, lem:kemeny_restrict_k3_syzygies_to_curve}\n  For a general \\(C\\in |L|\\), the finite map from\n  \\(\\Gr_2(H^0(E))\\) to \\(|L|\\) identifies its fibre over \\(C\\) with\n  \\(W^1_{k+1}(C)\\).  The degree \\(k-2\\) Veronese image is nondegenerate on the\n  union of the lines corresponding to these pencils, so the K3 space\n  \\(\\K_{k-1,1}(X,L)\\) is generated by the corresponding secant subspaces.\n  Restriction to \\(C\\) identifies these subspaces with the rank \\(k\\) syzygy\n  spaces in the statement.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Kemeny_UniversalSecantBundles.tex", "lean_file": "", "dep_count": 4, "rdep_count": 0, "descendant_count": 0, "proof_size_tex": 610, "effort_local": 610, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 26348}, "lem:kemeny_even_k3_section_to_general_curve": {"id": "lem:kemeny_even_k3_section_to_general_curve", "type": "lemma", "title": "Even K3 section transfer to a general curve", "chapter": "", "statement": "\\textit{Source: Kemeny, Introduction, even-genus transfer sentence.}\n  The vanishing \\(\\K_{k,1}(X,L)=0\\) for a Picard-rank-one K3 surface of even\n  genus \\(2k\\) implies \\(\\K_{k,1}(C,\\omega_C)=0\\) for a general canonical curve\n  \\(C\\) of genus \\(2k\\).", "uses": ["thm:kemeny_even_voisin"], "lean_name": "MR4213770.EvenK3SectionToGeneralCurve", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{thm:kemeny_even_voisin}\n  Restrict the K3 Koszul complex to smooth hyperplane sections \\(C\\in |L|\\);\n  adjunction identifies \\(L|_C\\) with \\(\\omega_C\\), and the standard Green\n  restriction comparison identifies the relevant curve Koszul group with the\n  specialization controlled by \\(\\K_{k,1}(X,L)\\).  Since Kemeny's even K3\n  vanishing supplies zero for this specialization and Koszul cohomology\n  dimensions are upper semicontinuous in flat families of canonical curves, the\n  same vanishing holds on the open general even-genus locus.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Kemeny_UniversalSecantBundles.tex", "lean_file": "", "dep_count": 1, "rdep_count": 1, "descendant_count": 1, "proof_size_tex": 545, "effort_local": 545, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 16779}, "lem:kemeny_koszul_reduction": {"id": "lem:kemeny_koszul_reduction", "type": "lemma", "title": "Koszul vanishing via the kernel bundle", "chapter": "", "statement": "\\textit{Source: Kemeny, Section sec1, opening paragraph.}\n  Let \\(X\\) be a K3 surface of even genus \\(g=2k\\) with kernel bundle \\(M_L\\)\n  (\\cref{def:kemeny_kernel_bundle}).  Then the vanishing\n  \\(H^1(X,\\wedge^{k+1}M_L)=0\\) implies \\(\\K_{k,1}(X,L)=0\\).", "uses": ["def:kemeny_kernel_bundle", "def:kemeny_koszul_cohomology", "found:oxmod_exterior_power"], "lean_name": "MR4213770.KernelBundleReduction", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:kemeny_kernel_bundle, def:kemeny_koszul_cohomology}\n  This is the kernel-bundle description of Koszul cohomology specialized to\n  \\((p,q)=(k,1)\\) (\\cref{def:kemeny_koszul_cohomology}).  Since\n  \\(H^1(X,\\cO_X)=0\\) on a K3 surface, the degree \\((k,1)\\) Koszul complex is\n  exact at its middle term precisely when \\(H^1(X,\\wedge^{k+1}M_L)=0\\); hence the\n  stated vanishing forces \\(\\K_{k,1}(X,L)=0\\).\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Kemeny_UniversalSecantBundles.tex", "lean_file": "", "dep_count": 3, "rdep_count": 1, "descendant_count": 13, "proof_size_tex": 407, "effort_local": 407, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 4934}, "def:kemeny_universal_zero_locus": {"id": "def:kemeny_universal_zero_locus", "type": "definition", "title": "Universal zero locus", "chapter": "", "statement": "\\textit{Source: Kemeny, Section sec1.}\n  Let \\(\\PP=\\PP(H^0(E))\\), with projections \\(p:X\\times\\PP\\to X\\) and\n  \\(q:X\\times\\PP\\to\\PP\\).  The universal zero locus is\n  \\[\n    \\cZ=\\{(x,s)\\mid s(x)=0\\}\\subseteq X\\times\\PP .\n  \\]\n  It is smooth over \\(X\\), and finite flat over \\(\\PP\\) under the Picard-rank-one\n  hypothesis.", "uses": ["def:kemeny_LM_bundle"], "lean_name": "MR4213770.UniversalZeroLocus", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Kemeny_UniversalSecantBundles.tex", "lean_file": "", "dep_count": 1, "rdep_count": 6, "descendant_count": 24, "proof_size_tex": null, "effort_local": 320, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 889}, "def:kemeny_universal_secant_bundles": {"id": "def:kemeny_universal_secant_bundles", "type": "definition", "title": "Universal secant bundles", "chapter": "", "statement": "\\textit{Source: Kemeny, Section sec1.}\n  Let \\(\\pi:B\\to X\\times\\PP\\) be the blow-up of \\(\\cZ\\), with exceptional\n  divisor \\(D\\), and let \\(p'=p\\circ\\pi\\), \\(q'=q\\circ\\pi\\).  Define\n  \\[\n    0\\to\\cS\\to q'^*q'_*(p'^*L\\otimes I_D)\\to p'^*L\\otimes I_D\\to0\n  \\]\n  and let \\(\\Gamma\\) be the quotient in\n  \\(0\\to\\cS\\to\\pi^*\\cM\\to\\Gamma\\to0\\), where \\(\\cM=p^*M_L\\) is the pullback to\n  \\(X\\times\\PP\\) of the kernel bundle \\(M_L\\) (\\cref{def:kemeny_kernel_bundle}).\n  The bundles \\(\\cS\\) and \\(\\Gamma\\) are Kemeny's universal secant bundles.", "uses": ["def:kemeny_universal_zero_locus", "def:kemeny_kernel_bundle"], "lean_name": "MR4213770.UniversalSecantBundles", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Kemeny_UniversalSecantBundles.tex", "lean_file": "", "dep_count": 2, "rdep_count": 5, "descendant_count": 20, "proof_size_tex": null, "effort_local": 533, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 1746}, "lem:kemeny_W_locally_free": {"id": "lem:kemeny_W_locally_free", "type": "lemma", "title": "The cokernel bundle \\(\\mathcal W\\)", "chapter": "", "statement": "\\textit{Source: Kemeny, Lemma very-first-lem.}\n  The cokernel\n  \\[\n    \\mathcal W=\\operatorname{Coker}\\bigl(q'_*(p'^*L\\otimes I_D)\\to q'_*p'^*L\\bigr)\n  \\]\n  is locally free of rank \\(k\\).", "uses": ["def:kemeny_universal_zero_locus", "def:peer_higher_direct_image", "def:peer_affine_pushforward_base_change", "def:peer_module_iso_locality", "found:locally_free"], "lean_name": "MR4213770.WLocallyFree", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:peer_higher_direct_image, def:peer_affine_pushforward_base_change, def:peer_module_iso_locality}\n  Apply \\(Rq_*\\) to the universal exact sequence.  The fibres of\n  \\(q_*(p^*L|_{\\cZ})\\) have dimension \\(k+1\\), while\n  \\(R^1q_*(p^*L\\otimes I_{\\cZ})\\) has fibre \\(H^2(\\cO_X)\\), hence rank one.\n  Grauert's theorem gives local freeness.  The pushforward exact sequence is\n  checked after the standard base-change reductions, and the resulting\n  sheaf-map identification is local on stalks; the exact sequence then shows\n  that the kernel \\(\\mathcal W\\) has rank \\(k\\).\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Kemeny_UniversalSecantBundles.tex", "lean_file": "", "dep_count": 5, "rdep_count": 3, "descendant_count": 14, "proof_size_tex": 574, "effort_local": 574, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 1463}, "lem:kemeny_first_iso": {"id": "lem:kemeny_first_iso", "type": "lemma", "title": "First symmetric-power computation", "chapter": "", "statement": "\\textit{Source: Kemeny, Lemma first-iso.}\n  For \\(\\cG=q^*q_*(p^*L\\otimes I_{\\cZ})\\), one has\n  \\(H^{k+1}(X\\times\\PP,\\Sym^{k+1}\\cG)=0\\) and a natural isomorphism\n  \\(H^k(X\\times\\PP,\\Sym^{k+1}\\cG)\\simeq \\Sym^kH^0(E)\\).", "uses": ["def:kemeny_universal_secant_bundles", "def:kemeny_universal_zero_locus", "found:oxmod_sym_power"], "lean_name": "MR4213770.FirstIso", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:kemeny_universal_secant_bundles, def:kemeny_universal_zero_locus, def:kemeny_LM_bundle, found:oxmod_sym_power}\n  Recall \\(\\cG=q^*q_*(p^*L\\otimes I_{\\cZ})\\) and that\n  \\(q_*p^*E\\simeq H^0(E)\\otimes\\cO_{\\PP}\\).  Pulling the evaluation\n  \\(q^*q_*p^*E\\to p^*E\\) back together with the universal section presents \\(\\cG\\)\n  as the cokernel of the two-term locally free complex\n  \\[\n    0\\to q^*\\cO_{\\PP}(-2)\\to H^0(E)\\otimes q^*\\cO_{\\PP}(-1)\\to\\cG\\to0 ,\n  \\]\n  whose left map is multiplication by\n  \\(\\mathrm{id}\\in H^0(E)\\otimes H^0(E)^\\vee\\).  Taking the \\((k+1)\\)-st symmetric power\n  of this two-term complex yields the short exact sequence\n  \\[\n    0\\to\\Sym^kH^0(E)\\otimes q^*\\cO_{\\PP}(-k-2)\n      \\to\\Sym^{k+1}H^0(E)\\otimes q^*\\cO_{\\PP}(-k-1)\n      \\to\\Sym^{k+1}\\cG\\to0 .\n  \\]\n  We read the cohomology of \\(\\Sym^{k+1}\\cG\\) from the associated long exact\n  sequence.  Working on \\(X\\times\\PP^{k+1}\\), the Künneth formula together with\n  \\(H^1(\\cO_X)=0\\) gives\n  \\[\n    H^k\\bigl(\\cO_X\\boxtimes\\cO_{\\PP}(-k-1)\\bigr)\n      =H^{k+1}\\bigl(\\cO_X\\boxtimes\\cO_{\\PP}(-k-1)\\bigr)=0 ,\n  \\]\n  since \\(H^{k+1}(\\PP,\\cO_{\\PP}(-k-1))=H^0(\\PP,\\cO_{\\PP}(-1))^\\vee=0\\) by Serre\n  duality on \\(\\PP^{k+1}\\) (whose canonical bundle is \\(\\cO_{\\PP}(-k-2)\\)), and the\n  lower twists of \\(\\cO_{\\PP}(-k-1)\\) carry no cohomology.  Hence the middle term\n  of the symmetric-power sequence has vanishing \\(H^k\\) and \\(H^{k+1}\\), so the\n  connecting homomorphism is an isomorphism\n  \\[\n    H^k\\bigl(\\Sym^{k+1}\\cG\\bigr)\\;\\xrightarrow{\\ \\sim\\ }\\;\n    H^{k+1}\\bigl(\\Sym^kH^0(E)\\otimes q^*\\cO_{\\PP}(-k-2)\\bigr)\n    \\simeq\\Sym^kH^0(E) ,\n  \\]\n  the final identification using\n  \\(H^{k+1}(\\cO_X\\boxtimes\\cO_{\\PP}(-k-2))=H^0(\\cO_X)\\otimes\n   H^{k+1}(\\cO_{\\PP}(-k-2))\\simeq\\C\\) (again Serre duality on \\(\\PP^{k+1}\\)).\n  Finally \\(H^{k+1}(\\Sym^{k+1}\\cG)=0\\): in the long exact sequence it lies between\n  \\(H^{k+1}\\) of the middle term, which vanishes as above, and\n  \\(H^{k+2}(\\cO_X\\boxtimes\\cO_{\\PP}(-k-2))\\), whose only Künneth summand\n  \\(H^1(\\cO_X)\\otimes H^{k+1}(\\cO_{\\PP}(-k-2))\\) is killed by \\(H^1(\\cO_X)=0\\).\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Kemeny_UniversalSecantBundles.tex", "lean_file": "", "dep_count": 3, "rdep_count": 3, "descendant_count": 17, "proof_size_tex": 2084, "effort_local": 2084, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 4530}, "lem:kemeny_first_twist": {"id": "lem:kemeny_first_twist", "type": "lemma", "title": "First twisted symmetric-power computation", "chapter": "", "statement": "\\textit{Source: Kemeny, Lemma first-twist-lem.}\n  There is a natural isomorphism\n  \\[\n    H^k\\bigl(\\Sym^k\\cG\\otimes p^*L\\otimes I_{\\cZ}\\bigr)\\simeq \\Sym^kH^0(E).\n  \\]", "uses": ["lem:kemeny_first_iso", "def:kemeny_universal_zero_locus"], "lean_name": "MR4213770.TwistedSymmetricComparison", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{lem:kemeny_first_iso, def:kemeny_universal_zero_locus}\n  Tensor the symmetric-power resolution of \\(\\cG\\) by \\(p^*L\\otimes I_{\\cZ}\\),\n  getting the short exact sequence\n  \\begin{align*}\n    0\\to{}&\\Sym^{k-1}H^0(E)\\otimes q^*\\cO_{\\PP}(-k-1)\\otimes p^*L\\otimes I_{\\cZ}\n      \\to\\Sym^kH^0(E)\\otimes q^*\\cO_{\\PP}(-k)\\otimes p^*L\\otimes I_{\\cZ}\\\\\n      &\\to\\Sym^k\\cG\\otimes p^*L\\otimes I_{\\cZ}\\to0 .\n  \\end{align*}\n  The twist \\(p^*L\\otimes I_{\\cZ}\\) is resolved by the universal section sequence\n  \\(0\\to\\cO_X\\boxtimes\\cO_{\\PP}(-2)\\to E\\boxtimes\\cO_{\\PP}(-1)\\to\n   p^*L\\otimes I_{\\cZ}\\to0\\).  We use it to compute\n  \\(H^\\bullet(L\\boxtimes\\cO_{\\PP}(-k-1)\\otimes I_{\\cZ})\\): by Künneth\n  \\(H^{k+2}(\\cO_X\\boxtimes\\cO_{\\PP}(-k-3))=0\\), while\n  \\[\n    H^{k+1}\\bigl(\\cO_X\\boxtimes\\cO_{\\PP}(-k-3)\\bigr)\n      =H^{k+1}\\bigl(\\omega_{\\PP}(-1)\\bigr)\\simeq H^0(\\cO_{\\PP}(1))^\\vee\\simeq H^0(E),\n    \\quad\n    H^{k+1}\\bigl(E\\boxtimes\\cO_{\\PP}(-k-2)\\bigr)\\simeq H^0(E),\n  \\]\n  where \\(\\omega_{\\PP}=\\cO_{\\PP}(-k-2)\\) is the canonical bundle of\n  \\(\\PP^{k+1}\\).  The connecting map between these two groups is identified with\n  \\(\\mathrm{id}:H^0(E)\\to H^0(E)\\), so\n  \\(H^{k+1}(L\\boxtimes\\cO_{\\PP}(-k-1)\\otimes I_{\\cZ})=0\\) and, likewise,\n  \\(H^k(L\\boxtimes\\cO_{\\PP}(-k-1)\\otimes I_{\\cZ})=0\\).  Consequently the left-hand\n  term of the symmetric-power sequence drops out in degree \\(k\\) and\n  \\[\n    H^k\\bigl(\\Sym^k\\cG\\otimes p^*L\\otimes I_{\\cZ}\\bigr)\\simeq\n    \\Sym^kH^0(E)\\otimes H^k\\bigl(L\\boxtimes\\cO_{\\PP}(-k)\\otimes I_{\\cZ}\\bigr).\n  \\]\n  It remains to see that the boundary map\n  \\(H^k(L\\boxtimes\\cO_{\\PP}(-k)\\otimes I_{\\cZ})\\to H^{k+1}(q^*\\omega_{\\PP})\\) is an\n  isomorphism; this follows because \\(H^i(E\\boxtimes\\cO_{\\PP}(-k-1))=0\\) for all\n  \\(i\\), giving \\(H^k(L\\boxtimes\\cO_{\\PP}(-k)\\otimes I_{\\cZ})\\simeq\\C\\) and hence\n  the asserted natural isomorphism.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Kemeny_UniversalSecantBundles.tex", "lean_file": "", "dep_count": 2, "rdep_count": 2, "descendant_count": 16, "proof_size_tex": 1850, "effort_local": 1850, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 6380}, "lem:kemeny_second_twist": {"id": "lem:kemeny_second_twist", "type": "lemma", "title": "Second twisted symmetric-power comparison", "chapter": "", "statement": "\\textit{Source: Kemeny, Lemma second-twist-lem.}\n  The evaluation morphism \\(\\cG\\twoheadrightarrow p^*L\\otimes I_{\\cZ}\\) induces an\n  isomorphism\n  \\[\n    H^k(\\Sym^k\\cG\\otimes\\cG)\\;\\xrightarrow{\\ \\sim\\ }\\;\n    H^k(\\Sym^k\\cG\\otimes p^*L\\otimes I_{\\cZ}).\n  \\]", "uses": ["lem:kemeny_first_iso", "lem:kemeny_first_twist", "def:kemeny_universal_zero_locus"], "lean_name": "MR4213770.SecondTwist", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{lem:kemeny_first_iso, lem:kemeny_first_twist, def:kemeny_universal_zero_locus}\n  The argument repeats the previous one with \\(\\cG\\) in place of\n  \\(p^*L\\otimes I_{\\cZ}\\).  Tensoring the symmetric-power resolution of \\(\\cG\\) by\n  \\(\\cG\\) gives\n  \\[\n    0\\to\\Sym^{k-1}H^0(E)\\otimes q^*\\cO_{\\PP}(-k-1)\\otimes\\cG\n      \\to\\Sym^kH^0(E)\\otimes q^*\\cO_{\\PP}(-k)\\otimes\\cG\n      \\to\\Sym^k\\cG\\otimes\\cG\\to0 .\n  \\]\n  Using the two-term resolution\n  \\(0\\to q^*\\cO_{\\PP}(-2)\\to H^0(E)\\otimes q^*\\cO_{\\PP}(-1)\\to\\cG\\to0\\) one finds\n  \\(H^{k+1}(\\cG\\otimes q^*\\cO_{\\PP}(-k-1))=H^k(\\cG\\otimes q^*\\cO_{\\PP}(-k-1))=0\\)\n  and \\(H^k(\\cG\\otimes q^*\\cO_{\\PP}(-k))\\xrightarrow{\\sim}H^{k+1}(q^*\\omega_{\\PP})\\),\n  where \\(\\omega_{\\PP}=\\cO_{\\PP}(-k-2)\\).  Hence the left term again drops out in\n  degree \\(k\\) and\n  \\[\n    H^k\\bigl(\\Sym^k\\cG\\otimes\\cG\\bigr)\\simeq\n    H^k\\bigl(\\Sym^kH^0(E)\\otimes q^*\\cO_{\\PP}(-k)\\otimes\\cG\\bigr)\\simeq\\Sym^kH^0(E).\n  \\]\n  By \\cref{lem:kemeny_first_twist} the target\n  \\(H^k(\\Sym^k\\cG\\otimes p^*L\\otimes I_{\\cZ})\\) is the same space\n  \\(\\Sym^kH^0(E)\\), and under these identifications the map induced by the\n  evaluation \\(\\cG\\twoheadrightarrow p^*L\\otimes I_{\\cZ}\\) is the identity of\n  \\(\\Sym^kH^0(E)\\); it is therefore the asserted isomorphism.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Kemeny_UniversalSecantBundles.tex", "lean_file": "", "dep_count": 3, "rdep_count": 1, "descendant_count": 15, "proof_size_tex": 1260, "effort_local": 1260, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 7640}, "prop:kemeny_auto_injectivity": {"id": "prop:kemeny_auto_injectivity", "type": "proposition", "title": "Automatic injectivity", "chapter": "", "statement": "\\textit{Source: Kemeny, Proposition auto-injectivity.}\n  The natural map\n  \\(H^k(\\Sym^{k+1}\\cG)\\to H^k(\\Sym^k\\cG\\otimes p^*L\\otimes I_{\\cZ})\\) is an\n  isomorphism.", "uses": ["lem:kemeny_first_iso", "lem:kemeny_first_twist", "lem:kemeny_second_twist"], "lean_name": "MR4213770.AutoInjectivity", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{lem:kemeny_first_iso, lem:kemeny_first_twist, lem:kemeny_second_twist}\n  The natural map factors as\n  \\[\n    H^k(\\Sym^{k+1}\\cG)\\to H^k(\\Sym^k\\cG\\otimes\\cG)\n      \\xrightarrow{\\ \\sim\\ }H^k(\\Sym^k\\cG\\otimes p^*L\\otimes I_{\\cZ}),\n  \\]\n  where the second arrow is the evaluation isomorphism of\n  \\cref{lem:kemeny_second_twist}.  So it suffices to show that the first arrow is\n  injective.  For any vector bundle \\(\\mathcal F\\) the composite of natural maps\n  \\(\\Sym^{k+1}\\mathcal F\\to \\Sym^k\\mathcal F\\otimes\\mathcal F\\to\n   \\Sym^{k+1}\\mathcal F\\) is multiplication by \\(k+1\\), an isomorphism in\n  characteristic zero; hence the first map\n  \\(\\Sym^{k+1}\\cG\\to\\Sym^k\\cG\\otimes\\cG\\) is a split injection of bundles and\n  stays injective on \\(H^k\\).  Finally both ends are \\(\\Sym^kH^0(E)\\): the source\n  by \\cref{lem:kemeny_first_iso} and the target by\n  \\cref{lem:kemeny_first_twist}, so the injection of equal-dimensional spaces is\n  an isomorphism.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Kemeny_UniversalSecantBundles.tex", "lean_file": "", "dep_count": 3, "rdep_count": 1, "descendant_count": 14, "proof_size_tex": 950, "effort_local": 950, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 8590}, "thm:kemeny_even_secant_vanishing": {"id": "thm:kemeny_even_secant_vanishing", "type": "theorem", "title": "Even-genus secant-bundle vanishing", "chapter": "", "statement": "\\textit{Source: Kemeny, Theorem main-thm.}\n  For \\(1\\le i\\le k+1\\),\n  \\[\n    H^i\\bigl(B,\\wedge^{k+1-i}\\pi^*\\cM\\otimes\\Sym^i\\cS\\bigr)=0 .\n  \\]", "uses": ["def:kemeny_universal_secant_bundles", "prop:kemeny_auto_injectivity", "def:peer_affine_pushforward_base_change"], "lean_name": "MR4213770.EvenSecantVanishing", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:kemeny_universal_secant_bundles, prop:kemeny_auto_injectivity, lem:kemeny_first_iso, lem:kemeny_first_twist, def:peer_affine_pushforward_base_change}\n  Note first \\(\\pi^*\\cG\\simeq q'^*q'_*(p'^*L\\otimes I_D)\\).  The defining sequence\n  \\(0\\to\\cS\\to\\pi^*\\cM\\to\\Gamma\\to0\\) yields, for each \\(i\\), the\n  symmetric-power sequence\n  \\begin{equation}\\label{eq:ses-S}\n    0\\to\\Sym^i\\cS\\to\\Sym^i\\pi^*\\cG\\to\\Sym^{i-1}\\pi^*\\cG\\otimes p'^*L\\otimes I_D\\to0 .\n  \\end{equation}\n  By the projection formula and the blow-up identities\n  \\(\\pi_*\\cO_B\\simeq\\cO_{X\\times\\PP}\\), \\(\\pi_*I_D\\simeq I_{\\cZ}\\),\n  \\(R^j\\pi_*\\cO_B=R^j\\pi_*I_D=0\\) for \\(j>0\\), the natural map\n  \\(H^\\ell(B,\\Sym^i\\pi^*\\cG)\\to H^\\ell(B,\\Sym^{i-1}\\pi^*\\cG\\otimes p'^*L\\otimes I_D)\\)\n  is identified, for every \\(\\ell\\), with\n  \\(H^\\ell(X\\times\\PP,\\Sym^i\\cG)\\to\n    H^\\ell(X\\times\\PP,\\Sym^{i-1}\\cG\\otimes p^*L\\otimes I_{\\cZ})\\).\n\n  \\emph{Top case \\(i=k+1\\).}  Taking the long exact sequence of\n  \\eqref{eq:ses-S} for \\(i=k+1\\): the term \\(H^{k+1}(\\Sym^{k+1}\\pi^*\\cG)=0\\) by\n  \\cref{lem:kemeny_first_iso}, while the map\n  \\(H^k(\\Sym^{k+1}\\pi^*\\cG)\\to H^k(\\Sym^k\\pi^*\\cG\\otimes p'^*L\\otimes I_D)\\) is an\n  isomorphism by \\cref{prop:kemeny_auto_injectivity}.  Hence\n  \\(H^{k+1}(B,\\Sym^{k+1}\\cS)=0\\).\n\n  \\emph{Cases \\(1\\le i\\le k\\).}  From \\eqref{eq:ses-S} twisted by\n  \\(\\wedge^{k+1-i}\\pi^*\\cM\\) it suffices to prove the two vanishings\n  \\[\n    H^i\\bigl(\\wedge^{k+1-i}\\pi^*\\cM\\otimes\\Sym^i\\pi^*\\cG\\bigr)\n      =H^{i-1}\\bigl(\\wedge^{k+1-i}\\pi^*\\cM\\otimes\\Sym^{i-1}\\pi^*\\cG\\otimes\n       p'^*L\\otimes I_D\\bigr)=0 .\n  \\]\n  For the first, the symmetric-power resolution\n  \\[\n    0\\to\\Sym^{i-1}H^0(E)\\otimes q^*\\cO_{\\PP}(-i-1)\n      \\to\\Sym^iH^0(E)\\otimes q^*\\cO_{\\PP}(-i)\\to\\Sym^i\\cG\\to0\n  \\]\n  reduces it to\n  \\(H^i(\\wedge^{k+1-i}M_L\\boxtimes\\cO_{\\PP}(-i))=\n   H^{i+1}(\\wedge^{k+1-i}M_L\\boxtimes\\cO_{\\PP}(-i-1))=0\\), which holds by Künneth\n  for \\(1\\le i\\le k\\).  For the second, the resolution\n  \\begin{align*}\n    0\\to{}&\\Sym^{i-2}H^0(E)\\otimes q^*\\cO_{\\PP}(-i)\\otimes p^*L\\otimes I_{\\cZ}\n      \\to\\Sym^{i-1}H^0(E)\\otimes q^*\\cO_{\\PP}(-i+1)\\otimes p^*L\\otimes I_{\\cZ}\\\\\n      &\\to\\Sym^{i-1}\\cG\\otimes p^*L\\otimes I_{\\cZ}\\to0\n  \\end{align*}\n  reduces it to\n  \\(H^{i-1}(\\wedge^{k+1-i}M_L(L)\\boxtimes\\cO_{\\PP}(-i+1)\\otimes I_{\\cZ})=\n   H^i(\\wedge^{k+1-i}M_L(L)\\boxtimes\\cO_{\\PP}(-i)\\otimes I_{\\cZ})=0\\).  These follow\n  from the universal section sequence\n  \\(0\\to\\cO_X\\boxtimes\\cO_{\\PP}(-2)\\to E\\boxtimes\\cO_{\\PP}(-1)\\to L\\otimes I_{\\cZ}\\to0\\),\n  twisted by \\(\\wedge^{k+1-i}M_L\\boxtimes\\cO_{\\PP}(q)\\) for \\(q\\in\\{-i+1,-i\\}\\) and\n  evaluated by Künneth, using \\(H^0(X,M_L)=0\\) when \\(i=k\\).\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Kemeny_UniversalSecantBundles.tex", "lean_file": "", "dep_count": 3, "rdep_count": 1, "descendant_count": 13, "proof_size_tex": 2646, "effort_local": 2646, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 11236}, "thm:kemeny_even_voisin": {"id": "thm:kemeny_even_voisin", "type": "theorem", "title": "Voisin's theorem in even genus", "chapter": "", "statement": "\\textit{Source: Kemeny, Section sec1.}\n  For a Picard-rank-one complex K3 surface \\((X,L)\\) of even genus \\(2k\\),\n  \\(\\K_{k,1}(X,L)=0\\).", "uses": ["lem:kemeny_koszul_reduction", "thm:kemeny_even_secant_vanishing"], "lean_name": "MR4213770.EvenVoisin", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{lem:kemeny_koszul_reduction, thm:kemeny_even_secant_vanishing}\n  The kernel-bundle description reduces \\(\\K_{k,1}(X,L)=0\\) to\n  \\(H^1(X,\\wedge^{k+1}M_L)=0\\).  Pulling to \\(B\\) and using the exact sequence\n  \\(0\\to\\cS\\to\\pi^*\\cM\\to\\Gamma\\to0\\), the exterior-power filtration reduces\n  this vanishing to the family of vanishing statements in\n  \\cref{thm:kemeny_even_secant_vanishing}.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Kemeny_UniversalSecantBundles.tex", "lean_file": "", "dep_count": 2, "rdep_count": 3, "descendant_count": 12, "proof_size_tex": 388, "effort_local": 388, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 16234}, "thm:kemeny_real_thm": {"id": "thm:kemeny_real_thm", "type": "theorem", "title": "Surjectivity for the extremal syzygy map", "chapter": "", "statement": "\\textit{Source: Kemeny, Theorem real-thm.}\n  The natural map\n  \\(H^1(B,\\wedge^k\\pi^*\\cM\\otimes p'^*L)\\to\n    H^1(B,\\wedge^k\\Gamma\\otimes p'^*L)\\)\n  is surjective.", "uses": ["def:kemeny_universal_secant_bundles"], "lean_name": "MR4213770.ExtremalMapSurjective", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:kemeny_universal_secant_bundles, def:peer_affine_pushforward_base_change}\n  The exterior-power filtration of \\(0\\to\\cS\\to\\pi^*\\cM\\to\\Gamma\\to0\\), namely\n  \\[\n    \\dots\\to\\cS\\otimes\\wedge^{k-1}\\pi^*\\cM\\otimes p'^*L\n      \\to\\wedge^k\\pi^*\\cM\\otimes p'^*L\\to\\wedge^k\\Gamma\\otimes p'^*L\\to0 ,\n  \\]\n  shows that \\(\\psi\\) is surjective once\n  \\(H^{1+i}(\\Sym^i\\cS\\otimes\\wedge^{k-i}\\pi^*\\cM\\otimes p'^*L)=0\\) for\n  \\(1\\le i\\le k\\).  Feeding in the symmetric-power sequence\n  \\(0\\to\\Sym^i\\cS\\to\\Sym^i\\pi^*\\cG\\to\\Sym^{i-1}\\pi^*\\cG\\otimes p'^*L\\otimes I_D\\to0\\)\n  and pushing down by \\(\\pi\\) (using \\(\\pi_*\\cO_B=\\cO_{X\\times\\PP}\\),\n  \\(\\pi_*I_D=I_{\\cZ}\\), \\(R^{>0}\\pi_*=0\\) on these sheaves), this reduces to the\n  two vanishings on \\(X\\times\\PP\\)\n  \\[\n    H^{1+i}\\bigl(\\Sym^i\\cG\\otimes\\wedge^{k-i}\\cM\\otimes p^*L\\bigr)\n      =H^i\\bigl(\\Sym^{i-1}\\cG\\otimes\\wedge^{k-i}\\cM\\otimes p^*L^{\\otimes2}\n       \\otimes I_{\\cZ}\\bigr)=0 .\n  \\]\n  Taking \\(\\Sym^i\\) of\n  \\(0\\to q^*\\cO_{\\PP}(-2)\\to H^0(E)\\otimes q^*\\cO_{\\PP}(-1)\\to\\cG\\to0\\) replaces\n  these by the four Künneth vanishings\n  \\begin{align*}\n    &H^{2+i}\\bigl(\\wedge^{k-i}M_L(L)\\boxtimes\\cO_{\\PP}(-i-1)\\bigr)=0,\n    &&H^{1+i}\\bigl(\\wedge^{k-i}M_L(L)\\boxtimes\\cO_{\\PP}(-i)\\bigr)=0,\\\\\n    &H^{1+i}\\bigl((\\wedge^{k-i}M_L(2L)\\boxtimes\\cO_{\\PP}(-i))\\otimes I_{\\cZ}\\bigr)=0,\n    &&H^i\\bigl((\\wedge^{k-i}M_L(2L)\\boxtimes\\cO_{\\PP}(-i+1))\\otimes I_{\\cZ}\\bigr)=0.\n  \\end{align*}\n  The first two hold by the Künneth formula for \\(1\\le i\\le k\\) (the\n  \\(\\cO_{\\PP}\\)-twists are too negative to contribute below degree \\(k+1\\)).  For\n  the last two, resolve \\(I_{\\cZ}\\) by\n  \\(0\\to L^{-1}\\boxtimes\\cO_{\\PP}(-2)\\to E(L^{-1})\\boxtimes\\cO_{\\PP}(-1)\n   \\to I_{\\cZ}\\to0\\); this reduces them to the further four Künneth vanishings\n  \\begin{align*}\n    &H^{2+i}\\bigl(\\wedge^{k-i}M_L(L)\\boxtimes\\cO_{\\PP}(-i-2)\\bigr)=0,\n    &&H^{1+i}\\bigl(\\wedge^{k-i}M_L\\otimes E(L)\\boxtimes\\cO_{\\PP}(-i-1)\\bigr)=0,\\\\\n    &H^{1+i}\\bigl(\\wedge^{k-i}M_L(L)\\boxtimes\\cO_{\\PP}(-i-1)\\bigr)=0,\n    &&H^i\\bigl(\\wedge^{k-i}M_L\\otimes E(L)\\boxtimes\\cO_{\\PP}(-i)\\bigr)=0,\n  \\end{align*}\n  all of which follow from the Künneth formula, using \\(H^1(X,L)=0\\) when\n  \\(i=k\\) in the first.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Kemeny_UniversalSecantBundles.tex", "lean_file": "", "dep_count": 1, "rdep_count": 1, "descendant_count": 11, "proof_size_tex": 2187, "effort_local": 2187, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 3933}, "lem:kemeny_even_det_gamma": {"id": "lem:kemeny_even_det_gamma", "type": "lemma", "title": "Determinant of \\(\\Gamma\\) in even genus", "chapter": "", "statement": "\\textit{Source: Kemeny, Section sec2, determinant lemma.}\n  With the notation of the even-genus construction,\n  \\(\\wedge^k\\Gamma\\simeq I_D\\otimes q'^*\\cO_{\\PP}(k)\\).", "uses": ["lem:kemeny_W_locally_free"], "lean_name": "MR4213770.EvenDetGamma", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{lem:kemeny_W_locally_free}\n  Take determinants in\n  \\(0\\to\\Gamma\\to q'^*\\mathcal W\\to p'^*L|_D\\to0\\).  The determinant of\n  \\(\\mathcal W\\) is computed from\n  \\(0\\to q_*(p^*L\\otimes I_{\\cZ})\\to q_*p^*L\\to\\mathcal W\\to0\\), and the\n  two-term resolution of \\(q_*(p^*L\\otimes I_{\\cZ})\\) gives\n  \\(\\det\\mathcal W\\simeq \\cO_{\\PP}(k)\\).\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Kemeny_UniversalSecantBundles.tex", "lean_file": "", "dep_count": 1, "rdep_count": 1, "descendant_count": 11, "proof_size_tex": 335, "effort_local": 335, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 1798}, "cor:kemeny_extremal_syzygy_iso": {"id": "cor:kemeny_extremal_syzygy_iso", "type": "corollary", "title": "Extremal syzygy vector-space isomorphism", "chapter": "", "statement": "\\textit{Source: Kemeny, Corollary main-cor-nat-iso.}\n  The map \\(\\psi\\) is an isomorphism and induces a natural isomorphism\n  \\(\\K_{k-1,1}(X,L)\\simeq \\Sym^{k-2}H^0(X,E)\\).", "uses": ["thm:kemeny_real_thm", "lem:kemeny_even_det_gamma", "thm:kemeny_even_voisin"], "lean_name": "MR4213770.ExtremalSyzygyIso", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{thm:kemeny_real_thm, lem:kemeny_even_det_gamma, thm:kemeny_even_voisin}\n  The determinant computation rewrites the target of \\(\\psi\\) as the cohomology\n  of \\(I_D\\otimes q'^*\\cO_{\\PP}(k)\\otimes p'^*L\\), which is\n  \\(H^0(\\cO_{\\PP}(k-2))^\\vee\\).  Surjectivity gives the dual injection\n  \\(\\Sym^{k-2}H^0(E)\\hookrightarrow \\K_{k-1,1}(X,L)\\); the even-genus vanishing\n  supplies the dimension equality.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Kemeny_UniversalSecantBundles.tex", "lean_file": "", "dep_count": 3, "rdep_count": 4, "descendant_count": 10, "proof_size_tex": 403, "effort_local": 403, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 19733}, "lem:kemeny_gamma_prime_image": {"id": "lem:kemeny_gamma_prime_image", "type": "lemma", "title": "Image of \\(\\wedge^k\\Gamma'\\)", "chapter": "", "statement": "\\textit{Source: Kemeny, Proof of Theorem geo-thm-intro.}\n  With \\(\\Gamma'=\\pi_*\\Gamma\\), there is an exact sequence\n  \\(0\\to\\Gamma'\\to q^*\\mathcal W\\to p^*L|_{\\cZ}\\to0\\).  The image of\n  \\(\\wedge^k\\Gamma'\\to\\wedge^kq^*\\mathcal W\\simeq\\cO_{\\PP}(k)\\) is\n  \\(I_{\\cZ}\\otimes q^*\\cO_{\\PP}(k)\\), and the induced map is the pushforward of\n  \\(\\wedge^k\\Gamma\\to I_D\\otimes q'^*\\cO_{\\PP}(k)\\).", "uses": ["def:kemeny_universal_secant_bundles", "lem:kemeny_W_locally_free"], "lean_name": "MR4213770.GammaPrimeImage", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:kemeny_universal_secant_bundles, lem:kemeny_W_locally_free}\n  Push forward the quotient sequence defining \\(\\Gamma\\) and compare its\n  determinant with the determinant of \\(q^*\\mathcal W\\).  The standard secant\n  image computation for the zero locus \\(\\cZ\\) identifies the resulting ideal\n  image with \\(I_{\\cZ}\\otimes q^*\\cO_{\\PP}(k)\\).\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Kemeny_UniversalSecantBundles.tex", "lean_file": "", "dep_count": 2, "rdep_count": 1, "descendant_count": 6, "proof_size_tex": 347, "effort_local": 347, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 2667}, "lem:kemeny_R1q_line_bundle": {"id": "lem:kemeny_R1q_line_bundle", "type": "lemma", "title": "The \\(R^1q_*\\)-line bundle", "chapter": "", "statement": "\\textit{Source: Kemeny, Proof of Theorem geo-thm-intro.}\n  The higher direct image\n  \\(R^1q_*((L\\boxtimes\\cO_{\\PP}(k))\\otimes I_{\\cZ})\\) is canonically\n  isomorphic to \\(\\cO_{\\PP}(k-2)\\).", "uses": ["def:kemeny_universal_zero_locus", "lem:kemeny_W_locally_free", "def:peer_higher_direct_image", "def:peer_affine_pushforward_base_change"], "lean_name": "MR4213770.R1qLineBundle", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:kemeny_universal_zero_locus, lem:kemeny_W_locally_free, def:peer_higher_direct_image, def:peer_affine_pushforward_base_change}\n  Twist the universal zero-locus sequence by \\(q^*\\cO_{\\PP}(k)\\) and apply\n  \\(Rq_*\\).  The middle term has no relevant higher image, and relative duality\n  gives \\(R^2q_*\\cO_{X\\times\\PP}\\simeq\\cO_{\\PP}\\), producing the line bundle\n  \\(\\cO_{\\PP}(k-2)\\).\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Kemeny_UniversalSecantBundles.tex", "lean_file": "", "dep_count": 4, "rdep_count": 2, "descendant_count": 6, "proof_size_tex": 390, "effort_local": 390, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 1853}, "lem:kemeny_psi_global_sections": {"id": "lem:kemeny_psi_global_sections", "type": "lemma", "title": "Global-section description of \\(\\psi\\)", "chapter": "", "statement": "\\textit{Source: Kemeny, Proof of Theorem geo-thm-intro.}\n  Under Leray and the preceding image computation, \\(\\psi\\) is the map on global\n  sections induced by\n  \\[\n    \\K_{k-1,1}(X,L)^\\vee\\otimes\\cO_{\\PP}\\to\\cO_{\\PP}(k-2).\n  \\]", "uses": ["cor:kemeny_extremal_syzygy_iso", "lem:kemeny_gamma_prime_image", "lem:kemeny_R1q_line_bundle", "def:peer_higher_direct_image"], "lean_name": "MR4213770.PsiGlobalSections", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{cor:kemeny_extremal_syzygy_iso, lem:kemeny_gamma_prime_image, lem:kemeny_R1q_line_bundle, def:peer_higher_direct_image}\n  Leray rewrites the source cohomology as global sections of\n  \\(R^1q_*(\\wedge^k\\mathcal M\\otimes p^*L)\\).  The map\n  \\(\\wedge^k\\Gamma'\\to I_{\\cZ}\\otimes q^*\\cO_{\\PP}(k)\\), followed by the\n  \\(R^1q_*\\)-identification, gives the displayed vector-bundle morphism.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Kemeny_UniversalSecantBundles.tex", "lean_file": "", "dep_count": 4, "rdep_count": 3, "descendant_count": 5, "proof_size_tex": 387, "effort_local": 387, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 20857}, "lem:kemeny_fibre_secant_map": {"id": "lem:kemeny_fibre_secant_map", "type": "lemma", "title": "Fibre of the secant map", "chapter": "", "statement": "\\textit{Source: Kemeny, Proof of Theorem geo-thm-intro.}\n  For nonzero \\(t\\in H^0(E)\\), the fibre over \\([t]\\) of the morphism\n  \\(\\K_{k-1,1}(X,L)^\\vee\\otimes\\cO_{\\PP}\\to\\cO_{\\PP}(k-2)\\) is the map through\n  the blow-up \\(B_t\\) of \\(Z(t)\\).  Under Serre duality and the kernel-bundle\n  description, its dual image is precisely\n  \\[\n    \\K_{k-1,1}\\bigl(X,L,H^0(L\\otimes I_{Z(t)})\\bigr)\n    \\subseteq \\K_{k-1,1}(X,L).\n  \\]", "uses": ["lem:kemeny_psi_global_sections", "def:kemeny_universal_secant_bundles"], "lean_name": "MR4213770.FibreSecantMap", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{lem:kemeny_psi_global_sections, def:kemeny_universal_secant_bundles}\n  Evaluate the global vector-bundle morphism at \\([t]\\) and identify the fibre\n  with the cohomology map on the individual secant blow-up \\(B_t\\).  The\n  determinant identifications convert this to the Serre dual inclusion\n  \\(\\wedge^k\\mathcal S_t(D_t)\\hookrightarrow\\wedge^k\\pi_t^*M_L(D_t)\\), which is\n  the inclusion of the secant Koszul subspace.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Kemeny_UniversalSecantBundles.tex", "lean_file": "", "dep_count": 2, "rdep_count": 2, "descendant_count": 4, "proof_size_tex": 424, "effort_local": 424, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 21281}, "thm:kemeny_veronese_identification": {"id": "thm:kemeny_veronese_identification", "type": "theorem", "title": "Veronese identification of the secant syzygy map", "chapter": "", "statement": "\\textit{Source: Kemeny, Proof of Theorem geo-thm-intro.}\n  The morphism\n  \\(\\K_{k-1,1}(X,L)^\\vee\\otimes\\cO_{\\PP}\\to\\cO_{\\PP}(k-2)\\) induced by \\(\\psi\\)\n  is a quotient bundle.  The associated projective map\n  \\(\\PP(H^0(E))\\to\\PP(\\K_{k-1,1}(X,L))\\) is the degree \\(k-2\\) Veronese map, and\n  its point over \\([t]\\) is the secant Koszul line associated to \\(Z(t)\\).", "uses": ["cor:kemeny_extremal_syzygy_iso", "lem:kemeny_psi_global_sections", "lem:kemeny_fibre_secant_map"], "lean_name": "MR4213770.VeroneseIdentification", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{cor:kemeny_extremal_syzygy_iso, lem:kemeny_psi_global_sections, lem:kemeny_fibre_secant_map}\n  The global-section description identifies the map as a morphism onto\n  \\(\\cO_{\\PP}(k-2)\\).  The extremal syzygy isomorphism makes it surjective on\n  global sections; since \\(\\cO_{\\PP}(k-2)\\) is globally generated, the morphism is\n  surjective as a sheaf map.  Its projectivization is therefore the Veronese\n  quotient, and the fibre lemma identifies its points with the desired secant\n  Koszul subspaces.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Kemeny_UniversalSecantBundles.tex", "lean_file": "", "dep_count": 3, "rdep_count": 2, "descendant_count": 3, "proof_size_tex": 505, "effort_local": 505, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 21786}, "lem:kemeny_grassmann_pencil_map": {"id": "lem:kemeny_grassmann_pencil_map", "type": "lemma", "title": "Grassmannian map to \\(|L|\\)", "chapter": "", "statement": "\\textit{Source: Kemeny, Proof of Corollary geo-cor.}\n  There is a finite surjective morphism\n  \\(d:\\Gr_2(H^0(E))\\to |L|\\) sending \\(W\\subset H^0(E)\\) to the degeneracy\n  divisor of \\(W\\otimes\\cO_X\\to E\\).  For a general \\(C\\in|L|\\), the fibre\n  \\(d^{-1}(C)\\) is naturally identified with the reduced Brill--Noether locus\n  \\(W^1_{k+1}(C)\\).", "uses": [], "lean_name": "MR4213770.GrassmannPencilMap", "proved": false, "mathlib_ok": false, "proof_tex": "\n  The evaluation degeneracy construction gives the morphism to \\(|L|\\).  For a\n  general curve \\(C\\), the cokernel of evaluation is \\(\\omega_C\\otimes A^{-1}\\),\n  and the Brill--Noether comparison identifies \\(W\\) with \\(H^0(A)^\\vee\\) for\n  \\(A\\in W^1_{k+1}(C)\\).\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Kemeny_UniversalSecantBundles.tex", "lean_file": "", "dep_count": 0, "rdep_count": 3, "descendant_count": 3, "proof_size_tex": 260, "effort_local": 260, "proof_size_tex_total": 260, "proof_size_lean_total": null, "effort_total": 260}, "lem:kemeny_voisin_generation_observation": {"id": "lem:kemeny_voisin_generation_observation", "type": "lemma", "title": "Voisin generation observation", "chapter": "", "statement": "\\textit{Source: Kemeny, Proof of Corollary geo-cor.}\n  For general \\(C\\in |L|\\), the subspaces\n  \\(\\Sym^{k-2}H^0(A)^\\vee\\), as \\(A\\) ranges over \\(W^1_{k+1}(C)\\), generate\n  \\(\\Sym^{k-2}H^0(E)\\).", "uses": ["lem:kemeny_grassmann_pencil_map"], "lean_name": "MR4213770.VoisinGenerationObservation", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{lem:kemeny_grassmann_pencil_map}\n  Under the fibre identification \\(d^{-1}(C)\\simeq W^1_{k+1}(C)\\), the pencils\n  give the lines \\(H^0(A)^\\vee\\subset H^0(E)\\).  Voisin's generation statement\n  says that their \\((k-2)\\)-nd symmetric powers span the full symmetric power.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Kemeny_UniversalSecantBundles.tex", "lean_file": "", "dep_count": 1, "rdep_count": 1, "descendant_count": 1, "proof_size_tex": 275, "effort_local": 275, "proof_size_tex_total": 535, "proof_size_lean_total": null, "effort_total": 535}, "lem:kemeny_restrict_k3_syzygies_to_curve": {"id": "lem:kemeny_restrict_k3_syzygies_to_curve", "type": "lemma", "title": "Restriction of K3 secant syzygies", "chapter": "", "statement": "\\textit{Source: Kemeny, Proof of Corollary geo-cor.}\n  Under restriction\n  \\(\\K_{k-1,1}(X,L)\\simeq \\K_{k-1,1}(C,\\omega_C)\\), the K3 secant subspaces\n  attached to sections corresponding to \\(A\\in W^1_{k+1}(C)\\) become exactly\n  \\[\n    \\K_{k-1,1}\\bigl(C,\\omega_C,H^0(\\omega_C\\otimes A^{-1})\\bigr)\n    \\subseteq \\K_{k-1,1}(C,\\omega_C).\n  \\]", "uses": ["thm:kemeny_veronese_identification", "lem:kemeny_grassmann_pencil_map"], "lean_name": "MR4213770.RestrictK3SyzygiesToCurve", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{thm:kemeny_veronese_identification, lem:kemeny_grassmann_pencil_map}\n  The section \\(s\\) corresponding to the pencil \\(A\\) has zero scheme whose\n  secant subspace is identified by the Veronese fibre calculation.  Restricting\n  the K3 Koszul complex to the hyperplane section \\(C\\) sends\n  \\(H^0(L\\otimes I_{Z(s)})\\) to \\(H^0(\\omega_C\\otimes A^{-1})\\), giving the\n  stated curve subspace.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Kemeny_UniversalSecantBundles.tex", "lean_file": "", "dep_count": 2, "rdep_count": 1, "descendant_count": 1, "proof_size_tex": 393, "effort_local": 393, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 22439}, "lem:kemeny_BNP_gen": {"id": "lem:kemeny_BNP_gen", "type": "lemma", "title": "Picard-rank-two K3 input", "chapter": "", "statement": "\\textit{Source: Kemeny, Lemma BNP-gen.}\n  For the Picard-rank-two K3 surface used in the odd-genus reduction, the line\n  bundles \\(L_n=L'-n\\Delta\\), \\(0\\le n\\le3\\), are base-point free, \\(L_n\\) is\n  ample for \\(0<n\\le2\\), \\(|L_n|\\) is not a sum of two pencils, and general\n  smooth curves in \\(|L_n|\\) are Brill--Noether and Petri general.", "uses": [], "lean_name": "MR4213770.BNPGen", "proved": false, "mathlib_ok": false, "proof_tex": "\n  Riemann--Roch gives nonempty systems.  A negative intersection rational base\n  component would force an impossible decomposition in the rank-two Picard\n  lattice, so \\(L_n\\) is nef; Mayer's criterion gives base-point freeness and\n  the same lattice calculation gives ampleness for \\(0<n\\le2\\).  If\n  \\(L_n=A_1+A_2\\) with both \\(h^0(A_i)\\ge2\\), expressing the \\(A_i\\) in the\n  basis \\(L',\\Delta\\) forces one summand to have only one section.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Kemeny_UniversalSecantBundles.tex", "lean_file": "", "dep_count": 0, "rdep_count": 5, "descendant_count": 19, "proof_size_tex": 440, "effort_local": 440, "proof_size_tex_total": 440, "proof_size_lean_total": null, "effort_total": 440}, "lem:kemeny_projection_criterion": {"id": "lem:kemeny_projection_criterion", "type": "lemma", "title": "Projection criterion", "chapter": "", "statement": "\\textit{Source: Kemeny, Lemma proj-crit.}\n  If the projection map\n  \\(pr_k:H^1(\\wedge^{k+1}M_{L'})\\to H^1(\\wedge^kM_L(-\\Delta))\\) is injective,\n  then \\(H^1(\\wedge^{k+1}M_L)=0\\).", "uses": ["lem:kemeny_BNP_gen"], "lean_name": "MR4213770.ProjectionCriterion", "proved": false, "mathlib_ok": false, "proof_tex": "\n  Take cohomology of\n  \\(0\\to\\wedge^{k+1}M_L\\to\\wedge^{k+1}M_{L'}\\to\\wedge^kM_L(-\\Delta)\\to0\\).\n  The group \\(H^0(\\wedge^kM_L(-\\Delta))\\) vanishes, so injectivity of \\(pr_k\\)\n  kills the connecting obstruction and gives the desired \\(H^1\\)-vanishing.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Kemeny_UniversalSecantBundles.tex", "lean_file": "", "dep_count": 1, "rdep_count": 2, "descendant_count": 3, "proof_size_tex": 248, "effort_local": 248, "proof_size_tex_total": 688, "proof_size_lean_total": null, "effort_total": 688}, "lem:kemeny_green_pic2": {"id": "lem:kemeny_green_pic2", "type": "lemma", "title": "Even-style result on the nodal K3 surface", "chapter": "", "statement": "\\textit{Source: Kemeny, Lemma green-pic2.}\n  For the odd-genus Picard-rank-two surface,\n  \\(\\K_{k+1,1}(X,L')=0\\) and\n  \\(\\Sym^{k-1}H^0(X,E)\\simeq \\K_{k,1}(X,L')\\).", "uses": ["thm:kemeny_even_voisin", "cor:kemeny_extremal_syzygy_iso"], "lean_name": "MR4213770.GreenPicTwo", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{thm:kemeny_even_voisin, cor:kemeny_extremal_syzygy_iso}\n  Contract \\(\\Delta\\) to a rational double point on \\(\\hat X\\).  The universal\n  zero-locus construction remains finite flat because \\(\\operatorname{Cl}(\\hat\n  X)=\\mathbb Z[\\hat L]\\), so the even-genus cohomological proof applies on\n  \\(\\hat X\\).  Rational singularities identify the section rings of \\(L'\\) and\n  \\(\\hat L\\), transferring the Koszul statements back to \\(X\\).\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Kemeny_UniversalSecantBundles.tex", "lean_file": "", "dep_count": 2, "rdep_count": 2, "descendant_count": 3, "proof_size_tex": 437, "effort_local": 437, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 20170}, "lem:kemeny_decomposable": {"id": "lem:kemeny_decomposable", "type": "lemma", "title": "Nonvanishing on decomposable elements", "chapter": "", "statement": "\\textit{Source: Kemeny, Lemma decomposable.}\n  The determinant map\n  \\(\\wedge^2H^0(E)\\to H^0(\\wedge^2E)=H^0(L')\\) is nonzero on every nonzero\n  decomposable element.", "uses": ["lem:kemeny_BNP_gen"], "lean_name": "MR4213770.DecomposableNonzero", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{lem:kemeny_BNP_gen}\n  If a decomposable wedge vanished, the two sections would generate a rank-one\n  subsheaf with at least two sections.  After removing torsion from the quotient,\n  both determinant factors have at least two sections, so \\(L'\\) would split as a\n  sum of two pencils, contradicting \\cref{lem:kemeny_BNP_gen}.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Kemeny_UniversalSecantBundles.tex", "lean_file": "", "dep_count": 1, "rdep_count": 1, "descendant_count": 12, "proof_size_tex": 331, "effort_local": 331, "proof_size_tex_total": 771, "proof_size_lean_total": null, "effort_total": 771}, "lem:kemeny_E_minus_delta_is_F": {"id": "lem:kemeny_E_minus_delta_is_F", "type": "lemma", "title": "Twisting \\(E\\) by the nodal curve gives \\(F\\)", "chapter": "", "statement": "\\textit{Source: Kemeny, Section odd-genus.}\n  The rank-two Lazarsfeld--Mukai bundle satisfies \\(E(-\\Delta)\\simeq F\\), where\n  \\(F\\) is the unique stable bundle with determinant \\(L-\\Delta\\) and Euler\n  characteristic \\(k+1\\).", "uses": ["lem:kemeny_BNP_gen"], "lean_name": "MR4213770.EMinusDeltaIsF", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{lem:kemeny_BNP_gen}\n  The bundle \\(E(-\\Delta)\\) has the same numerical invariants as \\(F\\).  If it\n  were unstable, a destabilizing rank-one filtration would give two line\n  bundles with at least two sections whose sum is \\(L\\), contradicting the\n  no-sum-of-pencils property in the rank-two Picard lattice.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Kemeny_UniversalSecantBundles.tex", "lean_file": "", "dep_count": 1, "rdep_count": 2, "descendant_count": 16, "proof_size_tex": 313, "effort_local": 313, "proof_size_tex_total": 753, "proof_size_lean_total": null, "effort_total": 753}, "def:kemeny_odd_kernel_N": {"id": "def:kemeny_odd_kernel_N", "type": "definition", "title": "Odd-genus kernel bundle \\(N\\)", "chapter": "", "statement": "\\textit{Source: Kemeny, Section odd-genus.}\n  Define \\(N\\) by\n  \\[\n    0\\to N\\to H^0(E(-\\Delta))\\otimes\\cO_X\\to E(-\\Delta)\\to0 .\n  \\]\n  For \\(t\\in H^0(E)\\), wedging with \\(t\\) gives\n  \\(H^0(E(-\\Delta))\\to H^0(L)\\) and hence a map \\(N\\to M_L\\).  Globalizing over\n  \\(\\PP=\\PP(H^0(E))\\) gives\n  \\[\n    r:N\\boxtimes\\cO_{\\PP}(-1)\\to \\mathcal M=p^*M_L .\n  \\]", "uses": ["lem:kemeny_E_minus_delta_is_F"], "lean_name": "MR4213770.OddKernelN", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Kemeny_UniversalSecantBundles.tex", "lean_file": "", "dep_count": 1, "rdep_count": 3, "descendant_count": 14, "proof_size_tex": null, "effort_local": 352, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 1105}, "def:kemeny_odd_blowup_elementary_transform": {"id": "def:kemeny_odd_blowup_elementary_transform", "type": "definition", "title": "Odd blow-up and elementary transform", "chapter": "", "statement": "\\textit{Source: Kemeny, Section odd-genus.}\n  The map \\(r\\) fails to be fibrewise injective along\n  \\(\\mathcal Z=\\{(x,s)\\mid s(x)=0\\}\\subset X\\times\\PP(H^0(E(-\\Delta)))\\).  Let\n  \\(\\pi:B\\to X\\times\\PP\\) be the blow-up along \\(\\mathcal Z\\), with exceptional\n  divisor \\(D\\), and define \\(p'=p\\circ\\pi\\), \\(q'=q\\circ\\pi\\).  The elementary\n  transform \\(S\\) is the dual of \\(\\operatorname{Im}((\\pi^*r)^\\vee)\\), and\n  \\(\\Gamma\\) is the quotient in \\(0\\to S\\to\\pi^*\\mathcal M\\to\\Gamma\\to0\\), where\n  \\(\\Gamma\\) is locally free of rank \\(k+2\\).", "uses": ["def:kemeny_odd_kernel_N", "lem:kemeny_decomposable"], "lean_name": "MR4213770.OddBlowupElementaryTransform", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Kemeny_UniversalSecantBundles.tex", "lean_file": "", "dep_count": 2, "rdep_count": 2, "descendant_count": 11, "proof_size_tex": null, "effort_local": 538, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 1974}, "lem:kemeny_odd_projective_bundle_model": {"id": "lem:kemeny_odd_projective_bundle_model", "type": "lemma", "title": "Odd projective-bundle model", "chapter": "", "statement": "\\textit{Source: Kemeny, Section odd-genus.}\n  With \\(\\mathcal F=\\operatorname{Coker}(N\\to H^0(E)\\otimes\\cO_X)\\), the blow-up\n  \\(B\\) is \\(\\PP(\\mathcal H)\\) over \\(\\PP(\\mathcal F)\\).  The projection\n  \\(\\chi:B\\to\\PP(\\mathcal F)\\) satisfies\n  \\[\n    \\chi^*\\cO_{\\PP(\\mathcal F)}(1)\\simeq q'^*\\cO_{\\PP}(1)(-D).\n  \\]", "uses": ["def:kemeny_odd_blowup_elementary_transform"], "lean_name": "MR4213770.OddProjectiveBundleModel", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:kemeny_odd_blowup_elementary_transform}\n  Fibrewise, \\(B\\) is the blow-up of a projective space along the linear subspace\n  cut out by \\(N\\).  The standard description of such a blow-up as a projective\n  bundle over the quotient projective bundle gives \\(\\PP(\\mathcal H)\\), and the\n  exceptional divisor accounts for the twist in \\(\\chi^*\\cO(1)\\).\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Kemeny_UniversalSecantBundles.tex", "lean_file": "", "dep_count": 1, "rdep_count": 4, "descendant_count": 10, "proof_size_tex": 357, "effort_local": 357, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 2331}, "lem:kemeny_odd_S_relative_tangent": {"id": "lem:kemeny_odd_S_relative_tangent", "type": "lemma", "title": "Elementary transform as a relative tangent bundle", "chapter": "", "statement": "\\textit{Source: Kemeny, Section odd-genus.}\n  The elementary transform bundle is\n  \\(S\\simeq T_\\chi\\otimes q'^*\\cO_{\\PP}(-2)\\), where \\(T_\\chi\\) is the relative\n  tangent bundle of \\(\\chi:B\\to\\PP(\\mathcal F)\\).", "uses": ["lem:kemeny_odd_projective_bundle_model"], "lean_name": "MR4213770.OddSRelativeTangent", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{lem:kemeny_odd_projective_bundle_model}\n  Compare the relative Euler sequence for \\(\\PP(\\mathcal H)\\) with the dual\n  defining exact sequence for \\(S\\).  After twisting by \\(q'^*\\cO_{\\PP}(-2)\\),\n  the two cokernel descriptions agree.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Kemeny_UniversalSecantBundles.tex", "lean_file": "", "dep_count": 1, "rdep_count": 2, "descendant_count": 7, "proof_size_tex": 239, "effort_local": 239, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 2570}, "lem:kemeny_odd_det_gamma": {"id": "lem:kemeny_odd_det_gamma", "type": "lemma", "title": "Determinant of \\(\\Gamma\\) in odd genus", "chapter": "", "statement": "\\textit{Source: Kemeny, Lemma det-gamma.}\n  One has\n  \\(\\det\\Gamma\\simeq q'^*\\cO_{\\PP}(k-1)(-D-p'^*\\Delta)\\).  Consequently\n  \\[\n    H^2\\bigl(B,\\wedge^{k+2}\\Gamma(p'^*\\Delta)(D)\\bigr)\n    \\simeq \\Sym^{k-1}H^0(X,E)^\\vee .\n  \\]", "uses": ["def:kemeny_odd_blowup_elementary_transform", "lem:kemeny_odd_S_relative_tangent", "def:peer_affine_pushforward_base_change"], "lean_name": "MR4213770.OddDetGamma", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:kemeny_odd_blowup_elementary_transform, lem:kemeny_odd_S_relative_tangent, def:peer_affine_pushforward_base_change}\n  Taking determinants in \\(0\\to S\\to\\pi^*\\mathcal M\\to\\Gamma\\to0\\) and using\n  the tangent-bundle description of \\(S\\) gives the determinant formula.  The\n  cohomology identification follows after cancelling \\(D\\) and \\(p'^*\\Delta\\)\n  and pushing \\(q'^*\\cO_{\\PP}(k-1)\\) down to the projective-space factor.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Kemeny_UniversalSecantBundles.tex", "lean_file": "", "dep_count": 3, "rdep_count": 2, "descendant_count": 5, "proof_size_tex": 432, "effort_local": 432, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 3002}, "prop:kemeny_odd_most_of_vanishing": {"id": "prop:kemeny_odd_most_of_vanishing", "type": "proposition", "title": "Most odd-genus exterior-power vanishings", "chapter": "", "statement": "\\textit{Source: Kemeny, Proposition most-of-van.}\n  For \\(1\\le i\\le k+2\\) with \\(i\\ne k,k+1\\),\n  \\[\n    H^{2+i}\\bigl(B,\\wedge^{k+2-i}\\pi^*\\mathcal M\\otimes\n    \\Sym^i(S)(p'^*\\Delta)(D)\\bigr)=0 .\n  \\]", "uses": ["lem:kemeny_odd_S_relative_tangent", "lem:kemeny_odd_projective_bundle_model"], "lean_name": "MR4213770.OddMostOfVanishing", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{lem:kemeny_odd_S_relative_tangent, lem:kemeny_odd_projective_bundle_model}\n  Resolve \\(\\Sym^i(S)\\) by the Euler sequence for \\(S\\simeq T_\\chi\\otimes\n  q'^*\\cO_{\\PP}(-2)\\).  For \\(1\\le i\\le k-1\\), the relative projective-space\n  fibres of \\(\\chi\\), Leray, and Kunneth vanish the terms; the remaining\n  \\(i=k+2\\) case is reduced to a Kunneth vanishing on \\(X\\times\\PP\\).\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Kemeny_UniversalSecantBundles.tex", "lean_file": "", "dep_count": 2, "rdep_count": 1, "descendant_count": 4, "proof_size_tex": 374, "effort_local": 374, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 2944}, "lem:kemeny_LM_mult_map": {"id": "lem:kemeny_LM_mult_map", "type": "lemma", "title": "Odd Lazarsfeld--Mukai multiplication map", "chapter": "", "statement": "\\textit{Source: Kemeny, Lemma LM-mult-map.}\n  The multiplication map\n  \\[\n    H^0(X,E(-\\Delta))\\otimes H^0(X,L-\\Delta)\\to H^0(X,E(L-2\\Delta))\n  \\]\n  is surjective.", "uses": ["lem:kemeny_E_minus_delta_is_F", "lem:kemeny_BNP_gen"], "lean_name": "MR4213770.LMMultMap", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{lem:kemeny_E_minus_delta_is_F, lem:kemeny_BNP_gen}\n  Restrict to a smooth curve \\(C\\in|L-\\Delta|\\), split the restricted bundle as\n  the two Lazarsfeld--Mukai summands associated to a pencil, and apply the\n  base-point-free pencil trick, together with the standard reduction from\n  restricted multiplication to the surface multiplication map.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Kemeny_UniversalSecantBundles.tex", "lean_file": "", "dep_count": 2, "rdep_count": 1, "descendant_count": 7, "proof_size_tex": 348, "effort_local": 348, "proof_size_tex_total": 1101, "proof_size_lean_total": null, "effort_total": 1101}, "lem:kemeny_odd_mult_vanishings": {"id": "lem:kemeny_odd_mult_vanishings", "type": "lemma", "title": "Odd multiplication vanishings", "chapter": "", "statement": "\\textit{Source: Kemeny, Lemma mult-maps.}\n  The vanishings\n  \\(H^2(X,M_L(\\Delta)\\otimes N)=0\\) and \\(H^2(X,M_L(\\Delta))=0\\) hold.", "uses": ["def:kemeny_odd_kernel_N", "lem:kemeny_LM_mult_map"], "lean_name": "MR4213770.OddMultVanishings", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:kemeny_odd_kernel_N, lem:kemeny_LM_mult_map}\n  Use the defining sequence of \\(N\\).  The first vanishing is reduced to\n  surjectivity of the surface multiplication map, which follows from\n  \\(\\cref{lem:kemeny_LM_mult_map}\\) and the restriction diagram along\n  \\(\\Delta\\); the second follows directly from the defining sequence of \\(M_L\\).\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Kemeny_UniversalSecantBundles.tex", "lean_file": "", "dep_count": 2, "rdep_count": 1, "descendant_count": 6, "proof_size_tex": 347, "effort_local": 347, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 1800}, "prop:kemeny_green_odd_main": {"id": "prop:kemeny_green_odd_main", "type": "proposition", "title": "Odd \\(i=k+1\\) vanishing", "chapter": "", "statement": "\\textit{Source: Kemeny, Proposition green-odd-main.}\n  The middle vanishing\n  \\[\n    H^{k+3}\\bigl(B,\\pi^*\\mathcal M\\otimes\\Sym^{k+1}(S)(p'^*\\Delta)(D)\\bigr)=0\n  \\]\n  holds.", "uses": ["lem:kemeny_odd_projective_bundle_model", "lem:kemeny_odd_mult_vanishings"], "lean_name": "MR4213770.GreenOddMain", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{lem:kemeny_odd_projective_bundle_model, lem:kemeny_odd_mult_vanishings}\n  Resolve \\(\\Sym^{k+1}(S)\\) using the relative Euler sequence.  Relative duality\n  over \\(\\chi\\) turns the critical map into the multiplication map on symmetric\n  powers of \\(\\mathcal H\\), whose composite is multiplication by \\(k+1\\).  The\n  remaining obstruction groups are exactly the Kunneth consequences of\n  \\(\\cref{lem:kemeny_odd_mult_vanishings}\\).\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Kemeny_UniversalSecantBundles.tex", "lean_file": "", "dep_count": 2, "rdep_count": 2, "descendant_count": 5, "proof_size_tex": 433, "effort_local": 433, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 3459}, "lem:kemeny_odd_identilem": {"id": "lem:kemeny_odd_identilem", "type": "lemma", "title": "Odd cohomology identifications", "chapter": "", "statement": "\\textit{Source: Kemeny, Lemma identilem.}\n  For every \\(j\\), there are natural isomorphisms\n  \\[\n  \\begin{aligned}\n    H^j(B,\\pi^*\\mathcal M\\otimes\\Sym^{k+1}(S)(p'^*\\Delta)(D))\n      &\\simeq H^{j+1}(B,\\pi^*\\mathcal M\\otimes S(-2k)(p'^*\\Delta)(D)),\\\\\n    H^j(B,\\wedge^2\\pi^*\\mathcal M\\otimes\\Sym^k(S)(p'^*\\Delta)(D))\n      &\\simeq H^{j+1}(B,\\wedge^2\\pi^*\\mathcal M(-2k)(p'^*\\Delta)(D)).\n  \\end{aligned}\n  \\]", "uses": ["lem:kemeny_odd_projective_bundle_model"], "lean_name": "MR4213770.OddIdentiLem", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{lem:kemeny_odd_projective_bundle_model}\n  Apply the relative Euler resolution of \\(\\Sym^{k+1}(S)\\) and \\(\\Sym^k(S)\\),\n  push along \\(\\chi\\), and use relative duality.  The natural splitting of the\n  symmetric-power surjection identifies the kernels and cokernels with the\n  displayed cohomology groups.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Kemeny_UniversalSecantBundles.tex", "lean_file": "", "dep_count": 1, "rdep_count": 2, "descendant_count": 5, "proof_size_tex": 308, "effort_local": 308, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 2639}, "lem:kemeny_odd_sym2S_vanishing": {"id": "lem:kemeny_odd_sym2S_vanishing", "type": "lemma", "title": "Vanishing for \\(\\Sym^2(S)\\)", "chapter": "", "statement": "\\textit{Source: Kemeny, Section odd-genus.}\n  The cohomology group\n  \\(H^{k+4}(B,\\Sym^2(S)(-2k)(p'^*\\Delta)(D))\\) vanishes.", "uses": ["def:kemeny_odd_kernel_N", "lem:kemeny_BNP_gen"], "lean_name": "MR4213770.OddSymTwoSVanishing", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:kemeny_odd_kernel_N, lem:kemeny_BNP_gen}\n  Away from \\(D\\), \\(\\Sym^2(S)(p'^*\\Delta)\\) is identified with the pullback of\n  \\(\\Sym^2N(\\Delta)\\boxtimes\\cO_{\\PP}(-2)\\).  Kunneth reduces the claim to\n  \\(H^2(X,\\Sym^2N(\\Delta))=0\\), which follows from the symmetric-square sequence\n  for \\(N\\) and surjectivity of the determinant map, itself obtained from Petri\n  generality of curves in \\(|L+\\Delta|\\).\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Kemeny_UniversalSecantBundles.tex", "lean_file": "", "dep_count": 2, "rdep_count": 1, "descendant_count": 5, "proof_size_tex": 408, "effort_local": 408, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 1513}, "prop:kemeny_odd_wedge2_gamma_vanishing": {"id": "prop:kemeny_odd_wedge2_gamma_vanishing", "type": "proposition", "title": "Odd \\(\\wedge^2\\Gamma\\)-vanishing", "chapter": "", "statement": "\\textit{Source: Kemeny, Section odd-genus.}\n  The group\n  \\(H^{k+3}(B,\\wedge^2\\Gamma(-2k)(p'^*\\Delta)(D))\\) vanishes.  Consequently the\n  map \\(\\phi\\) induced by \\(0\\to S\\to\\pi^*\\mathcal M\\to\\Gamma\\to0\\) is\n  surjective.", "uses": ["lem:kemeny_odd_det_gamma", "prop:kemeny_green_odd_main", "lem:kemeny_odd_identilem", "lem:kemeny_odd_sym2S_vanishing"], "lean_name": "MR4213770.OddWedgeTwoGammaVanishing", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{lem:kemeny_odd_det_gamma, prop:kemeny_green_odd_main, lem:kemeny_odd_identilem, lem:kemeny_odd_sym2S_vanishing}\n  The four-term exterio
