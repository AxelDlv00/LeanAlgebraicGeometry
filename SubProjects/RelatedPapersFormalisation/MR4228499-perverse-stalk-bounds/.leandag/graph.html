<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Blueprint dependency graph</title>
<link rel="stylesheet" href="https://unpkg.com/katex@0.16.9/dist/katex.min.css">
<script src="https://unpkg.com/katex@0.16.9/dist/katex.min.js"></script>
<script src="https://unpkg.com/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>
<style>
:root {
  --sidebar-bg: #0f172a;
  --toolbar-bg: #1e293b;
  --surface:    #1a2744;
  --border:     #1e3a5f;
  --text:       #e2e8f0;
  --muted:      #64748b;
  --accent:     #60a5fa;
  --green:      #4ade80;
  --green-bg:   rgba(74,222,128,.12);
  --red:        #f87171;
  --red-bg:     rgba(248,113,113,.12);
  --orange:     #fb923c;
  --orange-bg:  rgba(251,146,60,.12);
  --code-bg:    #090d16;
  --radius:     7px;
  --mono: 'JetBrains Mono','Fira Code','Cascadia Code','Consolas','Monaco',monospace;
  --sans: -apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;
}

html { margin:0; padding:0; height:100%; overflow:hidden; }
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
body { font-family:var(--sans); display:flex; flex-direction:column;
       height:100%; background:#f8fafc; color:var(--text); }

/* ── Toolbar ─────────────────────────────────────────────────── */
#toolbar {
  background:var(--toolbar-bg); height:44px; padding:0 16px;
  display:flex; align-items:center; gap:14px; flex-shrink:0;
  border-bottom:1px solid #263045;
}
.brand { font-size:13px; font-weight:700; color:#f1f5f9; letter-spacing:.03em; }
.stat  { font-size:12px; color:#64748b; white-space:nowrap; }
.legend { display:flex; gap:6px; align-items:center; flex-wrap:wrap; }
.leg-dot { width:10px; height:10px; border-radius:50%; display:inline-block; }
.leg-bar {
  width:54px; height:8px; border-radius:4px; display:inline-block;
  background:linear-gradient(90deg,#facc15,#f59e0b,#f97316);
}
.leg-txt { font-size:10px; font-weight:600; color:#94a3b8; }
.sym-legend { padding-left:10px; margin-left:4px; border-left:1px solid #334155; gap:8px; }
.hint { margin-left:auto; font-size:11px; color:#334155; white-space:nowrap; }

/* ── Controls bar ────────────────────────────────────────────── */
#controls {
  background:#16233b; min-height:40px; padding:6px 16px;
  display:flex; align-items:center; gap:10px; flex-shrink:0;
  border-bottom:1px solid #263045; flex-wrap:wrap;
}
#controls input[type=text], #controls select {
  background:#0f1f3d; color:var(--text); border:1px solid #1e3a5f;
  border-radius:5px; font-size:12px; padding:5px 8px;
  font-family:var(--sans); outline:none;
}
#controls input[type=text] { width:200px; }
#controls input[type=text]:focus, #controls select:focus { border-color:var(--accent); }
#controls select { max-width:260px; cursor:pointer; }
#controls .chk { font-size:12px; color:#94a3b8; display:flex; align-items:center; gap:5px; cursor:pointer; user-select:none; }
.btn {
  background:#1e293b; color:#cbd5e1; border:1px solid #334155;
  border-radius:5px; font-size:12px; padding:5px 12px; cursor:pointer;
}
.btn:hover { background:#263045; }
.pill {
  display:inline-flex; align-items:center; gap:7px;
  background:#172554; color:#93c5fd; border:1px solid #1e3a8a;
  border-radius:12px; font-size:11px; padding:3px 4px 3px 11px; cursor:pointer;
  max-width:280px;
}
.pill .lbl { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.pill .x { font-weight:700; padding:0 6px; border-radius:9px; }
.pill:hover .x { background:#1e3a8a; }

/* ── Main layout ─────────────────────────────────────────────── */
#main  { display:flex; flex:1; overflow:hidden; min-height:0; position:relative; }
#graph { flex:1; min-height:0; background:#f8fafc; }

/* ── Project-stats overlay ───────────────────────────────────── */
#stats-panel {
  position:absolute; top:12px; left:12px; z-index:5;
  background:rgba(15,23,42,.9); border:1px solid #1e3a5f; border-radius:8px;
  padding:10px 12px; min-width:188px; backdrop-filter:blur(3px);
  font-size:11px; color:#cbd5e1; box-shadow:0 4px 16px rgba(0,0,0,.25);
}
#stats-panel h4 {
  font-size:10px; font-weight:700; letter-spacing:.08em; text-transform:uppercase;
  color:#64748b; margin-bottom:7px;
}
#stats-panel .row { display:flex; justify-content:space-between; gap:14px; line-height:1.7; }
#stats-panel .row .v { font-family:var(--mono); color:#f1f5f9; }
#stats-panel .v.done { color:var(--green); }
#stats-panel .v.work { color:var(--orange); }
#stats-panel .v.inf  { color:var(--red); }
#stats-panel .bar {
  height:6px; border-radius:3px; background:#1e293b; margin:7px 0 3px; overflow:hidden;
}
#stats-panel .bar > span { display:block; height:100%; background:var(--green); }
#stats-panel .sep { border-top:1px solid #1e3a5f; margin:7px 0; }
#graph canvas { display:block; }

/* ── File-view colour legend ─────────────────────────────────── */
#file-legend {
  position:absolute; bottom:12px; left:12px; z-index:5;
  background:rgba(15,23,42,.9); border:1px solid #1e3a5f; border-radius:8px;
  padding:9px 11px; max-width:280px; max-height:42%; overflow-y:auto;
  backdrop-filter:blur(3px); font-size:11px; color:#cbd5e1;
  box-shadow:0 4px 16px rgba(0,0,0,.25);
}
#file-legend::-webkit-scrollbar { width:4px; }
#file-legend::-webkit-scrollbar-thumb { background:#1e3a5f; border-radius:2px; }
#file-legend h4 {
  font-size:10px; font-weight:700; letter-spacing:.08em; text-transform:uppercase;
  color:#64748b; margin-bottom:7px;
}
#file-legend .fl-row { display:flex; align-items:center; gap:7px; line-height:1.9; }
#file-legend .fl-sw { width:11px; height:11px; border-radius:3px; flex-shrink:0;
  border:1px solid rgba(255,255,255,.18); }
#file-legend .fl-name {
  font-family:var(--mono); font-size:10px; color:#cbd5e1;
  overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex:1;
}
#file-legend .fl-n { font-family:var(--mono); font-size:10px; color:#64748b; }
#file-legend .fl-empty { font-style:italic; color:#475569; }

/* ── Sidebar ─────────────────────────────────────────────────── */
#sidebar {
  width:340px; flex-shrink:0;
  background:var(--sidebar-bg);
  border-left:1px solid #1e293b;
  display:flex; flex-direction:column; overflow:hidden;
}
#sidebar-empty {
  flex:1; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:10px;
}
#sidebar-empty svg { opacity:.2; }
#sidebar-empty p { font-size:13px; color:#334155; }
#sidebar-content {
  flex:1; overflow-y:auto; padding:10px;
  display:flex; flex-direction:column; gap:8px;
}
#sidebar-content::-webkit-scrollbar { width:4px; }
#sidebar-content::-webkit-scrollbar-thumb { background:#1e3a5f; border-radius:2px; }

/* ── Cards ───────────────────────────────────────────────────── */
.card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius); padding:12px;
}
.card-title {
  font-size:10px; font-weight:700; letter-spacing:.08em;
  text-transform:uppercase; color:var(--muted); margin-bottom:10px;
}
.btn-focus {
  width:100%; margin-top:10px; background:#172554; color:#93c5fd;
  border:1px solid #1e3a8a; border-radius:5px; font-size:11px;
  font-weight:600; padding:7px; cursor:pointer; letter-spacing:.02em;
}
.btn-focus:hover { background:#1e3a8a; color:#bfdbfe; }

/* ── Header card ─────────────────────────────────────────────── */
.node-badges { display:flex; gap:5px; flex-wrap:wrap; margin-bottom:8px; }
.badge {
  display:inline-block; padding:2px 8px; border-radius:10px;
  font-size:10px; font-weight:700; letter-spacing:.04em;
}
.badge-type    { background:#172554; color:#93c5fd; border:1px solid #1e3a8a44; }
.badge-proved  { background:var(--green-bg);  color:var(--green);  border:1px solid rgba(74,222,128,.25); }
.badge-sorry   { background:var(--orange-bg); color:var(--orange); border:1px solid rgba(251,146,60,.25); }
.badge-unproved{ background:var(--red-bg);    color:var(--red);    border:1px solid rgba(248,113,113,.25); }
.node-title   { font-size:15px; font-weight:600; color:#f1f5f9; line-height:1.35; margin-bottom:5px; }
.node-id      { font-family:var(--mono); font-size:11px; color:#475569; }
.node-chapter { font-size:11px; color:#334155; margin-top:3px; }
.lean-ref     { font-size:11px; color:var(--muted); margin-top:6px; }
.lean-ref code{ font-family:var(--mono); color:var(--accent); }

/* ── Structure card ──────────────────────────────────────────── */
.degrees { display:flex; gap:20px; margin-bottom:10px; }
.degree  { display:flex; flex-direction:column; align-items:center; gap:2px; }
.degree-val   { font-size:22px; font-weight:700; color:#f1f5f9; line-height:1; }
.degree-label { font-size:10px; color:var(--muted); text-align:center; }
.deps-list  { display:flex; flex-wrap:wrap; gap:4px; margin-bottom:8px; }
.deps-sub   { font-size:10px; color:var(--muted); margin:6px 0 4px; letter-spacing:.03em; }
.dep-chip {
  font-family:var(--mono); font-size:10px; padding:3px 7px;
  background:#0f1f3d; border:1px solid #1e3a5f;
  border-radius:4px; color:var(--accent); cursor:pointer; transition:background .15s;
}
.dep-chip:hover { background:#172554; }
.no-deps { font-size:12px; color:var(--muted); font-style:italic; }

/* ── Metrics card ────────────────────────────────────────────── */
.metrics-grid {
  display:grid; grid-template-columns:auto 1fr 1fr;
  gap:5px 10px; align-items:center;
}
.col-head { font-size:10px; color:#334155; text-align:right; font-weight:600; }
.m-label  { font-size:11px; color:var(--muted); }
.m-val    { font-family:var(--mono); font-size:12px; color:#94a3b8; text-align:right; }
.m-done   { color:var(--green); font-weight:700; }
.m-inf    { color:var(--red);   font-weight:700; }
.m-work   { color:var(--orange); }

/* ── Section header ──────────────────────────────────────────── */
.sec-hdr {
  display:flex; justify-content:space-between; align-items:baseline; margin-bottom:6px;
}
.chars-pair { font-family:var(--mono); font-size:10px; color:#334155; }
.chars-inf  { color:var(--red); }
.chars-val  { color:#475569; }

/* ── LaTeX rendered block ────────────────────────────────────── */
.latex-rendered {
  font-family:var(--sans); font-size:13px; line-height:1.7;
  color:#94a3b8; overflow-x:auto; min-height:1.5em;
}
.latex-rendered .katex-display { margin:6px 0; overflow-x:auto; }
.latex-rendered em { font-style:italic; color:#cbd5e1; }
.latex-rendered strong { font-weight:600; color:#cbd5e1; }
.latex-rendered.empty { color:#1e3a5f; font-style:italic; }

/* ── Lean code block ─────────────────────────────────────────── */
.code-block {
  font-family:var(--mono); font-size:11px; line-height:1.6;
  background:var(--code-bg); color:#abb2bf;
  border:1px solid #1a2744; border-radius:5px;
  padding:10px 12px; white-space:pre; overflow:auto;
  max-height:220px;
}
.code-block::-webkit-scrollbar { width:4px; height:4px; }
.code-block::-webkit-scrollbar-thumb { background:#1e3a5f; border-radius:2px; }
.code-block.empty { color:#1e3a5f; font-style:italic; white-space:normal; }

/* ── Lean syntax colours (One Dark palette) ──────────────────── */
.hl-kw      { color:#c678dd; }
.hl-tactic  { color:#61afef; }
.hl-type    { color:#e5c07b; }
.hl-comment { color:#5c6370; font-style:italic; }
.hl-str     { color:#98c379; }
.hl-num     { color:#d19a66; }
</style>
</head>

    <option value="union">All declarations</option>
    <option value="blueprint">Blueprint only</option>

  <select id="component"><option value="">All components</option></select>
  <select id="chapter"><option value="">All chapters</option></select>
  <select id="fileview" title="Tint the background by source file">
    <option value="off">File view: off</option>
    <option value="lean">File view: Lean files</option>
    <option value="tex">File view: LaTeX files</option>
  </select>
  <label class="chk"><input type="checkbox" id="orphans"> show isolated <span id="iso-count"></span></label>
  <span id="focus-pill" class="pill" style="display:none" title="Clear focus">
    <span class="lbl"></span><span class="x">&times;</span>
  </span>
  <button id="reset" class="btn">Reset view</button>
</div>
<div id="main">
  <div id="graph"></div>
  <div id="stats-panel"></div>
  <div id="file-legend" style="display:none"></div>
  <aside id="sidebar">
    <div id="sidebar-empty">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none"

        <line x1="9" y1="9" x2="15" y2="9"/><line x1="9" y1="13" x2="13" y2="13"/>
      </svg>
      <p>Click a node to inspect it</p>
    </div>
    <div id="sidebar-content" style="display:none"></div>
  </aside>
</div>

const allNodes  = {"def:peer_jacobian": {"id": "def:peer_jacobian", "type": "definition", "title": "Jacobian of a curve anchor", "chapter": "", "statement": "The peer project \\emph{Algebraic-Jacobian-Challenge}, in its chapter on the\n  Jacobian, supplies the Jacobian $J$ of a smooth projective curve $C$ as a\n  group object representing degree-zero divisor classes.  Sawin's §5 works on\n  the Jacobian of a hyperelliptic curve, identifying each component $J^{(n)}$ of\n  degree-$n$ classes with $J$ after fixing a base point, and uses the trivial\n  cotangent bundle $T^*J \\cong J \\times H^0(C,K_C)$.  This anchor is that group\n  object.", "uses": [], "lean_name": "AlgebraicGeometry.Jacobian", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Sawin_PeerDependencies.tex", "lean_file": "", "dep_count": 0, "rdep_count": 3, "descendant_count": 12, "proof_size_tex": null, "effort_local": 478, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 478}, "def:peer_weil_divisor": {"id": "def:peer_weil_divisor", "type": "definition", "title": "Weil divisors and symmetric powers anchor", "chapter": "", "statement": "The peer project \\emph{Algebraic-Jacobian-Challenge}, in its chapter on Weil\n  divisors, supplies effective divisors on a curve and (via prime divisors and\n  their multiplicities) the symmetric power $C^{(n)} = \\Sym^n C$ as a moduli\n  space of degree-$n$ effective divisors, together with the Abel--Jacobi map\n  $\\pi_n : C^{(n)} \\to J$ sending a divisor to its class.  The theta locus\n  $\\Theta_n = \\pi_n(C^{(n)})$ and the maps $\\underline A^{a,b}$, $\\Sigma^{a,b}$\n  of §5 are built from this data.", "uses": ["def:peer_jacobian"], "lean_name": "AlgebraicGeometry.Scheme.WeilDivisor", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Sawin_PeerDependencies.tex", "lean_file": "", "dep_count": 1, "rdep_count": 3, "descendant_count": 11, "proof_size_tex": null, "effort_local": 498, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 976}, "def:peer_canonical_differentials": {"id": "def:peer_canonical_differentials", "type": "definition", "title": "Canonical differentials anchor", "chapter": "", "statement": "The peer project \\emph{Algebraic-Jacobian-Challenge}, in its chapter on\n  relative differentials, supplies the sheaf of Kähler differentials and hence\n  the canonical bundle $K_C = \\Omega^1_{C/k}$ and its global sections\n  $H^0(C,K_C)$.  Sawin identifies the fibre of $T^*J$ with $H^0(C,K_C)$ and uses\n  Serre duality $T_{D}C^{(n)} \\cong H^0(C,\\cO(D)/\\cO)$,\n  $(T^*)_{D}C^{(n)} \\cong H^0(C, K_C/K_C(-D))$ throughout the\n  characteristic-cycle computation of Lemma~\\ref{lem:sawin_ts_singular}.", "uses": [], "lean_name": "AlgebraicGeometry.Scheme.relativeDifferentialsPresheaf", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Sawin_PeerDependencies.tex", "lean_file": "", "dep_count": 0, "rdep_count": 1, "descendant_count": 8, "proof_size_tex": null, "effort_local": 492, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 492}, "def:peer_higher_direct_image": {"id": "def:peer_higher_direct_image", "type": "definition", "title": "Higher direct image / pushforward anchor", "chapter": "", "statement": "The peer project \\emph{Cech-Cohomology}, in its chapter on higher direct\n  images, supplies the derived pushforward $R^i f_* \\cF$ of a sheaf along a\n  morphism.  Sawin's constructible-sheaf operations --- proper pushforward\n  $f_*$, the decomposition $\\pi^n_*\\bQ_\\ell = \\bigoplus_r i^{n+2r}_*\n  \\bQ_\\ell[-2r](-r)$ (Lemma~\\ref{lem:sawin_ts_decomposition}), and proper base\n  change --- specialise this pushforward formalism to the $\\ell$-adic setting.\n  This anchor is the common pushforward interface.", "uses": [], "lean_name": "AlgebraicGeometry.higherDirectImage", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Sawin_PeerDependencies.tex", "lean_file": "", "dep_count": 0, "rdep_count": 1, "descendant_count": 5, "proof_size_tex": null, "effort_local": 501, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 501}, "def:hello_placeholder": {"id": "def:hello_placeholder", "type": "definition", "title": "Initialization stub", "chapter": "", "statement": "Placeholder definition \\texttt{hello} introduced by the project template in the Lean source before the scaffold phase begins.  This entry exists solely to register the stub in the blueprint DAG; the declaration will be replaced by the real formalization declarations during the autoformalize stage.", "uses": [], "lean_name": "hello", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "def hello := \"world\"", "proof_size_lean": 20, "has_sorry": false, "tex_file": "chapters/Sawin_Terminology.tex", "lean_file": "MR4228499BoundsForTheStalksOfPerverseSheavesInCharacteristicPAndAConjectureO/Basic.lean", "dep_count": 0, "rdep_count": 0, "descendant_count": 0, "proof_size_tex": null, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": 20, "effort_total": 0}, "def:sawin_conical": {"id": "def:sawin_conical", "type": "definition", "title": "Conical subset", "chapter": "", "statement": "\\textit{Source: Sawin, §1, Definition (conical).}\n  A closed subset, or algebraic cycle, on a vector bundle is \\emph{conical} if it\n  is invariant under the $\\bG_m$-action by dilation of vectors.", "uses": [], "lean_name": "MR4228499.IsConical", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Sawin_Terminology.tex", "lean_file": "", "dep_count": 0, "rdep_count": 2, "descendant_count": 24, "proof_size_tex": null, "effort_local": 195, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 195}, "def:sawin_projectivization": {"id": "def:sawin_projectivization", "type": "definition", "title": "Projectivization of a conical cycle", "chapter": "", "statement": "\\textit{Source: Sawin, §1, Definition (projectivization).}\n  For a vector bundle $V$ on a variety $X$, $\\PP(V) = \\Proj(\\Sym^*(V^\\vee))$ is\n  its projectivization, of dimension $\\dim X + \\rank V - 1$, identified with the\n  quotient of $V$ minus its zero section by $\\bG_m$.  For a conical cycle $C$ on\n  $V$, $\\PP(C)$ is the quotient of $C$, minus its intersection with the zero\n  section, by $\\bG_m$.", "uses": ["def:sawin_conical"], "lean_name": "MR4228499.projectivization", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Sawin_Terminology.tex", "lean_file": "", "dep_count": 1, "rdep_count": 3, "descendant_count": 11, "proof_size_tex": null, "effort_local": 400, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 595}, "def:sawin_polar_multiplicity": {"id": "def:sawin_polar_multiplicity", "type": "definition", "title": "Polar multiplicity, projective form", "chapter": "", "statement": "\\textit{Source: Sawin, §1, Definition polar-multiplicity.}\n  Let $X$ be smooth of dimension $n$, $C$ a conical cycle on $T^*X$ of dimension\n  $n$, and $x\\in X$.  For $0\\le i<n$, let $V$ be a rank-$(i+1)$ sub-bundle of\n  $T^*X$ near $x$ with $V_x$ a general point of the Grassmannian of\n  $(i+1)$-planes in $(T^*X)_x$.  The \\emph{$i$th polar multiplicity}\n  $\\gamma^i_C(x)$ is the multiplicity at $x$ of $\\pi_*(\\PP(C)\\cap\\PP(V))$, where\n  $\\pi:\\PP(T^*X)\\to X$.  The $n$th polar multiplicity is the multiplicity of the\n  zero-section in $C$.  Well-definedness is Lemma~\\ref{lem:sawin_intersection_comparison}.", "uses": ["def:sawin_projectivization"], "lean_name": "MR4228499.polarMultiplicity", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Sawin_Terminology.tex", "lean_file": "", "dep_count": 1, "rdep_count": 5, "descendant_count": 8, "proof_size_tex": null, "effort_local": 607, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 1202}, "def:sawin_C_transversal_map": {"id": "def:sawin_C_transversal_map", "type": "definition", "title": "$C$-transversal morphism (to $Y$)", "chapter": "", "statement": "\\textit{Source: Sawin, §2, Definition C-transversal-1.}\n  For $C\\subseteq T^*X$ a closed conical subset and $f:X\\to Y$ a morphism of\n  smooth schemes, $f$ is \\emph{$C$-transversal} if $df^{-1}(C)$, under\n  $X\\times_Y T^*Y \\to T^*X$, lies in the zero-section.", "uses": [], "lean_name": "MR4228499.CTransversalMap", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Sawin_Terminology.tex", "lean_file": "", "dep_count": 0, "rdep_count": 5, "descendant_count": 18, "proof_size_tex": null, "effort_local": 258, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 258}, "def:sawin_circ_forward": {"id": "def:sawin_circ_forward", "type": "definition", "title": "Pushforward $f_\\circ C$", "chapter": "", "statement": "\\textit{Source: Sawin, §2, Definition circ-forward.}\n  If $f$ is proper, $f_\\circ C$ is the pushforward from $X\\times_Y T^*Y$ to\n  $T^*Y$ of $df^{-1}(C)$.", "uses": ["def:sawin_C_transversal_map"], "lean_name": "MR4228499.circForward", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Sawin_Terminology.tex", "lean_file": "", "dep_count": 1, "rdep_count": 2, "descendant_count": 7, "proof_size_tex": null, "effort_local": 154, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 412}, "def:sawin_shriek_forward": {"id": "def:sawin_shriek_forward", "type": "definition", "title": "Pushforward $f_! A$ of a cycle", "chapter": "", "statement": "\\textit{Source: Sawin, §2, Definition shriek-forward.}\n  For $A$ a codimension-$\\dim X$ cycle supported on $C$ with $f_\\circ C$ of\n  dimension $\\dim Y$, $f_! A$ is the pushforward to $T^*Y$ of the\n  intersection-theoretic inverse image $df^*A$.", "uses": ["def:sawin_circ_forward"], "lean_name": "MR4228499.shriekForward", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Sawin_Terminology.tex", "lean_file": "", "dep_count": 1, "rdep_count": 1, "descendant_count": 5, "proof_size_tex": null, "effort_local": 244, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 656}, "def:sawin_h_transversal": {"id": "def:sawin_h_transversal", "type": "definition", "title": "$C$-transversal $h:W\\to X$ and $h^\\circ C$", "chapter": "", "statement": "\\textit{Source: Sawin, §2, Definition (Saito 3.1).}\n  For $h:W\\to X$, let $h^*C\\subseteq W\\times_X T^*X$ be the pullback of $C$ and\n  $K=\\ker(dh:W\\times_X T^*X\\to T^*W)$.  Then $h$ is \\emph{$C$-transversal} if\n  $h^*C\\cap K$ lies in the zero-section, and one sets $h^\\circ C = dh(h^*C)\n  \\subseteq T^*W$ (closed by Saito Lemma 3.1).", "uses": ["def:sawin_conical"], "lean_name": "MR4228499.HTransversal", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Sawin_Terminology.tex", "lean_file": "", "dep_count": 1, "rdep_count": 3, "descendant_count": 17, "proof_size_tex": null, "effort_local": 332, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 527}, "def:sawin_pair_transversal": {"id": "def:sawin_pair_transversal", "type": "definition", "title": "$C$-transversal pair", "chapter": "", "statement": "\\textit{Source: Sawin, §2, Definition (Saito 3.5(2)).}\n  A pair $h:W\\to X$, $f:W\\to Y$ is \\emph{$C$-transversal} if $h$ is\n  $C$-transversal and $f$ is $h^\\circ C$-transversal.", "uses": ["def:sawin_h_transversal", "def:sawin_C_transversal_map"], "lean_name": "MR4228499.PairTransversal", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Sawin_Terminology.tex", "lean_file": "", "dep_count": 2, "rdep_count": 1, "descendant_count": 11, "proof_size_tex": null, "effort_local": 176, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 961}, "def:sawin_local_acyclic": {"id": "def:sawin_local_acyclic", "type": "definition", "title": "Local acyclicity", "chapter": "", "statement": "\\textit{Source: Sawin, §2, Definition (SGA 4.5).}\n  $f:W\\to Y$ is \\emph{locally acyclic} relative to $K\\in D^b_c(W,\\bF_\\ell)$ if for\n  every geometric point $x\\in W$ and geometric point $t\\in Y$ specializing to\n  $f(x)$, the map $H^*(W_x,K)\\to H^*(W_{x,t},K)$ is an isomorphism.  When $Y$ is a\n  smooth curve this is equivalent to the vanishing of $\\RPhi_f K$.", "uses": [], "lean_name": "MR4228499.LocallyAcyclic", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Sawin_Terminology.tex", "lean_file": "", "dep_count": 0, "rdep_count": 1, "descendant_count": 11, "proof_size_tex": null, "effort_local": 360, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 360}, "def:sawin_singular_support": {"id": "def:sawin_singular_support", "type": "definition", "title": "Singular support $SS(K)$", "chapter": "", "statement": "\\textit{Source: Sawin, §2, Definition (Beilinson 1.3).}\n  For $K\\in D^b_c(X,\\bF_\\ell)$, the \\emph{singular support} $\\SSing(K)$ is the\n  smallest closed conical $C\\subseteq T^*X$ such that for every $C$-transversal\n  pair $h:W\\to X$, $f:W\\to Y$, the map $f$ is locally acyclic relative to $h^*K$.\n  Existence, uniqueness, and $\\dim \\SSing(K)=\\dim X$ are Beilinson's\n  Theorem 1.3.", "uses": ["def:sawin_pair_transversal", "def:sawin_local_acyclic"], "lean_name": "MR4228499.singularSupport", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Sawin_Terminology.tex", "lean_file": "", "dep_count": 2, "rdep_count": 3, "descendant_count": 10, "proof_size_tex": null, "effort_local": 380, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 1701}, "def:sawin_properly_transversal": {"id": "def:sawin_properly_transversal", "type": "definition", "title": "Properly $C$-transversal morphism", "chapter": "", "statement": "\\textit{Source: Sawin, §2, Definition (Saito 7.1(1)).}\n  With $C\\subseteq T^*X$ of pure dimension $n=\\dim X$ and $h:W\\to X$ with\n  $\\dim W=m$, $h$ is \\emph{properly $C$-transversal} if it is $C$-transversal and\n  every irreducible component of $h^*C$ has dimension $m$.", "uses": ["def:sawin_h_transversal"], "lean_name": "MR4228499.ProperlyCTransversal", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Sawin_Terminology.tex", "lean_file": "", "dep_count": 1, "rdep_count": 3, "descendant_count": 10, "proof_size_tex": null, "effort_local": 269, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 796}, "def:sawin_shriek_pullback": {"id": "def:sawin_shriek_pullback", "type": "definition", "title": "Pullback $h^! A$ of a cycle", "chapter": "", "statement": "\\textit{Source: Sawin, §2, Definition (Saito 7.1(2)).}\n  For $A$ a codimension-$n$ cycle on $T^*X$ with conical support $C$ and $h:W\\to\n  X$ properly $C$-transversal, $h^!A = (-1)^{n-m}$ times the\n  intersection-theoretic pushforward along $dh:W\\times_X T^*X\\to T^*W$ of the\n  pullback along $h$ of $A$ (well-defined since $dh$ is finite on $\\operatorname{supp} h^*A$).", "uses": ["def:sawin_properly_transversal"], "lean_name": "MR4228499.shriekPullback", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Sawin_Terminology.tex", "lean_file": "", "dep_count": 1, "rdep_count": 3, "descendant_count": 7, "proof_size_tex": null, "effort_local": 369, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 1165}, "def:sawin_isolated_char_point": {"id": "def:sawin_isolated_char_point", "type": "definition", "title": "Isolated $C$-characteristic point", "chapter": "", "statement": "\\textit{Source: Sawin, §2, Definition (Saito 5.3(1)).}\n  For $f:X\\to Y$ to a smooth curve, a closed point $x$ is \\emph{at most an\n  isolated $C$-characteristic point} if $f$ is $C$-transversal on some punctured\n  neighborhood of $x$; it is an \\emph{isolated $C$-characteristic point} if in\n  addition $f$ is $C$-transversal on no full neighborhood of $x$.", "uses": ["def:sawin_C_transversal_map"], "lean_name": "MR4228499.IsolatedCharacteristicPoint", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Sawin_Terminology.tex", "lean_file": "", "dep_count": 1, "rdep_count": 1, "descendant_count": 10, "proof_size_tex": null, "effort_local": 355, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 613}, "def:sawin_dimtot": {"id": "def:sawin_dimtot", "type": "definition", "title": "Total dimension $\\dimtot$", "chapter": "", "statement": "\\textit{Source: Sawin, §2, Definition (dimtot).}\n  For a Galois representation $V$ of a local field over $\\bF_\\ell$,\n  $\\dimtot V = \\dim V + \\Swan V$.  For a complex $W$,\n  $\\dimtot W = \\sum_i (-1)^i \\dimtot \\cH^i(W)$.", "uses": [], "lean_name": "MR4228499.dimtot", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Sawin_Terminology.tex", "lean_file": "", "dep_count": 0, "rdep_count": 1, "descendant_count": 10, "proof_size_tex": null, "effort_local": 218, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 218}, "def:sawin_characteristic_cycle": {"id": "def:sawin_characteristic_cycle", "type": "definition", "title": "Characteristic cycle $CC(K)$", "chapter": "", "statement": "\\textit{Source: Sawin, §2, Definition (Saito 5.10).}\n  $\\CCyc(K)$ is the unique $\\bZ$-linear combination of irreducible components of\n  $\\SSing(K)$ such that for every étale $j:W\\to X$, every $f:W\\to Y$ to a smooth\n  curve, and every at most isolated $h^\\circ \\SSing(\\cF)$-characteristic point\n  $u\\in W$ of $f$,\n  \\[ -\\dimtot\\bigl(\\RPhi_f(j^*K)\\bigr)_u = (j^*\\CCyc(K),(df)^*\\omega)_{T^*W,u}, \\]\n  for $\\omega$ a meromorphic one-form without zero or pole at $f(u)$.  Existence\n  and uniqueness are Saito Theorem 5.9; integrality (Beilinson--Deligne) is Saito\n  Theorem 5.18.  By Saito Proposition 5.14(2), $\\SSing(K) = \\operatorname{supp}\\CCyc(K)$.", "uses": ["def:sawin_singular_support", "def:sawin_dimtot", "def:sawin_isolated_char_point"], "lean_name": "MR4228499.characteristicCycle", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Sawin_Terminology.tex", "lean_file": "", "dep_count": 3, "rdep_count": 4, "descendant_count": 9, "proof_size_tex": null, "effort_local": 648, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 2922}, "def:sawin_local_intersection": {"id": "def:sawin_local_intersection", "type": "definition", "title": "Local intersection number", "chapter": "", "statement": "\\textit{Source: Sawin, §3, Definition (local intersection number).}\n  For $f:Y\\to X$, $x\\in X$, and cycles $C_1,C_2$ on $Y$ of total dimension\n  $\\dim Y$ with $C_1\\cap C_2\\cap f^{-1}(x)$ proper (and each component of\n  $C_1\\cap C_2$ either proper inside $f^{-1}(x)$ or disjoint from it), the local\n  intersection number $(C_1,C_2)_{Y,x}$ is the sum of the degrees of the refined\n  intersection $C_1\\cdot C_2$ (Fulton) over the components of $C_1\\cap C_2$\n  inside $f^{-1}(x)$.", "uses": [], "lean_name": "MR4228499.localIntersectionNumber", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Sawin_MasseyBound.tex", "lean_file": "", "dep_count": 0, "rdep_count": 2, "descendant_count": 8, "proof_size_tex": null, "effort_local": 476, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 476}, "lem:sawin_intersection_comparison": {"id": "lem:sawin_intersection_comparison", "type": "lemma", "title": "Independence of the polar intersection from the choice of $(Y,V)$", "chapter": "", "statement": "\\textit{Source: Sawin, §3, Lemma intersection-comparison.}\n  Let $X$ be smooth, $C$ a conical cycle on $T^*X$ of dimension $\\dim X$, $x\\in\n  X$, and $0\\le i<\\dim X$.  For $Y\\subset X$ smooth of dimension $\\dim X-i$\n  through $x$ and $V$ a rank-$(i+1)$ sub-bundle of $T^*X$ on $Y$ whose strict\n  transforms of $\\PP(C),\\PP(V)$ do not meet in the exceptional divisor of the\n  blowup of $\\PP(T^*X)$ at the fibre over $x$, the contribution of the fibre over\n  $x$ to $\\PP(C)\\cap\\PP(V)$ depends only on $i$.  A general pair $((TY)_x,V_x)$\n  satisfies the hypothesis, so such $(Y,V)$ exist.", "uses": ["def:sawin_projectivization", "def:sawin_local_intersection"], "lean_name": "MR4228499.intersection_comparison", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:sawin_projectivization}\n  Work locally and deform $(Y,V)$ to $(Y',V')$ through a connected family of\n  local complete intersections (convex combination of defining equations).  The\n  emptiness of the strict-transform intersection in the exceptional divisor is\n  open, so the whole family can be taken to satisfy it; the intersection locus is\n  closed and disjoint from $x$, hence avoids a neighborhood of $x$, so the\n  contribution at $x$ is constant in the family.  For genericity: $\\PP(C)$ has\n  dimension $\\dim X-1$, the exceptional fibre $\\PP((TX)_x)\\times\\PP((T^*X)_x)$ has\n  dimension $2\\dim X-2$, and the strict transform of $\\PP(V)$ is\n  $\\PP((TY)_x)\\times\\PP(V_x)$ of dimension $\\dim X-1$; for general subspaces the\n  intersection has expected dimension $-1$, i.e. is empty.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Sawin_MasseyBound.tex", "lean_file": "", "dep_count": 2, "rdep_count": 2, "descendant_count": 6, "proof_size_tex": 793, "effort_local": 793, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 1864}, "def:sawin_polar_multiplicity_2": {"id": "def:sawin_polar_multiplicity_2", "type": "definition", "title": "Polar multiplicity, intersection form", "chapter": "", "statement": "\\textit{Source: Sawin, §3, Definition polar-multiplicity-2.}\n  For $0\\le i<\\dim X$, with $Y$ a sufficiently general smooth codimension-$i$\n  subvariety through $x$ and $V$ a sufficiently general rank-$(i+1)$ sub-bundle of\n  $T^*X$ over $Y$, the $i$th polar multiplicity of $C$ at $x$ is the local\n  intersection number $(\\PP(C),\\PP(V))_{\\PP(T^*X),x}$.  For $i=\\dim X$ it is the\n  multiplicity of the zero-section in $C$.  Well-definedness is\n  Lemma~\\ref{lem:sawin_intersection_comparison}.", "uses": ["def:sawin_projectivization", "def:sawin_local_intersection"], "lean_name": "MR4228499.polarMultiplicity'", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Sawin_MasseyBound.tex", "lean_file": "", "dep_count": 2, "rdep_count": 2, "descendant_count": 6, "proof_size_tex": null, "effort_local": 490, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 1561}, "lem:sawin_multiplicity_polar": {"id": "lem:sawin_multiplicity_polar", "type": "lemma", "title": "Equivalence of the two polar multiplicities", "chapter": "", "statement": "\\textit{Source: Sawin, §3, Lemma multiplicity-polar.}\n  Definition~\\ref{def:sawin_polar_multiplicity} and\n  Definition~\\ref{def:sawin_polar_multiplicity_2} agree.", "uses": ["def:sawin_polar_multiplicity", "def:sawin_polar_multiplicity_2", "lem:sawin_intersection_comparison"], "lean_name": "MR4228499.polarMultiplicity_eq", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:sawin_polar_multiplicity, def:sawin_polar_multiplicity_2}\n  The multiplicity of a cycle at a point is its local intersection number with a\n  general smooth subscheme through the point.  The projection formula gives\n  $(\\pi_*(\\PP(C)\\cap\\PP(V)),Y)_{X,x} = (\\PP(C),\\PP(V)\\cap\\pi^*Y)_{\\PP(T^*X),x}$,\n  and $\\PP(V)\\cap\\pi^*Y$ is the projectivized restriction $V'$ of $V$ to $Y$.  A\n  dimension count in the exceptional divisor $\\PP((TX)_x)\\times\\PP((T^*X)_x)$\n  shows that for $V_x$ general and $Y$ general depending on $V$, the strict\n  transforms of $\\PP(C)$ and $\\PP(V')$ do not meet, so\n  Definition~\\ref{def:sawin_polar_multiplicity_2} applies and the two numbers\n  coincide.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Sawin_MasseyBound.tex", "lean_file": "", "dep_count": 3, "rdep_count": 0, "descendant_count": 0, "proof_size_tex": 685, "effort_local": 685, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 3646}, "lem:sawin_transversality_check": {"id": "lem:sawin_transversality_check", "type": "lemma", "title": "Fibre inclusion is properly transversal", "chapter": "", "statement": "\\textit{Source: Sawin, §4, Lemma transversality-check.}\n  Let $f:X\\to Y$ be smooth of relative dimension $m$ between smooth varieties,\n  $C\\subseteq T^*X$ closed conical with all components of dimension $\\dim X$, and\n  $i:f^{-1}(y)\\hookrightarrow X$ the fibre inclusion.  If $f$ is $C$-transversal\n  and the fibres of $C\\to X\\to Y$ have dimension $m$, then $i$ is properly\n  $C$-transversal.", "uses": ["def:sawin_C_transversal_map", "def:sawin_properly_transversal"], "lean_name": "MR4228499.transversality_check", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:sawin_C_transversal_map, def:sawin_properly_transversal}\n  $C$-transversality of $f$ means $C$ meets the image of $df$ (the one-forms\n  pulled back from $Y$, i.e. those in $\\ker di$) only along the zero-section, so\n  $i$ is $C$-transversal.  Moreover $i^*C = y\\times_Y C$ is a fibre of $C\\to Y$,\n  of dimension $\\dim X-\\dim Y = \\dim f^{-1}(y)$, giving proper transversality.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Sawin_MasseyBound.tex", "lean_file": "", "dep_count": 2, "rdep_count": 1, "descendant_count": 6, "proof_size_tex": 384, "effort_local": 384, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 1438}, "lem:sawin_nearby_formula": {"id": "lem:sawin_nearby_formula", "type": "lemma", "title": "Nearby-cycle characteristic-cycle formula", "chapter": "", "statement": "\\textit{Source: Sawin, §4, Lemma nearby-formula.}\n  Let $X$ be smooth, $Y$ a smooth curve, $K\\in D^b_c(X,\\bF_\\ell)$, and let\n  $\\CCyc'(K)$, $\\SSing'(K)$ denote $\\CCyc(K)$, $\\SSing(K)$ with the cotangent\n  space at $x$ removed.  If $f:X\\to Y$ is smooth projective, $\\SSing'(K)$-transversal,\n  and the fibres of $\\SSing'(K)$ over $Y$ have dimension $\\dim X-1$, then for\n  $Z=f^{-1}(f(x))$ with inclusion $i$,\n  \\[ i^!\\CCyc'(K) = \\CCyc(\\RPsi_f K). \\]", "uses": ["lem:sawin_transversality_check", "def:sawin_characteristic_cycle", "def:sawin_shriek_pullback", "def:sawin_singular_support"], "lean_name": "MR4228499.nearby_formula", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{lem:sawin_transversality_check, def:sawin_characteristic_cycle}\n  Away from $x$, $\\SSing'(K)$-transversality makes $f$ locally acyclic, so\n  $\\RPhi_f K=0$ and $\\RPsi_f K=i^*K$; by Saito Theorem 7.6 and\n  Lemma~\\ref{lem:sawin_transversality_check}, $\\CCyc(\\RPsi_f K)=i^!\\CCyc'(K)$\n  there.  Hence the difference $i^!\\CCyc'(K)-\\CCyc(\\RPsi_f K)$ is a multiple of\n  the cotangent space at $x$; pairing with the zero-section and using the index\n  formula (Saito Theorem 7.13) $(\\CCyc(\\RPsi_f K),Z)=\\chi(f^{-1}(\\eta),K)$ on one\n  side, and projection-formula manipulations $i_*(di)^*Z = N^*Z$ (Fulton\n  8.1.1(c)) together with the constancy of $(\\CCyc'(K),N^*f^{-1}(y'))$ in a smooth\n  family on the other, shows the two pairings agree, forcing the multiple to be\n  zero.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Sawin_MasseyBound.tex", "lean_file": "", "dep_count": 4, "rdep_count": 1, "descendant_count": 5, "proof_size_tex": 771, "effort_local": 771, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 4715}, "lem:sawin_genericity": {"id": "lem:sawin_genericity", "type": "lemma", "title": "A general pencil of conics is transversal", "chapter": "", "statement": "\\textit{Source: Sawin, §4, Lemma genericity-lemma.}\n  Let $X\\subseteq\\PP^n$ be smooth, $C\\subseteq T^*X$ closed conical of dimension\n  $\\dim X$, and $x\\in X$ a point whose cotangent space is not contained in $C$.\n  For a general pencil of conic sections $\\overline X\\subseteq X\\times\\PP^1$ with\n  projections $p:\\overline X\\to X$, $q:\\overline X\\to\\PP^1$: $p$ is properly\n  $C$-transversal, $q$ is $p^\\circ C$-transversal near the conic through $x$, and\n  the fibres of $p^\\circ C$ over $\\PP^1$ are $(\\dim X-1)$-dimensional near that\n  conic.", "uses": ["def:sawin_properly_transversal", "def:sawin_h_transversal", "def:sawin_C_transversal_map"], "lean_name": "MR4228499.genericity_lemma", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:sawin_properly_transversal, def:sawin_h_transversal, def:sawin_C_transversal_map}\n  The base locus $Y$ of a generic pencil is smooth of codimension $2$ (Bertini),\n  and $p$ is the blow-up of $X$ along $Y$.  Counting conditions on the pencil:\n  for $(y,\\omega)\\in C$, ``$y\\in Y$'' is codimension $2$ and ``$\\omega$ transverse\n  to $Y$'' is codimension $\\dim X-2$, while the space of such $(y,\\omega)$ up to\n  scaling is $(\\dim X-1)$-dimensional, so the bad locus is codimension $1$ ---\n  non-generic --- giving $C$-transversality; the dimension count of $p^*C$ gives\n  proper transversality.  For $q$: $p^\\circ C$-transversality is open, and one\n  checks $dq(\\omega_0)\\notin p^\\circ C$ pointwise on the conic through $x$ via\n  analogous codimension counts, using that the cotangent space at $x$ is not in\n  $C$.  Finally each component of $p^\\circ C$ has dimension $\\dim X$, so its\n  fibres over $\\PP^1$ have dimension $\\dim X-1$ once the finitely many points\n  forced into a single conic are excluded from the neighborhood.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Sawin_MasseyBound.tex", "lean_file": "", "dep_count": 3, "rdep_count": 1, "descendant_count": 5, "proof_size_tex": 1033, "effort_local": 1033, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 2087}, "lem:sawin_final_nearby_formula": {"id": "lem:sawin_final_nearby_formula", "type": "lemma", "title": "Pencil-of-conics nearby/vanishing formula", "chapter": "", "statement": "\\textit{Source: Sawin, §4, Lemma final-nearby-formula.}\n  With $\\overline X$, $p$, $q$ a general pencil of conics, $\\overline x=p^{-1}(x)$,\n  $y=q(\\overline x)$, and $i:q^{-1}(y)\\hookrightarrow\\overline X$:\n  (1) $\\CCyc(\\RPsi_q p^*K)=i^!p^!\\CCyc'(K)$;\n  (2) $\\RPhi_q p^*K$ is supported at $x$;\n  (3) $-\\dimtot(\\RPhi_q p^*K)_x$ equals the multiplicity of the cotangent space at\n  $x$ in $\\CCyc(K)$;\n  (4) if $K$ is perverse, $(\\RPhi_q p^*K)_x$ is supported in degree $-1$.", "uses": ["lem:sawin_nearby_formula", "lem:sawin_genericity", "def:sawin_characteristic_cycle", "def:sawin_shriek_pullback"], "lean_name": "MR4228499.final_nearby_formula", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{lem:sawin_nearby_formula, lem:sawin_genericity, def:sawin_characteristic_cycle, def:sawin_dimtot}\n  (1) By Lemma~\\ref{lem:sawin_genericity}, $p$ is properly $\\SSing(K)$-transversal\n  and étale at $x$, so $\\CCyc(p^*K)=p^!\\CCyc(K)$ (Saito Theorem 6.6); apply\n  Lemma~\\ref{lem:sawin_nearby_formula} to $p^*K$ and $q$.\n  (2) $q$ is $\\SSing(p^*K)$-transversal near $x$ off $x$, so $p^*K$ is locally\n  $q$-acyclic there and $\\RPhi_q p^*K$ is supported at $x$.\n  (3) $x$ is at most isolated characteristic, so\n  $-\\dimtot(\\RPhi_q p^*K)_x = (\\CCyc(p^*K),(dq)^*\\omega)_x$; the only component of\n  $\\SSing(p^*K)$ meeting $(dq)^*\\omega$ is $N^*x$, with intersection $1$, giving\n  the multiplicity of $N^*x$ in $\\CCyc(p^*K)=\\CCyc(K)$.\n  (4) $p^*K[-1]$ is perverse near $x$ on the generic fibre, so by Gabber's theorem\n  (Illusie, Corollary 4.6) $\\RPhi_q(p^*K)[-1]$ is perverse; being supported at a\n  point it sits in degree $0$, so the unshifted complex is in degree $-1$.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Sawin_MasseyBound.tex", "lean_file": "", "dep_count": 4, "rdep_count": 1, "descendant_count": 4, "proof_size_tex": 967, "effort_local": 967, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 6715}, "lem:sawin_multiplicity_hypersurface": {"id": "lem:sawin_multiplicity_hypersurface", "type": "lemma", "title": "Polar multiplicity drops under a generic conic section", "chapter": "", "statement": "\\textit{Source: Sawin, §4, Lemma multiplicity-hypersurface.}\n  Let $X\\subseteq\\PP^n$ be smooth, $x\\in X$, $C$ a conical cycle on $T^*X$, $C'$ its\n  part away from the cotangent space at $x$, $\\inhyper X$ a generic conic section\n  through $x$ with inclusion $j$, and $\\inhyper C=-j^!C'$.  Then for $i>0$ the\n  $i$th polar multiplicity of $C$ at $x$ equals the $(i-1)$st polar multiplicity\n  of $\\inhyper C$ at $x$, and for $i=0$ it equals the multiplicity of the\n  cotangent space at $x$ in $C$.", "uses": ["lem:sawin_intersection_comparison", "def:sawin_polar_multiplicity_2", "def:sawin_shriek_pullback", "def:sawin_polar_multiplicity"], "lean_name": "MR4228499.multiplicity_hypersurface", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{lem:sawin_intersection_comparison, def:sawin_polar_multiplicity_2}\n  Split into $i=0$, $0<i<\\dim X$, $i=\\dim X$.  For $i=0$ a general section of\n  $\\PP(T^*X)$ meets $\\PP(C)$ only in the fibre over $x$.  For $0<i<\\dim X$, a\n  projective-geometry diagram (the blow-up of $\\PP(T^*X\\times_X\\inhyper X)$ along\n  the conormal section) and Fulton's projection formula identify\n  $(\\PP(\\inhyper C),\\PP(\\inhyper V))_{\\PP(T^*\\inhyper X),x}$ with\n  $(\\PP(C'),\\PP(V))_{\\PP(T^*X)}=(\\PP(C),\\PP(V))_{\\PP(T^*X)}$, while a codimension\n  count on the exceptional divisor verifies the strict-transform condition of\n  Lemma~\\ref{lem:sawin_intersection_comparison}.  For $i=\\dim X$, a cycle whose\n  hypersurface restriction (resp. cotangent projection) is the zero-section was\n  already the zero-section.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Sawin_MasseyBound.tex", "lean_file": "", "dep_count": 4, "rdep_count": 1, "descendant_count": 4, "proof_size_tex": 789, "effort_local": 789, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 4720}, "thm:sawin_first_massey": {"id": "thm:sawin_first_massey", "type": "theorem", "title": "Characteristic-$p$ Massey bound", "chapter": "", "statement": "\\textit{Source: Sawin, §4, Theorem first-Massey.}\n  Let $X$ be a smooth variety over a perfect field $k$, $\\ell$ invertible in $k$,\n  and $K$ a perverse sheaf of $\\bF_\\ell$-modules on $X$.  Then for every $x\\in X$,\n  \\[ \\dim_{\\bF_\\ell}\\cH^{-i}(K)_x \\ \\le\\ \\gamma^i_{\\CCyc(K)}(x). \\]", "uses": ["lem:sawin_final_nearby_formula", "lem:sawin_multiplicity_hypersurface", "def:sawin_polar_multiplicity", "def:sawin_characteristic_cycle"], "lean_name": "MR4228499.first_Massey", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{lem:sawin_final_nearby_formula, lem:sawin_multiplicity_hypersurface}\n  Étale-locally we may take $X\\subseteq\\PP^n$ smooth projective.  Induct on $i$.\n  From the distinguished triangle $p^*K\\to\\RPsi_q p^*K\\to\\RPhi_q p^*K$ take stalk\n  cohomology at $x$.  Since $\\RPsi_q p^*K[-1]$ is perverse, $\\cH^0(\\RPsi_q p^*K)_x=0$,\n  so for $i=0$, $\\dim\\cH^0(K)_x\\le\\dim(\\RPhi_q p^*K)^{-1}_x\\le-\\dimtot(\\RPhi_q\n  p^*K)_x$, the multiplicity of the cotangent space at $x$ in $\\CCyc(K)$, which by\n  Lemma~\\ref{lem:sawin_multiplicity_hypersurface} is $\\gamma^0_{\\CCyc(K)}(x)$.\n  For $i>0$, Lemma~\\ref{lem:sawin_final_nearby_formula}(4) makes the connecting map\n  vanish, so $\\dim\\cH^{-i}(K)_x\\le\\dim\\cH^{-i}(\\RPsi_q p^*K)_x$; the induction\n  hypothesis bounds this by the $(i-1)$st polar multiplicity of\n  $\\CCyc(\\RPsi_q p^*K[-1])$, which by\n  Lemma~\\ref{lem:sawin_final_nearby_formula}(1) and\n  Lemma~\\ref{lem:sawin_multiplicity_hypersurface} equals $\\gamma^i_{\\CCyc(K)}(x)$.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Sawin_MasseyBound.tex", "lean_file": "", "dep_count": 4, "rdep_count": 2, "descendant_count": 3, "proof_size_tex": 965, "effort_local": 965, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 11235}, "cor:sawin_vanishing": {"id": "cor:sawin_vanishing", "type": "corollary", "title": "Vanishing of stalk cohomology", "chapter": "", "statement": "\\textit{Source: Sawin, Corollary vanishing-intro.}\n  With $X$, $k$, $\\ell$, $K$ as in Theorem~\\ref{thm:sawin_first_massey},\n  $\\cH^{-i}(K)_x = 0$ whenever $-i > \\dim\\SSing(K)_x - \\dim X$, where\n  $\\SSing(K)_x$ is the fibre of the singular support over $x$.", "uses": ["thm:sawin_first_massey", "def:sawin_polar_multiplicity", "def:sawin_singular_support"], "lean_name": "MR4228499.vanishing", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{thm:sawin_first_massey}\n  By Theorem~\\ref{thm:sawin_first_massey} it suffices that the $i$th polar\n  multiplicity vanishes for $i<\\dim X-\\dim\\SSing(K)_x$.  For a rank-$(i+1)$ bundle\n  $V$, $\\PP(V)$ has dimension $i$ in the fibre over $0$ while $\\PP(\\CCyc(K))\n  \\subseteq\\PP(\\SSing(K))$ has codimension $\\dim X-\\dim\\SSing(K)_x$ there, so a\n  general $V$ misses it and the polar multiplicity is zero.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Sawin_MasseyBound.tex", "lean_file": "", "dep_count": 3, "rdep_count": 0, "descendant_count": 0, "proof_size_tex": 404, "effort_local": 404, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 11639}, "def:sawin_Z_locus": {"id": "def:sawin_Z_locus", "type": "definition", "title": "The loci $Z_{w_1,w_2}$ and the maps $\\underline A^{a,b}$", "chapter": "", "statement": "\\textit{Source: Sawin, §5, construction of $Z_{w_1,w_2}$.}\n  Let $\\underline A^{a,b}:C^{(g-a)}\\times C^{(g-b)}\\to J$, $(D_1,D_2)\\mapsto\n  [D_1+D_2]$.  The cotangent fibre of $J$ is $H^0(C,K_C)$.  For $w_1+w_2\\le g$ let\n  $Z_{w_1,w_2}\\subseteq C^{(w_1)}\\times C^{(w_2)}\\times H^0(C,K_C)$ consist of\n  $(D_1,D_2,\\omega)$ with $\\divv(\\omega)\\ge D_1+D_2+\\tau(D_1)+\\tau(D_2)$; it is\n  smooth of dimension $g$.  Let $pr_{w_1,w_2}:Z_{w_1,w_2}\\to T^*J$,\n  $(D_1,D_2,\\omega)\\mapsto([D_1+2D_2],\\omega)$, a proper map, so\n  $pr_{w_1,w_2*}[Z_{w_1,w_2}]$ is a codimension-$g$ cycle on $T^*J$.", "uses": ["def:peer_jacobian", "def:peer_weil_divisor", "def:peer_canonical_differentials"], "lean_name": "MR4228499.ZLocus", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Sawin_ShendeTsimerman.tex", "lean_file": "", "dep_count": 3, "rdep_count": 2, "descendant_count": 7, "proof_size_tex": null, "effort_local": 579, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 2047}, "lem:sawin_ts_singular": {"id": "lem:sawin_ts_singular", "type": "lemma", "title": "Singular support of the theta map", "chapter": "", "statement": "\\textit{Source: Sawin, §5, Lemma ts-singular.}\n  The pushforward $\\underline A^{a,b}_\\circ(C^{(g-a)}\\times C^{(g-b)})$ of the\n  zero-section is contained in the union of the zero-section of $T^*J$ with\n  $\\bigcup_{w_1+w_2<g}\\operatorname{supp} pr_{w_1,w_2*}[Z_{w_1,w_2}]$.", "uses": ["def:sawin_circ_forward", "def:sawin_Z_locus"], "lean_name": "MR4228499.ts_singular", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:sawin_circ_forward, def:sawin_Z_locus}\n  A pair $(D_a,D_b,\\omega)$ lies in $(d\\underline A^{a,b})^{-1}$ of the\n  zero-section iff $\\divv(\\omega)\\ge\\max(D_a,D_b)$ (Serre duality identifies the\n  derivative with reduction modulo $D_a,D_b$).  Subtract divisors $[P+\\tau(P)]$\n  from $D_a+D_b$ until impossible, obtaining $D'$; let $D_1$ be its odd-multiplicity\n  part and $D_2=(D'-D_1)/2$, so $[D_a+D_b]=[D_1+2D_2]$.  A case analysis at each\n  point (using that $\\omega$ vanishes to even order at hyperelliptic points) shows\n  $\\divv(\\omega)\\ge D_1+D_2+\\tau(D_1)+\\tau(D_2)$, so $(D_1,D_2,\\omega)\\in\n  Z_{\\deg D_1,\\deg D_2}$ and $([D_a+D_b],\\omega)=pr_{w_1,w_2}(D_1,D_2,\\omega)$.  If\n  $\\deg(D_1+D_2)\\ge g$ then $\\omega=0$ and the point is on the zero-section.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Sawin_ShendeTsimerman.tex", "lean_file": "", "dep_count": 2, "rdep_count": 1, "descendant_count": 5, "proof_size_tex": 765, "effort_local": 765, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 3224}, "lem:sawin_ts_smooth_cc": {"id": "lem:sawin_ts_smooth_cc", "type": "lemma", "title": "Characteristic cycle of $\\underline A_{a,b*}\\bQ_\\ell$", "chapter": "", "statement": "\\textit{Source: Sawin, §5, Lemma ts-smooth-cc.}\n  $\\CCyc(\\underline A_{a,b*}\\bQ_\\ell[2g-a-b]) = \\sum_{0\\le w_1+w_2<g}\n  m_{w_1,w_2,a,b}\\,pr_{w_1,w_2*}[Z_{w_1,w_2}] + m_{a,b}[J]$, where\n  $m_{w_1,w_2,a,b}$ is the coefficient of $v_1^{g-a}v_2^{g-b}$ in\n  \\[ (v_1+v_2+v_1^2v_2+v_1v_2^2)^{w_1}(v_1v_2)^{w_2}\n     (1+v_1^2+2v_1v_2+v_2^2+v_1^2v_2^2)^{g-1-w_1-w_2}, \\]\n  and $|m_{a,b}|\\le 8^g$.", "uses": ["lem:sawin_ts_singular", "def:sawin_shriek_forward", "def:sawin_characteristic_cycle"], "lean_name": "MR4228499.ts_smooth_cc", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{lem:sawin_ts_singular, def:sawin_shriek_forward}\n  Lemma~\\ref{lem:sawin_ts_singular} verifies the dimension hypothesis (2.20) of\n  Saito-direct Theorem 2.2.5, giving $\\CCyc(\\underline A_{a,b*}\\bQ_\\ell[2g-a-b]) =\n  \\underline A^{a,b}_![C^{(g-a)}\\times C^{(g-b)}]$.  Pulling back along a general\n  $\\omega\\in H^0(C,K_C)$ (with $2g-2$ simple zeros in $g-1$ $\\tau$-orbits) reduces\n  both sides to an explicit count of subsets, matched by the standard\n  generating-function bookkeeping that assigns the listed monomials; thus the\n  coefficient of $v_1^av_2^b$ is $m_{w_1,w_2,a,b}$.  The cycles agree on a general\n  fibre, hence up to components not dominating $H^0(C,K_C)$, which must be the\n  zero-section; its multiplicity is $(-1)^{g+a+b}$ times the Euler characteristic\n  of the generic fibre of $\\underline A_{a,b}$, bounded by $8^g$ (TS Proposition\n  3.16), and is characteristic-independent by lifting to characteristic zero.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Sawin_ShendeTsimerman.tex", "lean_file": "", "dep_count": 3, "rdep_count": 1, "descendant_count": 4, "proof_size_tex": 933, "effort_local": 933, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 7065}, "lem:sawin_ts_decomposition": {"id": "lem:sawin_ts_decomposition", "type": "lemma", "title": "Decomposition of $\\pi^n_*\\bQ_\\ell$", "chapter": "", "statement": "\\textit{Source: Sawin, §5, Lemma ts-decomposition.}\n  For $0\\le n\\le g$, $\\pi^n_*\\bQ_\\ell = \\bigoplus_{r=0}^{n/2}\n  i^{n+2r}_*\\bQ_\\ell[-2r](-r)$, where $i^m:\\Theta_m\\hookrightarrow J$.  (Obtained\n  in the proofs of IY Lemma 2.9 / TS Lemma 3.1.)", "uses": ["def:peer_higher_direct_image", "def:peer_weil_divisor"], "lean_name": "MR4228499.ts_decomposition", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:peer_higher_direct_image}\n  This is part of the proofs of IY Lemma 2.9 and TS Lemma 3.1: the pushforward of\n  the constant sheaf along the Abel--Jacobi map of the symmetric power splits as\n  the displayed sum of (shifted, Tate-twisted) constant sheaves on the theta loci.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Sawin_ShendeTsimerman.tex", "lean_file": "", "dep_count": 2, "rdep_count": 1, "descendant_count": 4, "proof_size_tex": 281, "effort_local": 281, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 1758}, "lem:sawin_ts_singular_cc": {"id": "lem:sawin_ts_singular_cc", "type": "lemma", "title": "Characteristic cycle of $\\Sigma^{a,b}_*\\bQ_\\ell$", "chapter": "", "statement": "\\textit{Source: Sawin, §5, Lemma ts-singular-cc.}\n  $\\CCyc(\\Sigma^{a,b}_*\\bQ_\\ell[2g-a-b]) = \\sum_{0\\le w_1+w_2<g}\n  m'_{w_1,w_2,a,b}\\,pr_{w_1,w_2*}[Z_{w_1,w_2}] + m'_{a,b}[J]$, where\n  $m'_{w_1,w_2,a,b}$ is the coefficient of $v_1^{g-a}v_2^{g-b}$ in\n  $(1-v_1^{-2})(1-v_2^{-2})$ times the generating function of\n  Lemma~\\ref{lem:sawin_ts_smooth_cc}, and $|m'_{a,b}|\\le 4\\cdot 8^g$.", "uses": ["lem:sawin_ts_smooth_cc", "lem:sawin_ts_decomposition"], "lean_name": "MR4228499.ts_singular_cc", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{lem:sawin_ts_smooth_cc, lem:sawin_ts_decomposition}\n  By Lemma~\\ref{lem:sawin_ts_decomposition},\n  $\\underline A^{a,b}_*\\bQ_\\ell = \\bigoplus_{r,s}\\Sigma^{a+2r,b+2s}_*\\bQ_\\ell[-2r-2s](-r-s)$,\n  so $\\CCyc(\\Sigma^{a,b}_*\\bQ_\\ell) = \\CCyc(\\underline A^{a,b}_*\\bQ_\\ell) -\n  \\CCyc(\\underline A^{a+2,b}_*) - \\CCyc(\\underline A^{a,b+2}_*) +\n  \\CCyc(\\underline A^{a+2,b+2}_*)$; substituting\n  Lemma~\\ref{lem:sawin_ts_smooth_cc} produces the factor $(1-v_1^{-2})(1-v_2^{-2})$\n  and the bound $|m'_{a,b}|\\le 4\\cdot 8^g$.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Sawin_ShendeTsimerman.tex", "lean_file": "", "dep_count": 2, "rdep_count": 2, "descendant_count": 3, "proof_size_tex": 515, "effort_local": 515, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 8362}, "lem:sawin_individual_polar_bound": {"id": "lem:sawin_individual_polar_bound", "type": "lemma", "title": "Polar multiplicity of a single $pr_{w_1,w_2*}[Z_{w_1,w_2}", "chapter": "", "statement": "$]\n  \n  \n  \n  \n  \n  \\textit{Source: Sawin, §5, Lemma individual-polar-bound.}\n  For $x\\in J$ and $0\\le i<g-1$, the $i$th polar multiplicity of\n  $pr_{w_1,w_2*}[Z_{w_1,w_2}]$ at $x$ is at most\n  \\[ 2^{w_1+w_2}\\binom{g}{i}\\!\\!\\sum_{\\substack{c+d=w_1+w_2-i\\\\ c\\le w_1,\\,d\\le w_2}}\\!\\!\n     \\binom{g-i-1}{c,d,g-1-w_1-w_2}2^{w_2-d}\\binom{w_1+w_2-c-d}{w_1-c}. \\]", "uses": ["def:sawin_polar_multiplicity", "thm:sawin_appendix", "def:sawin_Z_locus"], "lean_name": "MR4228499.individual_polar_bound", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:sawin_polar_multiplicity, thm:sawin_appendix}\n  Choosing $V$ the constant bundle $L^\\vee$ ($L\\subseteq H^1(C,\\cO_C)$ generic of\n  rank $g-i-1$), the polar multiplicity is the multiplicity of the Shende--Tsimerman\n  polar variety $P'_L V_{w_1,w_2}=\\pi_{w_1,w_2}(\\sigma^{-1}\\PP(L^\\vee))$, after\n  identifying $\\PP(Z_{w_1,w_2})\\cong C^{(w_1)}\\times C^{(w_2)}\\times(C/\\tau)^{g-1-w_1-w_2}$.\n  TS Lemma 3.22 computes its class as a multiple of $[\\Theta_i]$; applying the\n  appendix bound Theorem~\\ref{thm:sawin_appendix} (with $r=2$) and\n  $([\\Theta_i],[\\Theta_{g-i}])=\\binom{g}{i}$ yields the stated estimate.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Sawin_ShendeTsimerman.tex", "lean_file": "", "dep_count": 3, "rdep_count": 1, "descendant_count": 3, "proof_size_tex": 614, "effort_local": 614, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 5025}, "lem:sawin_global_polar_bound": {"id": "lem:sawin_global_polar_bound", "type": "lemma", "title": "Summed polar-multiplicity bound", "chapter": "", "statement": "\\textit{Source: Sawin, §5, Lemma global-polar-bound.}\n  For $x\\in J$, $\\sum_{i=0}^{g-1}\\gamma^i_{\\CCyc(\\Sigma^{a,b}_*\\bQ_\\ell[2g-a-b])}(x)\n  \\le 28^g/16$.", "uses": ["lem:sawin_individual_polar_bound", "lem:sawin_ts_singular_cc"], "lean_name": "MR4228499.global_polar_bound", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{lem:sawin_individual_polar_bound, lem:sawin_ts_singular_cc}\n  Rewrite the inner sum of Lemma~\\ref{lem:sawin_individual_polar_bound} as a\n  coefficient of $(1+2u)^i(1+u)^{w_1+w_2-i}$, and bound $m'_{w_1,w_2,a,b}\\le\n  m_{w_1,w_2,a,b}\\le 4^{w_1}6^{g-1-w_1-w_2}$ (value of the generating function at\n  $1$).  Summing over $w_2$ at fixed $w=w_1+w_2$ gives the $i$th polar multiplicity\n  of $\\sum_{w_1+w_2=w}m'_{w_1,w_2,a,b}pr_{w_1,w_2*}[Z_{w_1,w_2}]$ at most\n  $6^{g-1-w}12^i10^{w-i}\\binom{g}{i}\\binom{g-i-1}{w-i}$; summing over $w$ gives\n  $\\binom{g}{i}12^i16^{g-i-1}$, and summing over $i$ from $0$ to $g-1$ collapses to\n  $(12+16)^g/16=28^g/16$ (the zero-section does not contribute for $i<g$).\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/Sawin_ShendeTsimerman.tex", "lean_file": "", "dep_count": 2, "rdep_count"
