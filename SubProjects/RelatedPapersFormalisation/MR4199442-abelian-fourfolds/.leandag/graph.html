<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Blueprint dependency graph</title>
<link rel="stylesheet" href="https://unpkg.com/katex@0.16.9/dist/katex.min.css">
<script src="https://unpkg.com/katex@0.16.9/dist/katex.min.js"></script>
<script src="https://unpkg.com/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>
<style>
:root {
  --sidebar-bg: #0f172a;
  --toolbar-bg: #1e293b;
  --surface:    #1a2744;
  --border:     #1e3a5f;
  --text:       #e2e8f0;
  --muted:      #64748b;
  --accent:     #60a5fa;
  --green:      #4ade80;
  --green-bg:   rgba(74,222,128,.12);
  --red:        #f87171;
  --red-bg:     rgba(248,113,113,.12);
  --orange:     #fb923c;
  --orange-bg:  rgba(251,146,60,.12);
  --code-bg:    #090d16;
  --radius:     7px;
  --mono: 'JetBrains Mono','Fira Code','Cascadia Code','Consolas','Monaco',monospace;
  --sans: -apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;
}

html { margin:0; padding:0; height:100%; overflow:hidden; }
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
body { font-family:var(--sans); display:flex; flex-direction:column;
       height:100%; background:#f8fafc; color:var(--text); }

/* â”€â”€ Toolbar â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
#toolbar {
  background:var(--toolbar-bg); height:44px; padding:0 16px;
  display:flex; align-items:center; gap:14px; flex-shrink:0;
  border-bottom:1px solid #263045;
}
.brand { font-size:13px; font-weight:700; color:#f1f5f9; letter-spacing:.03em; }
.stat  { font-size:12px; color:#64748b; white-space:nowrap; }
.legend { display:flex; gap:6px; align-items:center; flex-wrap:wrap; }
.leg-dot { width:10px; height:10px; border-radius:50%; display:inline-block; }
.leg-bar {
  width:54px; height:8px; border-radius:4px; display:inline-block;
  background:linear-gradient(90deg,#facc15,#f59e0b,#f97316);
}
.leg-txt { font-size:10px; font-weight:600; color:#94a3b8; }
.sym-legend { padding-left:10px; margin-left:4px; border-left:1px solid #334155; gap:8px; }
.hint { margin-left:auto; font-size:11px; color:#334155; white-space:nowrap; }

/* â”€â”€ Controls bar â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
#controls {
  background:#16233b; min-height:40px; padding:6px 16px;
  display:flex; align-items:center; gap:10px; flex-shrink:0;
  border-bottom:1px solid #263045; flex-wrap:wrap;
}
#controls input[type=text], #controls select {
  background:#0f1f3d; color:var(--text); border:1px solid #1e3a5f;
  border-radius:5px; font-size:12px; padding:5px 8px;
  font-family:var(--sans); outline:none;
}
#controls input[type=text] { width:200px; }
#controls input[type=text]:focus, #controls select:focus { border-color:var(--accent); }
#controls select { max-width:260px; cursor:pointer; }
#controls .chk { font-size:12px; color:#94a3b8; display:flex; align-items:center; gap:5px; cursor:pointer; user-select:none; }
.btn {
  background:#1e293b; color:#cbd5e1; border:1px solid #334155;
  border-radius:5px; font-size:12px; padding:5px 12px; cursor:pointer;
}
.btn:hover { background:#263045; }
.pill {
  display:inline-flex; align-items:center; gap:7px;
  background:#172554; color:#93c5fd; border:1px solid #1e3a8a;
  border-radius:12px; font-size:11px; padding:3px 4px 3px 11px; cursor:pointer;
  max-width:280px;
}
.pill .lbl { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.pill .x { font-weight:700; padding:0 6px; border-radius:9px; }
.pill:hover .x { background:#1e3a8a; }

/* â”€â”€ Main layout â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
#main  { display:flex; flex:1; overflow:hidden; min-height:0; position:relative; }
#graph { flex:1; min-height:0; background:#f8fafc; }

/* â”€â”€ Project-stats overlay â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
#stats-panel {
  position:absolute; top:12px; left:12px; z-index:5;
  background:rgba(15,23,42,.9); border:1px solid #1e3a5f; border-radius:8px;
  padding:10px 12px; min-width:188px; backdrop-filter:blur(3px);
  font-size:11px; color:#cbd5e1; box-shadow:0 4px 16px rgba(0,0,0,.25);
}
#stats-panel h4 {
  font-size:10px; font-weight:700; letter-spacing:.08em; text-transform:uppercase;
  color:#64748b; margin-bottom:7px;
}
#stats-panel .row { display:flex; justify-content:space-between; gap:14px; line-height:1.7; }
#stats-panel .row .v { font-family:var(--mono); color:#f1f5f9; }
#stats-panel .v.done { color:var(--green); }
#stats-panel .v.work { color:var(--orange); }
#stats-panel .v.inf  { color:var(--red); }
#stats-panel .bar {
  height:6px; border-radius:3px; background:#1e293b; margin:7px 0 3px; overflow:hidden;
}
#stats-panel .bar > span { display:block; height:100%; background:var(--green); }
#stats-panel .sep { border-top:1px solid #1e3a5f; margin:7px 0; }
#graph canvas { display:block; }

/* â”€â”€ File-view colour legend â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
#file-legend {
  position:absolute; bottom:12px; left:12px; z-index:5;
  background:rgba(15,23,42,.9); border:1px solid #1e3a5f; border-radius:8px;
  padding:9px 11px; max-width:280px; max-height:42%; overflow-y:auto;
  backdrop-filter:blur(3px); font-size:11px; color:#cbd5e1;
  box-shadow:0 4px 16px rgba(0,0,0,.25);
}
#file-legend::-webkit-scrollbar { width:4px; }
#file-legend::-webkit-scrollbar-thumb { background:#1e3a5f; border-radius:2px; }
#file-legend h4 {
  font-size:10px; font-weight:700; letter-spacing:.08em; text-transform:uppercase;
  color:#64748b; margin-bottom:7px;
}
#file-legend .fl-row { display:flex; align-items:center; gap:7px; line-height:1.9; }
#file-legend .fl-sw { width:11px; height:11px; border-radius:3px; flex-shrink:0;
  border:1px solid rgba(255,255,255,.18); }
#file-legend .fl-name {
  font-family:var(--mono); font-size:10px; color:#cbd5e1;
  overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex:1;
}
#file-legend .fl-n { font-family:var(--mono); font-size:10px; color:#64748b; }
#file-legend .fl-empty { font-style:italic; color:#475569; }

/* â”€â”€ Sidebar â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
#sidebar {
  width:340px; flex-shrink:0;
  background:var(--sidebar-bg);
  border-left:1px solid #1e293b;
  display:flex; flex-direction:column; overflow:hidden;
}
#sidebar-empty {
  flex:1; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:10px;
}
#sidebar-empty svg { opacity:.2; }
#sidebar-empty p { font-size:13px; color:#334155; }
#sidebar-content {
  flex:1; overflow-y:auto; padding:10px;
  display:flex; flex-direction:column; gap:8px;
}
#sidebar-content::-webkit-scrollbar { width:4px; }
#sidebar-content::-webkit-scrollbar-thumb { background:#1e3a5f; border-radius:2px; }

/* â”€â”€ Cards â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
.card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius); padding:12px;
}
.card-title {
  font-size:10px; font-weight:700; letter-spacing:.08em;
  text-transform:uppercase; color:var(--muted); margin-bottom:10px;
}
.btn-focus {
  width:100%; margin-top:10px; background:#172554; color:#93c5fd;
  border:1px solid #1e3a8a; border-radius:5px; font-size:11px;
  font-weight:600; padding:7px; cursor:pointer; letter-spacing:.02em;
}
.btn-focus:hover { background:#1e3a8a; color:#bfdbfe; }

/* â”€â”€ Header card â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
.node-badges { display:flex; gap:5px; flex-wrap:wrap; margin-bottom:8px; }
.badge {
  display:inline-block; padding:2px 8px; border-radius:10px;
  font-size:10px; font-weight:700; letter-spacing:.04em;
}
.badge-type    { background:#172554; color:#93c5fd; border:1px solid #1e3a8a44; }
.badge-proved  { background:var(--green-bg);  color:var(--green);  border:1px solid rgba(74,222,128,.25); }
.badge-sorry   { background:var(--orange-bg); color:var(--orange); border:1px solid rgba(251,146,60,.25); }
.badge-unproved{ background:var(--red-bg);    color:var(--red);    border:1px solid rgba(248,113,113,.25); }
.node-title   { font-size:15px; font-weight:600; color:#f1f5f9; line-height:1.35; margin-bottom:5px; }
.node-id      { font-family:var(--mono); font-size:11px; color:#475569; }
.node-chapter { font-size:11px; color:#334155; margin-top:3px; }
.lean-ref     { font-size:11px; color:var(--muted); margin-top:6px; }
.lean-ref code{ font-family:var(--mono); color:var(--accent); }

/* â”€â”€ Structure card â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
.degrees { display:flex; gap:20px; margin-bottom:10px; }
.degree  { display:flex; flex-direction:column; align-items:center; gap:2px; }
.degree-val   { font-size:22px; font-weight:700; color:#f1f5f9; line-height:1; }
.degree-label { font-size:10px; color:var(--muted); text-align:center; }
.deps-list  { display:flex; flex-wrap:wrap; gap:4px; margin-bottom:8px; }
.deps-sub   { font-size:10px; color:var(--muted); margin:6px 0 4px; letter-spacing:.03em; }
.dep-chip {
  font-family:var(--mono); font-size:10px; padding:3px 7px;
  background:#0f1f3d; border:1px solid #1e3a5f;
  border-radius:4px; color:var(--accent); cursor:pointer; transition:background .15s;
}
.dep-chip:hover { background:#172554; }
.no-deps { font-size:12px; color:var(--muted); font-style:italic; }

/* â”€â”€ Metrics card â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
.metrics-grid {
  display:grid; grid-template-columns:auto 1fr 1fr;
  gap:5px 10px; align-items:center;
}
.col-head { font-size:10px; color:#334155; text-align:right; font-weight:600; }
.m-label  { font-size:11px; color:var(--muted); }
.m-val    { font-family:var(--mono); font-size:12px; color:#94a3b8; text-align:right; }
.m-done   { color:var(--green); font-weight:700; }
.m-inf    { color:var(--red);   font-weight:700; }
.m-work   { color:var(--orange); }

/* â”€â”€ Section header â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
.sec-hdr {
  display:flex; justify-content:space-between; align-items:baseline; margin-bottom:6px;
}
.chars-pair { font-family:var(--mono); font-size:10px; color:#334155; }
.chars-inf  { color:var(--red); }
.chars-val  { color:#475569; }

/* â”€â”€ LaTeX rendered block â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
.latex-rendered {
  font-family:var(--sans); font-size:13px; line-height:1.7;
  color:#94a3b8; overflow-x:auto; min-height:1.5em;
}
.latex-rendered .katex-display { margin:6px 0; overflow-x:auto; }
.latex-rendered em { font-style:italic; color:#cbd5e1; }
.latex-rendered strong { font-weight:600; color:#cbd5e1; }
.latex-rendered.empty { color:#1e3a5f; font-style:italic; }

/* â”€â”€ Lean code block â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
.code-block {
  font-family:var(--mono); font-size:11px; line-height:1.6;
  background:var(--code-bg); color:#abb2bf;
  border:1px solid #1a2744; border-radius:5px;
  padding:10px 12px; white-space:pre; overflow:auto;
  max-height:220px;
}
.code-block::-webkit-scrollbar { width:4px; height:4px; }
.code-block::-webkit-scrollbar-thumb { background:#1e3a5f; border-radius:2px; }
.code-block.empty { color:#1e3a5f; font-style:italic; white-space:normal; }

/* â”€â”€ Lean syntax colours (One Dark palette) â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
.hl-kw      { color:#c678dd; }
.hl-tactic  { color:#61afef; }
.hl-type    { color:#e5c07b; }
.hl-comment { color:#5c6370; font-style:italic; }
.hl-str     { color:#98c379; }
.hl-num     { color:#d19a66; }
</style>
</head>

<div id="controls">
  <input id="search" type="text" list="node-ids" placeholder="Search node idâ€¦" autocomplete="off" spellcheck="false">
  <datalist id="node-ids"></datalist>
  <select id="nodeset" title="Which declarations to include">
    <option value="union">All declarations</option>
    <option value="blueprint">Blueprint only</option>
    <option value="lean">Lean only</option>
  </select>
  <select id="component"><option value="">All components</option></select>
  <select id="chapter"><option value="">All chapters</option></select>
  <select id="fileview" title="Tint the background by source file">

        <line x1="9" y1="9" x2="15" y2="9"/><line x1="9" y1="13" x2="13" y2="13"/>
      </svg>
      <p>Click a node to inspect it</p>
    </div>
    <div id="sidebar-content" style="display:none"></div>
  </aside>
</div>

const allNodes  = {"def:variety": {"id": "def:variety", "type": "definition", "title": "Variety", "chapter": "Conventions", "statement": "\\textit{Source: Ancona, arXiv:1806.03216, Â§2.}\n  Fix a base field \\(k\\). A \\emph{variety} over \\(k\\) is a smooth, projective and\n  geometrically connected scheme over \\(k\\).", "uses": [], "lean_name": "MR4199442StandardConjecturesForAbelianFourfolds.Variety", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/conventions.tex", "lean_file": "", "dep_count": 0, "rdep_count": 1, "descendant_count": 76, "proof_size_tex": null, "effort_local": 173, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 173}, "def:chow-motives": {"id": "def:chow-motives", "type": "definition", "title": "Chow motives", "chapter": "Conventions", "statement": "\\textit{Source: Ancona, arXiv:1806.03216, Â§2.}\n  Let \\(k\\) be a base field and let \\(F\\) be a field of coefficients of\n  characteristic zero. We denote by \\(\\CHM(k)_{F}\\) the category of \\emph{Chow\n  motives} over \\(k\\) with coefficients in \\(F\\) (the subscript \\(F\\) may be\n  omitted). The motive functor\n  \\[\\hh : \\Var_k \\longrightarrow \\CHM(k)_{F}^{\\op}\\]\n  associates to each variety its motive. The same notation \\(\\hh(X)\\) is used for\n  the image of \\(X\\) in the associated categories of \\emph{homological} and\n  \\emph{numerical} motives. One also works with \\emph{relative motives}: the\n  relative base is always the ring of integers \\(W\\) of a \\(p\\)-adic field, and\n  Chow motives over \\(W\\) are denoted \\(\\CHM(W)\\).", "uses": ["def:variety"], "lean_name": "MR4199442StandardConjecturesForAbelianFourfolds.ChowMotives", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/conventions.tex", "lean_file": "", "dep_count": 1, "rdep_count": 7, "descendant_count": 75, "proof_size_tex": null, "effort_local": 724, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 897}, "def:num-motives": {"id": "def:num-motives", "type": "definition", "title": "Numerical motives", "chapter": "Conventions", "statement": "\\textit{Source: Ancona, arXiv:1806.03216, Â§2.}\n  For a base field \\(k\\) and a coefficient field \\(F\\) of characteristic zero,\n  \\(\\NUM(k)_F\\) denotes the category of \\emph{numerical motives} over \\(k\\) with\n  coefficients in \\(F\\): the quotient of the homological category in which\n  morphisms are taken modulo numerical equivalence. The motive of a variety\n  \\(X\\) is still written \\(\\hh(X)\\).", "uses": ["def:chow-motives"], "lean_name": "MR4199442StandardConjecturesForAbelianFourfolds.NumericalMotives", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/conventions.tex", "lean_file": "", "dep_count": 1, "rdep_count": 3, "descendant_count": 59, "proof_size_tex": null, "effort_local": 394, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 1291}, "def:realizations": {"id": "def:realizations", "type": "definition", "title": "Classical realizations", "chapter": "Conventions", "statement": "\\textit{Source: Ancona, arXiv:1806.03216, Â§2.}\n  The \\emph{classical realizations} are the following functors into graded vector\n  spaces:\n  \\begin{itemize}\n    \\item Betti realization \\(R_B : \\CHM(\\C)_{\\Q} \\to \\GrVec_\\Q\\);\n    \\item \\(\\ell\\)-adic realization (\\(\\ell\\) invertible in \\(k\\))\n      \\(R_\\ell : \\CHM(k)_{\\Q} \\to \\GrVec_{\\Q_\\ell}\\);\n    \\item de Rham realization (\\(k\\) of characteristic zero)\n      \\(R_\\dR : \\CHM(k)_{\\Q} \\to \\GrVec_{k}\\);\n    \\item crystalline realization (\\(k\\) perfect of positive characteristic)\n      \\(R_\\crys : \\CHM(k)_{\\Q} \\to \\GrVec_{\\Frac(W(k))}\\).\n  \\end{itemize}\n  In their enriched form these functors land in Hodge structures (\\(R_B\\)),\n  Galois representations (\\(R_\\ell\\)), filtered vector spaces (\\(R_\\dR\\)) and\n  spaces with an absolute Frobenius action (\\(R_\\crys\\)).", "uses": ["def:chow-motives"], "lean_name": "MR4199442StandardConjecturesForAbelianFourfolds.ClassicalRealizations", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/conventions.tex", "lean_file": "", "dep_count": 1, "rdep_count": 6, "descendant_count": 40, "proof_size_tex": null, "effort_local": 816, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 1713}, "def:filtered-phi-modules": {"id": "def:filtered-phi-modules", "type": "definition", "title": "Admissible filtered $\\varphi$-modules", "chapter": "Conventions", "statement": "\\textit{Source: Ancona, arXiv:1806.03216, Â§2.}\n  Let \\(W\\) be the ring of integers of a \\(p\\)-adic field \\(K\\) with residue\n  field \\(k\\), so that \\(\\Frac(W(k))\\) is the maximal unramified subfield of\n  \\(K\\). We denote by \\(\\MOD\\) the category of \\emph{admissible filtered\n  \\(\\varphi\\)-modules}. An object of \\(\\MOD\\) is, in particular, a\n  finite-dimensional \\(\\Frac(W(k))\\)-vector space \\(V\\), together with a\n  decreasing filtration \\(\\Fil^*\\) on \\(V \\otimes_{\\Frac(W(k))} K\\) and a\n  \\((\\Frac(W(k))/\\Q_p)\\)-semilinear endomorphism \\(\\varphi\\) of \\(V\\) (the\n  absolute Frobenius), satisfying compatibilities between \\(\\Fil^*\\) and\n  \\(\\varphi\\).", "uses": [], "lean_name": "MR4199442StandardConjecturesForAbelianFourfolds.FilteredPhiModules", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/conventions.tex", "lean_file": "", "dep_count": 0, "rdep_count": 4, "descendant_count": 41, "proof_size_tex": null, "effort_local": 650, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 650}, "def:hyodo-kato": {"id": "def:hyodo-kato", "type": "definition", "title": "Hyodo--Kato realization", "chapter": "Conventions", "statement": "\\textit{Source: Ancona, arXiv:1806.03216, Â§2.}\n  There is a \\emph{Hyodo--Kato} realization functor\n  \\[R_{\\HK} : \\CHM(W) \\longrightarrow \\MOD\\]\n  interpolating the de Rham and crystalline realizations: forgetting the absolute\n  Frobenius recovers the de Rham realization of the generic fiber,\n  \\(R_{\\HK}(\\cdot) \\otimes K = R_\\dR(\\cdot_{|K})\\), while forgetting the\n  filtration recovers the crystalline realization of the special fiber,\n  \\(R_{\\HK}(\\cdot) = R_\\crys(\\cdot_{|k})\\).", "uses": ["def:filtered-phi-modules", "def:realizations"], "lean_name": "MR4199442StandardConjecturesForAbelianFourfolds.HyodoKatoRealization", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/conventions.tex", "lean_file": "", "dep_count": 2, "rdep_count": 3, "descendant_count": 34, "proof_size_tex": null, "effort_local": 481, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 2844}, "def:unit-object": {"id": "def:unit-object", "type": "definition", "title": "Unit object", "chapter": "Conventions", "statement": "\\textit{Source: Ancona, arXiv:1806.03216, Â§2.}\n  The \\emph{unit object} in any of the above categories of motives (Chow,\n  homological or numerical) over a base \\(S\\) is the motive of \\(S\\),\n  \\[\\one \\coloneqq \\hh(S).\\]\n  When \\(S = \\Spec(k)\\) one has the identification \\(\\End(\\one) = \\Q\\).", "uses": ["def:chow-motives"], "lean_name": "MR4199442StandardConjecturesForAbelianFourfolds.UnitMotive", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/conventions.tex", "lean_file": "", "dep_count": 1, "rdep_count": 1, "descendant_count": 58, "proof_size_tex": null, "effort_local": 291, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 1188}, "def:algebraic-class": {"id": "def:algebraic-class", "type": "definition", "title": "Algebraic class", "chapter": "Conventions", "statement": "\\textit{Source: Ancona, arXiv:1806.03216, Â§2.}\n  An \\emph{algebraic class} of a motive \\(T\\) is a morphism\n  \\[\\alpha \\in \\Hom(\\one, T).\\]\n  Its realization is the map \\(R(\\alpha) : F \\to R(T)\\), where \\(F\\) is the\n  coefficient field of the realization; \\(R(\\alpha)\\) is determined by its value\n  \\(R(\\alpha)(1) \\in R(T)\\), which is called an algebraic class of the cohomology\n  group \\(R(T)\\) (and, by abuse, of the motive \\(T\\)). One may ignore Tate twists\n  and say \\(T\\) has algebraic classes when \\(T(n)\\) does.", "uses": ["def:unit-object"], "lean_name": "MR4199442StandardConjecturesForAbelianFourfolds.AlgebraicClass", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/conventions.tex", "lean_file": "", "dep_count": 1, "rdep_count": 2, "descendant_count": 57, "proof_size_tex": null, "effort_local": 517, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 1705}, "def:num-equiv": {"id": "def:num-equiv", "type": "definition", "title": "Numerical equivalence", "chapter": "Conventions", "statement": "\\textit{Source: Ancona, arXiv:1806.03216, Â§2.}\n  An algebraic class \\(\\alpha\\) of a motive \\(T\\) is \\emph{numerically trivial}\n  if \\(\\beta \\circ \\alpha = 0\\) for every \\(\\beta \\in \\Hom(T, \\one)\\). Two\n  algebraic classes are \\emph{numerically equivalent} if their difference is\n  numerically trivial. This recovers the classical notion of numerical\n  equivalence.", "uses": ["def:algebraic-class"], "lean_name": "MR4199442StandardConjecturesForAbelianFourfolds.NumericallyEquivalent", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/conventions.tex", "lean_file": "", "dep_count": 1, "rdep_count": 4, "descendant_count": 56, "proof_size_tex": null, "effort_local": 364, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 2069}, "def:num-cycles": {"id": "def:num-cycles", "type": "definition", "title": "Spaces of algebraic cycles", "chapter": "Conventions", "statement": "\\textit{Source: Ancona, arXiv:1806.03216, Â§2.}\n  Let \\(X\\) be a variety. The space of algebraic cycles on \\(X\\) with coefficients\n  in \\(F\\) modulo numerical equivalence is\n  \\[\\mathcal{Z}^{n}_{\\num}(X)_{F} = \\Hom_{\\NUM(k)_F}\\bigl(\\one, \\hh(X)(n)\\bigr),\\]\n  a finite-dimensional \\(F\\)-vector space whose dimension is denoted \\(\\rho_n\\).\n  Analogously, for a fixed Weil cohomology, \\(\\mathcal{Z}^{n}_{\\hom}(X)_{F}\\)\n  denotes the space of algebraic cycles on \\(X\\) with coefficients in \\(F\\)\n  modulo homological equivalence.", "uses": ["def:num-motives", "def:num-equiv", "def:algebraic-class"], "lean_name": "MR4199442StandardConjecturesForAbelianFourfolds.NumericalCycles", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/conventions.tex", "lean_file": "", "dep_count": 3, "rdep_count": 7, "descendant_count": 55, "proof_size_tex": null, "effort_local": 524, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 2987}, "conj:kunneth": {"id": "conj:kunneth", "type": "conjecture", "title": "Standard conjecture of K\\\"unneth type", "chapter": "Standard conjecture of Hodge type", "statement": "\\textit{Source: Ancona, arXiv:1806.03216, Â§3.}\n  There exists a decomposition\n  \\[\\hh(X) = \\bigoplus_{n=0}^{2d} \\hh^n(X)\\]\n  in homological motives such that \\(R(\\hh^n(X)) = H^n(X)\\) for every \\(n\\), and\n  such that the duality\n  \\[\\hh^n(X) = \\hh^{2d-n}(X)^{\\vee}(-d)\\]\n  holds. This is a classical conjecture and is assumed in what follows.", "uses": [], "lean_name": "MR4199442StandardConjecturesForAbelianFourfolds.KunnethConjecture", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/hodge_type.tex", "lean_file": "", "dep_count": 0, "rdep_count": 1, "descendant_count": 46, "proof_size_tex": null, "effort_local": 341, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 341}, "conj:lefschetz": {"id": "conj:lefschetz", "type": "conjecture", "title": "Standard conjecture of Lefschetz type", "chapter": "Standard conjecture of Hodge type", "statement": "\\textit{Source: Ancona, arXiv:1806.03216, Â§3.}\n  For all \\(n \\leq d\\), cup product with \\(L^{d-n}\\) induces a canonical\n  isomorphism\n  \\[\\hh^n(X) \\cong \\hh^{2d-n}(X)(d-n).\\]\n  Moreover, the K\\\"unneth decomposition of \\cref{conj:kunneth} refines to a\n  primitive Lefschetz decomposition\n  \\[\\hh^n(X) = \\hh^{n,\\prim}(X) \\oplus \\hh^{n-2}(X)(-1)\\]\n  which realizes to the primitive decomposition of \\(H^n(X)\\). This is a\n  classical conjecture and is assumed in what follows.", "uses": [], "lean_name": "MR4199442StandardConjecturesForAbelianFourfolds.LefschetzConjecture", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/hodge_type.tex", "lean_file": "", "dep_count": 0, "rdep_count": 2, "descendant_count": 46, "proof_size_tex": null, "effort_local": 472, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 472}, "ass:kun-lef": {"id": "ass:kun-lef", "type": "definition", "title": "Assumption: K\\\"unneth and Lefschetz", "chapter": "Standard conjecture of Hodge type", "statement": "\\textit{Source: Ancona, arXiv:1806.03216, Â§3.}\n  We say that \\(X\\) satisfies the \\emph{K\\\"unneth--Lefschetz assumption} if it\n  verifies both the standard conjecture of K\\\"unneth type (\\cref{conj:kunneth})\n  and the standard conjecture of Lefschetz type (\\cref{conj:lefschetz}). This\n  assumption is satisfied in particular by abelian varieties, and is in force\n  throughout the chapter.", "uses": ["conj:kunneth", "conj:lefschetz"], "lean_name": "MR4199442StandardConjecturesForAbelianFourfolds.KunnethLefschetzAssumption", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/hodge_type.tex", "lean_file": "", "dep_count": 2, "rdep_count": 2, "descendant_count": 45, "proof_size_tex": null, "effort_local": 387, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 1200}, "def:pairing-mot": {"id": "def:pairing-mot", "type": "definition", "title": "Motivic pairing", "chapter": "Standard conjecture of Hodge type", "statement": "\\textit{Source: Ancona, arXiv:1806.03216, Â§3.}\n  For \\(n \\leq d\\) the \\emph{motivic pairing}\n  \\[\\langle \\cdot, \\cdot \\rangle_{n,\\mathrm{mot}} : \\hh^n(X) \\otimes \\hh^{n}(X)\n    \\longrightarrow \\one(-n)\\]\n  is defined recursively on \\(n\\) by modifying the adjunction pairing \\(q_n\\) of\n  the previous remark, as follows:\n  \\begin{itemize}\n    \\item the Lefschetz decomposition\n      \\(\\hh^{n}(X) = \\hh^{n,\\prim}(X) \\oplus \\hh^{n-2}(X)(-1)\\) is required to be\n      orthogonal;\n    \\item on the summand \\(\\hh^{n-2}(X)(-1)\\) one imposes the equality\n      \\(\\langle \\cdot, \\cdot \\rangle_{n,\\mathrm{mot}} =\n      \\langle \\cdot, \\cdot \\rangle_{n-2,\\mathrm{mot}}(-2)\\);\n    \\item on the primitive part \\(\\hh^{n,\\prim}(X)\\) one sets\n      \\(\\langle \\cdot, \\cdot \\rangle_{n,\\mathrm{mot}} = (-1)^{n(n+1)/2} q_n\\).\n  \\end{itemize}", "uses": ["ass:kun-lef", "def:chow-motives"], "lean_name": "MR4199442StandardConjecturesForAbelianFourfolds.motivicPairing", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/hodge_type.tex", "lean_file": "", "dep_count": 2, "rdep_count": 3, "descendant_count": 44, "proof_size_tex": null, "effort_local": 820, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 2917}, "def:primitive-pairing": {"id": "def:primitive-pairing", "type": "definition", "title": "Primitive pairing on numerical cycles", "chapter": "Standard conjecture of Hodge type", "statement": "\\textit{Source: Ancona, arXiv:1806.03216, Â§3.}\n  Fix \\(n \\leq d/2\\). For\n  \\(\\alpha, \\beta \\in \\mathcal{Z}^{n}_{\\hom}(X)_{\\Q} =\n  \\Hom(\\one, \\hh^{2n}(X)(n))\\), form\n  \\(\\alpha \\otimes \\beta \\in\n  \\Hom(\\one, \\hh^{2n}(X) \\otimes \\hh^{2n}(X)(2n))\\) and define\n  \\[\\langle \\alpha, \\beta \\rangle_{n} =\n    \\langle \\cdot, \\cdot \\rangle_{2n,\\mathrm{mot}}(2n) \\circ (\\alpha \\otimes \\beta)\n    \\;\\in\\; \\Q = \\End(\\one).\\]\n  The \\emph{space of primitive numerical cycles} is the subspace\n  \\[\\mathcal{Z}^{n,\\prim}_{\\num}(X)_{\\Q} =\n    \\Hom_{\\NUM(k)_\\Q}\\bigl(\\one, \\hh^{2n,\\prim}(X)(n)\\bigr)\n    \\subset \\mathcal{Z}^{n}_{\\num}(X)_{\\Q},\\]\n  on which \\(\\langle \\cdot, \\cdot \\rangle_{n}\\) induces a pairing\n  \\[\\langle \\cdot, \\cdot \\rangle_{n} :\n    \\mathcal{Z}^{n,\\prim}_{\\num}(X)_{\\Q} \\times\n    \\mathcal{Z}^{n,\\prim}_{\\num}(X)_{\\Q} \\longrightarrow \\Q.\\]\n  This admits the equivalent elementary description\n  \\[\\mathcal{Z}^{n,\\prim}_{\\num}(X)_{\\Q} =\n    \\{\\alpha \\in \\mathcal{Z}^{n}_{\\num}(X)_{\\Q} :\n    \\alpha \\cdot L^{d-2n+1} = 0 \\text{ in } \\mathcal{Z}^{d-n+1}_{\\num}(X)_{\\Q}\\},\\]\n  and for \\(\\alpha, \\beta \\in \\mathcal{Z}^{n,\\prim}_{\\num}(X)_{\\Q}\\) one has\n  \\[\\langle \\alpha, \\beta \\rangle_{n} = (-1)^n\\, \\alpha \\cdot \\beta \\cdot L^{d-2n}.\\]", "uses": ["def:pairing-mot", "def:num-cycles"], "lean_name": "MR4199442StandardConjecturesForAbelianFourfolds.primitivePairing", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/hodge_type.tex", "lean_file": "", "dep_count": 2, "rdep_count": 4, "descendant_count": 10, "proof_size_tex": null, "effort_local": 1233, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 6240}, "conj:hodge-type": {"id": "conj:hodge-type", "type": "conjecture", "title": "Standard conjecture of Hodge type", "chapter": "Standard conjecture of Hodge type", "statement": "\\textit{Source: Ancona, arXiv:1806.03216, Â§3.}\n  For all \\(n \\leq d/2\\), the pairing\n  \\[\\langle \\cdot, \\cdot \\rangle_{n} :\n    \\mathcal{Z}^{n,\\prim}_{\\num}(X)_{\\Q} \\times\n    \\mathcal{Z}^{n,\\prim}_{\\num}(X)_{\\Q} \\longrightarrow \\Q\\]\n  of \\cref{def:primitive-pairing} is positive definite.", "uses": ["def:primitive-pairing"], "lean_name": "MR4199442StandardConjecturesForAbelianFourfolds.HodgeTypeConjecture", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/hodge_type.tex", "lean_file": "", "dep_count": 1, "rdep_count": 2, "descendant_count": 4, "proof_size_tex": null, "effort_local": 289, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 6529}, "prop:ker-pairing": {"id": "prop:ker-pairing", "type": "proposition", "title": "Kernel of the pairing", "chapter": "Standard conjecture of Hodge type", "statement": "\\textit{Source: Ancona, arXiv:1806.03216, Â§3.}\n  The kernel of the pairing \\(\\langle \\cdot, \\cdot \\rangle_{n}\\) on the vector\n  space \\(\\mathcal{Z}_{\\hom}^{n}(X)_{\\Q}\\) is exactly the space of algebraic\n  classes that are numerically trivial. The analogous statement holds for\n  \\(\\mathcal{Z}_{\\hom}^{n,\\prim}(X)_{\\Q}\\).", "uses": ["def:primitive-pairing", "def:num-equiv"], "lean_name": "MR4199442StandardConjecturesForAbelianFourfolds.kernel_pairing_eq_num_trivial", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:primitive-pairing, def:num-equiv}\n  This follows from a general fact. Let \\(T\\) be a homological motive endowed\n  with an isomorphism \\(f : T \\cong T^\\vee\\), and let\n  \\(q : T \\otimes T \\to \\one\\) be the pairing it induces by adjunction. As in\n  \\cref{def:primitive-pairing}, \\(q\\) induces a pairing\n  \\(\\langle \\cdot, \\cdot \\rangle\\) on \\(\\Hom(\\one, T)\\), which admits the\n  description\n  \\[\\langle \\alpha, \\beta \\rangle = \\alpha^\\vee \\circ f \\circ \\beta.\\]\n  This equality holds for formal reasons in any rigid category (and, for\n  homological motives, may be checked after realization). Hence \\(\\beta\\) lies in\n  the kernel if and only if \\((\\alpha^\\vee \\circ f) \\circ \\beta = 0\\) for all\n  \\(\\alpha\\); since \\(f\\) is an isomorphism, this is equivalent to\n  \\(\\gamma \\circ \\beta = 0\\) for all \\(\\gamma \\in \\Hom(T, \\one)\\), i.e. \\(\\beta\\)\n  is numerically trivial. Applying this to \\(T = \\hh^{2n}(X)(n)\\) and to\n  \\(T = \\hh^{2n,\\prim}(X)(n)\\) gives both statements.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/hodge_type.tex", "lean_file": "", "dep_count": 2, "rdep_count": 2, "descendant_count": 5, "proof_size_tex": 977, "effort_local": 977, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 7217}, "cor:semipos": {"id": "cor:semipos", "type": "corollary", "title": "Perfectness and semipositivity", "chapter": "Standard conjecture of Hodge type", "statement": "\\textit{Source: Ancona, arXiv:1806.03216, Â§3.}\n  The pairing \\(\\langle \\cdot, \\cdot \\rangle_{n}\\) is perfect on\n  \\(\\mathcal{Z}_{\\num}^{n}(X)_{\\Q}\\). Moreover it is positive definite on\n  \\(\\mathcal{Z}_{\\num}^{n}(X)_{\\Q}\\) if and only if it is positive semidefinite\n  on \\(\\mathcal{Z}_{\\hom}^{n}(X)_{\\Q}\\). The analogous statements hold for\n  \\(\\mathcal{Z}_{\\num}^{n,\\prim}(X)_{\\Q}\\).", "uses": ["prop:ker-pairing"], "lean_name": "MR4199442StandardConjecturesForAbelianFourfolds.pairing_perfect_and_semipos", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{prop:ker-pairing}\n  By \\cref{prop:ker-pairing} the kernel of \\(\\langle \\cdot, \\cdot \\rangle_{n}\\)\n  on \\(\\mathcal{Z}_{\\hom}^{n}(X)_{\\Q}\\) is precisely the space of numerically\n  trivial classes. The numerical space \\(\\mathcal{Z}_{\\num}^{n}(X)_{\\Q}\\) is the\n  quotient of \\(\\mathcal{Z}_{\\hom}^{n}(X)_{\\Q}\\) by that kernel, so the induced\n  pairing on \\(\\mathcal{Z}_{\\num}^{n}(X)_{\\Q}\\) has trivial kernel, i.e. is\n  perfect. Since a symmetric form that is positive semidefinite descends to a\n  positive definite form precisely on the quotient by its kernel, positive\n  semidefiniteness on \\(\\mathcal{Z}_{\\hom}^{n}(X)_{\\Q}\\) is equivalent to\n  positive definiteness on \\(\\mathcal{Z}_{\\num}^{n}(X)_{\\Q}\\). The same argument\n  applies verbatim with \\(\\hh^{2n}(X)(n)\\) replaced by \\(\\hh^{2n,\\prim}(X)(n)\\),\n  giving the primitive statements.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/hodge_type.tex", "lean_file": "", "dep_count": 1, "rdep_count": 1, "descendant_count": 4, "proof_size_tex": 842, "effort_local": 842, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 8059}, "thm:segre": {"id": "thm:segre", "type": "theorem", "title": "Divisor case, Segre--Bronowski", "chapter": "Standard conjecture of Hodge type", "statement": "\\textit{Source: Ancona, arXiv:1806.03216, Â§3.}\n  The pairing \\(\\langle \\cdot, \\cdot \\rangle_{1}\\) on\n  \\(\\mathcal{Z}_{\\num}^{1}(X)_{\\Q}\\) is positive definite. Equivalently, the\n  pairing\n  \\[\\mathcal{Z}^1_{\\num}(X)_{\\Q} \\times \\mathcal{Z}_{\\num}^1(X)_{\\Q}\n    \\longrightarrow \\Q, \\qquad (D, D') \\mapsto D \\cdot D' \\cdot L^{d-2}\\]\n  has signature \\((s_+; s_-) = (1; \\rho_1 - 1)\\), where\n  \\(\\rho_1 = \\dim \\mathcal{Z}_{\\num}^1(X)_{\\Q}\\).", "uses": ["def:primitive-pairing"], "lean_name": "MR4199442StandardConjecturesForAbelianFourfolds.segre_divisor_positive_definite", "proved": false, "mathlib_ok": false, "proof_tex": "\n  This is the classical Hodge index theorem for divisors (Segre--Bronowski). It\n  is the only previously known case of the standard conjecture of Hodge type in\n  positive characteristic, and we cite it as a known input (AndrÃ©,\n  \\emph{Une introduction aux motifs}, 5.3.2.3). No proof is reproduced here.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/hodge_type.tex", "lean_file": "", "dep_count": 1, "rdep_count": 2, "descendant_count": 5, "proof_size_tex": 301, "effort_local": 301, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 6541}, "prop:any-polarization": {"id": "prop:any-polarization", "type": "proposition", "title": "Equivalent signature formulation for fourfolds", "chapter": "Standard conjecture of Hodge type", "statement": "\\textit{Source: Ancona, arXiv:1806.03216, Â§3.}\n  For a fourfold \\(X\\), the standard conjecture of Hodge type\n  (\\cref{conj:hodge-type}) is equivalent to the assertion that the intersection\n  product\n  \\[\\mathcal{Z}^2_{\\num}(X)_{\\Q} \\times \\mathcal{Z}_{\\num}^2(X)_{\\Q}\n    \\longrightarrow \\Q\\]\n  has signature \\((s_+; s_-) = (\\rho_2 - \\rho_1 + 1; \\rho_1 - 1)\\), where\n  \\(\\rho_n = \\dim \\mathcal{Z}_{\\num}^n(X)_{\\Q}\\). In particular the conjecture is\n  independent of the chosen ample divisor \\(L\\).", "uses": ["thm:segre", "conj:hodge-type", "def:primitive-pairing"], "lean_name": "MR4199442StandardConjecturesForAbelianFourfolds.hodge_type_iff_signature", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{thm:segre, def:primitive-pairing}\n  By \\cref{thm:segre} the standard conjecture of Hodge type holds for divisors,\n  so it remains to study codimension-two cycles. The Lefschetz decomposition\n  \\(\\hh^{4}(X) = \\hh^{4,\\prim}(X) \\oplus \\hh^{2}(X)(-1)\\) induces a decomposition\n  \\[\\mathcal{Z}^{2}_{\\num}(X)_{\\Q} =\n    \\mathcal{Z}^{2,\\prim}_{\\num}(X)_{\\Q} \\oplus L \\cdot \\mathcal{Z}^{1}_{\\num}(X)_{\\Q},\\]\n  orthogonal for the intersection product because the Lefschetz decomposition is\n  orthogonal for the cup product already at the homological level.\n\n  We claim the intersection product on \\(L \\cdot \\mathcal{Z}^{1}_{\\num}(X)_{\\Q}\\)\n  has signature \\((1; \\rho_1 - 1)\\). Granting the claim, the intersection product\n  is positive definite on \\(\\mathcal{Z}^{2,\\prim}_{\\num}(X)_{\\Q}\\) if and only if\n  the intersection product on the total space \\(\\mathcal{Z}^2_{\\num}(X)_{\\Q}\\) has\n  the predicted signature \\((\\rho_2 - \\rho_1 + 1; \\rho_1 - 1)\\); and positive\n  definiteness on the primitive part is exactly the standard conjecture of Hodge\n  type for \\(X\\) in codimension two (via \\cref{def:primitive-pairing}, noting\n  \\(\\langle \\alpha, \\beta \\rangle_2 = \\alpha \\cdot \\beta\\) on the primitive part\n  of a fourfold, \\(d - 2n = 0\\)). For the claim, an element\n  \\(\\alpha = L \\cdot D \\in L \\cdot \\mathcal{Z}^{1}_{\\num}(X)_{\\Q}\\) satisfies\n  \\(\\alpha \\cdot \\alpha = D \\cdot D \\cdot L^2\\), so the claim follows from\n  \\cref{thm:segre}. Since the formulation refers only to the intersection product\n  on \\(\\mathcal{Z}^2_{\\num}(X)_{\\Q}\\), it does not depend on \\(L\\).\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/hodge_type.tex", "lean_file": "", "dep_count": 3, "rdep_count": 1, "descendant_count": 3, "proof_size_tex": 1564, "effort_local": 1564, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 8394}, "prop:reduce-finite": {"id": "prop:reduce-finite", "type": "proposition", "title": "Reduction to a finite field", "chapter": "Standard conjecture of Hodge type", "statement": "\\textit{Source: Ancona, arXiv:1806.03216, Â§3.}\n  Let \\(X_0\\) be a specialization of \\(X\\), and suppose \\(X_0\\) also satisfies\n  \\cref{ass:kun-lef} (with respect to the specialization of \\(L\\)). Then the\n  standard conjecture of Hodge type for \\(X_0\\) implies the standard conjecture of\n  Hodge type for \\(X\\). In particular the conjecture reduces to varieties defined\n  over a finite field.", "uses": ["cor:semipos", "ass:kun-lef"], "lean_name": "MR4199442StandardConjecturesForAbelianFourfolds.reduce_to_finite_field", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{cor:semipos}\n  Smooth proper base change in \\(\\ell\\)-adic cohomology gives a canonical\n  inclusion\n  \\(\\mathcal{Z}_{\\hom}^{n,\\prim}(X)_{\\Q} \\subset\n  \\mathcal{Z}_{\\hom}^{n,\\prim}(X_0)_{\\Q}\\). Hence if\n  \\(\\langle \\cdot, \\cdot \\rangle_{n}\\) is positive semidefinite on\n  \\(\\mathcal{Z}_{\\hom}^{n,\\prim}(X_0)_{\\Q}\\) it is positive semidefinite on the\n  subspace \\(\\mathcal{Z}_{\\hom}^{n,\\prim}(X)_{\\Q}\\). By \\cref{cor:semipos} this\n  semipositivity is equivalent to the standard conjecture of Hodge type, so the\n  conjecture passes from \\(X_0\\) to \\(X\\).\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/hodge_type.tex", "lean_file": "", "dep_count": 2, "rdep_count": 1, "descendant_count": 3, "proof_size_tex": 556, "effort_local": 556, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 8615}, "thm:scht": {"id": "thm:scht", "type": "theorem", "title": "Standard conjecture of Hodge type for abelian fourfolds", "chapter": "Standard conjecture of Hodge type", "statement": "\\textit{Source: Ancona, arXiv:1806.03216, Â§3.}\n  The standard conjecture of Hodge type (\\cref{conj:hodge-type}) holds for abelian\n  fourfolds in positive characteristic.", "uses": ["conj:hodge-type", "prop:reduce-finite", "prop:exotic-dim2", "thm:honda-tate", "prop:any-polarization", "cor:cm-stable", "lem:lefschetz-pairings", "prop:scht-lefschetz", "prop:factor-algebraic", "cor:lifting-motives", "thm:mainthm"], "lean_name": "MR4199442StandardConjecturesForAbelianFourfolds.standardConjectureHodgeType_abelianFourfold", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{prop:reduce-finite, prop:exotic-dim2, thm:honda-tate, prop:any-polarization, cor:cm-stable, lem:lefschetz-pairings, prop:scht-lefschetz, prop:factor-algebraic, cor:lifting-motives, thm:mainthm}\n  Let \\(A\\) be an abelian fourfold and \\(L\\) a hyperplane section. By\n  \\cref{prop:reduce-finite} we may assume \\(A\\) and \\(L\\) are defined over a\n  finite field \\(k = \\F_q\\); to prove the theorem we are free to replace \\(k\\) by\n  a finite extension.\n\n  Among the factors of the canonical decomposition of \\(\\hh^4(A)\\), consider\n  those that are \\emph{exotic}. There exist a finite extension \\(k'\\) of \\(k\\)\n  and a CM-structure for \\(A \\times_k k'\\) such that every exotic motive of\n  \\(\\hh^{4}(A \\times_k k')\\) has dimension two (\\cref{prop:exotic-dim2}). By\n  \\cref{thm:honda-tate} this CM-structure lifts to characteristic zero. By\n  \\cref{prop:any-polarization} it is enough to work with a single \\(L\\) for a\n  given abelian fourfold, and by \\cref{cor:cm-stable} we may choose \\(L\\) so that\n  it lifts to characteristic zero and the CM-structure is \\(*\\)-stable.\n\n  By \\cref{lem:lefschetz-pairings} we may replace the pairing\n  \\(\\langle \\cdot, \\cdot \\rangle_{4,\\mathrm{mot}}\\) by\n  \\(\\langle \\cdot, \\cdot \\rangle_{1,\\mathrm{mot}}^{\\otimes 4}\\); for the latter\n  the CM-decomposition is orthogonal, so we may work with a single factor of the\n  decomposition. By \\cref{prop:scht-lefschetz} and \\cref{prop:factor-algebraic}\n  the Lefschetz factors are disposed of, reducing us to the exotic factors.\n\n  Finally, each exotic factor \\(\\mathcal{M}_I\\) is settled by\n  \\cref{thm:mainthm} applied with \\(M = \\mathcal{M}_I(2)\\). All hypotheses of\n  \\cref{thm:mainthm} hold: the motive lives in mixed characteristic\n  (\\cref{cor:lifting-motives}), together with its quadratic form (because \\(L\\)\n  lifts to characteristic zero); the Betti space is two-dimensional, and so is the\n  space of numerical cycles by \\cref{prop:factor-algebraic}; and the quadratic\n  form \\(q_B = R_B(\\langle \\cdot, \\cdot \\rangle_{1,\\mathrm{mot}}^{\\otimes 4})\\) is\n  a polarization since \\(R_B(\\langle \\cdot, \\cdot \\rangle_{1,\\mathrm{mot}})\\) is.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/hodge_type.tex", "lean_file": "", "dep_count": 11, "rdep_count": 1, "descendant_count": 2, "proof_size_tex": 2118, "effort_local": 2118, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 68761}, "thm:classic-motive": {"id": "thm:classic-motive", "type": "theorem", "title": "Motive of an abelian variety", "chapter": "The motive of an abelian variety", "statement": "\\textit{Source: Ancona, arXiv:1806.03216, Â§4.}\n  Let \\(A\\) be an abelian variety of dimension \\(g\\), with endomorphism ring\n  \\(\\End(A)\\) and motive \\(\\hh(A) \\in \\CHM(k)_{F}\\). Then:\n  \\begin{enumerate}\n    \\item (Deninger--Murre) The motive \\(\\hh(A)\\) admits a Chow--K\\\"unneth\n      decomposition\n      \\[\\hh(A) = \\bigoplus_{n=0}^{2g} \\hh^n(A),\\]\n      natural in \\(\\End(A)\\) and satisfying \\(R(\\hh^n(A)) = H^n(A)\\).\n    \\item (K\\\"unnemann) The intersection product induces a canonical isomorphism\n      of graded algebras\n      \\[\\hh^*(A) = \\Sym^* \\hh^1(A).\\]\n    \\item (Kings) The action of \\(\\End(A)\\) on \\(\\hh^1(A)\\) coming from the\n      naturality in (1) induces an injective morphism of algebras\n      \\[\\End(A) \\otimes_{\\Z} F \\hookrightarrow \\End_{\\CHM(k)_{F}}(\\hh^1(A)),\\]\n      and if \\(A\\) is isogenous to \\(B \\times C\\) then\n      \\(\\hh^1(A) = \\hh^1(B) \\oplus \\hh^1(C)\\).\n    \\item (K\\\"unnemann) The Chow--Lefschetz conjecture holds for \\(A\\). In\n      particular the classical isomorphism in \\(\\ell\\)-adic cohomology induced by\n      a polarization \\(H_{\\ell}^1(A) \\cong H_{\\ell}^1(A)^{\\vee}(-1)\\) lifts to an\n      isomorphism\n      \\[\\hh^1(A) \\cong \\hh^1(A)^{\\vee}(-1).\\]\n  \\end{enumerate}", "uses": ["def:chow-motives"], "lean_name": "MR4199442StandardConjecturesForAbelianFourfolds.MotiveAbelianVariety", "proved": false, "mathlib_ok": false, "proof_tex": "\n  Each of the four statements is a cited classical result, and no proof is\n  reproduced here: (1) is due to Deninger--Murre, (2) to K\\\"unnemann, (3) is\n  \\cite[Proposition 2.2.1]{Ki} of Kings, and (4) is the Chow--Lefschetz theorem\n  of K\\\"unnemann.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/motives.tex", "lean_file": "", "dep_count": 1, "rdep_count": 5, "descendant_count": 20, "proof_size_tex": 247, "effort_local": 247, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 1144}, "def:abelian-type-rank": {"id": "def:abelian-type-rank", "type": "definition", "title": "Abelian type and rank", "chapter": "The motive of an abelian variety", "statement": "\\textit{Source: Ancona, arXiv:1806.03216, Â§4.}\n  A motive is of \\emph{abelian type} if it is a direct factor, up to Tate twist,\n  of the motive of an abelian variety. A motive of abelian type \\(T\\) is of\n  \\emph{rank \\(d\\)} if the cohomology groups of \\(R(T)\\) vanish in all degrees\n  except one, and in that degree the cohomology group has dimension \\(d\\); one\n  then writes \\(\\dim T = d\\).", "uses": ["def:chow-motives"], "lean_name": "MR4199442StandardConjecturesForAbelianFourfolds.AbelianTypeRank", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/motives.tex", "lean_file": "", "dep_count": 1, "rdep_count": 3, "descendant_count": 48, "proof_size_tex": null, "effort_local": 391, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 1288}, "prop:motive-num-bound": {"id": "prop:motive-num-bound", "type": "proposition", "title": "Numerical bound for motives of abelian type", "chapter": "The motive of an abelian variety", "statement": "\\textit{Source: Ancona, arXiv:1806.03216, Â§4.}\n  Let \\(T\\) be a motive of abelian type of dimension \\(d\\), and let\n  \\[V_Z = V_Z(T) = \\Hom_{\\NUM(k)_\\Q}(\\one, T)\\]\n  be its space of algebraic classes modulo numerical equivalence. Then\n  \\[\\dim_\\Q V_Z \\le d.\\]\n  Moreover, if \\(\\dim_\\Q V_Z = d\\), then:\n  \\begin{enumerate}\n    \\item all realizations of \\(T\\) are spanned by algebraic classes;\n    \\item numerical equivalence on \\(\\Hom_{\\CHM(k)_\\Q}(\\one, T)\\) coincides with\n      homological equivalence (for all cohomologies);\n    \\item if \\(L\\) is the coefficient field of the realization \\(R\\), then\n      \\(V_Z \\otimes_\\Q L = R(T)\\).\n  \\end{enumerate}", "uses": ["def:abelian-type-rank", "def:num-cycles", "def:num-equiv"], "lean_name": "MR4199442StandardConjecturesForAbelianFourfolds.MotiveNumericalBound", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:num-equiv, def:abelian-type-rank}\n  Take \\(n\\) classes \\(\\bar v_1, \\dots, \\bar v_n\\) linearly independent in\n  \\(V_Z\\), and lift them to \\(v_1, \\dots, v_n \\in \\Hom_{\\CHM(k)_\\Q}(\\one, T)\\).\n  By the definition of numerical equivalence there exist\n  \\(f_1, \\dots, f_n \\in \\Hom_{\\CHM(k)_\\Q}(T, \\one)\\) with\n  \\(f_i(v_j) = \\delta_{ij}\\). Applying a realization gives\n  \\(R(f_i)(R(v_j)) = \\delta_{ij}\\), whence \\(R(v_1), \\dots, R(v_n)\\) are linearly\n  independent and \\(n \\le \\dim R(T) = d\\). This proves the inequality.\n\n  Suppose now \\(n = d\\). Then \\(R(v_1), \\dots, R(v_d)\\) form a basis of\n  \\(\\Hom(R(\\one), R(T))\\), so \\(R(T)\\) is spanned by the algebraic classes\n  \\(R(v_1)(1), \\dots, R(v_d)(1)\\); this is (1). For an arbitrary\n  \\(v \\in \\Hom_{\\CHM(k)_\\Q}(\\one, T)\\), write\n  \\(R(v) = \\lambda_1 R(v_1) + \\cdots + \\lambda_d R(v_d)\\). The composition\n  \\(f_i(v)\\) is on the one hand a rational number and on the other hand equal to\n  \\(\\lambda_i\\). Hence every algebraic class is a rational combination of the\n  basis \\(R(v_1)(1), \\dots, R(v_d)(1)\\), which gives (2) and (3).\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/motives.tex", "lean_file": "", "dep_count": 3, "rdep_count": 2, "descendant_count": 42, "proof_size_tex": 1084, "effort_local": 1084, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 4462}, "def:lefschetz-class": {"id": "def:lefschetz-class", "type": "definition", "title": "Lefschetz classes", "chapter": "The motive of an abelian variety", "statement": "\\textit{Source: Ancona, arXiv:1806.03216, Â§5.}\n  Let \\(\\Q[\\mathcal{Z}^{1}_{\\num}(A)_{\\Q}]\\) be the subalgebra of\n  \\(\\mathcal{Z}^{*}_{\\num}(A)_{\\Q}\\) generated by\n  \\(\\mathcal{Z}^{1}_{\\num}(A)_{\\Q}\\). An element of this subalgebra is called a\n  \\emph{Lefschetz class}. The subspace of Lefschetz classes in\n  \\(\\mathcal{Z}^{n}_{\\num}(A)_{\\Q}\\) is denoted \\(\\mathcal{L}^{n}(A)\\).", "uses": ["def:num-cycles"], "lean_name": "MR4199442StandardConjecturesForAbelianFourfolds.LefschetzClass", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/motives.tex", "lean_file": "", "dep_count": 1, "rdep_count": 3, "descendant_count": 15, "proof_size_tex": null, "effort_local": 377, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 3364}, "lem:lefschetz-pairings": {"id": "lem:lefschetz-pairings", "type": "lemma", "title": "Comparison of Lefschetz pairings", "chapter": "The motive of an abelian variety", "statement": "\\textit{Source: Ancona, arXiv:1806.03216, Â§5.}\n  Fix \\(n\\) with \\(2 \\le 2n \\le g\\). Then the three motivic pairings\n  \\(\\langle \\cdot, \\cdot \\rangle_{1,\\mathrm{mot}}^{\\otimes 2n}\\),\n  \\(\\langle \\cdot, \\cdot \\rangle_{2,\\mathrm{mot}}^{\\otimes n}\\) and\n  \\(\\langle \\cdot, \\cdot \\rangle_{2n,\\mathrm{mot}}\\) on\n  \\(\\hh^{2n,\\prim}(A) \\in \\NUM(k)_\\Q\\) coincide up to a positive rational scalar.\n  Moreover, for each of these pairings, the Lefschetz decomposition\n  \\[\\hh^{2n}(A) = \\hh^{2n,\\prim}(A) \\oplus \\hh^{2n-2,\\prim}(A)(-1)\\]\n  is orthogonal.", "uses": ["def:pairing-mot", "thm:classic-motive"], "lean_name": "MR4199442StandardConjecturesForAbelianFourfolds.lefschetzPairingsCoincide", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{thm:classic-motive, def:pairing-mot}\n  The statement may be checked at the homological level, hence after\n  realization, say on \\(H_\\ell^{2n,\\prim}(A)\\). Spread \\(A\\) over the moduli\n  space of polarized abelian varieties (in mixed characteristic, with fixed\n  level structure); the three pairings are defined on the relative cohomology of\n  the universal abelian scheme. The Zariski closure of the monodromy group of\n  this relative cohomology is \\(\\GSp_{2g} = \\GSp(H_\\ell^{1}(A))\\), and\n  \\[H_\\ell^{2n,\\prim}(A) \\subset H_\\ell^{2n}(A) = \\Lambda^{2n} H_\\ell^{1}(A)\\]\n  is a geometrically irreducible representation. By Schur's lemma the three\n  pairings therefore coincide up to a scalar; since each is also defined over\n  Betti cohomology the scalar is rational, and since each is a polarization of\n  the underlying Hodge structure the scalar is positive. For orthogonality the\n  argument is the same: a failure of orthogonality would produce a nonzero\n  \\(\\GSp_{2g}\\)-equivariant map\n  \\(H_\\ell^{2n,\\prim}(A) \\to H_\\ell^{2n-2}(A)(-1)^\\vee\\), impossible by Schur's\n  lemma.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/motives.tex", "lean_file": "", "dep_count": 2, "rdep_count": 2, "descendant_count": 4, "proof_size_tex": 1081, "effort_local": 1081, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 4245}, "prop:scht-lefschetz": {"id": "prop:scht-lefschetz", "type": "proposition", "title": "Hodge type for Lefschetz classes", "chapter": "The motive of an abelian variety", "statement": "\\textit{Source: Ancona, arXiv:1806.03216, Â§5.}\n  Fix \\(n\\) with \\(2 \\le 2n \\le g\\). The three pairings\n  \\(\\langle \\cdot, \\cdot \\rangle_{1,\\mathrm{mot}}^{\\otimes 2n}\\),\n  \\(\\langle \\cdot, \\cdot \\rangle_{2,\\mathrm{mot}}^{\\otimes n}\\) and\n  \\(\\langle \\cdot, \\cdot \\rangle_{2n,\\mathrm{mot}}\\) on\n  \\(\\mathcal{Z}^{n}_{\\num}(A)_{\\Q}\\) are positive definite if and only if any one\n  of them is. Moreover, they are positive definite on the subspace\n  \\(\\mathcal{L}^{n}(A)\\) of Lefschetz classes.", "uses": ["lem:lefschetz-pairings", "thm:segre", "def:lefschetz-class", "thm:classic-motive"], "lean_name": "MR4199442StandardConjecturesForAbelianFourfolds.schtLefschetz", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{lem:lefschetz-pairings, thm:segre, thm:classic-motive, def:lefschetz-class}\n  By \\cref{lem:lefschetz-pairings} the Lefschetz decomposition\n  \\(\\hh^{2n}(A) = \\hh^{2n,\\prim}(A) \\oplus \\hh^{2n-2,\\prim}(A)(-1)\\) is orthogonal\n  for any of the three pairings; arguing by induction on \\(n\\) it therefore\n  suffices to check positivity on the algebraic classes of \\(\\hh^{2n,\\prim}(A)\\),\n  and again by \\cref{lem:lefschetz-pairings} the positivity on the primitive\n  part does not depend on which pairing is used. The same induction applies to\n  Lefschetz classes, since each component in the Lefschetz decomposition of a\n  Lefschetz class is again a Lefschetz class.\n\n  We check positivity for \\(\\langle \\cdot, \\cdot \\rangle_{2,\\mathrm{mot}}^{\\otimes\n  n}\\). By construction its restriction to algebraic classes is\n  \\(\\langle \\cdot, \\cdot \\rangle_{1}^{\\otimes n}\\). By\n  \\cref{rem:sym-inclusion} we have the inclusion\n  \\[\\mathcal{Z}^n_{\\num}(A)_{\\Q} = \\Hom_{\\NUM(k)_\\Q}(\\one, \\hh^{2n}(A)(n))\n    \\subset \\Hom_{\\NUM(k)_\\Q}(\\one, (\\hh^2(A)(1))^{\\otimes n}),\\]\n  and the algebra isomorphism of \\cref{thm:classic-motive} gives\n  \\[\\mathcal{L}^{n}(A)_{\\Q} =\n    \\mathcal{Z}^n_{\\num}(A)_{\\Q} \\cap (\\mathcal{Z}^1_{\\num}(A)_{\\Q})^{\\otimes n}\\]\n  inside \\(\\Hom_{\\NUM(k)_\\Q}(\\one, (\\hh^2(A)(1))^{\\otimes n})\\). Now the pairing\n  \\(\\langle \\cdot, \\cdot \\rangle_1\\) on\n  \\(\\mathcal{Z}^1_{\\num}(A)_{\\Q} = \\Hom_{\\NUM(k)_\\Q}(\\one, \\hh^2(A)(1))\\) is\n  positive definite by \\cref{thm:segre}, hence so is its \\(n\\)-th tensor power\n  \\(\\langle \\cdot, \\cdot \\rangle_1^{\\otimes n}\\) on\n  \\((\\mathcal{Z}^1_{\\num}(A)_{\\Q})^{\\otimes n}\\), and in particular its\n  restriction to \\(\\mathcal{L}^{n}(A)_{\\Q}\\).\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/motives.tex", "lean_file": "", "dep_count": 4, "rdep_count": 1, "descendant_count": 3, "proof_size_tex": 1683, "effort_local": 1683, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 9929}, "thm:tate": {"id": "thm:tate", "type": "theorem", "title": "Tate: abundance of endomorphisms", "chapter": "The motive of an abelian variety", "statement": "\\textit{Source: Ancona, arXiv:1806.03216, Â§6.}\n  (Tate.) A maximal commutative \\(\\Q\\)-subalgebra of \\(\\End^0(A)\\) has dimension\n  \\(2g\\). Moreover there exist maximal commutative \\(\\Q\\)-subalgebras of\n  \\(\\End^0(A)\\) which are products of CM fields.", "uses": [], "lean_name": "MR4199442StandardConjecturesForAbelianFourfolds.tateMaximalCommutative", "proved": false, "mathlib_ok": false, "proof_tex": "\n  Both statements are cited inputs: the dimension count is Tate's theorem, and\n  the existence of a maximal commutative subalgebra that is a product of CM\n  fields is \\cite[Lemma 2]{TateBour}. No proof is reproduced.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/motives.tex", "lean_file": "", "dep_count": 0, "rdep_count": 1, "descendant_count": 22, "proof_size_tex": 214, "effort_local": 214, "proof_size_tex_total": 214, "proof_size_lean_total": null, "effort_total": 214}, "def:CM-structure": {"id": "def:CM-structure", "type": "definition", "title": "CM-structure", "chapter": "The motive of an abelian variety", "statement": "\\textit{Source: Ancona, arXiv:1806.03216, Â§6.}\n  When \\(A\\) is simple over \\(k\\), a \\emph{CM-structure} for \\(A\\) is a choice of\n  maximal CM field in \\(\\End^0(A)\\). For general \\(A\\), a choice of isogeny\n  decomposition into simple factors \\(A \\sim A_1 \\times \\cdots \\times A_t\\)\n  together with a CM-structure \\(L_i\\) for each \\(A_i\\) induces a maximal\n  commutative \\(\\Q\\)-subalgebra\n  \\[B = L_1 \\times \\cdots \\times L_t\\]\n  of \\(\\End^0(A)\\); such an algebra \\(B\\) is called a \\emph{CM-structure} for\n  \\(A\\). The CM-structure is \\emph{\\(*\\)-stable} if \\(B\\) is stable under the\n  Rosati involution \\(*\\).", "uses": ["thm:tate"], "lean_name": "MR4199442StandardConjecturesForAbelianFourfolds.CMStructure", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/motives.tex", "lean_file": "", "dep_count": 1, "rdep_count": 4, "descendant_count": 21, "proof_size_tex": null, "effort_local": 608, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 822}, "def:cm-sigma": {"id": "def:cm-sigma", "type": "definition", "title": "CM Galois data", "chapter": "The motive of an abelian variety", "statement": "\\textit{Source: Ancona, arXiv:1806.03216, Â§6.}\n  Let \\(B = L_1 \\times \\cdots \\times L_t\\) be a CM-structure for \\(A\\), written\n  as a product of CM fields. Let \\(L\\) be the Galois closure over \\(\\Q\\) of the\n  compositum of the \\(L_i\\); it is again a CM number field. Let\n  \\(\\Sigma_i = \\Hom(L_i, L)\\) be the set of embeddings, and let\n  \\[\\Sigma = \\Sigma_1 \\sqcup \\cdots \\sqcup \\Sigma_t.\\]\n  Write \\(\\bar{\\cdot}\\) for the action on \\(\\Sigma\\) (and on its subsets) induced\n  by composition with complex conjugation.", "uses": ["def:CM-structure"], "lean_name": "MR4199442StandardConjecturesForAbelianFourfolds.CMGaloisData", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/motives.tex", "lean_file": "", "dep_count": 1, "rdep_count": 2, "descendant_count": 18, "proof_size_tex": null, "effort_local": 514, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 1336}, "prop:decomposition": {"id": "prop:decomposition", "type": "proposition", "title": "CM decomposition of \\(\\hh^1\\)", "chapter": "The motive of an abelian variety", "statement": "\\textit{Source: Ancona, arXiv:1806.03216, Â§6.}\n  With \\(L\\) and \\(\\Sigma\\) as in \\cref{def:cm-sigma}, the motive \\(\\hh^1(A)\\)\n  decomposes in \\(\\CHM(k)_{L}\\) as a sum of \\(2g\\) motives\n  \\[\\hh^1(A) = \\bigoplus_{\\sigma \\in \\Sigma} M_\\sigma,\\]\n  where \\(b \\in L_i\\) acts on \\(M_\\sigma\\) (via \\cref{thm:classic-motive}) by\n  multiplication by \\(\\sigma(b)\\) if \\(\\sigma \\in \\Sigma_i\\) and by \\(0\\)\n  otherwise. Each \\(M_\\sigma\\) is of rank one in the sense of\n  \\cref{def:abelian-type-rank}. If the CM-structure is \\(*\\)-stable, the\n  polarization isomorphism \\(p : \\hh^1(A) \\cong \\hh^1(A)^{\\vee}(-1)\\) of\n  \\cref{thm:classic-motive} restricts to an isomorphism\n  \\[M_\\sigma \\cong M_{\\bar\\sigma}^\\vee(-1) \\qquad (\\sigma \\in \\Sigma)\\]\n  and to the zero map \\(M_\\sigma \\to M_{\\sigma'}^\\vee(-1)\\) for every\n  \\(\\sigma' \\neq \\bar\\sigma\\).", "uses": ["def:CM-structure", "def:cm-sigma", "thm:classic-motive", "def:abelian-type-rank"], "lean_name": "MR4199442StandardConjecturesForAbelianFourfolds.motiveH1Decomposition", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{thm:classic-motive, def:CM-structure, def:cm-sigma, def:abelian-type-rank}\n  This is \\cite[Corollary 3.2]{Ascona}; we recall the argument. From the\n  inclusion \\(L_1 \\times \\cdots \\times L_t \\hookrightarrow \\End^0(A)\\) and\n  \\cref{thm:classic-motive} one deduces an inclusion\n  \\((\\prod_i L_i) \\otimes L \\hookrightarrow \\End_{\\CHM(k)_{L}}(\\hh^1(A))\\). The\n  product of fields decomposes as\n  \\((\\prod_i L_i) \\otimes L \\cong \\prod_i L^{\\Sigma_i}\\), and each of its\n  projectors cuts out a factor \\(M_\\sigma\\); the rank-one property and the\n  prescribed action of \\(L_i\\) follow. For the last part, the claim may be\n  checked after realization, and the Rosati involution acts as complex\n  conjugation on the CM fields, so the polarization isomorphism matches\n  \\(M_\\sigma\\) with \\(M_{\\bar\\sigma}^\\vee(-1)\\) and kills all other components.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/motives.tex", "lean_file": "", "dep_count": 4, "rdep_count": 1, "descendant_count": 17, "proof_size_tex": 842, "effort_local": 842, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 3713}, "prop:cm-decomposition": {"id": "prop:cm-decomposition", "type": "proposition", "title": "CM decomposition of \\(\\hh^n\\)", "chapter": "The motive of an abelian variety", "statement": "\\textit{Source: Ancona, arXiv:1806.03216, Â§6.}\n  In the setting of \\cref{def:cm-sigma} and \\cref{prop:decomposition}:\n  \\begin{enumerate}\n    \\item In \\(\\CHM(k)_{L}\\) the motive \\(\\hh^n(A)\\) decomposes as\n      \\[\\hh^n(A) = \\bigoplus_{I \\subset \\Sigma,\\ |I| = n} M_I, \\qquad\n        M_I = \\bigotimes_{\\sigma \\in I} M_\\sigma,\\]\n      with each \\(M_I\\) of rank one. If the CM-structure is \\(*\\)-stable, then\n      \\(M_I\\) and \\(M_J\\) are mutually orthogonal in \\(\\NUM(k)_L\\) with respect\n      to \\(\\langle \\cdot, \\cdot \\rangle_{1,\\mathrm{mot}}^{\\otimes n}\\) unless\n      \\(I = \\bar J\\).\n    \\item In \\(\\CHM(k)_{\\Q}\\) the motive \\(\\hh^n(A)\\) decomposes as\n      \\[\\hh^n(A) = \\bigoplus \\mathcal{M}_I,\\]\n      where \\(\\mathcal{M}_I\\) is spanned by the factors \\(M_{g(I)}\\),\n      \\(g \\in \\Gal(L/\\Q)\\). If the CM-structure is \\(*\\)-stable, this\n      decomposition is orthogonal in \\(\\NUM(k)_\\Q\\) with respect to\n      \\(\\langle \\cdot, \\cdot \\rangle_{1,\\mathrm{mot}}^{\\otimes n}\\).\n  \\end{enumerate}", "uses": ["prop:decomposition", "def:cm-sigma", "thm:classic-motive"], "lean_name": "MR4199442StandardConjecturesForAbelianFourfolds.cmDecomposition", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{prop:decomposition, thm:classic-motive}\n  Part (2) follows from part (1) by collecting the \\(\\Gal(L/\\Q)\\)-orbits of the\n  factors. For part (1), \\cref{prop:decomposition} is the case \\(n = 1\\), and the\n  algebra isomorphism \\(\\hh^*(A) = \\Sym^* \\hh^1(A)\\) of \\cref{thm:classic-motive}\n  deduces the decomposition for higher \\(n\\): the rank-one factors \\(M_I\\) are\n  the tensor products \\(\\bigotimes_{\\sigma \\in I} M_\\sigma\\), and orthogonality\n  for the tensor-power pairing is inherited from the \\(n = 1\\) case.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/motives.tex", "lean_file": "", "dep_count": 3, "rdep_count": 7, "descendant_count": 16, "proof_size_tex": 517, "effort_local": 517, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 4230}, "prop:factor-algebraic": {"id": "prop:factor-algebraic", "type": "proposition", "title": "Algebraic and Lefschetz classes in a factor", "chapter": "The motive of an abelian variety", "statement": "\\textit{Source: Ancona, arXiv:1806.03216, Â§6.}\n  Let \\(\\mathcal{M}_I \\in \\CHM(k)_{\\Q}\\) be a direct factor of \\(\\hh^{2n}(A)\\) as\n  constructed in \\cref{prop:cm-decomposition}(2). Then:\n  \\begin{enumerate}\n    \\item If \\(\\Hom_{\\NUM(k)_\\Q}(\\one, \\mathcal{M}_I(n)) \\neq 0\\), then\n      \\[\\dim_\\Q \\Hom_{\\NUM(k)_\\Q}(\\one, \\mathcal{M}_I(n)) = \\dim \\mathcal{M}_I.\\]\n      In this case homological and numerical equivalence coincide on\n      \\(\\mathcal{M}_I\\), and the realizations of \\(\\mathcal{M}_I\\) are spanned by\n      algebraic classes.\n    \\item If \\(\\Hom_{\\NUM(k)_\\Q}(\\one, \\mathcal{M}_I(n))\\) contains a nonzero\n      Lefschetz class (\\cref{def:lefschetz-class}), then all algebraic classes in\n      it are Lefschetz.\n  \\end{enumerate}", "uses": ["prop:cm-decomposition", "prop:motive-num-bound", "def:lefschetz-class"], "lean_name": "MR4199442StandardConjecturesForAbelianFourfolds.factorAlgebraic", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{prop:cm-decomposition, prop:motive-num-bound, def:lefschetz-class}\n  Since numerical equivalence commutes with extension of scalars over \\(\\Q\\),\n  \\[\\dim_\\Q \\Hom_{\\NUM(k)_\\Q}(\\one, \\mathcal{M}_I(n)) =\n    \\dim_L \\Hom_{\\NUM(k)_L}(\\one, \\mathcal{M}_I(n)).\\]\n  By construction of \\(\\mathcal{M}_I\\) (\\cref{prop:cm-decomposition}(2)) the space\n  \\(\\Hom_{\\NUM(k)_L}(\\one, \\mathcal{M}_I(n))\\) is generated by the\n  \\(\\Hom_{\\NUM(k)_L}(\\one, M_{g(I)}(n))\\), \\(g \\in \\Gal(L/\\Q)\\); and since\n  \\(\\Gal(L/\\Q)\\) acts on cycles modulo numerical equivalence,\n  \\[\\dim_L \\Hom_{\\NUM(k)_L}(\\one, M_{I}(n)) =\n    \\dim_L \\Hom_{\\NUM(k)_L}(\\one, M_{g(I)}(n))\\]\n  for all \\(g\\). By \\cref{prop:cm-decomposition}(1) the motives \\(M_I\\) are of\n  rank one, so by \\cref{prop:motive-num-bound} each of these dimensions is \\(0\\)\n  or \\(1\\). This gives the dimension equality in (1); the remaining assertions of\n  (1) follow from \\cref{prop:motive-num-bound} as well. Part (2) is proved\n  exactly as part (1), since every property of motives and algebraic classes used\n  above holds equally for Lefschetz motives and Lefschetz classes.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/motives.tex", "lean_file": "", "dep_count": 3, "rdep_count": 2, "descendant_count": 12, "proof_size_tex": 1109, "effort_local": 1109, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 8890}, "thm:honda-tate": {"id": "thm:honda-tate", "type": "theorem", "title": "Honda--Tate lifting", "chapter": "The motive of an abelian variety", "statement": "\\textit{Source: Ancona, arXiv:1806.03216, Â§6.}\n  (Tate, Bourbaki.) For any CM-structure \\(B\\) for \\(A\\)\n  (\\cref{def:CM-structure}), the pair \\((A, B)\\) lifts to characteristic zero:\n  there exist a \\(p\\)-adic field \\(K\\) with ring of integers \\(W\\), whose residue\n  field \\(k'\\) is a finite extension of \\(k\\), an abelian scheme \\(\\mathcal{A}\\)\n  over \\(W\\), and an embedding \\(B \\hookrightarrow \\End^0(\\mathcal{A})\\), such\n  that \\(\\mathcal{A} \\times_W k'\\) is \\(B\\)-equivariantly isogenous to\n  \\(A \\times_k k'\\).", "uses": ["def:CM-structure"], "lean_name": "MR4199442StandardConjecturesForAbelianFourfolds.hondaTateLifting", "proved": false, "mathlib_ok": false, "proof_tex": "\n  This is a cited input, \\cite[Theorem 2]{TateBour}; no proof is reproduced.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/motives.tex", "lean_file": "", "dep_count": 1, "rdep_count": 3, "descendant_count": 7, "proof_size_tex": 74, "effort_local": 74, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 896}, "cor:cm-stable": {"id": "cor:cm-stable", "type": "corollary", "title": "Existence of a \\(*\\)-stable lift", "chapter": "The motive of an abelian variety", "statement": "\\textit{Source: Ancona, arXiv:1806.03216, Â§6.}\n  There exists a polarization on the abelian scheme \\(\\mathcal{A}\\) of\n  \\cref{thm:honda-tate} for which the CM-structure is \\(*\\)-stable.", "uses": ["thm:honda-tate", "def:CM-structure"], "lean_name": "MR4199442StandardConjecturesForAbelianFourfolds.cmStable", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{thm:honda-tate, def:CM-structure}\n  The CM-structure gives a decomposition\n  \\(\\mathcal{A} = \\mathcal{A}_1 \\times \\cdots \\times \\mathcal{A}_t\\) into simple\n  CM abelian schemes. Take the polarization to be the product of a polarization\n  on each factor; the statement then reduces to the case where \\(\\mathcal{A}\\) is\n  simple, and it suffices to check it on the generic fiber, i.e. in\n  characteristic zero. There the endomorphism algebra of a simple CM abelian\n  variety cannot be larger than its CM-structure, so \\(*\\)-stability is\n  automatic.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/motives.tex", "lean_file": "", "dep_count": 2, "rdep_count": 1, "descendant_count": 3, "proof_size_tex": 553, "effort_local": 553, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 1449}, "cor:lifting-motives": {"id": "cor:lifting-motives", "type": "corollary", "title": "Lifting the CM decomposition", "chapter": "The motive of an abelian variety", "statement": "\\textit{Source: Ancona, arXiv:1806.03216, Â§6.}\n  The decompositions of \\(\\hh(A \\times_k k')\\) in \\cref{prop:cm-decomposition}\n  lift to decompositions of \\(\\hh(\\mathcal{A}) \\in \\CHM(W)\\). Moreover, if the\n  CM-structure of \\(A\\) is \\(*\\)-stable (and the polarization lifts as well),\n  then the orthogonality statement of \\cref{prop:cm-decomposition} holds in\n  \\(\\CHM(W)\\) too.", "uses": ["prop:cm-decomposition", "thm:honda-tate", "thm:classic-motive"], "lean_name": "MR4199442StandardConjecturesForAbelianFourfolds.liftingMotives", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{prop:cm-decomposition, thm:classic-motive, thm:honda-tate}\n  The construction of \\cref{prop:cm-decomposition} is a formal combination of\n  \\cref{thm:classic-motive} with the CM-structure. By \\cref{rem:AHP} the results\n  of \\cref{thm:classic-motive} hold over the ring of integers \\(W\\), and by\n  \\cref{thm:honda-tate} the CM-structure lifts to \\(\\mathcal{A}/W\\); hence the\n  same construction yields the decomposition of \\(\\hh(\\mathcal{A})\\) in\n  \\(\\CHM(W)\\), together with the orthogonality statement when the CM-structure is\n  \\(*\\)-stable and the polarization lifts.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/motives.tex", "lean_file": "", "dep_count": 3, "rdep_count": 2, "descendant_count": 5, "proof_size_tex": 575, "effort_local": 575, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 4879}, "def:exotic-motive": {"id": "def:exotic-motive", "type": "definition", "title": "Exotic motive", "chapter": "Exotic classes", "statement": "\\textit{Source: Ancona, arXiv:1806.03216, Â§7.}\n  Let \\(\\mathcal{M}_I \\in \\CHM(k)_{\\Q}\\) be a direct factor of \\(\\hh^{4}(A)\\) as\n  constructed in \\cref{prop:cm-decomposition}(2). The motive \\(\\mathcal{M}_I\\) is\n  called \\emph{exotic} if its space of algebraic classes\n  \\(\\Hom_{\\NUM(k)_\\Q}(\\one, \\mathcal{M}_I(2))\\) is nonzero and contains no nonzero\n  Lefschetz class (\\cref{def:lefschetz-class}). An element of the \\(\\Q\\)-vector\n  space \\(\\Hom_{\\NUM(k)_\\Q}(\\one, \\mathcal{M}_I(2))\\) is called an \\emph{exotic\n  class}.", "uses": ["prop:cm-decomposition", "def:lefschetz-class", "def:num-cycles"], "lean_name": "MR4199442StandardConjecturesForAbelianFourfolds.ExoticMotive", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/exotic_classes.tex", "lean_file": "", "dep_count": 3, "rdep_count": 2, "descendant_count": 12, "proof_size_tex": null, "effort_local": 519, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 7216}, "prop:exotic-dim2": {"id": "prop:exotic-dim2", "type": "proposition", "title": "Exotic motives have dimension two", "chapter": "Exotic classes", "statement": "\\textit{Source: Ancona, arXiv:1806.03216, Â§7.}\n  Suppose \\(A\\) has dimension four. Then there exist a finite extension \\(k'\\) of\n  \\(k\\) and a CM-structure for \\(A \\times_k k'\\) such that any exotic motive\n  \\(\\mathcal{M}_I \\in \\CHM(k')_{\\Q}\\) of \\(\\hh^{4}(A \\times_k k')\\) has dimension\n  two.", "uses": ["def:exotic-motive", "lem:exotic-frobenius", "def:exotic-subset", "lem:exotic-partition", "lem:exotic-count", "lem:exotic-supersingular", "lem:exotic-threefold-factor", "lem:exotic-split", "def:exotic-assumption"], "lean_name": "MR4199442StandardConjecturesForAbelianFourfolds.exoticDimTwo", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:exotic-assumption, rem:exotic-assumption-lef, lem:exotic-count,\n    lem:exotic-partition, lem:exotic-supersingular, lem:exotic-threefold-factor,\n    lem:exotic-split, rem:exotic-equal-dim}\n  The argument combines the four lemmas established in the remainder of this\n  chapter; we sketch it here and prove the supporting lemmas below.\n  After a finite extension of \\(k\\) we may assume \\cref{def:exotic-assumption}\n  holds (\\cref{rem:exotic-assumption-lef}), and exotic motives stay exotic under\n  further finite extension. By \\cref{lem:exotic-count} there are zero, two or\n  four exotic subsets, and by \\cref{lem:exotic-partition}(3) together with the\n  equality of \\cref{rem:exotic-equal-dim} each exotic motive is even-dimensional.\n\n  If there is no exotic subset there is nothing to prove. If there are two, they\n  are a conjugate pair \\(I, \\bar I\\), forming a single \\(\\Gal(\\bar\\Q/\\Q)\\)-orbit\n  of cardinality two; hence the corresponding exotic motive \\(\\mathcal{M}_I\\) has\n  dimension two.\n\n  If there are four, then by \\cref{lem:exotic-supersingular}, after passing to\n  \\(\\F_{q^2}\\) the fourfold becomes isogenous to \\(E \\times X\\) with \\(E\\) a\n  supersingular elliptic curve on which Frobenius acts as \\(q \\cdot \\id\\); over\n  \\(\\F_{q^2}\\) such an \\(E\\) satisfies \\(\\dim_\\Q \\End(E) \\otimes_\\Z \\Q = 4\\). By\n  \\cref{lem:exotic-threefold-factor} the space of exotic classes lies in\n  \\(\\mathcal{M}_{I \\cap \\Sigma_X} \\otimes \\hh^1(E)\\) with\n  \\(\\mathcal{M}_{I \\cap \\Sigma_X}\\) of rank two and spanned by algebraic classes.\n  Choosing the CM-structure on \\(E\\) provided by \\cref{lem:exotic-split}, this\n  motive splits as\n  \\(\\mathcal{M}_{I \\cap \\Sigma_X} \\otimes \\hh^1(E) =\n    \\mathcal{M}_{(I \\cap \\Sigma_X) \\cup \\sigma} \\oplus\n    \\mathcal{M}_{(I \\cap \\Sigma_X) \\cup \\bar\\sigma}\\),\n  a sum of two motives of rank two. With this CM-structure each exotic motive is\n  one of these rank-two summands (or a conjugate pair as above), hence has\n  dimension two.\n\n  Taking \\(k'\\) to be the finite extension realizing \\cref{def:exotic-assumption}\n  and the passage to \\(\\F_{q^2}\\), and the CM-structure to be the one just\n  selected, every exotic motive of \\(\\hh^{4}(A \\times_k k')\\) has dimension two.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/exotic_classes.tex", "lean_file": "", "dep_count": 9, "rdep_count": 1, "descendant_count": 3, "proof_size_tex": 2208, "effort_local": 2208, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 24630}, "def:exotic-assumption": {"id": "def:exotic-assumption", "type": "definition", "title": "Algebraic classes defined over the base", "chapter": "Exotic classes", "statement": "\\textit{Source: Ancona, arXiv:1806.03216, Â§7.}\n  We suppose that all the algebraic classes\n  \\(\\mathcal{Z}^*_\\num(A_{\\bar k})_\\Q\\) are defined over \\(k\\).", "uses": ["def:num-cycles"], "lean_name": "MR4199442StandardConjecturesForAbelianFourfolds.AlgebraicClassesOverBase", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/exotic_classes.tex",
