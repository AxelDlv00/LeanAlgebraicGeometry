"lean_file": "", "dep_count": 1, "rdep_count": 6, "descendant_count": 9, "proof_size_tex": null, "effort_local": 154, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 3141}, "lem:exotic-frobenius": {"id": "lem:exotic-frobenius", "type": "lemma", "title": "Frobenius relations of an exotic motive", "chapter": "Exotic classes", "statement": "\\textit{Source: Ancona, arXiv:1806.03216, Â§7.}\n  Let \\(q = \\#k\\) and let \\(\\mathcal{M}_I\\) be an exotic motive. Then\n  \\[\\prod_{\\sigma \\in I} \\alpha_\\sigma = q^2,\\]\n  and moreover\n  \\[\\alpha_\\sigma \\cdot \\alpha_\\tau \\neq q\n    \\qquad \\text{for all distinct } \\sigma, \\tau \\in I.\\]", "uses": ["def:exotic-motive", "prop:factor-algebraic", "prop:cm-decomposition"], "lean_name": "MR4199442StandardConjecturesForAbelianFourfolds.exoticFrobeniusRelations", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:exotic-motive, prop:factor-algebraic, prop:cm-decomposition}\n  By \\cref{prop:factor-algebraic}(1) the \\(\\ell\\)-adic realization of\n  \\(\\mathcal{M}_I\\) is spanned by algebraic cycles, so Frobenius acts on it by\n  multiplication by \\(q^2\\). On the other hand, by the construction of the\n  factors (\\cref{prop:cm-decomposition}(1)), Frobenius acts on the line\n  \\(M_I \\subset \\mathcal{M}_I\\) by multiplication by\n  \\(\\prod_{\\sigma \\in I} \\alpha_\\sigma\\). Comparing the two gives\n  \\(\\prod_{\\sigma \\in I} \\alpha_\\sigma = q^2\\).\n\n  Suppose the second relation fails, say\n  \\(\\alpha_\\sigma \\alpha_\\tau = q\\) for some distinct \\(\\sigma, \\tau \\in I\\).\n  Together with \\(\\prod_{\\sigma \\in I} \\alpha_\\sigma = q^2\\) this forces the\n  four eigenvalues \\(\\{\\alpha_\\sigma\\}_{\\sigma \\in I}\\) to be of the form\n  \\(\\alpha, q/\\alpha, \\beta, q/\\beta\\). Each pair \\((\\alpha, q/\\alpha)\\) and\n  \\((\\beta, q/\\beta)\\) cuts out a Frobenius-invariant class in\n  \\(H^2_\\ell(A)(1)\\). Since the Tate conjecture for divisors on abelian\n  varieties is known \\cite[Theorem 4]{Tate}, each such class is the class of a\n  divisor, so \\(M_I\\) would contain a nonzero Lefschetz class â€” contradicting\n  that \\(\\mathcal{M}_I\\) is exotic.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/exotic_classes.tex", "lean_file": "", "dep_count": 3, "rdep_count": 3, "descendant_count": 11, "proof_size_tex": 1209, "effort_local": 1209, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 10618}, "def:exotic-subset": {"id": "def:exotic-subset", "type": "definition", "title": "Exotic subset", "chapter": "Exotic classes", "statement": "\\textit{Source: Ancona, arXiv:1806.03216, Â§7.}\n  A subset \\(I \\subset \\Sigma\\) of cardinality four satisfying the two relations\n  of \\cref{lem:exotic-frobenius}, namely\n  \\[\\prod_{\\sigma \\in I} \\alpha_\\sigma = q^2\n    \\qquad \\text{and} \\qquad\n    \\alpha_\\sigma \\alpha_\\tau \\neq q\n    \\ \\ (\\sigma \\neq \\tau \\in I),\\]\n  is called an \\emph{exotic subset}.", "uses": ["lem:exotic-frobenius"], "lean_name": "MR4199442StandardConjecturesForAbelianFourfolds.ExoticSubset", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/exotic_classes.tex", "lean_file": "", "dep_count": 1, "rdep_count": 7, "descendant_count": 10, "proof_size_tex": null, "effort_local": 352, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 10970}, "lem:exotic-partition": {"id": "lem:exotic-partition", "type": "lemma", "title": "Partition, conjugates, even dimension", "chapter": "Exotic classes", "statement": "\\textit{Source: Ancona, arXiv:1806.03216, Â§7.}\n  The following hold.\n  \\begin{enumerate}\n    \\item If \\(I\\) is an exotic subset, then the pair \\((I, \\bar I)\\) is a\n      partition of \\(\\Sigma\\).\n    \\item Any \\(\\Gal(\\bar\\Q/\\Q)\\)-conjugate of an exotic subset is again exotic.\n    \\item Any exotic motive is even-dimensional.\n  \\end{enumerate}", "uses": ["def:exotic-subset", "prop:cm-decomposition"], "lean_name": "MR4199442StandardConjecturesForAbelianFourfolds.exoticSubsetPartition", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:exotic-subset, prop:cm-decomposition}\n  The Weil conjectures give \\(\\bar\\alpha = q/\\alpha\\) for every Frobenius\n  eigenvalue \\(\\alpha\\). For (1): if some \\(\\sigma \\in I\\) had\n  \\(\\bar\\sigma \\in I\\) as well, then \\(\\alpha_\\sigma \\alpha_{\\bar\\sigma}\n  = \\alpha_\\sigma \\cdot q/\\alpha_\\sigma = q\\), contradicting the second relation\n  of \\cref{def:exotic-subset}; since \\(|I| = 4 = |\\Sigma|/2\\) and \\(I\\) meets no\n  conjugate pair, \\((I, \\bar I)\\) is a partition of \\(\\Sigma\\). Part (2) is\n  immediate from the definition of an exotic subset, the two defining relations\n  being preserved by the \\(\\Gal(\\bar\\Q/\\Q)\\)-action on the eigenvalues. For (3):\n  by (1) complex conjugation sends \\(I\\) to \\(\\bar I \\neq I\\), and the same holds\n  for every \\(\\Gal(\\bar\\Q/\\Q)\\)-conjugate of \\(I\\); thus complex conjugation acts\n  without fixed points on the orbit of \\(I\\), so the orbit has even cardinality.\n  By \\cref{prop:cm-decomposition} this cardinality equals\n  \\(\\dim \\mathcal{M}_I\\), so \\(\\mathcal{M}_I\\) is even-dimensional.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/exotic_classes.tex", "lean_file": "", "dep_count": 2, "rdep_count": 4, "descendant_count": 7, "proof_size_tex": 1027, "effort_local": 1027, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 11997}, "lem:exotic-frobenius-power": {"id": "lem:exotic-frobenius-power", "type": "lemma", "title": "Frobenius relations over extensions", "chapter": "Exotic classes", "statement": "\\textit{Source: Ancona, arXiv:1806.03216, Â§7.}\n  Under \\cref{def:exotic-assumption}, an exotic subset \\(I\\) satisfies\n  \\[(\\alpha_\\sigma \\cdot \\alpha_\\tau)^n \\neq q^n\n    \\qquad \\text{for all distinct } \\sigma, \\tau \\in I\n    \\text{ and all integers } n \\ge 1.\\]", "uses": ["def:exotic-subset", "def:exotic-assumption"], "lean_name": "MR4199442StandardConjecturesForAbelianFourfolds.exoticFrobeniusPower", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:exotic-subset, rem:exotic-assumption-lef}\n  Extend scalars to \\(\\F_{q^n}\\). By \\cref{rem:exotic-assumption-lef} the motive\n  \\(M_I\\) remains exotic, and the Frobenius eigenvalues become\n  \\(\\{\\alpha_\\sigma^n\\}\\). Applying the second relation of\n  \\cref{def:exotic-subset} over the new base field \\(\\F_{q^n}\\) (whose cardinality\n  is \\(q^n\\)) gives \\((\\alpha_\\sigma \\alpha_\\tau)^n \\neq q^n\\) for all distinct\n  \\(\\sigma, \\tau \\in I\\).\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/exotic_classes.tex", "lean_file": "", "dep_count": 2, "rdep_count": 1, "descendant_count": 8, "proof_size_tex": 443, "effort_local": 443, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 11567}, "lem:exotic-no-two": {"id": "lem:exotic-no-two", "type": "lemma", "title": "No intersection in exactly two elements", "chapter": "Exotic classes", "statement": "\\textit{Source: Ancona, arXiv:1806.03216, Â§7.}\n  Under \\cref{def:exotic-assumption}, two exotic subsets cannot intersect in\n  exactly two elements.", "uses": ["def:exotic-subset", "def:exotic-assumption", "lem:exotic-frobenius-power"], "lean_name": "MR4199442StandardConjecturesForAbelianFourfolds.exoticSubsetsNotTwo", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:exotic-subset, lem:exotic-frobenius-power}\n  Suppose \\(I\\) and \\(J\\) are exotic subsets with \\(|I \\cap J| = 2\\). Let\n  \\(\\alpha, \\beta\\) be the Frobenius eigenvalues attached to \\(I \\setminus\n  (I \\cap J)\\) and \\(\\gamma, \\delta\\) those attached to \\(J \\setminus (I \\cap\n  J)\\). The first relation of \\cref{def:exotic-subset} applied to \\(I\\) and to\n  \\(J\\) (whose products both equal \\(q^2\\) and share the factors over\n  \\(I \\cap J\\)) gives \\(\\alpha\\beta = \\gamma\\delta\\). The second relation gives,\n  after reordering, \\(\\alpha = q/\\gamma\\) and \\(\\beta = q/\\delta\\). Substituting,\n  \\(\\gamma\\delta = (q/\\alpha)(q/\\beta) = q^2/(\\alpha\\beta)\\), so\n  \\(\\alpha\\beta = q^2/(\\alpha\\beta)\\), i.e. \\((\\alpha\\beta)^2 = q^2\\). Since\n  \\(\\alpha = \\alpha_\\sigma\\) and \\(\\beta = \\alpha_\\tau\\) are the eigenvalues of\n  the two elements \\(\\sigma, \\tau\\) of \\(I \\setminus (I \\cap J)\\), this reads\n  \\((\\alpha_\\sigma \\alpha_\\tau)^2 = q^2\\), contradicting\n  \\cref{lem:exotic-frobenius-power} applied to \\(I\\) with \\(n = 2\\).\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/exotic_classes.tex", "lean_file": "", "dep_count": 3, "rdep_count": 1, "descendant_count": 7, "proof_size_tex": 1017, "effort_local": 1017, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 12584}, "lem:exotic-count": {"id": "lem:exotic-count", "type": "lemma", "title": "There are zero, two or four exotic subsets", "chapter": "Exotic classes", "statement": "\\textit{Source: Ancona, arXiv:1806.03216, Â§7.}\n  Under \\cref{def:exotic-assumption}, the dimension of the space of exotic\n  classes is zero, two or four. More precisely, there are either zero, two or\n  four exotic subsets. If there are two, they are complex conjugate to one\n  another. If there are four, they are of the form \\(I, \\bar I, J, \\bar J\\) with\n  \\(|I \\cap J| = 3\\).", "uses": ["def:exotic-subset", "def:exotic-assumption", "lem:exotic-partition", "lem:exotic-no-two"], "lean_name": "MR4199442StandardConjecturesForAbelianFourfolds.exoticSubsetCount", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{lem:exotic-partition, lem:exotic-no-two, rem:exotic-completare,\n    rem:exotic-equal-dim}\n  The statement on exotic classes follows from that on exotic subsets: by\n  \\cref{lem:exotic-partition} together with the equality of\n  \\cref{rem:exotic-equal-dim} the dimension of the space of exotic classes is\n  even, and by \\cref{rem:exotic-completare} it is at most the number of exotic\n  subsets.\n\n  For the exotic subsets: complex conjugation acts on them without fixed points\n  (proof of \\cref{lem:exotic-partition}), so they come in conjugate pairs.\n  Suppose there are at least four, say \\(I, \\bar I, J, \\bar J\\). One of \\(J\\),\n  \\(\\bar J\\) meets \\(I\\) in at least two elements; say it is \\(J\\). Since\n  \\(|I| = |J| = 4\\) and \\(\\bar I = \\Sigma \\setminus I\\), \\(J\\) cannot equal \\(I\\)\n  or \\(\\bar I\\), so \\(1 \\le |I \\cap J| \\le 3\\); by \\cref{lem:exotic-no-two}\n  \\(|I \\cap J| \\neq 2\\), and as \\(|I \\cap J| \\ge 2\\) we get \\(|I \\cap J| = 3\\).\n  If there were more than four exotic subsets, the same argument would produce a\n  further exotic subset \\(K\\) meeting \\(I\\) in exactly three elements; then\n  \\(J\\) and \\(K\\) would meet in exactly two elements, impossible by\n  \\cref{lem:exotic-no-two}. Hence there are zero, two or four exotic subsets,\n  with the stated structure.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/exotic_classes.tex", "lean_file": "", "dep_count": 4, "rdep_count": 3, "descendant_count": 6, "proof_size_tex": 1276, "effort_local": 1276, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 14887}, "lem:exotic-supersingular": {"id": "lem:exotic-supersingular", "type": "lemma", "title": "Four exotic subsets force a supersingular factor", "chapter": "Exotic classes", "statement": "\\textit{Source: Ancona, arXiv:1806.03216, Â§7.}\n  Suppose there are four exotic subsets and \\cref{def:exotic-assumption} holds.\n  Then, after extending \\(k = \\F_q\\) to its quadratic extension \\(\\F_{q^2}\\), the\n  abelian fourfold \\(A\\) becomes isogenous to \\(E \\times X\\), where \\(X\\) is an\n  abelian threefold and \\(E\\) is a supersingular elliptic curve on which\n  Frobenius acts as \\(q \\cdot \\id\\).", "uses": ["def:exotic-subset", "def:exotic-assumption", "lem:exotic-count", "lem:exotic-partition", "lem:exotic-frobenius"], "lean_name": "MR4199442StandardConjecturesForAbelianFourfolds.exoticFourSupersingular", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{lem:exotic-count, lem:exotic-partition, lem:exotic-frobenius}\n  Keep the notation of \\cref{lem:exotic-count}: the four exotic subsets are\n  \\(I, \\bar I, J, \\bar J\\) with \\(|I \\cap J| = 3\\). Let \\(\\sigma\\) be the single\n  element of \\(I \\setminus (I \\cap J)\\). By \\cref{lem:exotic-partition}(1),\n  \\(\\bar J = \\Sigma \\setminus J\\), so \\(J \\cap \\bar I = \\bar J \\setminus\n  \\overline{(I \\cap J)}\\) reduces the element of \\(J \\setminus (I \\cap J)\\) to\n  \\(\\bar\\sigma\\). Writing \\(\\alpha = \\alpha_\\sigma\\) and using\n  \\(\\bar\\alpha = \\alpha_{\\bar\\sigma}\\), the first relation of\n  \\cref{lem:exotic-frobenius} applied to \\(I\\) and to \\(J\\) (whose products over\n  \\(I \\cap J\\) agree) forces \\(\\alpha = \\bar\\alpha\\), hence\n  \\(\\alpha^2 = \\alpha \\bar\\alpha = q\\).\n\n  Extend the base field to \\(\\F_{q^2}\\); the Frobenius eigenvalues become the\n  squares, and \\(\\alpha^2 = q\\) shows that \\(q\\) occurs among the eight\n  eigenvalues. Thus there is a nonzero Frobenius-equivariant map between the\n  Tate module of a supersingular elliptic curve \\(E\\) on which Frobenius acts as\n  \\(q \\cdot \\id\\) and the Tate module of \\(A\\). By \\cite[Theorem 4]{Tate} this\n  yields an isogeny \\(A \\sim E \\times X\\) with \\(X\\) an abelian threefold.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/exotic_classes.tex", "lean_file": "", "dep_count": 5, "rdep_count": 1, "descendant_count": 4, "proof_size_tex": 1221, "effort_local": 1221, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 16108}, "lem:exotic-threefold-factor": {"id": "lem:exotic-threefold-factor", "type": "lemma", "title": "The threefold factor has dimension two", "chapter": "Exotic classes", "statement": "\\textit{Source: Ancona, arXiv:1806.03216, Â§7.}\n  Over \\(k = \\F_{q^2}\\), let \\(E\\) be a supersingular elliptic curve on which\n  Frobenius acts as \\(q \\cdot \\id\\) and let \\(A = E \\times X\\) with \\(X\\) an\n  abelian threefold. Let \\(\\Sigma_X\\), \\(\\Sigma_E\\) be CM-structures for \\(X\\),\n  \\(E\\) and put \\(\\Sigma = \\Sigma_X \\cup \\Sigma_E\\). Then any exotic subset \\(I\\)\n  has \\(|I \\cap \\Sigma_X| = 3\\), and the motive\n  \\(\\mathcal{M}_{I \\cap \\Sigma_X} \\in \\CHM(k)_{\\Q}\\), a direct factor of\n  \\(\\hh^3(X)\\) constructed by \\cref{prop:cm-decomposition}, has dimension two.\n  Moreover, if the space of exotic classes on \\(A\\) is four-dimensional, it is\n  contained in the four-dimensional motive\n  \\(\\mathcal{M}_{I \\cap \\Sigma_X} \\otimes \\hh^1(E)\\).", "uses": ["def:exotic-subset", "def:exotic-assumption", "lem:exotic-partition", "lem:exotic-count", "prop:cm-decomposition"], "lean_name": "MR4199442StandardConjecturesForAbelianFourfolds.exoticThreefoldFactor", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{lem:exotic-partition, lem:exotic-count, prop:cm-decomposition}\n  By \\cref{lem:exotic-partition}(1) the pair \\((I, \\bar I)\\) partitions\n  \\(\\Sigma\\). Since \\(\\Sigma_X\\) has cardinality six and is stable under complex\n  conjugation, \\(I\\) meets \\(\\Sigma_X\\) in exactly half of it, so\n  \\(|I \\cap \\Sigma_X| = 3\\).\n\n  Consider the cardinality-three subsets \\(K \\subset \\Sigma_X\\) satisfying\n  \\[\\prod_{\\sigma \\in K} \\alpha_\\sigma = q^3, \\qquad\n    \\alpha_\\sigma \\alpha_\\tau \\neq q^2 \\ (\\sigma \\neq \\tau \\in K), \\qquad\n    \\alpha_\\sigma \\neq q \\ (\\sigma \\in K).\\]\n  The defining relations of an exotic subset for \\(I\\) imply that\n  \\(K = I \\cap \\Sigma_X\\) satisfies these three relations (the factor over\n  \\(\\Sigma_E\\) being a single eigenvalue equal to \\(q\\), since Frobenius acts on\n  \\(\\hh^1(E)\\) as \\(q\\cdot\\id\\)). Conversely, if \\(K \\subset \\Sigma_X\\) satisfies\n  them, then \\(I = K \\cup \\{\\sigma\\}\\) is an exotic subset for any\n  \\(\\sigma \\in \\Sigma_E\\). Since \\(A\\) has at most four exotic subsets\n  (\\cref{lem:exotic-count}), there are at most two such \\(K\\); as\n  \\(I \\cap \\Sigma_X\\) and \\(\\bar I \\cap \\Sigma_X\\) are two of them, there are\n  exactly two. The group \\(\\Gal(\\bar\\Q/\\Q)\\) acts on these two subsets, so the\n  motive \\(\\mathcal{M}_{I \\cap \\Sigma_X}\\) â€” spanned by the \\(M_{g(I \\cap\n  \\Sigma_X)}\\) â€” has dimension two. The final assertion follows from the\n  construction of \\(\\mathcal{M}_{I \\cap \\Sigma_X}\\) in\n  \\cref{prop:cm-decomposition}.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/exotic_classes.tex", "lean_file": "", "dep_count": 5, "rdep_count": 1, "descendant_count": 4, "proof_size_tex": 1463, "effort_local": 1463, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 16350}, "lem:exotic-split": {"id": "lem:exotic-split", "type": "lemma", "title": "Splitting the exotic motive into rank-two pieces", "chapter": "Exotic classes", "statement": "\\textit{Source: Ancona, arXiv:1806.03216, Â§7.}\n  Let \\(A = E \\times X\\) with \\(E\\) a supersingular elliptic curve such that\n  \\(\\dim_\\Q \\End(E) \\otimes_\\Z \\Q = 4\\). Fix a CM-structure for \\(X\\) and a direct\n  factor \\(\\mathcal{M}_I \\in \\CHM(k)_{\\Q}\\) of \\(\\hh^3(X)\\) constructed by\n  \\cref{prop:cm-decomposition}. Suppose \\(\\mathcal{M}_I\\) has rank two and that\n  \\(\\mathcal{M}_I \\otimes \\hh^1(E)\\) is spanned by algebraic classes. Then there\n  is a CM-structure for \\(E\\), with \\(\\Sigma_E = \\{\\sigma, \\bar\\sigma\\}\\), such\n  that\n  \\[\\mathcal{M}_I \\otimes \\hh^1(E) =\n    \\mathcal{M}_{I \\cup \\sigma} \\oplus \\mathcal{M}_{I \\cup \\bar\\sigma}\\]\n  in \\(\\CHM(k)_{\\Q}\\), a sum of two motives of rank two, via\n  \\cref{prop:cm-decomposition}(2).", "uses": ["prop:cm-decomposition", "cor:lifting-motives", "def:hyodo-kato", "def:abelian-type-rank"], "lean_name": "MR4199442StandardConjecturesForAbelianFourfolds.exoticSplit", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{prop:cm-decomposition, cor:lifting-motives, def:hyodo-kato}\n  By the construction of \\(\\mathcal{M}_I\\) (\\cref{prop:cm-decomposition}(2)) there\n  is a quadratic number field \\(F\\) over which \\(\\mathcal{M}_I\\) splits in\n  \\(\\CHM(k)_{F}\\) as a sum \\(\\mathcal{M}_I = M_I \\oplus M_{\\bar I}\\) of two\n  rank-one motives. It suffices to show that \\(\\hh^1(E)\\) likewise splits in\n  \\(\\CHM(k)_{F}\\) into a sum of two motives of dimension one; this is equivalent\n  to embedding \\(F\\) into the division algebra \\(\\End(E) \\otimes_\\Z \\Q\\). The\n  quaternion algebra \\(\\End(E) \\otimes_\\Z \\Q\\) is split at every prime except\n  \\(p\\) and \\(\\infty\\) (where its invariant is \\(1/2\\)); by the\n  Albert--Brauer--Hasse--Noether theorem the embedding exists iff\n  \\(\\End(E) \\otimes_\\Z F\\) is a matrix algebra, which need only be checked at\n  \\(p\\) and \\(\\infty\\). Thus it suffices to rule out the embeddings\n  \\(F \\subset \\R\\) and \\(F \\subset \\Q_p\\).\n\n  Both are excluded using that the motives lift to characteristic zero\n  (\\cref{cor:lifting-motives}). If \\(F \\subset \\R\\), the Betti realization of the\n  lift of \\(M_I\\) would have to respect Hodge symmetry, impossible for a\n  one-dimensional space of weight three. If \\(F \\subset \\Q_p\\), the Hyodo--Kato\n  realizations (\\cref{def:hyodo-kato}) of \\(M_I\\) and \\(M_{\\bar I}\\) would be\n  one-dimensional filtered \\(\\varphi\\)-modules with distinct filtrations (the\n  weight being three), whence \\(\\det(M_I \\otimes \\hh^1(E))\\) and\n  \\(\\det(M_{\\bar I} \\otimes \\hh^1(E))\\) would be one-dimensional filtered\n  \\(\\varphi\\)-modules with distinct filtrations on which absolute Frobenius acts\n  identically (by \\(p^4\\), as both are spanned by algebraic classes); one of them\n  would then fail to be admissible, contradicting that realizations of motives\n  are admissible. (Alternatively, without lifting: if \\(F \\subset \\Q_p\\) the\n  division algebra \\(\\End(E) \\otimes_\\Z \\Q_p\\) would act on the two-dimensional\n  \\(\\Q_p\\)-space of algebraic classes of \\(M_I \\otimes \\hh^1(E)\\), which is\n  impossible.) Hence \\(F\\) embeds in \\(\\End(E) \\otimes_\\Z \\Q\\), \\(\\hh^1(E)\\)\n  splits over \\(F\\), and the two rank-two summands\n  \\(\\mathcal{M}_{I \\cup \\sigma}, \\mathcal{M}_{I \\cup \\bar\\sigma}\\) are obtained by\n  \\cref{prop:cm-decomposition}(2).\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/exotic_classes.tex", "lean_file": "", "dep_count": 4, "rdep_count": 1, "descendant_count": 4, "proof_size_tex": 2255, "effort_local": 2255, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 9081}, "def:mainthm-setup": {"id": "def:mainthm-setup", "type": "definition", "title": "Setup and hypotheses of the main theorem", "chapter": "Orthogonal motives of rank two and quadratic forms", "statement": "\\textit{Source: Ancona, arXiv:1806.03216, Â§8 (hypotheses of the main theorem, bundled).}\n  We bundle once and for all the data and hypotheses shared by the main theorem\n  and every statement that ``keeps its notation''. Let \\(K\\) be a \\(p\\)-adic\n  field, \\(W\\) its ring of integers and \\(k\\) its residue field, and fix an\n  embedding \\(\\sigma : K \\hookrightarrow \\C\\). Let\n  \\[M \\in \\CHM(W)_\\Q\\]\n  be a motive in mixed characteristic, with induced motives\n  \\(M_{\\vert\\C} \\in \\CHM(\\C)_\\Q\\) and \\(M_{\\vert{k}} \\in \\CHM(k)_\\Q\\) obtained by\n  pullback. Consider the two \\(\\Q\\)-vector spaces\n  \\[V_B = R_B(M_{\\vert\\C}) \\qquad \\text{and} \\qquad\n    V_Z = \\Hom_{\\NUM(k)_\\Q}(\\one, M_{\\vert{k}}).\\]\n  Let \\(q\\) be a \\emph{quadratic form on \\(M\\)}, that is, a morphism\n  \\(q : \\Sym^2 M \\to \\one\\) in \\(\\CHM(W)_\\Q\\), and let\n  \\[q_B = R_B(q) \\qquad \\text{and} \\qquad\n    q_Z(\\cdot) = q_{\\vert{k}} \\circ \\Sym^2(\\cdot)\\]\n  be the induced \\(\\Q\\)-quadratic forms on \\(V_B\\) and \\(V_Z\\) respectively. We\n  assume throughout that\n  \\begin{enumerate}\n    \\item the \\(\\Q\\)-vector spaces \\(V_B\\) and \\(V_Z\\) are both of dimension\n      \\(2\\); and\n    \\item the pairing \\(q_B\\) on \\(V_B\\) is a polarization of Hodge structures.\n  \\end{enumerate}", "uses": ["def:chow-motives", "def:num-motives", "def:realizations", "def:pairing-mot", "def:filtered-phi-modules"], "lean_name": "MR4199442StandardConjecturesForAbelianFourfolds.MainTheoremSetup", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/quadratic_forms.tex", "lean_file": "", "dep_count": 5, "rdep_count": 7, "descendant_count": 34, "proof_size_tex": null, "effort_local": 1225, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 6002}, "thm:mainthm": {"id": "thm:mainthm", "type": "theorem", "title": "Main theorem on rank-two orthogonal motives", "chapter": "Orthogonal motives of rank two and quadratic forms", "statement": "\\textit{Source: Ancona, arXiv:1806.03216, Â§8.}\n  Let \\(K\\) be a \\(p\\)-adic field, \\(W\\) its ring of integers and \\(k\\) its\n  residue field, and fix an embedding \\(\\sigma : K \\hookrightarrow \\C\\). Let\n  \\[M \\in \\CHM(W)_\\Q\\]\n  be a motive in mixed characteristic, with induced motives\n  \\(M_{\\vert\\C} \\in \\CHM(\\C)_\\Q\\) and \\(M_{\\vert{k}} \\in \\CHM(k)_\\Q\\) obtained by\n  pullback. Consider the two \\(\\Q\\)-vector spaces\n  \\[V_B = R_B(M_{\\vert\\C}) \\qquad \\text{and} \\qquad\n    V_Z = \\Hom_{\\NUM(k)_\\Q}(\\one, M_{\\vert{k}}).\\]\n  Let \\(q\\) be a \\emph{quadratic form on \\(M\\)}, that is, a morphism\n  \\(q : \\Sym^2 M \\to \\one\\) in \\(\\CHM(W)_\\Q\\), and let\n  \\[q_B = R_B(q) \\qquad \\text{and} \\qquad\n    q_Z(\\cdot) = q_{\\vert{k}} \\circ \\Sym^2(\\cdot)\\]\n  be the induced \\(\\Q\\)-quadratic forms on \\(V_B\\) and \\(V_Z\\) respectively.\n  Suppose that\n  \\begin{enumerate}\n    \\item the \\(\\Q\\)-vector spaces \\(V_B\\) and \\(V_Z\\) are both of dimension\n      \\(2\\); and\n    \\item the pairing \\(q_B\\) on \\(V_B\\) is a polarization of Hodge structures.\n  \\end{enumerate}\n  Then the quadratic form \\(q_Z\\) is positive definite.", "uses": ["def:mainthm-setup", "prop:padic-reduction", "prop:ordinary-case", "ass:i-positive", "prop:endo-field", "prop:iso-norm-unram", "cor:period-unram", "lem:not-norm-unram", "prop:iso-norm-ram", "cor:period-ram", "lem:not-norm-ram", "cor:period-wild", "lem:not-norm-wild", "cor:period-wild2", "lem:not-norm-wild2"], "lean_name": "MR4199442StandardConjecturesForAbelianFourfolds.mainTheorem", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:mainthm-setup, prop:padic-reduction, prop:ordinary-case,\n    ass:i-positive, prop:endo-field, prop:iso-norm-unram, cor:period-unram,\n    lem:not-norm-unram, prop:iso-norm-ram, cor:period-ram, lem:not-norm-ram,\n    cor:period-wild, lem:not-norm-wild, cor:period-wild2, lem:not-norm-wild2}\n  By \\cref{prop:padic-reduction} it suffices to compare the two rank-two\n  \\(\\Q_p\\)-quadratic spaces \\((V_{B,p}, q_{B,p})\\) and \\((V_{Z,p}, q_{Z,p})\\):\n  we must show that \\(q_{B,p}\\) and \\(q_{Z,p}\\) are isomorphic if and only if\n  \\(i\\) is even, where \\(i\\) is the Hodge weight of \\cref{prop:padic-reduction}.\n\n  By \\cref{prop:ordinary-case} we may assume that \\(V_B\\) is not of Hodge type\n  \\((0,0)\\); that is, we may work under \\cref{ass:i-positive}, fixing the\n  positive integer \\(i\\) of that assumption and the field \\(F\\) furnished by\n  \\cref{prop:endo-field}. We now case-split on \\(F\\).\n\n  \\emph{\\(F\\) unramified.} Combining \\cref{prop:iso-norm-unram} with the period\n  computation of \\cref{cor:period-unram}, the forms \\(q_{B,p}\\) and \\(q_{Z,p}\\)\n  are isomorphic if and only if \\(1/p^i\\) is a norm; by\n  \\cref{lem:not-norm-unram} this holds if and only if \\(i\\) is even.\n\n  \\emph{\\(F\\) ramified, and \\(F \\neq \\Q_2(\\sqrt{3}), \\Q_2(\\sqrt{-1})\\).}\n  Combining \\cref{prop:iso-norm-ram} with \\cref{cor:period-ram}, the forms are\n  isomorphic if and only if \\(a^i\\) is a norm; by \\cref{lem:not-norm-ram} this\n  holds if and only if \\(i\\) is even.\n\n  \\emph{\\(F = \\Q_2(\\sqrt{-1})\\).} Combining \\cref{prop:iso-norm-ram} with\n  \\cref{cor:period-wild}, the forms are isomorphic if and only if\n  \\((\\alpha \\cdot \\sigma(\\alpha))^i\\) is a norm; by \\cref{lem:not-norm-wild}\n  this holds if and only if \\(i\\) is even.\n\n  \\emph{\\(F = \\Q_2(\\sqrt{3})\\).} Combining \\cref{prop:iso-norm-ram} with\n  \\cref{cor:period-wild2}, the forms are isomorphic if and only if\n  \\((\\alpha \\cdot \\sigma(\\alpha))^i\\) is a norm; by \\cref{lem:not-norm-wild2}\n  this holds if and only if \\(i\\) is even.\n\n  In every case \\(q_{B,p}\\) and \\(q_{Z,p}\\) are isomorphic if and only if \\(i\\)\n  is even, which is exactly the condition of \\cref{prop:padic-reduction} for\n  \\(q_Z\\) to be positive definite. This proves the theorem.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/quadratic_forms.tex", "lean_file": "", "dep_count": 15, "rdep_count": 1, "descendant_count": 3, "proof_size_tex": 2190, "effort_local": 2190, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 39343}, "prop:mainthm-properties": {"id": "prop:mainthm-properties", "type": "proposition", "title": "Consequences of the main hypotheses", "chapter": "Orthogonal motives of rank two and quadratic forms", "statement": "\\textit{Source: Ancona, arXiv:1806.03216, Â§8.}\n  Under the hypotheses of \\cref{thm:mainthm} the following hold.\n  \\begin{enumerate}\n    \\item The quadratic form \\(q_Z\\) on \\(V_Z\\) is non-degenerate.\n    \\item For every classical realization \\(R\\), the vector space\n      \\(R(M_{\\vert{k}})\\) has dimension two.\n    \\item For every classical realization \\(R\\), the vector space\n      \\(R(M_{\\vert{k}})\\) is spanned by algebraic classes.\n    \\item Numerical equivalence on \\(\\Hom_{\\CHM(k)_\\Q}(\\one, M_{\\vert{k}})\\)\n      coincides with homological equivalence for any classical cohomology.\n    \\item If \\(R\\) is a classical realization with coefficient field \\(L\\), then\n      \\(V_Z \\otimes_\\Q L = R(M)\\).\n  \\end{enumerate}", "uses": ["def:mainthm-setup", "def:realizations", "def:num-motives", "prop:motive-num-bound"], "lean_name": "MR4199442StandardConjecturesForAbelianFourfolds.mainTheoremProperties", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\proves{prop:mainthm-properties}\n  \\uses{def:realizations, prop:motive-num-bound, def:mainthm-setup}\n  We start with (2). By the comparison theorem between singular and\n  \\(\\ell\\)-adic cohomology, \\(\\dim_\\Q V_B = \\dim_{\\Q_\\ell} R_\\ell(M_{\\vert\\C})\\)\n  for all primes \\(\\ell\\), including \\(\\ell = p\\). By smooth proper base change,\n  \\(\\dim_{\\Q_\\ell} R_\\ell(M_{\\vert\\C}) = \\dim_{\\Q_\\ell} R_\\ell(M_{\\vert{k}})\\)\n  for all \\(\\ell \\neq p\\), and by the \\(p\\)-adic comparison theorem\n  \\(\\dim_{\\Q_p} R_p(M_{\\vert\\C}) = \\dim_{\\Frac(W(k))} R_\\crys(M_{\\vert{k}})\\).\n  Since \\(\\dim_\\Q V_B = 2\\) by hypothesis, this gives (2).\n\n  Parts (3)--(5) follow exactly as in \\cref{prop:motive-num-bound}: the\n  hypothesis used there that the motive is of abelian type, ensuring that all\n  realizations have the same dimension, is here replaced by part (2).\n\n  Finally, for part (1) it is enough to show that \\(R(q_{\\vert{k}})\\) is\n  non-degenerate for some classical realization, by parts (2)--(5). Using the\n  comparison theorems once more, this is equivalent to \\(R_B(q)\\) being\n  non-degenerate, which holds because \\(R_B(q)\\) is a polarization of Hodge\n  structures.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/quadratic_forms.tex", "lean_file": "", "dep_count": 4, "rdep_count": 2, "descendant_count": 31, "proof_size_tex": 1150, "effort_local": 1150, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 10323}, "def:hilbert-symbol": {"id": "def:hilbert-symbol", "type": "definition", "title": "Hilbert symbol", "chapter": "Orthogonal motives of rank two and quadratic forms", "statement": "\\textit{Source: Ancona, arXiv:1806.03216, Â§9.}\n  Let \\(q\\) be a \\(\\Q\\)-quadratic form of rank \\(2\\) and \\(\\nu\\) a place of\n  \\(\\Q\\). The \\emph{Hilbert symbol} \\(\\varepsilon_\\nu(q)\\) of \\(q\\) at \\(\\nu\\) is\n  \\(+1\\) if the equation\n  \\[x^2 - q(y,z) = 0\\]\n  has a nonzero solution \\(x, y, z \\in \\Q_\\nu\\), and \\(-1\\) otherwise. According\n  to context we write \\(\\varepsilon_p(q)\\) or \\(\\varepsilon_\\R(q)\\).", "uses": [], "lean_name": "MR4199442StandardConjecturesForAbelianFourfolds.hilbertSymbol", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/quadratic_forms.tex", "lean_file": "", "dep_count": 0, "rdep_count": 3, "descendant_count": 9, "proof_size_tex": null, "effort_local": 402, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 402}, "prop:local-invariant": {"id": "prop:local-invariant", "type": "proposition", "title": "Local invariants determine a rank-two form over $\\Q_p$", "chapter": "Orthogonal motives of rank two and quadratic forms", "statement": "\\textit{Source: Ancona, arXiv:1806.03216, Â§9 (Serre, \\emph{Cours d'arithmÃ©tique}, Â§2.3).}\n  Let \\(p\\) be a prime and \\(q_1, q_2\\) two non-degenerate \\(\\Q\\)-quadratic\n  forms of rank \\(2\\). Then\n  \\[q_1 \\otimes \\Q_p \\cong q_2 \\otimes \\Q_p\\]\n  if and only if the discriminants of \\(q_1\\) and \\(q_2\\) coincide in\n  \\(\\Q_p^*/(\\Q_p^*)^2\\) and \\(\\varepsilon_p(q_1) = \\varepsilon_p(q_2)\\).", "uses": ["def:hilbert-symbol"], "lean_name": "MR4199442StandardConjecturesForAbelianFourfolds.rank2FormIsoQp", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:hilbert-symbol}\n  \\textit{Source: Serre, Cours d'arithmÃ©tique, Â§2.3 (classical; proof sketch\n  supplied).}\n  Over a \\(p\\)-adic field a non-degenerate quadratic form of a given rank is\n  classified up to isomorphism by two invariants: its discriminant, viewed in\n  \\(\\Q_p^*/(\\Q_p^*)^2\\), and its Hasse--Witt invariant. Two such forms of equal\n  rank over \\(\\Q_p\\) are therefore isomorphic if and only if both invariants\n  agree. For a rank-two form the Hasse--Witt invariant reduces to a single\n  Hilbert symbol, which â€” by the defining equation \\(x^2 - q(y,z) = 0\\) of\n  \\cref{def:hilbert-symbol} â€” is exactly \\(\\varepsilon_p(q)\\). Hence for\n  rank-two forms the pair (discriminant in \\(\\Q_p^*/(\\Q_p^*)^2\\),\n  \\(\\varepsilon_p\\)) is a complete system of invariants, and\n  \\(q_1 \\otimes \\Q_p \\cong q_2 \\otimes \\Q_p\\) if and only if the discriminants\n  of \\(q_1\\) and \\(q_2\\) coincide in \\(\\Q_p^*/(\\Q_p^*)^2\\) and\n  \\(\\varepsilon_p(q_1) = \\varepsilon_p(q_2)\\).\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/quadratic_forms.tex", "lean_file": "", "dep_count": 1, "rdep_count": 1, "descendant_count": 7, "proof_size_tex": 967, "effort_local": 967, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 1369}, "thm:product-formula": {"id": "thm:product-formula", "type": "theorem", "title": "Product formula for the Hilbert symbol", "chapter": "Orthogonal motives of rank two and quadratic forms", "statement": "\\textit{Source: Ancona, arXiv:1806.03216, Â§9 (Serre, \\emph{Cours d'arithmÃ©tique}, Â§3.1).}\n  Let \\(q\\) be a non-degenerate \\(\\Q\\)-quadratic form of rank \\(2\\), with Hilbert\n  symbols \\(\\varepsilon_\\nu(q)\\) as in \\cref{def:hilbert-symbol}. Then\n  \\(\\varepsilon_\\nu(q) = +1\\) for all but finitely many places \\(\\nu\\), and the\n  product formula over all places holds:\n  \\[\\prod_\\nu \\varepsilon_\\nu(q) = +1.\\]", "uses": ["def:hilbert-symbol"], "lean_name": "MR4199442StandardConjecturesForAbelianFourfolds.hilbertProductFormula", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:hilbert-symbol}\n  \\textit{Source: Serre, Cours d'arithmÃ©tique, Â§3.1 (classical; proof sketch\n  supplied).}\n  Up to scaling, diagonalize \\(q = \\langle a, b \\rangle\\) with\n  \\(a, b \\in \\Q^*\\). By \\cref{def:hilbert-symbol} the local invariant\n  \\(\\varepsilon_\\nu(q)\\) is then the Hilbert symbol \\((a,b)_\\nu\\) of \\(\\Q\\) at\n  the place \\(\\nu\\), measuring whether \\(z^2 = a x^2 + b y^2\\) has a nonzero\n  solution over \\(\\Q_\\nu\\). For a place \\(\\nu\\) not lying over \\(2\\), \\(\\infty\\),\n  or a prime dividing \\(ab\\), both \\(a\\) and \\(b\\) are units in \\(\\Z_\\nu\\) and\n  the form \\(\\langle a, b \\rangle\\) represents every unit, so\n  \\((a,b)_\\nu = +1\\); this leaves only the finitely many places dividing\n  \\(2 a b \\infty\\), giving the finiteness assertion. The global identity\n  \\[\\prod_\\nu \\varepsilon_\\nu(q) = \\prod_\\nu (a,b)_\\nu = +1\\]\n  is Hilbert reciprocity for \\(\\Q\\), which is equivalent to the law of quadratic\n  reciprocity together with its supplementary laws.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/quadratic_forms.tex", "lean_file": "", "dep_count": 1, "rdep_count": 1, "descendant_count": 7, "proof_size_tex": 969, "effort_local": 969, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 1371}, "cor:signature-top": {"id": "cor:signature-top", "type": "corollary", "title": "Sign comparison from $\\ell$-adic data", "chapter": "Orthogonal motives of rank two and quadratic forms", "statement": "\\textit{Source: Ancona, arXiv:1806.03216, Â§9.}\n  Let \\(q_1, q_2\\) be two non-degenerate \\(\\Q\\)-quadratic forms of rank \\(2\\),\n  and let \\(p\\) be a prime. Suppose that\n  \\[q_1 \\otimes \\Q_\\ell \\cong q_2 \\otimes \\Q_\\ell \\qquad\n    \\text{for all primes } \\ell \\neq p.\\]\n  Then \\(q_1\\) is positive definite if and only if one of the following holds:\n  \\begin{enumerate}\n    \\item \\(q_1 \\otimes \\Q_p\\) and \\(q_2 \\otimes \\Q_p\\) are isomorphic and\n      \\(q_2\\) is positive definite; or\n    \\item \\(q_1 \\otimes \\Q_p\\) and \\(q_2 \\otimes \\Q_p\\) are not isomorphic and\n      \\(q_2\\) is negative definite.\n  \\end{enumerate}", "uses": ["def:hilbert-symbol", "prop:local-invariant", "thm:product-formula"], "lean_name": "MR4199442StandardConjecturesForAbelianFourfolds.signatureComparison", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{rem:rank2-signature, prop:local-invariant, thm:product-formula}\n  The \\(\\ell\\)-adic hypothesis implies that the discriminants of \\(q_1\\) and\n  \\(q_2\\) coincide in \\(\\Q_\\ell^*/(\\Q_\\ell^*)^2\\) for all \\(\\ell \\neq p\\), and\n  hence (by the Hasse principle for squares in \\(\\Q\\)) coincide already in\n  \\(\\Q^*/(\\Q^*)^2\\).\n\n  If the common discriminant is negative, none of the listed conditions holds\n  and neither does positive definiteness, so the equivalence is clear. Assume\n  henceforth the discriminant is positive. By \\cref{rem:rank2-signature},\n  \\(q_1\\) is positive definite if and only if \\(\\varepsilon_\\R(q_1) = +1\\), and\n  \\(q_2\\) is positive (resp.\\ negative) definite if and only if\n  \\(\\varepsilon_\\R(q_2) = +1\\) (resp.\\ \\(-1\\)).\n\n  By \\cref{thm:product-formula},\n  \\(\\prod_\\nu \\varepsilon_\\nu(q_1) = \\prod_\\nu \\varepsilon_\\nu(q_2) = +1\\).\n  Combining this with the \\(\\ell\\)-adic isomorphisms (which give\n  \\(\\varepsilon_\\ell(q_1) = \\varepsilon_\\ell(q_2)\\) for all \\(\\ell \\neq p\\))\n  leaves only the real and \\(p\\)-adic places, whence\n  \\[\\varepsilon_\\R(q_1)\\,\\varepsilon_p(q_1)\n    = \\varepsilon_\\R(q_2)\\,\\varepsilon_p(q_2).\\]\n  Thus \\(q_1\\) is positive definite, i.e.\\ \\(\\varepsilon_\\R(q_1) = +1\\), if and\n  only if \\(\\varepsilon_p(q_1) = \\varepsilon_\\R(q_2)\\,\\varepsilon_p(q_2)\\); that\n  is, if and only if either \\(q_2\\) is positive definite and\n  \\(\\varepsilon_p(q_1) = \\varepsilon_p(q_2)\\), or \\(q_2\\) is negative definite\n  and \\(\\varepsilon_p(q_1) \\neq \\varepsilon_p(q_2)\\). Since the discriminants of\n  \\(q_1\\) and \\(q_2\\) coincide, the equality\n  \\(\\varepsilon_p(q_1) = \\varepsilon_p(q_2)\\) is, by\n  \\cref{prop:local-invariant}, equivalent to \\(q_1 \\otimes \\Q_p\\) and\n  \\(q_2 \\otimes \\Q_p\\) being isomorphic. This is the assertion.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/quadratic_forms.tex", "lean_file": "", "dep_count": 3, "rdep_count": 1, "descendant_count": 6, "proof_size_tex": 1756, "effort_local": 1756, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 4094}, "prop:padic-reduction": {"id": "prop:padic-reduction", "type": "proposition", "title": "$p$-adic reduction of the main theorem", "chapter": "Orthogonal motives of rank two and quadratic forms", "statement": "\\textit{Source: Ancona, arXiv:1806.03216, Â§9.}\n  Keep the notation of \\cref{def:mainthm-setup}. Let \\(p\\) be the characteristic\n  of \\(k\\), and let \\(i\\) be the unique non-negative integer such that the Hodge\n  structure \\(V_B\\) is of type \\((i,-i)\\) and \\((-i,i)\\). Then \\(q_Z\\) is\n  positive definite if and only if:\n  \\begin{enumerate}\n    \\item when \\(i\\) is even, the quadratic forms \\(q_B \\otimes \\Q_p\\) and\n      \\(q_Z \\otimes \\Q_p\\) are isomorphic; and\n    \\item when \\(i\\) is odd, the quadratic forms \\(q_B \\otimes \\Q_p\\) and\n      \\(q_Z \\otimes \\Q_p\\) are not isomorphic.\n  \\end{enumerate}", "uses": ["def:mainthm-setup", "prop:mainthm-properties", "cor:signature-top"], "lean_name": "MR4199442StandardConjecturesForAbelianFourfolds.padicReduction", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{prop:mainthm-properties, cor:signature-top}\n  By \\cref{prop:mainthm-properties}\\,(part~(5)) we\n  have \\(q_Z \\otimes \\Q_\\ell = R_\\ell(q_{\\vert{k}})\\), and by the comparison\n  theorem \\(q_B \\otimes \\Q_\\ell = R_\\ell(q_{\\vert\\C})\\). Combining these with\n  smooth proper base change in \\(\\ell\\)-adic cohomology yields\n  \\[q_B \\otimes \\Q_\\ell = q_Z \\otimes \\Q_\\ell \\qquad\n    \\text{for all } \\ell \\neq p.\\]\n  On the other hand, by hypothesis \\(q_B\\) is a polarization of the Hodge\n  structure \\(V_B\\), hence \\(q_B\\) is positive definite when \\(i\\) is even and\n  negative definite when \\(i\\) is odd. The claim now follows by applying\n  \\cref{cor:signature-top} with \\(q_1 = q_Z\\) and \\(q_2 = q_B\\).\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/quadratic_forms.tex", "lean_file": "", "dep_count": 3, "rdep_count": 2, "descendant_count": 5, "proof_size_tex": 697, "effort_local": 697, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 15114}, "thm:bcrys-bdr": {"id": "thm:bcrys-bdr", "type": "theorem", "title": "Period rings (Fontaine)", "chapter": "p-adic periods and the proof of the main theorem", "statement": "\\textit{Source: Ancona, arXiv:1806.03216, \\S10.}\n  There are two integral \\(\\Q_p\\)-algebras\n  \\[\\Bcrys \\subset \\BdR,\\]\n  the first carrying actions of the Galois group \\(\\Gal_K\\) and of the absolute\n  Frobenius \\(\\varphi\\), the second carrying a discrete valuation\n  \\(\\nu : \\BdR \\to \\Z \\cup \\{+\\infty\\}\\) and hence a decreasing filtration\n  \\(\\Fil^i \\BdR = \\{x \\in \\BdR : \\nu(x) \\geq i\\}\\) satisfying\n  \\(\\Fil^i \\cdot \\Fil^j \\subset \\Fil^{i+j}\\). The algebra \\(\\BdR\\) contains an\n  algebraic closure \\(\\overline{\\Q}_p\\), and \\(\\Bcrys \\cap \\overline{\\Q}_p\\) is\n  the maximal unramified extension of \\(\\Q_p\\) inside \\(\\overline{\\Q}_p\\).\n  Finally, the key identity\n  \\[\\bigl(\\Bcrys^{\\varphi=\\id} \\cap \\Fil^0 \\BdR\\bigr) = \\Q_p\\]\n  holds.", "uses": ["def:filtered-phi-modules"], "lean_name": "MR4199442StandardConjecturesForAbelianFourfolds.BcrysBdR", "proved": false, "mathlib_ok": false, "proof_tex": "\n  This is a foundational theorem of \\(p\\)-adic Hodge theory; see Fontaine, cited\n  in Ancona \\S10 as \\cite{Fonfon} and \\cite{Fontp} (the last identity is\n  \\cite[Theorem~5.3.7]{Fontp}). We take it as an external input.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/padic_periods.tex", "lean_file": "", "dep_count": 1, "rdep_count": 9, "descendant_count": 32, "proof_size_tex": 216, "effort_local": 216, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 866}, "thm:crys-equiv": {"id": "thm:crys-equiv", "type": "theorem", "title": "Crystalline comparison (Fontaine--Messing, Faltings, Tsuji)", "chapter": "p-adic periods and the proof of the main theorem", "statement": "\\textit{Source: Ancona, arXiv:1806.03216, \\S10.}\n  There is an equivalence of \\(\\Q_p\\)-linear rigid categories\n  \\[D : \\REP \\longrightarrow \\MOD\\]\n  between the category \\(\\REP\\) of crystalline \\(\\Gal_K\\)-representations and the\n  category \\(\\MOD\\) of admissible filtered \\(\\varphi\\)-modules\n  (\\cref{def:filtered-phi-modules}), with the following properties.\n  \\begin{enumerate}\n    \\item There is a canonical identification \\(V \\otimes \\Bcrys = D(V) \\otimes\n      \\Bcrys\\), \\(\\Gal_K\\)- and \\(\\varphi\\)-equivariant, and the induced\n      isomorphism \\(V \\otimes \\BdR = D(V) \\otimes \\BdR\\) respects filtrations.\n    \\item The functor is \\(D(V) = (V \\otimes \\Bcrys)^{\\Gal_K}\\) and its inverse\n      sends \\(W \\mapsto [W \\otimes \\Bcrys]^{\\varphi=\\id} \\cap \\Fil^0[W \\otimes\n      \\BdR]\\).\n    \\item \\(D\\) is compatible with the realization functors \\(R_p((\\cdot)_{\\vert\n      K})\\) and \\(R_\\HK(\\cdot)\\): one has \\(R_\\HK(\\cdot) = D \\circ R_p((\\cdot)_{\\vert\n      K})\\).\n  \\end{enumerate}", "uses": ["def:filtered-phi-modules", "def:realizations", "def:hyodo-kato", "thm:bcrys-bdr"], "lean_name": "MR4199442StandardConjecturesForAbelianFourfolds.crystallineEquivalence", "proved": false, "mathlib_ok": false, "proof_tex": "\n  This is a foundational theorem of \\(p\\)-adic Hodge theory; see\n  Fontaine--Messing, Faltings, and Tsuji, cited in Ancona \\S10 as\n  \\cite{FontMess}, \\cite{Falt}, \\cite{CF}. We take it as an external input.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/padic_periods.tex", "lean_file": "", "dep_count": 4, "rdep_count": 6, "descendant_count": 31, "proof_size_tex": 204, "effort_local": 204, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 3264}, "cor:crys-identifications": {"id": "cor:crys-identifications", "type": "corollary", "title": "Crystalline identification of the two spaces", "chapter": "p-adic periods and the proof of the main theorem", "statement": "\\textit{Source: Ancona, arXiv:1806.03216, \\S10.}\n  There are canonical identifications, commuting with all the extra structure:\n  \\begin{align}\n    (V_{B,p}, q_{B,p}) &= [(V_{Z,p}, q_{Z,p}) \\otimes \\Bcrys]^{\\varphi=\\id}\n      \\cap \\Fil^0[(V_{Z,p}, q_{Z,p}) \\otimes \\BdR], \\\\\n    (V_{B,p}, q_{B,p}) \\otimes \\Bcrys &= (V_{Z,p}, q_{Z,p}) \\otimes \\Bcrys, \\\\\n    (V_{B,p}, q_{B,p}) \\otimes \\BdR &= (V_{Z,p}, q_{Z,p}) \\otimes \\BdR.\n  \\end{align}\n  Moreover, under these identifications, the equality of \\(\\Q_p\\)-algebras\n  \\[\\End_{\\Gal_K}(V_{B,p}) = \\End_{\\varphi,\\Fil^*}(V_{Z,p} \\otimes \\Frac(W(k)))\\]\n  holds.", "uses": ["thm:crys-equiv", "prop:mainthm-properties", "def:hyodo-kato", "def:realizations", "def:mainthm-setup"], "lean_name": "MR4199442StandardConjecturesForAbelianFourfolds.crysIdentifications", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{thm:crys-equiv, prop:mainthm-properties, def:hyodo-kato}\n  By \\cref{prop:mainthm-properties} (part~(5))\n  we have \\(V_{Z,p} \\otimes \\Frac(W(k)) = R_\\crys(M_{\\vert k})\\), and by\n  \\cref{def:hyodo-kato} this equals \\(R_\\HK(M)\\). On the other hand\n  \\(V_{B,p} = R_p(M_{\\vert K})\\) by the comparison between singular and\n  \\(p\\)-adic cohomology. Part (3) of \\cref{thm:crys-equiv} then gives\n  \\(D(R_p(M_{\\vert K})) = R_\\HK(M)\\), so altogether\n  \\(D(V_{B,p}) = V_{Z,p} \\otimes \\Frac(W(k))\\). These identifications are\n  compatible with the quadratic forms, the realization functors and \\(D\\) being\n  tensor functors. Part (2) of \\cref{thm:crys-equiv} then gives\n  the first identity, and part (1) gives the second and third identities;\n  the algebra identification follows because \\(D\\) is an equivalence of\n  \\(\\Q_p\\)-linear categories.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/padic_periods.tex", "lean_file": "", "dep_count": 5, "rdep_count": 7, "descendant_count": 29, "proof_size_tex": 838, "effort_local": 838, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 12062}, "prop:ordinary-case": {"id": "prop:ordinary-case", "type": "proposition", "title": "The ordinary case", "chapter": "p-adic periods and the proof of the main theorem", "statement": "\\textit{Source: Ancona, arXiv:1806.03216, \\S10.}\n  Suppose the Hodge structure \\(V_B\\) is of type \\((0,0)\\). Then \\(q_{B,p}\\) and\n  \\(q_{Z,p}\\) are isomorphic --- in fact equal under the second identity of\n  \\cref{cor:crys-identifications} --- and hence \\cref{thm:mainthm} holds in this\n  case.", "uses": ["cor:crys-identifications", "thm:bcrys-bdr", "prop:padic-reduction", "def:mainthm-setup"], "lean_name": "MR4199442StandardConjecturesForAbelianFourfolds.ordinaryCase", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{cor:crys-identifications, thm:bcrys-bdr, prop:padic-reduction}\n  Frobenius acts trivially on \\(V_{Z,p}\\), which is spanned by algebraic\n  classes. The hypothesis on Hodge types gives \\(\\Fil^0(V_{Z,p} \\otimes K) =\n  V_{Z,p} \\otimes K\\). Hence the first identity of \\cref{cor:crys-identifications}\n  yields\n  \\[(V_{B,p}, q_{B,p}) = (V_{Z,p}, q_{Z,p}) \\otimes (\\Bcrys^{\\varphi=\\id} \\cap\n    \\Fil^0 \\BdR).\\]\n  By the identity \\(\\Bcrys^{\\varphi=\\id} \\cap \\Fil^0 \\BdR = \\Q_p\\) of\n  \\cref{thm:bcrys-bdr} we deduce \\(q_{B,p} = q_{Z,p}\\). \\cref{thm:mainthm} then\n  follows via \\cref{prop:padic-reduction}.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/padic_periods.tex", "lean_file": "", "dep_count": 4, "rdep_count": 1, "descendant_count": 4, "proof_size_tex": 602, "effort_local": 602, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 17455}, "ass:i-positive": {"id": "ass:i-positive", "type": "definition", "title": "The integer \\(i\\); non-ordinary assumption", "chapter": "p-adic periods and the proof of the main theorem", "statement": "\\textit{Source: Ancona, arXiv:1806.03216, \\S10.}\n  From now on we suppose the Hodge structure \\(V_B\\) is \\emph{not} of type\n  \\((0,0)\\). Equivalently, there is a well-defined positive integer \\(i\\) such\n  that \\(\\Fil^i(V_Z \\otimes K)\\) is a \\(K\\)-line and\n  \\(\\Fil^{i+1}(V_Z \\otimes K) = 0\\).", "uses": ["def:mainthm-setup", "def:realizations"], "lean_name": "MR4199442StandardConjecturesForAbelianFourfolds.iPositive", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/padic_periods.tex", "lean_file": "", "dep_count": 2, "rdep_count": 5, "descendant_count": 29, "proof_size_tex": null, "effort_local": 292, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 6294}, "lem:isotropic-line": {"id": "lem:isotropic-line", "type": "lemma", "title": "The Hodge line is isotropic", "chapter": "p-adic periods and the proof of the main theorem", "statement": "\\textit{Source: Ancona, arXiv:1806.03216, \\S10.}\n  Under \\cref{ass:i-positive} the line \\(\\Fil^i(V_Z \\otimes K)\\) is isotropic.", "uses": ["ass:i-positive", "def:mainthm-setup"], "lean_name": "MR4199442StandardConjecturesForAbelianFourfolds.isotropicLine", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{ass:i-positive}\n  As the quadratic form \\(q\\) is motivic, its de Rham realization respects the\n  filtration, so \\(R_\\dR(q)(\\Fil^i(V_Z \\otimes K)) \\subset \\Fil^{2i} R_\\dR(\\one)\\).\n  As \\(i > 0\\), we have \\(\\Fil^{2i} R_\\dR(\\one) = 0\\).\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/padic_periods.tex", "lean_file": "", "dep_count": 2, "rdep_count": 1, "descendant_count": 28, "proof_size_tex": 239, "effort_local": 239, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 6533}, "prop:endo-field": {"id": "prop:endo-field", "type": "proposition", "title": "The endomorphism field \\(F\\)", "chapter": "p-adic periods and the proof of the main theorem", "statement": "\\textit{Source: Ancona, arXiv:1806.03216, \\S10.}\n  Under \\cref{ass:i-positive}, the \\(\\Q_p\\)-algebra\n  \\(\\End_{\\Gal_K}(V_{B,p})\\) is a field \\(F\\) with \\([F : \\Q_p] = 2\\). Moreover,\n  for all \\(v \\in V_{B,p}\\) and \\(f \\in F\\),\n  \\begin{equation}\n    q_{B,p}(f \\cdot v) = N_{F/\\Q_p}(f)\\, q_{B,p}(v).\n  \\end{equation}", "uses": ["cor:crys-identifications", "lem:isotropic-line", "ass:i-positive"], "lean_name": "MR4199442StandardConjecturesForAbelianFourfolds.endoField", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{cor:crys-identifications, lem:isotropic-line, ass:i-positive}\n  Let \\(G = \\SO(q_{B,p})\\) (its \\(\\Q_p\\)-points) and set \\(F := \\Q_p[G] \\subset\n  \\End(V_{B,p})\\); this algebra is commutative of dimension two by construction.\n  As the quadratic form is induced by an algebraic cycle, \\(\\Gal_K\\) acts on\n  \\(V_{B,p}\\) through \\(G\\), so\n  \\(\\Q_p[\\Gal_K] \\subset F \\subset \\End(V_{B,p})\\).\n\n  First, \\(\\Q_p[\\Gal_K]\\) is not of dimension one: otherwise\n  \\(\\End_{\\Gal_K}(V_{B,p}) \\cong M_{2\\times 2}(\\Q_p)\\), and by the algebra\n  identification of \\cref{cor:crys-identifications} the same would hold for\n  \\(\\End_{\\varphi,\\Fil^*}(V_{Z,p} \\otimes \\Frac(W(k)))\\), forcing\n  \\(V_{Z,p} \\otimes \\Frac(W(k))\\) to split as a sum of two isomorphic filtered\n  \\(\\varphi\\)-modules with a one-step filtration, contradicting\n  \\cref{ass:i-positive}. Hence \\(\\Q_p[\\Gal_K] = F\\), and since \\(F\\) is its own\n  commutant, \\(F = \\End_{\\Gal_K}(V_{B,p})\\).\n\n  Next, \\(F\\) is not isomorphic to \\(\\Q_p \\times \\Q_p\\): otherwise\n  \\(V_{Z,p} \\otimes \\Frac(W(k)) = W \\oplus W'\\) as filtered \\(\\varphi\\)-modules\n  with both lines isotropic; as \\(\\Fil^i(V_Z \\otimes K)\\) is isotropic\n  (\\cref{lem:isotropic-line}), after possibly swapping \\(W, W'\\) we would have\n  \\(W \\otimes K = \\Fil^i(V_Z \\otimes K)\\). Admissibility then forces, for any\n  nonzero \\(w \\in W\\), the scalar \\(\\alpha\\) with \\(\\varphi(w) = \\alpha w\\) to\n  have \\(p\\)-adic valuation \\(i\\); but \\(V_{Z,p}\\) being spanned by algebraic\n  classes provides a nonzero \\(\\varphi\\)-fixed vector of \\(W\\), and since\n  \\(i \\neq 0\\) this is a contradiction.\n\n  Not being isomorphic to \\(\\Q_p \\times \\Q_p\\), the algebra \\(F = \\Q_p[\\SO(q_{B,p})]\\)\n  is a quadratic field extension of \\(\\Q_p\\). Identifying \\(V_{B,p}\\) with \\(F\\)\n  and the action of \\(F\\) with left multiplication, we have\n  \\(N_{F/\\Q_p}(f) = \\det(f \\cdot)\\), whence the displayed norm relation.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/padic_periods.tex", "lean_file": "", "dep_count": 3, "rdep_count": 11, "descendant_count": 27, "proof_size_tex": 1885, "effort_local": 1885, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 14478}, "cor:F-acts-num": {"id": "cor:F-acts-num", "type": "corollary", "title": "\\(F\\) acts on the numerical side", "chapter": "p-adic periods and the proof of the main theorem", "statement": "\\textit{Source: Ancona, arXiv:1806.03216, \\S10.}\n  Let \\(F\\) be the field of \\cref{prop:endo-field}. Then \\(F\\) acts on\n  \\(V_{Z,p}\\), the first identification of \\cref{cor:crys-identifications} is\n  \\(F\\)-equivariant, and for all \\(v \\in V_{Z,p}\\) and \\(f \\in F\\),\n  \\begin{equation}\n    q_{Z,p}(f \\cdot v) = N_{F/\\Q_p}(f)\\, q_{Z,p}(v).\n  \\end{equation}", "uses": ["prop:endo-field", "cor:crys-identifications"], "lean_name": "MR4199442StandardConjecturesForAbelianFourfolds.FactsNum", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{prop:endo-field, cor:crys-identifications}\n  Replacing \\(V_{Z,p}\\) by \\(V_{Z,p} \\otimes \\Frac(W(k))\\), the statement\n  combines \\cref{cor:crys-identifications} and \\cref{prop:endo-field}. As \\(F\\)\n  commutes with \\(\\varphi\\), and \\(V_{Z,p} \\subset V_{Z,p} \\otimes \\Frac(W(k))\\)\n  is exactly the space of \\(\\varphi\\)-fixed vectors, \\(V_{Z,p}\\) is stable under\n  \\(F\\) and the statement follows.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/padic_periods.tex", "lean_file": "", "dep_count": 2, "rdep_count": 1, "descendant_count": 7, "proof_size_tex": 399, "effort_local": 399, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 14877}, "cor:norm-criterion": {"id": "cor:norm-criterion", "type": "corollary", "title": "Norm criterion for isomorphism", "chapter": "p-adic periods and the proof of the main theorem", "statement": "\\textit{Source: Ancona, arXiv:1806.03216, \\S10.}\n  Let \\(F\\) be the field of \\cref{prop:endo-field}. The following are\n  equivalent.\n  \\begin{enumerate}\n    \\item The quadratic forms \\(q_{B,p}\\) and \\(q_{Z,p}\\) are isomorphic.\n    \\item There exist nonzero \\(v_B \\in V_{B,p}\\), \\(v_Z \\in V_{Z,p}\\) with\n      \\(q_{B,p}(v_B)\\) and \\(q_{Z,p}(v_Z)\\) equal in\n      \\(\\Q_p^*/N_{F/\\Q_p}(F^*)\\).\n    \\item For all nonzero \\(v_B \\in V_{B,p}\\), \\(v_Z \\in V_{Z,p}\\), the values\n      \\(q_{B,p}(v_B)\\) and \\(q_{Z,p}(v_Z)\\) are equal in\n      \\(\\Q_p^*/N_{F/\\Q_p}(F^*)\\).\n  \\end{enumerate}", "uses": ["prop:endo-field", "cor:F-acts-num"], "lean_name": "MR4199442StandardConjecturesForAbelianFourfolds.normCriterion", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{prop:endo-field, cor:F-acts-num}\n  A formal consequence of the norm relations of \\cref{prop:endo-field} and\n  \\cref{cor:F-acts-num}: both forms\n  scale by \\(N_{F/\\Q_p}\\) under the \\(F\\)-action, which acts transitively on\n  nonzero vectors of each rank-two \\(F\\)-line, so the class of the value in\n  \\(\\Q_p^*/N_{F/\\Q_p}(F^*)\\) is independent of the chosen nonzero vector.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/padic_periods.tex", "lean_file": "", "dep_count": 2, "rdep_count": 2, "descendant_count": 6, "proof_size_tex": 376, "effort_local": 376, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 15253}, "def:periods-unram": {"id": "def:periods-unram", "type": "definition", "title": "Periods, unramified case", "chapter": "p-adic periods and the proof of the main theorem", "statement": "\\textit{Source: Ancona, arXiv:1806.03216, \\S11.}\n  The \\(F\\)-vector subspace \\(P_i = P_i(F) \\subset \\Bcrys\\) is the set of\n  \\(\\lambda \\in \\Bcrys\\) such that \\(\\varphi^2(\\lambda) = \\lambda\\),\n  \\(\\lambda \\in \\Fil^i \\BdR\\), and \\(\\varphi(\\lambda) \\in \\Fil^{-i} \\BdR\\).", "uses": ["thm:bcrys-bdr", "prop:endo-field", "ass:i-positive"], "lean_name": "MR4199442StandardConjecturesForAbelianFourfolds.periodsUnram", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/padic_periods.tex", "lean_file": "", "dep_count": 3, "rdep_count": 3, "descendant_count": 8, "proof_size_tex": null, "effort_local": 267, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 14745}, "prop:periods-unram-dim": {"id": "prop:periods-unram-dim", "type": "proposition", "title": "Periods are a line, unramified case", "chapter": "p-adic periods and the proof of the main theorem", "statement": "\\textit{Source: Ancona, arXiv:1806.03216, \\S11.}\n  The \\(F\\)-vector space \\(P_i(F)\\) has dimension one. A nonzero\n  \\(\\lambda_i \\in P_i\\) satisfies:\n  (1) \\(\\lambda_i \\cdot \\varphi(\\lambda_i) \\in \\Q_p^*\\);\n  (2) \\(\\lambda_i\\) and \\(\\varphi(\\lambda_i)\\) are invertible in \\(\\Bcrys\\);\n  (3) \\(\\lambda_i \\in \\Fil^i \\BdR \\setminus \\Fil^{i+1} \\BdR\\);\n  (4) \\(\\varphi(\\lambda_i) \\in \\Fil^{-i} \\BdR \\setminus \\Fil^{-i+1} \\BdR\\).", "uses": ["def:periods-unram", "thm:crys-equiv", "thm:bcrys-bdr"], "lean_name": "MR4199442StandardConjecturesForAbelianFourfolds.periodsUnramDim", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:periods-unram, thm:crys-equiv, thm:bcrys-bdr}\n  By construction \\(\\lambda_i \\cdot \\varphi(\\lambda_i) \\in \\Bcrys^{\\varphi=\\id}\n  \\cap \\Fil^0 \\BdR = \\Q_p\\) (\\cref{thm:bcrys-bdr}); that it is nonzero will\n  follow from part (2), giving part (1).\n\n  Consider \\(N = \\Q_p^2\\) with basis \\(e_1, e_2\\), Frobenius\n  \\(\\varphi = \\left(\\begin{smallmatrix} 0 & 1 \\\\ 1 & 0 \\end{smallmatrix}\\right)\\),\n  and filtration \\(\\Fil^{-i} N = N\\),\n  \\(\\Fil^{-i+1} N = \\Fil^i N = \\Q_p \\cdot e_2\\), \\(\\Fil^{i+1} N = 0\\). This is an\n  admissible filtered \\(\\varphi\\)-module: on \\(\\det N\\), \\(\\varphi\\) acts by\n  \\(-1\\) (valuation \\(0\\)) and the filtration jumps only at \\(0\\); the two\n  \\(\\varphi\\)-stable lines are not \\(\\Q_p \\cdot e_2\\), so their filtration jumps\n  at \\(-i\\), while \\(\\varphi\\) acts by \\(\\pm 1\\) (valuation \\(0\\)), and\n  \\(-i \\leq 0\\) as \\(i > 0\\). By \\cref{thm:crys-equiv} there is a unique \\(V\\)\n  with \\(N = D(V)\\). Writing a nonzero \\((\\alpha, \\beta) \\in V\\) in the basis,\n  \\(\\varphi\\)-invariance gives \\(\\alpha = \\varphi(\\beta)\\),\n  \\(\\beta = \\varphi(\\alpha)\\), hence \\(\\alpha = \\varphi^2(\\alpha)\\); membership\n  in \\(\\Fil^0[N \\otimes \\BdR]\\) gives \\(\\alpha \\in \\Fil^i \\BdR\\),\n  \\(\\beta \\in \\Fil^{-i} \\BdR\\). Thus \\(\\alpha \\in P_i\\), and \\(t \\mapsto (t,\n  \\varphi(t))\\) identifies \\(P_i\\) with \\(V\\); as \\(\\dim_{\\Q_p} V = 2\\), \\(P_i\\)\n  is an \\(F\\)-line.\n\n  The determinant period relating \\(\\det N\\) to \\(\\det V\\) is generated by\n  \\(\\alpha\\beta(f - \\varphi(f))\\) for fixed \\(f \\in F \\setminus \\Q_p\\); as\n  \\(\\det N \\otimes \\Bcrys\\) and \\(\\det V \\otimes \\Bcrys\\) are free of rank one,\n  this is invertible, hence so are \\(\\alpha\\) and \\(\\beta\\). Finally\n  \\(\\nu(\\alpha) \\geq i\\) and \\(\\nu(\\beta) \\geq -i\\), while\n  \\(\\nu(\\alpha\\beta(f - \\varphi(f))) = 0\\) gives \\(\\nu(\\alpha\\beta) = 0\\), so\n  both inequalities are equalities.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/padic_periods.tex", "lean_file": "", "dep_count": 3, "rdep_count": 3, "descendant_count": 7, "proof_size_tex": 1837, "effort_local": 1837, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 16582}, "def:Q-unram": {"id": "def:Q-unram", "type": "definition", "title": "The space \\(Q\\), unramified case", "chapter": "p-adic periods and the proof of the main theorem", "statement": "\\textit{Source: Ancona, arXiv:1806.03216, \\S11.}\n  Viewing \\(V_{Z,+}\\) and \\(V_{B,+}\\) of \\cref{rem:conventionF} as \\(F\\)-subspaces\n  of \\(V_{Z,p} \\otimes \\Bcrys\\) via \\cref{cor:crys-identifications}, the\n  \\(F\\)-vector subspace \\(Q = Q(M) \\subset \\Bcrys\\) is the set of\n  \\(\\lambda \\in \\Bcrys\\) with \\(\\lambda \\cdot V_{B,+} \\subset V_{Z,+}\\).", "uses": ["cor:crys-identifications", "prop:endo-field"], "lean_name": "MR4199442StandardConjecturesForAbelianFourfolds.QUnram", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/padic_periods.tex", "lean_file": "", "dep_count": 2, "rdep_count": 1, "descendant_count": 6, "proof_size_tex": null, "effort_local": 343, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 14821}, "prop:PQ-unram": {"id": "prop:PQ-unram", "type": "proposition", "title": "\\(P_i = Q\\), unramified case", "chapter": "p-adic periods and the proof of the main theorem", "statement": "\\textit{Source: Ancona, arXiv:1806.03216, \\S11.}\n  The \\(F\\)-vector subspaces \\(P_i, Q \\subset \\Bcrys\\) of\n  \\cref{def:periods-unram} and \\cref{def:Q-unram} coincide and have dimension\n  one.", "uses": ["def:periods-unram", "def:Q-unram", "prop:periods-unram-dim", "cor:crys-identifications"], "lean_name": "MR4199442StandardConjecturesForAbelianFourfolds.PQUnram", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:periods-unram, def:Q-unram, prop:periods-unram-dim, cor:crys-identifications}\n  By \\cref{rem:conventionF} we have \\(V_{B,+} \\cdot \\Bcrys = V_{Z,+} \\cdot \\Bcrys\\),\n  and since \\(V_{B,+}, V_{Z,+}\\) are \\(F\\)-lines, \\(Q\\) has dimension one. Fix a\n  nonzero \\(\\lambda \\in Q\\); there are nonzero \\(v_B \\in V_{B,+}\\),\n  \\(v_Z \\in V_{Z,+}\\) with \\(\\lambda \\cdot v_B = v_Z\\), hence\n  \\(\\varphi(\\lambda) \\cdot \\varphi(v_B) = \\varphi(v_Z)\\). As \\(\\varphi\\) acts\n  trivially on \\(V_{B,p}\\) and on \\(V_{Z,p}\\) (algebraic classes), it acts as the\n  nontrivial element of \\(\\Gal(F/\\Q_p)\\) on \\(V_{B,p} \\otimes F\\) and\n  \\(V_{Z,p} \\otimes F\\); thus \\(\\varphi(v_B) \\in V_{B,-}\\),\n  \\(\\varphi(v_Z) \\in V_{Z,-}\\) and \\(\\varphi^2(v_B) = v_B\\),\n  \\(\\varphi^2(v_Z) = v_Z\\). Through \\cref{cor:crys-identifications} these give\n  the three conditions of \\cref{def:periods-unram}, so \\(Q \\subset P_i\\); by\n  \\cref{prop:periods-unram-dim} this is an equality.\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/padic_periods.tex", "lean_file": "", "dep_count": 4, "rdep_count": 1, "descendant_count": 5, "proof_size_tex": 943, "effort_local": 943, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 17868}, "prop:iso-norm-unram": {"id": "prop:iso-norm-unram", "type": "proposition", "title": "Isomorphism via a norm, unramified case", "chapter": "p-adic periods and the proof of the main theorem", "statement": "\\textit{Source: Ancona, arXiv:1806.03216, \\S11.}\n  For a nonzero \\(\\lambda_i \\in P_i\\) (recall\n  \\(\\lambda_i \\cdot \\varphi(\\lambda_i) \\in \\Q_p^*\\) by\n  \\cref{prop:periods-unram-dim}), the quadratic forms \\(q_{B,p}\\) and\n  \\(q_{Z,p}\\) are isomorphic if and only if\n  \\(\\lambda_i \\cdot \\varphi(\\lambda_i) \\in N_{F/\\Q_p}(F^*)\\).", "uses": ["prop:periods-unram-dim", "prop:PQ-unram", "cor:norm-criterion", "cor:crys-identifications"], "lean_name": "MR4199442StandardConjecturesForAbelianFourfolds.isoNormUnram", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{prop:periods-unram-dim, prop:PQ-unram, cor:norm-criterion, cor:crys-identifications}\n  Take \\(v_B \\in V_{B,+}\\), \\(v_Z \\in V_{Z,+}\\) as in\n  \\cref{prop:PQ-unram}. Then \\(v_B + \\var on \\(V\\), with\n  \\(V \\otimes \\Bcrys = N \\otimes \\Bcrys\\) being \\(F\\)-equivariant. There are\n  eigenvectors \\(m \\in L\\), \\(v \\in V \\otimes F\\) and \\(\\alpha \\in B_{\\crys,F}\\)\n  with \\(\\alpha \\cdot m = v\\), hence \\(\\sigma(\\alpha) \\cdot \\sigma(m) =\n  \\sigma(v)\\). As \\(\\varphi\\) acts trivially on \\(V\\) and \\(N\\), it fixes\n  \\(\\alpha\\) and \\(\\sigma(\\alpha)\\); the inclusion \\(V \\subset \\Fil^0(N \\otimes\n  \\BdR)\\) gives \\(\\alpha \\in \\Fil^i \\setminus \\Fil^{i+1}\\),\n  \\(\\sigma(\\alpha) \\in \\Fil^{-i} \\setminus \\Fil^{-i+1}\\). Thus \\(\\alpha \\in P_i\\),\n  and \\(t \\mapsto t \\cdot m + \\sigma(t) \\cdot \\sigma(m)\\) identifies \\(P_i\\) with\n  \\(V\\), an \\(F\\)-line. Finally \\(v\\) and \\(m\\) generate the same rank-one free\n  \\(B_{\\crys,F}\\)-module, so \\(\\alpha\\) is invertible, and likewise\n  \\(\\sigma(\\alpha)\\).\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/padic_periods.tex", "lean_file": "", "dep_count": 3, "rdep_count": 5, "descendant_count": 12, "proof_size_tex": 1782, "effort_local": 1782, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 16582}, "def:Q-ram": {"id": "def:Q-ram", "type": "definition", "title": "The space \\(Q\\), ramified case", "chapter": "p-adic periods and the proof of the main theorem", "statement": "\\textit{Source: Ancona, arXiv:1806.03216, \\S11.}\n  Viewing \\(V_{Z,+}\\) and \\(V_{B,+}\\) of \\cref{rem:conventionF} as \\(F\\)-subspaces\n  of \\(V_{Z,p} \\otimes B_{\\crys,F}\\) via \\cref{cor:crys-identifications}, the\n  \\(F\\)-vector subspace \\(Q = Q(M) \\subset B_{\\crys,F}\\) is the set of\n  \\(\\lambda \\in B_{\\crys,F}\\) with \\(\\lambda \\cdot V_{B,+} \\subset V_{Z,+}\\).", "uses": ["cor:crys-identifications", "prop:endo-field"], "lean_name": "MR4199442StandardConjecturesForAbelianFourfolds.QRam", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "", "proof_si d": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{thm:crys-equiv, thm:bcrys-bdr}\n  Consider \\(N = \\Q_p^2\\) with basis \\(e_1, e_2\\), Frobenius\n  \\(\\varphi = \\left(\\begin{smallmatrix} 0 & 1/p \\\\ 1 & 0 \\end{smallmatrix}\\right)\\),\n  and filtration \\(\\Fil^{-1} N = N\\), \\(\\Fil^0 N = \\Q_p e_2\\), \\(\\Fil^1 N = 0\\).\n  This is admissible: \\(N\\) has no nontrivial \\(\\varphi\\)-stable submodule, and on\n  \\(\\det N\\), \\(\\varphi\\) acts by \\(-1/p\\) (valuation \\(-1\\)) with the only\n  filtration jump at \\(-1\\). By \\cref{thm:crys-equiv} there is a unique \\(V\\) with\n  \\(N = D(V)\\). A nonzero \\((\\alpha, \\beta) \\in V\\), being \\(\\varphi\\)-fixed,\n  satisfies \\(\\alpha = (1/p)\\varphi(\\beta)\\), \\(\\beta = \\varphi(\\alpha)\\), hence\n  \\(p \\cdot \\alpha = \\varphi^2(\\alpha)\\); set \\(t_2 = \\alpha\\),\n  \\(\\varphi(t_2) = \\beta\\). Membership in \\(\\Fil^0[N \\otimes \\BdR]\\) gives\n  \\(\\alpha \\in \\Fil^1 \\BdR\\), \\(\\beta \\in \\Fil^0 \\BdR\\). The determinant period\n  \\(\\alpha\\beta(f - \\varphi(f))\\) (\\(f \\in F \\setminus \\Q_p\\)) is invertible, so\n  \\(\\alpha, \\beta\\) are invertible. Finally \\(\\nu(\\alpha) \\geq 1\\),\n  \\(\\nu(\\beta) \\geq 0\\) and \\(\\nu(\\alpha\\beta) = 1\\) force equalities, giving (1)\n  and (2).\n", "lean_source": "", "proof_size_lean": null, "has_sorry": false, "tex_file": "chapters/padic_periods.tex", "lean_file": "", "dep_count": 2, "rdep_count": 1, "descendant_count": 5, "proof_size_tex": 1125, "effort_local": 1125, "proof_size_tex_total": null, "proof_size_lean_total": null, "effort_total": 4389}, "cor:period-unram": {"id": "cor:period-unram", "type": "corollary", "title": "Explicit unramified period", "chapter": "p-adic periods and the proof of the main theorem", "statement": "\\textit{Source: Ancona, arXiv:1806.03216, \\S12.}\n  With \\(t_2\\) of \\cref{prop:lubin-tate-unram}, the element\n  \\(\\lambda_i = (t_2/\\varphi(t_2))^i\\) is a nonzero element of \\(P_
